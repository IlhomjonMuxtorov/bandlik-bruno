info:
  name: 1. Register Guest
  type: http
  seq: 1
http:
  method: POST
  url: '{{ base_url }}/mobile/auth/register-guest'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"device_id\": \"{{ device_id }}\",\n  \"os\": \"android\",\n  \"fcm_token\": \"sample_fcm_token_123\",\n  \"app_version\": \"1.0.0\",\n  \"language\": \"uz\"\n}"
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
