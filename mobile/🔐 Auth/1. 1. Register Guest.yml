info:
  name: 1. Register Guest
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url}}/mobile/auth/register-guest'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"device_id\": \"{{device_id}}\",\n  \"os\": \"android\",\n  \"fcm_token\": \"sample_fcm_token_123\",\n  \"app_version\": \"1.0.0\",\n  \"language\": \"uz\"\n}"
  auth: inherit
docs: |
  Ilova birinchi marta o'rnatilganda yoki ishga tushganda chaqiriladi. Yangi guest foydalanuvchi + qurilma yaratadi va qisqa muddatli JWT qaytaradi.

  **Auth:** talab qilinmaydi.

  ### đź“Ą Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `device_id` | string | âś… | Qurilmaning unikal identifikatori (UUID v4). Bir xil `device_id` kelsa qurilma yangilanadi. |
  | `os` | string | âś… | Operatsion tizim â€” `android` \| `ios`. |
  | `fcm_token` | string | âž– | Firebase Cloud Messaging token. Push uchun. Keyinchalik `PATCH /device/fcm` orqali yangilanadi. |
  | `app_version` | string | âž– | Semantic version, masalan `1.0.0`. Minimal versiya tekshiruvi uchun saqlanadi. |
  | `language` | string | âž– | `uz` \| `ru` \| `en`. Default: `uz`. Push shu tilda yuboriladi. |

  ### đź“¤ Response

  | Field | Type | Description |
  |---|---|---|
  | `access_token` | string | Guest JWT (1 soat amal qiladi). Payload: `{ sub: user_id, status: 3, type: 4 }` |
  | `token_type` | string | Har doim `Bearer` |
  | `expires_in` | int | Token muddati soniyalarda (`3600`) |

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `400` | Validatsiya xatosi (`device_id` yoki `os` yo'q / noto'g'ri). |
  | `500` | Qurilma yoki foydalanuvchi saqlashda xatolik. |

