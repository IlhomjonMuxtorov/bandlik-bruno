info:
  name: 5. Logout
  type: http
  seq: 6
http:
  method: POST
  url: '{{ base_url }}/mobile/auth/logout'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"device_id\": \"{{ device_id }}\"\n}"
  auth:
    mode: bearer
    bearer: '{{ access_token }}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
