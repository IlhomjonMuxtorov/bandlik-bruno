info:
  name: 5.1. Login with PIN
  type: http
  seq: 7
http:
  method: POST
  url: '{{base_url}}/mobile/auth/login-with-pin'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"pin\": \"1234\",\n  \"device_id\": \"{{device_id}}\"\n}"
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
