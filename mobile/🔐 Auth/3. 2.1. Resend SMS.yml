info:
  name: 2.1. Resend SMS
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/mobile/auth/resend-sms'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"phone\": \"+998901234567\"\n}"
  auth:
    mode: bearer
    bearer: '{{guest_token}}'
docs: |
  This endpoint handles POST request.
  
  ### 📥 Request Body
  
  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `phone` | string | ✅ | — |
  
  ### 📤 Response
  
  | Field | Type | Description |
  |---|---|---|
  | `success` | boolean | Request success status |
  | `data` | object | Response data |
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `400` | Invalid request data |
  | `401` | Unauthorized |
  | `404` | Not found |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
