info:
  name: 2.1. Resend SMS
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/mobile/auth/resend-sms'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"phone\": \"+998901234567\"\n}"
  auth:
    mode: bearer
    bearer: '{{ guest_token }}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
