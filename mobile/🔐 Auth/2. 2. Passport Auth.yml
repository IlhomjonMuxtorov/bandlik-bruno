info:
  name: 2. Passport Auth
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/mobile/auth/passport'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"passport_series\": \"AA\",\n  \"passport_number\": \"1234567\",\n  \"birth_date\": \"15.05.1990\",\n  \"phone\": \"+998901234567\",\n  \"device_id\": \"{{device_id}}\"\n}"
  auth:
    mode: bearer
    bearer: '{{guest_token}}'
docs: |
  This endpoint handles POST request.
  
  ### 📥 Request Body
  
  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `passport_series` | string | ✅ | — |
  | `passport_number` | string | ✅ | — |
  | `birth_date` | string | ✅ | — |
  | `phone` | string | ✅ | — |
  | `device_id` | string | ✅ | — |
  
  ### 📤 Response
  
  | Field | Type | Description |
  |---|---|---|
  | `success` | boolean | Request success status |
  | `data` | object | Response data |
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `400` | Invalid request data |
  | `401` | Unauthorized |
  | `404` | Not found |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
