info:
  name: 5.3. Change PIN
  type: http
  seq: 9
http:
  method: POST
  url: '{{base_url}}/mobile/auth/change-pin'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"old_pin\": \"1234\",\n  \"new_pin\": \"5678\"\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  This endpoint handles POST request.
  
  ### 📥 Request Body
  
  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `old_pin` | string | ✅ | — |
  | `new_pin` | string | ✅ | — |
  
  ### 📤 Response
  
  | Field | Type | Description |
  |---|---|---|
  | `success` | boolean | Request success status |
  | `data` | object | Response data |
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `400` | Invalid request data |
  | `401` | Unauthorized |
  | `404` | Not found |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
