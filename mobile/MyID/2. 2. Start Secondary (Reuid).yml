  \n**Auth:** `guest_token` (kamida guest token kerak)  \n**Returns:** `{ session_id }`\n\n### \U0001F4E5 Request Body\n\
  \n| Field | Type | Required | Description |\n|---|---|:---:|---|\n| `reuid` | string\
  \ | ✅ | Qayta foydalanish uchun ID (oldin olingan) |\n| `phone` | string | ➖ | Telefon\
  \ raqami |\n| `threshold` | number | ➖ | Yuz moslik progi, default: 0.85 |\n"
