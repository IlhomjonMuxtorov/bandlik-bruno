info:
  name: 8. Update Language
  type: http
  seq: 3
http:
  method: PATCH
  url: '{{base_url}}/mobile/device/language'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"device_id\": \"{{device_id}}\",\n  \"language\": \"ru\"\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Foydalanuvchi ilovada tilni o'zgartirganida chaqiriladi. Backend push-xabarnomalarni keyinchalik shu tilda yuboradi.

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `device_id` | string | ✅ | UUID. Tili o'zgartirilayotgan qurilma. |
  | `language` | string | ✅ | `uz` \| `ru` \| `en`. Boshqa qiymat `400`. |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `updated` | bool | Har doim `true` |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `device_id` ko'rsatilmagan |
  | `400` | `language` qiymati `uz`/`ru`/`en` dan tashqari |
  | `401` | `access_token` yo'q yoki muddati o'tgan |
  | `404` | `device_id` ushbu foydalanuvchiga tegishli emas |

