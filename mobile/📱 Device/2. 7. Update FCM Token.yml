info:
  name: 7. Update FCM Token
  type: http
  seq: 2
http:
  method: PATCH
  url: '{{base_url}}/mobile/device/fcm'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"device_id\": \"{{device_id}}\",\n  \"fcm_token\": \"refreshed_fcm_token_xyz\"\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  This endpoint handles PATCH request.
  
  ### 📥 Request Body
  
  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `device_id` | string | ✅ | — |
  | `fcm_token` | string | ✅ | — |
  
  ### 📤 Response
  
  | Field | Type | Description |
  |---|---|---|
  | `success` | boolean | Request success status |
  | `data` | object | Response data |
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `400` | Invalid request data |
  | `401` | Unauthorized |
  | `404` | Not found |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
