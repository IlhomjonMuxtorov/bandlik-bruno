info:
  name: 7. Update FCM Token
  type: http
  seq: 2
http:
  method: PATCH
  url: '{{base_url}}/mobile/device/fcm'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"device_id\": \"{{device_id}}\",\n  \"fcm_token\": \"refreshed_fcm_token_xyz\"\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
