info:
  name: Course Detail
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/mobile/courses/1'
  auth: inherit
docs: |-
  Bitta kurs tafsiloti. Faqat faol + e'lon qilingan (`is_active=true`, `status=active`) kurs qaytariladi. Kartochka maydonlariga qo'shimcha: to'liq tavsif va kursni taqdim etuvchi o'quv markazi (`organization`).

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi).

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (mehmon tokeni ham). |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Kurs ID |
  | `name` | string | Kurs nomi |
  | `slug` | string | URL slug |
  | `description` | string \| null | To'liq tavsif |
  | `category` | string \| null | `interview_prep` \| `language` \| `living_abroad` |
  | `category_label` | string \| null | Lokalizatsiya qilingan kurs turi nomi |
  | `language` | object \| null | `{ id, iso_code, name }` |
  | `level` | string \| null | Daraja (`A1` ...) |
  | `duration_hours` | int \| null | Davomiylik, soat |
  | `lessons_count` | int \| null | Darslar soni |
  | `price` | int | Narx (butun, `currency` valyutasida) |
  | `currency` | string | `UZS` \| `USD` \| `EUR` |
  | `cover_url` | string \| null | Muqova rasmi URL |
  | `organization` | object \| null | O'quv markazi: `{ id, name, logo_url }` |
  | `is_purchased` | bool | Nomzod kursni sotib olganmi (mehmonda/sotib olinmaganda `false`) |
  | `completion_percent` | float | Kursni tugatish foizi (darslar progressi o'rtachasi; sotib olinmaganda `0`) |
  | `lessons` | array | Darslar ro'yxati (har element: `id, name, type, sort_order, progress, is_passed, is_locked`) |

  > **Darslar ro'yxati** kurs sahifasida doim ko'rinadi. Sotib olinmaganda har bir dars `is_locked=true` (qulflangan, ochib bo'lmaydi) va `is_purchased=false` — UI to'lov qutisini (`price`) ko'rsatadi. Sotib olingach `is_locked=false`, `progress`/`is_passed` to'ladi va `completion_percent` progress barini boshqaradi. Darsni ochish (play_url) uchun: `GET /mobile/lessons/{id}`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz |
  | `404` | Kurs topilmadi yoki faol/e'lon qilinmagan |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
