info:
  name: Course List
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/courses'
  auth: inherit
docs: |-
  E'lon qilingan (`status=active`) o'quv kurslari ro'yxati — mobil **kartochka** ko'rinishi (Kurslar feed). Default tartib: `sort_order ASC`, keyin `id DESC`. Filtrlar "Filter" oynasiga mos: Kurs turi, Til, Daraja, Davomiylik.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi).

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Nomi / slug / tavsif / daraja bo'yicha qidiruv (ILIKE). |
  | `category_id` | int \| int[] | ➖ | Kurs turi ID (`course_type`). Bir nechta: `category_id[]=3&category_id[]=7` yoki `category_id=3,7` (OR bo'yicha). Manba: `GET /mobile/course-categories`. |
  | `language_id` | int \| int[] | ➖ | Til ID. Bir nechta: `language_id[]=1&language_id[]=2` yoki `language_id=1,2` (OR bo'yicha). |
  | `level` | string | ➖ | Daraja (masalan `A1`, `B2`). Aniq moslik. |
  | `duration_min` | int | ➖ | Minimal davomiylik, soat (`duration_hours >=`). |
  | `duration_max` | int | ➖ | Maksimal davomiylik, soat (`duration_hours <=`). |
  | `sort` | string | ➖ | `id` \| `sort_order` \| `price` \| `duration_hours` \| `created_at` \| `name` (oldiga `-` qo'yilsa kamayish tartibida, masalan `-price`). |
  | `per-page` | int | ➖ | 1..100, default 20. |
  | `page` | int | ➖ | Sahifa raqami. |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (mehmon tokeni ham). |

  ### 📤 Response

  Massiv (mobile format — metadata yo'q; sahifalash `X-Pagination-*` header'larida — jumladan `X-Pagination-Total-Count` = qidiruv/filtrga mos jami natijalar soni, "badge" uchun. Header CORS `Access-Control-Expose-Headers` orqali ochiq, frontend o'qiy oladi). Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Kurs ID |
  | `name` | string | Kurs nomi |
  | `slug` | string | URL slug |
  | `description` | string \| null | Qisqa tavsif |
  | `category_id` | int \| null | Kurs turi ID (`course_type`) |
  | `category_label` | string \| null | Lokalizatsiya qilingan kurs turi nomi |
  | `language` | object \| null | `{ id, iso_code, name }` |
  | `level` | string \| null | Daraja (`A1` ...) |
  | `duration_hours` | int \| null | Davomiylik, soat |
  | `lessons_count` | int \| null | Darslar soni |
  | `price` | int | Narx — butun **so'm** (tiyin EMAS), `currency` valyutasida. Admin API bilan bir xil birlik. |
  | `currency` | string | `UZS` \| `USD` \| `EUR` |
  | `cover_url` | string \| null | Muqova rasmi URL |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz |
  | `500` | Server xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
