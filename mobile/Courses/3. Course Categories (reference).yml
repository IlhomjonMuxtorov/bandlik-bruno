info:
  name: Course Categories (reference)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/course-categories'
  auth: inherit
docs: |-
  "Kurs turi" filtri uchun ma'lumotnoma — barcha mavjud kurs turlari (`value` + lokalizatsiya qilingan `label`). Filtr oynasidagi "Kurs turi" ro'yxatini to'ldirish uchun ishlatiladi.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi).

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (mehmon tokeni ham). |

  ### 📤 Response

  Massiv. Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `value` | string | `interview_prep` \| `language` \| `living_abroad` |
  | `label` | string | Lokalizatsiya qilingan nomi (`Accept-Language` / qurilma tiliga qarab) |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
