info:
  name: Course Categories (reference)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/course-categories'
  auth: inherit
docs: |-
  "Kurs turi" filtri uchun ma'lumotnoma — admin tomonidan boshqariladigan faol (`is_active=true`) kurs turlari, `course_type` jadvalidan. Filtr oynasidagi "Kurs turi" ro'yxatini to'ldirish uchun ishlatiladi.

  > Ro'yxat `Accept-Language` bo'yicha alifbo (A-Z) tartibida qaytadi (fallback
  > `uz`) — endi `sort_order` bo'yicha emas.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi).

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (mehmon tokeni ham). |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |

  ### 📤 Response

  Massiv. Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Kurs turi ID (`category_id` filtrida va kursning `category_id` da ishlatiladi) |
  | `name` | string | Lokalizatsiya qilingan nomi (`Accept-Language` ga qarab) |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
