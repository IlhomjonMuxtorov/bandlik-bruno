info:
  name: 7. Regions (O'zbekiston viloyatlari)
  type: http
  seq: 7
http:
  method: GET
  url: '{{base_url}}/mobile/regions'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  O'zbekiston viloyatlari ro'yxati (GCP Spravochniki, 15 yozuv).

  `id` qiymati GCP Spravochniki `SP_ID` ga teng (10 = Toshkent shahri, 11 = Toshkent viloyati, 12 = Sirdaryo va h.k.). Passport API javobidagi `birthregionid` to'g'ridan-to'g'ri shu ID ga mos.

  **Auth:** `access_token`.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {access_token}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz` |

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Viloyat kodi (GCP SP_ID) |
  | `name` | string | Lokalizatsiyalangan nom |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki muddati o'tgan |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
