info:
  name: 1. Countries List
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/countries'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{guest_token}}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
