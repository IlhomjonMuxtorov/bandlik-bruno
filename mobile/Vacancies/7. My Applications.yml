info:
  name: My Applications
  type: http
  seq: 7
http:
  method: GET
  url: '{{base_url}}/mobile/my-applications'
  auth: inherit
docs: |-
  Joriy nomzodning barcha arizalari. Mobile pagination тАФ bare array.

  **Auth:** `access_token`.

  ### ЁЯФО Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | тЮЦ | Vakansiya nomi (`title`) bo'yicha qidiruv (ILIKE, case-insensitive). `status` bilan birga ishlatish mumkin. |
  | `status` | string | тЮЦ | `applied` \| `reviewed` \| `accepted` \| `rejected` |
  | `per-page` | int | тЮЦ | 1..100, default 20 |

  ### ЁЯУд Response

  Massiv:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Application ID |
  | `chat_id` | int \| null | Tegishli chat (conversation) id. `null` тАФ agar chat ochilmagan bo'lsa (vakansiya tashkiloti XBA emas). `GET /mobile/chats/{chat_id}` bilan ochiladi. |
  | `vacancy` | object | `{id, title}` |
  | `status` / `status_label` | string | `applied` ... |
  | `cv` | object \| null | `{id, title}` |
  | `applied_at` | int | Unix timestamp |
  | `applied_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
  | `reviewed_at` / `decided_at` | int \| null | |
  | `reviewed_at_formatted` / `decided_at_formatted` | string \| null | `d.m.Y H:i` (Asia/Tashkent) |

  ### тЪая╕П Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `404` | Nomzod topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
