info:
  name: 13. My Applications Count
  type: http
  seq: 13
http:
  method: GET
  url: '{{base_url}}/mobile/my-applications/count'
  auth: inherit
docs: |-
  Hozirgi nomzodning arizalari **umumiy sonini** qaytaradi — mobil filter ekranidagi badge yoki "N ta ariaza" tugmasi uchun. Feed (`GET /mobile/my-applications`) bilan **aynan bir xil** filtr mantig'ini ishlatadi, shuning uchun son va ro'yxat har doim mos keladi.

  **Auth:** `access_token` majburiy (mehmon tokeni yaramaydi — autentifikatsiya va verifikatsiya talab qilinadi).

  ### 🔎 Query Parameters

  Feed bilan bir xil filtr paramlari. `per-page`, `page` count uchun ahamiyatsiz va e'tiborga olinmaydi.

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `status` | string | ➖ | Filtr statusiga qarab. Qiymatlar: `applied` \| `reviewed` \| `accepted` \| `rejected`. |
  | `q` | string | ➖ | Vakansiya sarlavhasi bo'yicha qidiruv (ILIKE). |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (verified account). |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `count` | int | Tanlangan filterlarga mos keladigan arizalar soni. |

  ```json
  { "count": 7 }
  ```

  > `count` qiymati feed (`GET /mobile/my-applications`) javobidagi `X-Pagination-Total-Count` header bilan bir xil bo'ladi (bir xil filtrlar berilganda).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz. |
  | `403` | Nomzod hisobiga ko'rsatmadi (mehmon token). |
  | `500` | Server xatosi. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
