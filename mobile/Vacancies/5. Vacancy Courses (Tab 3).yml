info:
  name: Vacancy Courses (Tab 3 — Tayyorlov kursi)
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/mobile/vacancies/1/courses'
  auth: inherit
docs: |-
  Detail ekranining **3-tabi ("Tayyorlov kursi")**: vakansiyaga biriktirilgan `training` kategoriyasidagi kurslar va ular uchun **bitta umumiy narx** (`combined_price`). Har kursning alohida narxi ko'rsatilmaydi — nomzod tanlangan kurslar to'plami uchun bitta umumiy narx to'laydi.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi).

  > **Breaking (shakl o'zgardi):** javob endi flat massiv emas — `{ combined_price, currency, courses[] }` obyekt. Har kurs elementidan `price` / `currency` **olib tashlandi**; narx faqat yuqori darajadagi `combined_price` da.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>`. |

  ### 📤 Response

  `{ ... }` — obyekt:

  | Field | Type | Description |
  |---|---|---|
  | `combined_price` | int \| null | Tanlangan kurslar uchun umumiy narx — so'mda (major unit), `currency` valyutasida. `null` faqat eski (combined narxsiz) vakansiyalarda. |
  | `currency` | string | `combined_price` valyutasi (default `UZS`) |
  | `courses` | array | Biriktirilgan kurslar ro'yxati (quyida), har biri narxsiz |

  **`courses[]` element:**

  | Field | Type | Description |
  |---|---|---|
  | `service_id` | int | `vacancy_service` qatori ID |
  | `course` | object \| null | Bog'langan kurs ma'lumotlari (quyida). Kurs o'chirilgan bo'lsa `null`. |

  **`course` object:**

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | EducationalCourse ID |
  | `name` | string | Kurs nomi (masalan "Nemis tili A1 darajasi") |
  | `description` | string \| null | Tavsif |
  | `level` | string \| null | Daraja (masalan `A1`) |
  | `duration_hours` | int \| null | Soat ("40 soat") |
  | `lessons_count` | int \| null | Darslar soni ("20 dars") |
  | `cover_url` | string \| null | Muqova rasm URL |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Vakansiya topilmadi yoki `approved` emas |
