info:
  name: Vacancy Detail (Tab 1 — Vakansiya haqida)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/vacancies/1'
  auth: inherit
docs: |-
  Detail ekranining **1-tabi ("Vakansiya haqida")**: header + asosiy ma'lumot + talablar + imtiyozlar + tashkilot. **Har chaqiriqda `views_count` atomik 1 ga oshadi.**

  To'lovlar (2-tab) va Tayyorlov kursi (3-tab) alohida endpointlarda (lazy-load):
  - `GET /mobile/vacancies/{id}/payments`
  - `GET /mobile/vacancies/{id}/courses`

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi). `visa_chance` viza so'rovnomasi to'ldirilmagan bo'lsa `null`.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (mehmon tokeni ham). |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Vacancy ID |
  | `title` | string | Sarlavha |
  | `description` | string \| null | HTML/markdown matn |
  | `country` | object | `{ id, name, flag_url }` |
  | `city` | object \| null | `{ id, name }` |
  | `visa_chance` | int \| null | "Sizga Viza chiqish darajasi %" — viza so'rovnomasidan, shu davlat bo'yicha. `match_score` bilan bir xil manba. `null` agar token yo'q / so'rovnoma to'ldirilmagan. |
  | `is_favorite` | bool | Joriy foydalanuvchi shu vakansiyani sevimlilarga qo'shganmi. Mehmon / kandidat topilmasa `false`. |
  | `salary` | object | `{ gross, gross_currency, net, net_currency }` — summalar major unitda (so'm/dollar, o'z valyutasida) |
  | `experience_months` | int | Talab qilinadigan ish tajribasi (oylarda). `0` = talab qilinmaydi. |
  | `experience_months_label` | string | Lokalizatsiyalangan label (`Accept-Language`). Masalan: `Tajriba talab qilinmaydi`, `8 oy`, `2 yil`, `1 yil 6 oy`. |
  | `employment_type` / `_label` | string | `full_time` ... + lokalizatsiya |
  | `hiring_quota` | int | Ishga qabul kvotasi (jami o'rin soni) |
  | `accepted_count` | int | Hozircha band qilingan o'rinlar — pipeline'dagi nomzodlar (chiqib ketgan / kursdan yiqilgan / vizasi rad etilganlar hisobga olinmaydi). |
  | `remaining_quota` | int | Qolgan bo'sh o'rin = `hiring_quota − accepted_count` (manfiy bo'lmaydi). Kvota to'lganda yangi nomzod qabul qilinmaydi. |
  | `duration_months_min` / `_max` | int \| null | Ish davomiyligi (oy) |
  | `work_schedule` / `_label` | string \| null | Ish jadvali |
  | `work_time_from` / `_to` | string \| null | `HH:MM` |
  | `organization` | object | `{ id, name, logo_url }` |
  | `requirements` | array | `[{ id, title, description, sort_order }]` |
  | `benefits` | array | `[{ id, title, description, sort_order }]` |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Vakansiya topilmadi yoki `approved` emas |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
