info:
  name: Vacancy Detail (Tab 1 вЂ” Vakansiya haqida)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/vacancies/1'
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |-
  Detail ekranining **1-tabi ("Vakansiya haqida")**: header + asosiy ma'lumot + talablar + imtiyozlar + tashkilot. **Har chaqiriqda `views_count` atomik 1 ga oshadi.**

  To'lovlar (2-tab) va Tayyorlov kursi (3-tab) alohida endpointlarda (lazy-load):
  - `GET /mobile/vacancies/{id}/payments`
  - `GET /mobile/vacancies/{id}/courses`

  **Auth:** ixtiyoriy. Token yuborilsa `visa_chance` to'ldiriladi (aks holda `null`).

  ### рџ“‹ Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Accept-Language` | вћ– | `uz` \| `ru` \| `en`. Default: `uz`. |
  | `Authorization` | вћ– | `Bearer <access_token>` вЂ” `visa_chance` uchun. |

  ### рџ“¤ Response

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Vacancy ID |
  | `title` | string | Sarlavha |
  | `description` | string \| null | HTML/markdown matn |
  | `country` | object | `{ id, name, flag_url }` |
  | `city` | object \| null | `{ id, name }` |
  | `visa_chance` | int \| null | "Sizga Viza chiqish darajasi %" вЂ” viza so'rovnomasidan, shu davlat bo'yicha. `match_score` bilan bir xil manba. `null` agar token yo'q / so'rovnoma to'ldirilmagan. |
  | `salary` | object | `{ gross, gross_currency, net, net_currency }` |
  | `experience_level` / `_label` | string | `none` \| `one_to_three` \| `three_to_six` + lokalizatsiya |
  | `employment_type` / `_label` | string | `full_time` ... + lokalizatsiya |
  | `hiring_quota` | int | Ishga qabul kvotasi |
  | `duration_months_min` / `_max` | int \| null | Ish davomiyligi (oy) |
  | `work_schedule` / `_label` | string \| null | Ish jadvali |
  | `work_time_from` / `_to` | string \| null | `HH:MM` |
  | `organization` | object | `{ id, name, logo_url }` |
  | `requirements` | array | `[{ id, title, description, sort_order }]` |
  | `benefits` | array | `[{ id, title, description, sort_order }]` |

  ### вљ пёЏ Errors

  | Code | Reason |
  |---|---|
  | `404` | Vakansiya topilmadi yoki `approved` emas |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
