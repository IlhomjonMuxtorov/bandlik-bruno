info:
  name: Apply to Vacancy
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/mobile/vacancies/1/apply'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"cv_id\": 1\n}"
  auth: inherit
docs: |-
  Nomzod tasdiqlangan vakansiyaga ariza topshiradi. Vakansiya `status = approved` bo'lishi va shu nomzoddan **birinchi ariza** bo'lishi shart (unique).

  > **Muhim:** `cv_id` endi **majburiy** va ko'rsatilgan CV **to'liq (active)** bo'lishi shart. Rezyume chala (`draft`) bo'lsa ariza qabul qilinmaydi. To'liqlik 11 ta band asosida hisoblanadi (kursdan tashqari 10 ta band majburiy) — qarang `GET /mobile/cv/{id}` → `header.completion`.

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `cv_id` | int | ✅ | Qaysi CV bilan ariza topshirilayotgani. CV `active` (to'liq to'ldirilgan) bo'lishi va shu nomzodga tegishli bo'lishi shart. |

  ### 📤 Response

  201 + Application DTO (id, status=`applied`, applied_at, ...).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Vakansiya `approved` emas |
  | `400` | `cv_id` yuborilmagan ("Please select a CV to apply") |
  | `400` | CV topilmadi yoki boshqa nomzodga tegishli ("CV not found") |
  | `400` | CV to'liq emas / `draft` ("Your CV is incomplete...") |
  | `409` | Allaqachon ariza topshirilgan |
  | `401` | Token yo'q |
  | `403` | Shaxs tasdiqlanmagan (`verification_required: true`) — avval `POST /mobile/auth/verify-identity` |
  | `456` | Mehmon (guest) — to'liq ro'yxatdan o'tish kerak |
  | `404` | Vakansiya yoki nomzod topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
