http:
  method: GET
  url: '{{base_url}}/mobile/vacancy-industries'
  auth: inherit
docs: 'Tasdiqlangan vakansiyalar uchun mavjud sohalar ro''yxati (Restoran, Qurilish,
  IT, ...).


  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi).


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer <access_token>`. |


  ### 📤 Response


  Massiv:


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Industry ID |

  | `code` | string | `restaurant`, `construction`, ... |

  | `name` | string | Lokalizatsiyalangan nom |

  | `category_id` | int \| null | Bog''langan kategoriya ID (yo''q bo''lsa `null`) |

  | `category` | string \| null | Lokalizatsiyalangan kategoriya nomi (yo''q bo''lsa `null`) |

  | `description` | string | Lokalizatsiyalangan izoh (bo''sh bo''lsa `""`) |

  | `sort_order` | int | Tartib |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `500` | Server xatosi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
