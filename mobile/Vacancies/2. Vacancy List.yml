http:
  method: GET
  url: '{{base_url}}/mobile/vacancies'
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |-
  Tasdiqlangan (`status=approved`) vakansiyalar ro'yxati â€” mobil **kartochka** ko'rinishi (yengil DTO, faqat kartochkada ko'rinadigan maydonlar). `published_at DESC` bo'yicha saralanadi.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi). `match_score` viza so'rovnomasi to'ldirilmagan bo'lsa `null`; `is_favorite` nomzod profili hali yo'q bo'lsa `false`.

  ### đź”Ž Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | âž– | Sarlavha bo'yicha qidiruv (ILIKE). |
  | `country_id` | int | âž– | Davlat ID. |
  | `city_id` | int \| int[] | âž– | Shahar ID. Bir nechta shahar: `city_id[]=1&city_id[]=2` yoki `city_id=1,2` (OR bo'yicha). |
  | `industry_id` | int | âž– | Soha ID. |
  | `employment_type` | string | âž– | `full_time` \| `part_time` \| `seasonal` \| `contract`. |
  | `experience_level` | string | âž– | `none` \| `one_to_three` \| `three_to_six`. |
  | `salary_min` | int | âž– | Minimal brutto maosh (`salary_gross >=`). |
  | `salary_max` | int | âž– | Maksimal brutto maosh (`salary_gross <=`). |
  | `salary_currency` | string | âž– | `UZS` \| `USD` \| `EUR`. Range berilganda default `USD`. |
  | `per-page` | int | âž– | 1..100, default 20. |
  | `page` | int | âž– | Sahifa raqami. |

  ### đź“‹ Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Accept-Language` | âž– | `uz` \| `ru` \| `en`. Default: `uz`. |
  | `Authorization` | âś… | `Bearer <access_token>` (mehmon tokeni ham). |

  ### đź“¤ Response

  Massiv (mobile format â€” metadata yo'q; sahifalash `X-Pagination-*` header'larida). Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Vacancy ID |
  | `title` | string | Sarlavha |
  | `slug` | string | URL slug |
  | `country` | object | `{ id, name, flag_url }` |
  | `city` | object \| null | `{ id, name }` |
  | `salary` | object | `{ gross, gross_currency, net, net_currency }` |
  | `employment_type` / `employment_type_label` | string | `full_time` ... + lokalizatsiya |
  | `duration_months_min` / `_max` | int \| null | Ish davomiyligi (oy) |
  | `match_score` | int \| null | "Sizga moslik darajasi %" â€” viza so'rovnomasi natijasidan, vakansiya davlati bo'yicha. Token yo'q yoki so'rovnoma to'ldirilmagan bo'lsa `null`. |
  | `is_favorite` | bool | Joriy nomzod sevimliga qo'shganmi. Mehmon uchun `false`. |

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `500` | Server xatosi |
