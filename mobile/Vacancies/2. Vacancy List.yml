info:
  name: Vacancy List
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/mobile/vacancies'
  auth: inherit
docs: |-
  Tasdiqlangan (`status=approved`) vakansiyalar ro'yxati тАФ mobil **kartochka** ko'rinishi (yengil DTO, faqat kartochkada ko'rinadigan maydonlar). Default tartib: eng yangi e'lon qilinganlar (`published_at DESC`). Tartibni `sort` parametri bilan o'zgartirish mumkin.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi). `match_score` viza so'rovnomasi to'ldirilmagan bo'lsa `null`; `is_favorite` nomzod profili hali yo'q bo'lsa `false`.

  > **Mehmon + sevimlilar:** mehmon (guest) token bilan `is_favorite=true` so'ralsa endpoint `456` qaytaradi тАФ sevimlilar ro'yxati ro'yxatdan o'tishni talab qiladi.

  ### ЁЯФО Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | тЮЦ | Sarlavha bo'yicha qidiruv (ILIKE). |
  | `country_id` | int | тЮЦ | Davlat ID. |
  | `city_id` | int \| int[] | тЮЦ | Shahar ID. Bir nechta shahar: `city_id[]=1&city_id[]=2` yoki `city_id=1,2` (OR bo'yicha). |
  | `industry_id` | int | тЮЦ | Soha ID. |
  | `organization_id` | int | тЮЦ | Tashkilot bo'yicha (tashkilot kartasidagi "Barcha vakansiyalar"dan o'tilganda). |
  | `employment_type` | string | тЮЦ | `full_time` \| `part_time` \| `seasonal` \| `contract`. |
  | `experience_level` | string | тЮЦ | `none` \| `one_to_three` \| `three_to_six`. |
  | `salary_min` | int | тЮЦ | Minimal brutto maosh (`salary_gross >=`) тАФ major unitda (so'm/dollar). |
  | `salary_max` | int | тЮЦ | Maksimal brutto maosh (`salary_gross <=`) тАФ major unitda (so'm/dollar). |
  | `salary_currency` | string | тЮЦ | `UZS` \| `USD` \| `EUR`. Range berilganda default `USD`. |
  | `is_favorite` | bool | тЮЦ | Faqat sevimli vakansiyalar (`true`) yoki sevimli emaslari (`false`). Default: barcha vakansiyalar. Mehmon `true` so'rasa тЖТ `456`. |
  | `cv_id` | int | тЮЦ | CV ID тАФ "mos vakansiyalar" uchun. **Hozircha qabul qilinadi, lekin filtr qo'llanmaydi (no-op);** `cv_id` bo'yicha real moslik filtri keyinroq qo'shiladi. |
  | `sort` | string | тЮЦ | Saralash. `newest` (Yaqinda qo'shilganlar, default) \| `salary_asc` (Maosh o'sish tartibida) \| `salary_desc` (Maosh kamayish tartibida). Maoshsiz vakansiyalar har doim oxirida. Noma'lum qiymat тЖТ `newest`. |
  | `per-page` | int | тЮЦ | 1..100, default 20. |
  | `page` | int | тЮЦ | Sahifa raqami. |

  ### ЁЯУЛ Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | тЬЕ | `Bearer <access_token>` (mehmon tokeni ham). |

  ### ЁЯУд Response

  Massiv (mobile format тАФ metadata yo'q; sahifalash `X-Pagination-*` header'larida тАФ jumladan `X-Pagination-Total-Count` = qidiruv/filtrga mos jami natijalar soni, "badge" uchun. Header CORS `Access-Control-Expose-Headers` orqali ochiq, frontend o'qiy oladi). Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Vacancy ID |
  | `title` | string | Sarlavha |
  | `slug` | string | URL slug |
  | `country` | object | `{ id, name, flag_url }` |
  | `city` | object \| null | `{ id, name }` |
  | `salary` | object | `{ gross, gross_currency, net, net_currency }` тАФ summalar major unitda (so'm/dollar, o'z valyutasida) |
  | `employment_type` / `employment_type_label` | string | `full_time` ... + lokalizatsiya |
  | `duration_months_min` / `_max` | int \| null | Ish davomiyligi (oy) |
  | `match_score` | int \| null | "Sizga moslik darajasi %" тАФ viza so'rovnomasi natijasidan, vakansiya davlati bo'yicha. Token yo'q yoki so'rovnoma to'ldirilmagan bo'lsa `null`. |
  | `is_favorite` | bool | Joriy nomzod sevimliga qo'shganmi. Mehmon uchun `false`. |

  ### тЪая╕П Errors

  | Code | Reason |
  |---|---|
  | `456` | Mehmon (guest) token bilan `is_favorite=true` so'raldi тАФ ro'yxatdan o'tish talab qilinadi. |
  | `500` | Server xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
