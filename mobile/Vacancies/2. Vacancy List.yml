info:
  name: Vacancy List
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/mobile/vacancies'
  auth: inherit
docs: |-
  Tasdiqlangan (`status=approved`) vakansiyalar ro'yxati — mobil **kartochka** ko'rinishi (yengil DTO, faqat kartochkada ko'rinadigan maydonlar). Default tartib: eng yangi e'lon qilinganlar (`published_at DESC`). Tartibni `sort` parametri bilan o'zgartirish mumkin.

  **Auth:** `access_token` majburiy (mehmon tokeni ham yaraydi). `match_score` viza so'rovnomasi to'ldirilmagan bo'lsa `null`; `is_favorite` nomzod profili hali yo'q bo'lsa `false`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Sarlavha bo'yicha qidiruv (ILIKE). |
  | `country_id` | int | ➖ | Davlat ID. |
  | `city_id` | int \| int[] | ➖ | Shahar ID. Bir nechta shahar: `city_id[]=1&city_id[]=2` yoki `city_id=1,2` (OR bo'yicha). |
  | `industry_id` | int | ➖ | Soha ID. |
  | `organization_id` | int | ➖ | Tashkilot bo'yicha (tashkilot kartasidagi "Barcha vakansiyalar"dan o'tilganda). |
  | `employment_type` | string | ➖ | `full_time` \| `part_time` \| `seasonal` \| `contract`. |
  | `experience_level` | string | ➖ | `none` \| `one_to_three` \| `three_to_six`. |
  | `salary_min` | int | ➖ | Minimal brutto maosh (`salary_gross >=`). |
  | `salary_max` | int | ➖ | Maksimal brutto maosh (`salary_gross <=`). |
  | `salary_currency` | string | ➖ | `UZS` \| `USD` \| `EUR`. Range berilganda default `USD`. |
  | `is_favorite` | bool | ➖ | Faqat sevimli vakansiyalar (`true`) yoki sevimli emaslari (`false`). Default: barcha vakansiyalar. |
  | `cv_id` | int | ➖ | CV ID — "mos vakansiyalar" uchun. **Hozircha qabul qilinadi, lekin filtr qo'llanmaydi (no-op);** `cv_id` bo'yicha real moslik filtri keyinroq qo'shiladi. |
  | `sort` | string | ➖ | Saralash. `newest` (Yaqinda qo'shilganlar, default) \| `salary_asc` (Maosh o'sish tartibida) \| `salary_desc` (Maosh kamayish tartibida). Maoshsiz vakansiyalar har doim oxirida. Noma'lum qiymat → `newest`. |
  | `per-page` | int | ➖ | 1..100, default 20. |
  | `page` | int | ➖ | Sahifa raqami. |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer <access_token>` (mehmon tokeni ham). |

  ### 📤 Response

  Massiv (mobile format — metadata yo'q; sahifalash `X-Pagination-*` header'larida). Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Vacancy ID |
  | `title` | string | Sarlavha |
  | `slug` | string | URL slug |
  | `country` | object | `{ id, name, flag_url }` |
  | `city` | object \| null | `{ id, name }` |
  | `salary` | object | `{ gross, gross_currency, net, net_currency }` |
  | `employment_type` / `employment_type_label` | string | `full_time` ... + lokalizatsiya |
  | `duration_months_min` / `_max` | int \| null | Ish davomiyligi (oy) |
  | `match_score` | int \| null | "Sizga moslik darajasi %" — viza so'rovnomasi natijasidan, vakansiya davlati bo'yicha. Token yo'q yoki so'rovnoma to'ldirilmagan bo'lsa `null`. |
  | `is_favorite` | bool | Joriy nomzod sevimliga qo'shganmi. Mehmon uchun `false`. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `500` | Server xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
