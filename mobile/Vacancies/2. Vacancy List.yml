info:
  name: Vacancy List
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/mobile/vacancies'
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |-
  Tasdiqlangan (`status=approved`) vakansiyalar ro'yxati — mobil **kartochka** ko'rinishi (yengil DTO, faqat kartochkada ko'rinadigan maydonlar). `published_at DESC` bo'yicha saralanadi.

  **Auth:** ixtiyoriy. Token yuborilsa `match_score` va `is_favorite` joriy foydalanuvchiga moslab to'ldiriladi; mehmon uchun `match_score=null`, `is_favorite=false`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Sarlavha bo'yicha qidiruv (ILIKE). |
  | `country_id` | int | ➖ | Davlat ID. |
  | `city_id` | int | ➖ | Shahar ID. |
  | `industry_id` | int | ➖ | Soha ID. |
  | `employment_type` | string | ➖ | `full_time` \| `part_time` \| `seasonal` \| `contract`. |
  | `experience_level` | string | ➖ | `none` \| `one_to_three` \| `three_to_six`. |
  | `salary_min` | int | ➖ | Minimal brutto maosh (`salary_gross >=`). |
  | `salary_max` | int | ➖ | Maksimal brutto maosh (`salary_gross <=`). |
  | `salary_currency` | string | ➖ | `UZS` \| `USD` \| `EUR`. Range berilganda default `USD`. |
  | `per-page` | int | ➖ | 1..100, default 20. |
  | `page` | int | ➖ | Sahifa raqami. |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |
  | `Authorization` | ➖ | `Bearer <access_token>` — `match_score`/`is_favorite` uchun. |

  ### 📤 Response

  Massiv (mobile format — metadata yo'q; sahifalash `X-Pagination-*` header'larida). Har bir element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Vacancy ID |
  | `title` | string | Sarlavha |
  | `slug` | string | URL slug |
  | `country` | object | `{ id, name, flag_url }` |
  | `city` | object \| null | `{ id, name }` |
  | `salary` | object | `{ gross, gross_currency, net, net_currency }` |
  | `employment_type` / `employment_type_label` | string | `full_time` ... + lokalizatsiya |
  | `duration_months_min` / `_max` | int \| null | Ish davomiyligi (oy) |
  | `match_score` | int \| null | "Sizga moslik darajasi %" — viza so'rovnomasi natijasidan, vakansiya davlati bo'yicha. Token yo'q yoki so'rovnoma to'ldirilmagan bo'lsa `null`. |
  | `is_favorite` | bool | Joriy nomzod sevimliga qo'shganmi. Mehmon uchun `false`. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `500` | Server xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
