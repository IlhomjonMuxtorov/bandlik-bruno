info:
  name: 9. Get My Profile
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/profile'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Ro''yxatdan o''tgan nomzodning o''z profili va **MVD** dan olingan pasport
  ma''lumotlarini qaytaradi.


  > Faqat `TYPE_CANDIDATE` (`type=4`) foydalanuvchilar uchun.


  **Auth:** `access_token`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {access_token}` |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Foydalanuvchi ID |

  | `phone` | string \| null | E.164 (`+998XXXXXXXXX`). `null` — hali tasdiqlanmagan
  |

  | `passport_series` | string \| null | 2 harf (`AA`) |

  | `passport_number` | string \| null | 7 raqam (`1234567`) |

  | `birth_date` | string \| null | `DD.MM.YYYY` |

  | `is_verified` | bool | Pasport MVD orqali tasdiqlangan |

  | `status` | int | `1`=aktiv, `2`=nofaol, `3`=mehmon |

  | `full_name_latin` | string \| null | MVD: `SURNAME NAME` lotin |

  | `full_name_cyrillic` | string \| null | MVD: kirill harflarda to''liq ism |

  | `pinpp` | string \| null | Shaxsiy ID raqami (14 raqam) |

  | `nationality` | string \| null | Millati (MVD) |

  | `citizenship` | object \| null | **YANGI.** `{ id, name }` — MVD-derived fuqarolik.
  `id` — GCP davlat kodi (`country.gcp_code`); `null` — MVD kod bermagan yoki davlat
  mos kelmagan. `name` — `country` relation orqali lokalizatsiya, bo''lmasa xom MVD
  fuqarolik qiymati; `null` — MVD ma''lumoti yo''q |

  | `sex` | string \| null | `male` \| `female` |

  | `photo_url` | string \| null | Pasport rasmi URL. `null` — MVD da rasm yo''q |

  | `balance` | float | Joriy (sarflanadigan) balans, so''m. Hold''ni o''z ichiga
  olmaydi |

  | `hold_balance` | float | Hold (band) qilingan balans, so''m. Xizmat bosqichlari
  uchun zahiraga olingan summa |

  | `passport_issued_by` | string \| null | Pasport bergan organ nomi |

  | `passport_valid_from` | string \| null | Berilgan sana (`DD.MM.YYYY`) |

  | `passport_valid_until` | string \| null | Amal qilish muddati (`DD.MM.YYYY`) |

  | `created_at` | int | Hisob yaratilgan vaqt (UNIX) |

  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | `access_token` yo''q yoki muddati o''tgan |

  | `403` | Foydalanuvchi `TYPE_CANDIDATE` emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
