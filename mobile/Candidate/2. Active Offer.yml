http:
  method: GET
  url: '{{base_url}}/mobile/candidate/active-offer'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Nomzodning hozirgi **faol qabul qilingan taklifini** (bitta vakansiya) va uning
  **jarayon stepperini** qaytaradi — asosiy sahifadagi karta uchun.


  > Biznes qoidasi: nomzod faqat **bitta** vakansiya uchun taklifni qabul qila oladi,
  shuning uchun istalgan paytda ko''pi bilan bitta faol (confirmed, terminal bo''lmagan)
  taklif bo''ladi.


  > Faqat `TYPE_CANDIDATE` (`type=4`) foydalanuvchilar uchun.


  **Auth:** `access_token`. Pul qiymatlari **so''m** da (backend tiyin saqlaydi).


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {access_token}` |


  ### 📤 Response


  Faol taklif **yo''q** bo''lsa (`200`):

  `{ "chat_id": null, "offer": null, "vacancy": null, "service_groups": [] }`


  Faol taklif **bor** bo''lsa (`200`):


  | Field | Type | Description |

  |---|---|---|

  | `chat_id` | int \| null | Offer chati (ChatConversation) ID — offer amallari uchun (`/mobile/chats/<id>/offer/...`) |

  | `offer.id` | int | Pipeline (VacancyCandidate) ID |

  | `offer.vacancy` | object | `{ id, title }` |

  | `offer.pipeline_outcome` | string | `active` \| `completed` \| `cancelled` |

  | `offer.current_stage` | string | `awaiting` \| `training` \| … \| `completed` \| `cancelled` |

  | `offer.confirmed` | bool | Taklif qabul qilingan |

  | `offer.confirmed_at` | int \| null | Qabul qilingan vaqt (UNIX) |

  | `offer.currency` | string | Valyuta |

  | `offer.required_amount` | int | Barcha bosqichlar summasi (so''m) |

  | `offer.funded_amount` | int | To''langan (hold qilingan) summa |

  | `offer.awaiting_amount` | int | **Boshlangan** (awaiting_payment) — hozir to''lash mumkin summa |

  | `offer.pending_amount` | int | Hali boshlanmagan guruhlar summasi (hali to''lab bo''lmaydi) |

  | `offer.reserved_amount` | int | Rezerv qilingan |

  | `offer.captured_amount` | int | Yechib olingan |

  | `offer.remaining_hold` | int | Qolgan hold (`offer` faqat jami ko''rsatkichlar) |

  | `service_groups` | array | (Yuqori daraja) Xizmatlar **tashkilot bo''yicha guruhlangan** + Start→Pay→Execute
  holati: `{service_group_id, organization, responsible_user, stages[], required_amount, funded_amount, awaiting_amount,
  currency, started, awaiting_start, fully_funded, is_current, payment_deadline_at, paid_percent,
  progress_percent}`. `service_group_id` (int|null) — guruhning `VacancyServiceGroup.id`''si (start uchun);
  `started=false` → guruh hali boshlanmagan; `is_current=true` → hozir to''lanadi |

  | `vacancy.id` | int | Vakansiya ID |

  | `vacancy.title` | string \| null | Vakansiya nomi (masalan `Oshipaz`) |

  | `vacancy.country` | object | `{ id, name, flag_url }` (lokalizatsiya) |

  | `vacancy.city` | object \| null | `{ id, name }` (lokalizatsiya) |

  | `service_groups[].stages[]` | array | Stepper bosqichlari (guruh ichida, `sort_order` bo''yicha) |

  | `service_groups[].stages[].category` | string | `agency`, `training`, `visa`, ... |

  | `service_groups[].stages[].category_label` | string | Lokalizatsiya qilingan nom |

  | `service_groups[].stages[].status` | string | `pending`, `awaiting_payment`, `in_progress`, `completed`, `overdue`, `payment_overdue`, `skipped` |

  | `service_groups[].stages[].status_label` | string | Lokalizatsiya qilingan status |

  | `service_groups[].stages[].funded` | bool | Ushbu bosqich to''langan |

  | `service_groups[].stages[].amount` | int | Bosqich summasi (so''m) |

  | `service_groups[].stages[].progress_percent` | int | 0–100 |

  | `service_groups[].stages[].started_at` | int \| null | Guruh boshlangan vaqt (UNIX) |

  | `service_groups[].stages[].payment_deadline_at` | int \| null | To''lov muddati (UNIX) — awaiting_payment da |

  | `service_groups[].stages[].payment_time_left_text` | string \| null | To''lovgacha qolgan vaqt |

  | `service_groups[].stages[].deadline_at` | int \| null | Ijro muddati (UNIX) — to''langan kundan |

  | `service_groups[].stages[].time_left_text` | string \| null | Aktiv soat bo''yicha qolgan vaqt (`3 d, 2 h`) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | `access_token` yo''q yoki muddati o''tgan |

  | `403` | Foydalanuvchi `TYPE_CANDIDATE` emas |

  | `404` | Joriy foydalanuvchi uchun nomzod topilmadi |

  | `456` | Mehmon (faollashmagan) foydalanuvchi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
