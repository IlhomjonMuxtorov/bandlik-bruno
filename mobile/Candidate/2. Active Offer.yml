docs: 'Nomzodning hozirgi **faol qabul qilingan taklifini** (bitta vakansiya) va uning
  **jarayon stepperini** qaytaradi â€” asosiy sahifadagi karta uchun.


  > Biznes qoidasi: nomzod faqat **bitta** vakansiya uchun taklifni qabul qila oladi,
  shuning uchun istalgan paytda ko''pi bilan bitta faol (confirmed, terminal bo''lmagan)
  taklif bo''ladi.


  > Faqat `TYPE_CANDIDATE` (`type=4`) foydalanuvchilar uchun.


  **Auth:** `access_token`. Pul qiymatlari **so''m** da (backend tiyin saqlaydi).


  ### đź“‹ Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | âś… | `Bearer {access_token}` |


  ### đź“¤ Response


  Faol taklif **yo''q** bo''lsa (`200`):

  `{ "chat_id": null, "offer": null, "vacancy": null, "service_groups": [] }`


  Faol taklif **bor** bo''lsa (`200`):


  | Field | Type | Description |

  |---|---|---|

  | `chat_id` | int \| null | Offer chati (ChatConversation) ID â€” offer amallari uchun (`/mobile/chats/<id>/offer/...`) |

  | `offer.id` | int | Pipeline (VacancyCandidate) ID |

  | `offer.vacancy` | object | `{ id, title }` |

  | `offer.pipeline_outcome` | string | `active` \| `completed` \| `cancelled` |

  | `offer.current_stage` | string | `awaiting` \| `training` \| â€¦ \| `completed` \| `cancelled` |

  | `offer.confirmed` | bool | Taklif qabul qilingan |

  | `offer.confirmed_at` | int \| null | Qabul qilingan vaqt (UNIX) |

  | `offer.currency` | string | Valyuta |

  | `offer.required_amount` | int | Barcha bosqichlar summasi (so''m) |

  | `offer.funded_amount` | int | To''langan (hold qilingan) summa |

  | `offer.awaiting_amount` | int | **Boshlangan** (awaiting_payment) â€” hozir to''lash mumkin summa |

  | `offer.pending_amount` | int | Hali boshlanmagan guruhlar summasi (hali to''lab bo''lmaydi) |

  | `offer.reserved_amount` | int | Rezerv qilingan |

  | `offer.captured_amount` | int | Yechib olingan |

  | `offer.remaining_hold` | int | Qolgan hold (`offer` faqat jami ko''rsatkichlar) |

  | `service_groups` | array | (Yuqori daraja) **Xizmat guruhlari = kuzatiladigan birlik** + Startâ†’Payâ†’Executeâ†’Completeâ†’Confirm
  holati GURUH darajasida: `{service_group_id, group_type, completion_flow, organization, responsible_user, services[],
  status, status_label, required_amount, funded_amount, awaiting_amount, discount_amount, currency, started,
  awaiting_start, fully_funded, is_current, started_at, payment_deadline_at, execution_deadline_at, completed_at,
  time_left_text, skipped, fully_completed, confirmed, documents[]}`.
  `service_group_id` (int|null) â€” guruhning `VacancyServiceGroup.id`''si (start uchun);
  `started=false` â†’ guruh hali boshlanmagan; `is_current=true` â†’ hozir aktiv |

  | `vacancy.id` | int | Vakansiya ID |

  | `vacancy.title` | string \| null | Vakansiya nomi (masalan `Oshipaz`) |

  | `vacancy.country` | object | `{ id, name, flag_url }` (lokalizatsiya) |

  | `vacancy.city` | object \| null | `{ id, name }` (lokalizatsiya) |

  | `service_groups[].status` | string | `pending`, `awaiting_payment`, `in_progress`, `completed`, `xba_confirmed`, `overdue`, `payment_overdue`, `skipped` (GURUH darajasida) |

  | `service_groups[].services[]` | array | Guruh ichidagi xizmatlar = billing line-item (`sort_order` bo''yicha; alohida bajarildi belgilanmaydi) |

  | `service_groups[].services[].category` | string | `agency`, `training`, `visa`, ... |

  | `service_groups[].services[].category_label` | string | Lokalizatsiya qilingan nom |

  | `service_groups[].services[].service_name` | string \| null | vacancy_service snapshot nomi |

  | `service_groups[].services[].amount` | int | Xizmat summasi (so''m) |

  | `service_groups[].services[].discount_amount` | int | Chegirma (so''m) |

  | `service_groups[].services[].original_amount` | int | `amount + discount_amount` (so''m) |

  | `service_groups[].services[].course_progress_percent` | int \| null | `training` kursning jonli progressi (0â€“100); kursga bog''lanmagan line uchun `null` |


  ### âš ď¸Ź Errors


  | Code | Reason |

  |---|---|

  | `401` | `access_token` yo''q yoki muddati o''tgan |

  | `403` | Foydalanuvchi `TYPE_CANDIDATE` emas |

  | `404` | Joriy foydalanuvchi uchun nomzod topilmadi |

  | `456` | Mehmon (faollashmagan) foydalanuvchi |

  '
settings:
