info:
  name: 3d. Education — Update file
  type: http
  seq: 4
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/education/1/file'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"diploma_file_id\": 42\n}"
  auth: inherit
docs: 'Ta''lim yozuviga biriktirilgan diplom faylini yangilash. **MVD'' dan
  sinxronlangan yozuvlar (`is_from_mvd=true`) uchun ham ruxsat etilgan** —
  MVD diplom metadatasini beradi, lekin nusxasini yubormaydi, shuning uchun
  nomzod o''zi diplom skanini biriktiradi.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `diploma_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan fayl ID.
  Yuborilmasa yoki `null` bo''lsa, joriy fayl o''zgartirilmaydi. Yangi qiymat
  berilsa, eski fayl avtomatik o''chiriladi |


  ### 📤 Response


  To''liq `EducationOutputDTO` (List endpoint bilan bir xil struktura).


  ### ⚠️ Cheklovlar


  - MVD yozuvi uchun **boshqa maydonlarni** yangilab bo''lmaydi — buning uchun
  bu yerda faqat `diploma_file_id` ishlatiladi, qolgan maydonlar e''tiborga olinmaydi.

  - Oddiy yozuvlar uchun esa **`PATCH /education/<id>`** orqali to''liq update qilinadi.

  '
