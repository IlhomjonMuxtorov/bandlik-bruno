info:
  name: 12.1. Conference — List
  type: http
  seq: 48
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/conference'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  "Konferensiya va seminarlar" CV bo'limining barcha yozuvlari ro'yxati.
  > **E'tibor:** bu endpoint avvalgi umumiy `GET /mobile/cv/{{cv_id}}/extra/<section>` API'sini almashtiradi — har bir CV bo'limi endi mustaqil, o'z shakliga ega endpoint.

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Yozuv ID |
  | `name` | string | Konferensiya/seminar nomi. |
  | `location` | string \| null | Joylashuv (erkin matn, masalan `Parij`). `null` — kiritilmagan. |
  | `start_date` | date \| null | Boshlangan sana. Format: `DD.MM.YYYY`. `null` — kiritilmagan. |
  | `end_date` | date \| null | Tugagan sana. Format: `DD.MM.YYYY`; `start_date`dan katta yoki teng bo'lishi kerak. `null` — kiritilmagan. |
  | `description` | string \| null | Tavsif (erkin matn). `null` — kiritilmagan. |
  | `link` | string \| null | To'liq havola (URL). `null` — kiritilmagan. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |
  | `456` | Guest-token — ro'yxatdan to'liq o'tish talab qilinadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
