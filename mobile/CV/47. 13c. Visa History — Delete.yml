docs: 'Viza tarixi yozuvini o''chirish. Faqat yozuv egasi (nomzod) o''chira oladi.
  Biriktirilgan viza hujjati ham o''chiriladi. Muvaffaqiyatda `204 No Content`.


  **Auth:** `access_token`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q yoki eskirgan |

  | `404` | Viza yozuvi topilmadi yoki boshqa nomzodga tegishli |

  '
