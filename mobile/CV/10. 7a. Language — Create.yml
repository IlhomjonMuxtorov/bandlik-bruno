info:
  name: 7a. Language — Create
  type: http
  seq: 10
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/language'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"language_id\": 1,\n    \"language_level_id\": 7\n}"
  auth: inherit
docs: 'Yangi til qo''shish.


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `language_id` | int | ✅ | Reference: languages |

  | `language_level_id` | int | ✅ | Reference: language-levels. Daraja tilning shkalasiga
  (`language.scale`) tegishli bo''lishi shart — ro''yxatni
  `GET /mobile/language-levels?language_id={language_id}` bilan oling. |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `403` | Shaxs tasdiqlanmagan (`is_verified=false`) — javobda `verification_required: true` |

  | `456` | Guest — registratsiya tugatilmagan |

  | `400` | Bir til ikki marta qo''shilmaydi (UNIQUE) |

  | `400` | `language_level_id` tilning shkalasiga tegishli emas (masalan yapon tiliga
  CEFR darajasi) — `Validation failed: [...]` |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
