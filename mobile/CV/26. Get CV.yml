info:
  name: Get CV
  type: http
  seq: 26
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Bitta CV-ning to''liq tafsilotlari (education, experience, languages va h.k.
  shu CV uchun).


  **Auth:** `access_token`.


  ### üìã Path Params


  | Param | Type | Description |

  |---|---|---|

  | `cv_id` | int | CV ID |


  ### üì§ Response


  | Field | Type | Description |

  |---|---|---|

  | `header` | object | `{ cv_id, title, profession, industry, status, is_primary,
  photo_url, full_name, completion_percent, is_complete, completion, stats }` |

  | `header.profession` | string | Ko''rsatiladigan kasb: soha nomi
  (`Accept-Language` bo''yicha), soha bo''lmasa ‚Äî `header.title` |

  | `header.industry` | object \| null | `{ id, name }` ‚Äî CV sohasi. `null` ‚Äî soha
  tanlanmagan |

  | `header.title` | string | **DEPRECATED** ‚Äî erkin matn CV nomi. Soha bilan
  yaratilgan CVda bo''sh qator |

  | `header.status` | string | `draft` yoki `active` ‚Äî to''liqlikdan avtomatik
  hisoblanadi (mijoz o''rnatmaydi) |

  | `header.completion_percent` | int | 0‚Äì100. 10 ta majburiy band asosida (qisqa
  muddatli kurs bandi hisobga olinmaydi) |

  | `header.is_complete` | bool | `true` bo''lganda CV `active` va vakansiyaga ariza
  topshirish mumkin |

  | `header.completion` | object | `{ percent, is_complete, missing[], sections[] }`.
  `missing[]` ‚Äî to''ldirilmagan majburiy band kalitlari; `sections[]` har bandda
  `{ key, label, required, filled }` (UI checklist uchun) |

  | `personal` | object | Passport asosida (CV-dan qat''iy nazar bir xil) |

  | `birth_place` | object | **BREAKING:** endi qat''iy MVD-derived: `{ address, country
  }`. Eski `region`/`district` kalitlari OLIB TASHLANDI (MVD ularni ajratmaydi).
  `address` kaliti QOLADI, lekin qiymati boshqa manbadan: endi MVD `birthplace`
  erkin matni (masalan tuman nomi), avvalgi "nomzod kiritgan ko''cha/uy manzili"
  EMAS; `null` ‚Äî MVD topilmagan. `country` ‚Äî tug''ilgan davlat, `country.gcp_code`
  orqali lokalizatsiya, bo''lmasa xom MVD qiymati (`null` ‚Äî noma''lum) |

  | `passport` | object | `{ tin, foreign_passport_number, citizenship, had_visa_before,
  additional_visa_country }`. `citizenship` (yangi) ‚Äî `{ id, name }`: `id` = GCP
  davlat kodi (`country.gcp_code`), `null` ‚Äî MVD kod bermagan/davlat mos kelmagan;
  `name` ‚Äî lokalizatsiya, bo''lmasa xom MVD fuqarolik qiymati. `additional_visa_country`
  ‚Äî `{id, name}` \| `null` |

  | `registration` | object | Yashash manzili ‚Äî MVD `MVDAddressInfoService` (`/mvd/services/address/info/pin/v1`) dan. Yuqori darajada **joriy** manzil turadi: faol vaqtinchalik ro''yxat bo''lsa o''sha, aks holda doimiy propiska. Kalitlar: `{ type, country, region, district, mahalla, street, street_type, address, cadastre, postal_code, registration_date, valid_until, full_address, permanent, temporary[] }` |

  | `registration.type` | string \| null | `permanent` ‚Äî doimiy propiska \| `temporary` ‚Äî vaqtinchalik ro''yxat. `null` ‚Äî MVD hali sinxronlanmagan (eski nomzod, faqat erkin matn ustunlari bor) |

  | `registration.region` \| `.district` \| `.country` | string \| null | MVD `Region`/`District`/`Country` ma''lumotnomasidan bog''langan nom (`Accept-Language` bo''yicha lokalizatsiya); bog''lanmasa MVD qaytargan xom kirill nomi |

  | `registration.mahalla` | string \| null | MFY nomi ‚Äî UzKad ma''lumotnomasidan lotin yozuvida; bog''lanmasa MVD `Maxalla.Value` (kirill). `null` ‚Äî MFY ko''rsatilmagan |

  | `registration.street` | string \| null | Ko''cha nomi ‚Äî 1C ma''lumotnomasidan lotin yozuvida (MVD `Street.Guid` kodi bo''yicha); bog''lanmasa MVD `Street.Value` (kirill) |

  | `registration.street_type` | string \| null | Ko''cha turi lokalizatsiyalangan nomi: Ko''cha \| Berk ko''cha \| O''tish \| Qishloq \| Shox ko''cha va h.k. `null` ‚Äî ko''cha ma''lumotnomada topilmadi |

  | `registration.address` | string \| null | MVD `Address` ‚Äî uy/xonadon darajasidagi erkin matn (masalan `–£–∑–±–µ–∫–∏—Å—Ç–æ–Ω –∫—É—á–∞—Å–∏, 58-—É–π`) |

  | `registration.cadastre` | string \| null | Turar-joyning kadastr raqami. `null` ‚Äî MVD bermagan |

  | `registration.postal_code` | string \| null | Pochta indeksi ‚Äî nomzod profilidan (MVD manzil xizmati indeks qaytarmaydi) |

  | `registration.valid_until` | string \| null | Vaqtinchalik ro''yxat muddati (`d.m.Y`). Doimiy propiskada doim `null` |

  | `registration.full_address` | string \| null | To''liq yig''ilgan manzil: `Viloyat, Tuman, MFY, Ko''cha, uy` |

  | `registration.permanent` | object \| null | Doimiy propiska yozuvi (yuqoridagi kalitlar bilan bir xil shakl). `null` ‚Äî MVD doimiy propiska qaytarmagan |

  | `registration.temporary` | array | Vaqtinchalik ro''yxatlar, yangisi birinchi. Har element `permanent` bilan bir xil shaklda, `valid_until` to''ldirilgan. Bo''sh massiv ‚Äî vaqtinchalik ro''yxat yo''q |

  | `education` | array | Faqat shu CV-ga tegishli |

  | `experience` | array | Faqat shu CV-ga tegishli |

  | `family` | object | Candidate-level (barcha CV-larda bir xil) |

  | `languages` | array | Candidate-level. Har element: `{ id, language, level, source, ball, certificate_url, serial_number, issued_date }`. `source=mvd` ‚Äî DTM/–ì–¶–¢ CEFR sertifikatidan (`/dtm/service/certificate/v1`), read-only, eng yuqori daraja; `ball`/`certificate_url`/`serial_number`/`issued_date` faqat `mvd` uchun, aks holda `null`. `source=manual` ‚Äî nomzod kiritgan |

  | `documents` | array | Faqat shu CV |

  | `driver` | object | License candidate-level, certificates CV-level |

  | `licenses` | array | Candidate-level kasbiy/biznes litsenziyalar (AGU `/dxa/service/license/v1/pin`). Har element: `{ name, document_type, register_number, registration_date, expiry_date, organization, activity_addresses[], activity_types[], is_from_mvd }`. `is_from_mvd=true` ‚Äî MVD''dan, read-only; bo''sh massiv ‚Äî litsenziya yo''q |

  | `education[].is_from_mvd` | bool | `true` ‚Äî MVD''dan auto (oliy diplom yoki kolej/litsey), tahrirlanmaydi |

  | `courses` | array | Faqat shu CV. Har element: `{ id, course_name, institution_name, start_date, end_date, certificate_number, certificate_file_url, duration_hours, is_from_mvd }`. `is_from_mvd=true` ‚Äî MinVUZ qisqa-kurs sertifikatidan (`/minvuz/services/short-certificate/v1`), read-only; `duration_hours` ‚Äî kurs soati (MVD), manualda `null` |

  | `skills` | array | Faqat shu CV. Talablar katalogining `professional_skills`
  guruhidan tanlangan kasbiy ko''nikmalar. Har element: `{ id, requirement_id, name,
  code }` ‚Äî `id` = candidate_cv_skill qatori (o''chirish uchun), `requirement_id` =
  `vacancy_requirement.id`, `name` = lokalizatsiyalangan nom, `code` = ta''rif kodi
  (masalan `pc.ms_office`) yoki `null`. Taklif: `GET /mobile/skills`. CV
  to''liqligiga ta''sir qilmaydi |

  | `contact` | object | `{ phone, email, phone_is_custom, email_is_custom, additional_phone, additional_phone_owner_name, additional_phone_relationship }` ‚Äî `GET /mobile/cv/{cv_id}/contact` bilan aynan bir xil. `phone`/`email` ‚Äî CV override yoki profil qiymati; `additional_*` ‚Äî zaxira kontakt (profil fallback yo''q, kiritilmagan bo''lsa `null`) |


  ### ‚öÝÔ∏è Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
