info:
  name: Get CV
  type: http
  seq: 26
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Bitta CV-ning to''liq tafsilotlari (education, experience, languages va h.k.
  shu CV uchun).


  **Auth:** `access_token`.


  ### 📋 Path Params


  | Param | Type | Description |

  |---|---|---|

  | `cv_id` | int | CV ID |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `header` | object | `{ cv_id, title, profession, industry, status, is_primary,
  photo_url, full_name, completion_percent, is_complete, completion, stats }` |

  | `header.profession` | string | Ko''rsatiladigan kasb: soha nomi
  (`Accept-Language` bo''yicha), soha bo''lmasa — `header.title` |

  | `header.industry` | object \| null | `{ id, name }` — CV sohasi. `null` — soha
  tanlanmagan |

  | `header.title` | string | **DEPRECATED** — erkin matn CV nomi. Soha bilan
  yaratilgan CVda bo''sh qator |

  | `header.status` | string | `draft` yoki `active` — to''liqlikdan avtomatik
  hisoblanadi (mijoz o''rnatmaydi) |

  | `header.completion_percent` | int | 0–100. 10 ta majburiy band asosida (qisqa
  muddatli kurs bandi hisobga olinmaydi) |

  | `header.is_complete` | bool | `true` bo''lganda CV `active` va vakansiyaga ariza
  topshirish mumkin |

  | `header.completion` | object | `{ percent, is_complete, missing[], sections[] }`.
  `missing[]` — to''ldirilmagan majburiy band kalitlari; `sections[]` har bandda
  `{ key, label, required, filled }` (UI checklist uchun) |

  | `personal` | object | Passport asosida (CV-dan qat''iy nazar bir xil) |

  | `birth_place` | object | **BREAKING:** endi qat''iy MVD-derived: `{ address, country
  }`. Eski `region`/`district` kalitlari OLIB TASHLANDI (MVD ularni ajratmaydi).
  `address` kaliti QOLADI, lekin qiymati boshqa manbadan: endi MVD `birthplace`
  erkin matni (masalan tuman nomi), avvalgi "nomzod kiritgan ko''cha/uy manzili"
  EMAS; `null` — MVD topilmagan. `country` — tug''ilgan davlat, `country.gcp_code`
  orqali lokalizatsiya, bo''lmasa xom MVD qiymati (`null` — noma''lum) |

  | `passport` | object | `{ tin, foreign_passport_number, citizenship, had_visa_before,
  additional_visa_country }`. `citizenship` (yangi) — `{ id, name }`: `id` = GCP
  davlat kodi (`country.gcp_code`), `null` — MVD kod bermagan/davlat mos kelmagan;
  `name` — lokalizatsiya, bo''lmasa xom MVD fuqarolik qiymati. `additional_visa_country`
  — `{id, name}` \| `null` |

  | `registration` | object | Propiska: `{ region, district, country, address, postal_code, registration_date }`. `region`/`district`/`country` MVD `MVDAddressInfoService` propiskasidan `region`/`district` jadvallariga bog''lanadi (erkin matn fallback) |

  | `education` | array | Faqat shu CV-ga tegishli |

  | `experience` | array | Faqat shu CV-ga tegishli |

  | `family` | object | Candidate-level (barcha CV-larda bir xil) |

  | `languages` | array | Candidate-level. Har element: `{ id, language, level, source, ball, certificate_url, serial_number, issued_date }`. `source=mvd` — DTM/ГЦТ CEFR sertifikatidan (`/dtm/service/certificate/v1`), read-only, eng yuqori daraja; `ball`/`certificate_url`/`serial_number`/`issued_date` faqat `mvd` uchun, aks holda `null`. `source=manual` — nomzod kiritgan |

  | `documents` | array | Faqat shu CV |

  | `driver` | object | License candidate-level, certificates CV-level |

  | `licenses` | array | Candidate-level kasbiy/biznes litsenziyalar (AGU `/dxa/service/license/v1/pin`). Har element: `{ name, document_type, register_number, registration_date, expiry_date, organization, activity_addresses[], activity_types[], is_from_mvd }`. `is_from_mvd=true` — MVD''dan, read-only; bo''sh massiv — litsenziya yo''q |

  | `education[].is_from_mvd` | bool | `true` — MVD''dan auto (oliy diplom yoki kolej/litsey), tahrirlanmaydi |

  | `courses` | array | Faqat shu CV. Har element: `{ id, course_name, institution_name, start_date, end_date, certificate_number, certificate_file_url, duration_hours, is_from_mvd }`. `is_from_mvd=true` — MinVUZ qisqa-kurs sertifikatidan (`/minvuz/services/short-certificate/v1`), read-only; `duration_hours` — kurs soati (MVD), manualda `null` |

  | `skills` | array | Faqat shu CV. Talablar katalogining `professional_skills`
  guruhidan tanlangan kasbiy ko''nikmalar. Har element: `{ id, requirement_id, name,
  code }` — `id` = candidate_cv_skill qatori (o''chirish uchun), `requirement_id` =
  `vacancy_requirement.id`, `name` = lokalizatsiyalangan nom, `code` = ta''rif kodi
  (masalan `pc.ms_office`) yoki `null`. Taklif: `GET /mobile/skills`. CV
  to''liqligiga ta''sir qilmaydi |

  | `contact` | object | `{ phone, email, phone_is_custom, email_is_custom }` (CV override yoki profil qiymati) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
