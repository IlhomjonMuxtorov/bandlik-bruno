info:
  name: Get CV
  type: http
  seq: 26
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Bitta CV-ning to''liq tafsilotlari (education, experience, languages va h.k.
  shu CV uchun).


  **Auth:** `access_token`.


  ### 📋 Path Params


  | Param | Type | Description |

  |---|---|---|

  | `cv_id` | int | CV ID |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `header` | object | `{ cv_id, title, status, is_primary, photo_url, full_name,
  completion_percent, is_complete, completion, stats }` |

  | `header.status` | string | `draft` yoki `active` — to''liqlikdan avtomatik
  hisoblanadi (mijoz o''rnatmaydi) |

  | `header.completion_percent` | int | 0–100. 10 ta majburiy band asosida (qisqa
  muddatli kurs bandi hisobga olinmaydi) |

  | `header.is_complete` | bool | `true` bo''lganda CV `active` va vakansiyaga ariza
  topshirish mumkin |

  | `header.completion` | object | `{ percent, is_complete, missing[], sections[] }`.
  `missing[]` — to''ldirilmagan majburiy band kalitlari; `sections[]` har bandda
  `{ key, label, required, filled }` (UI checklist uchun) |

  | `personal` | object | Passport asosida (CV-dan qat''iy nazar bir xil) |

  | `birth_place` | object | `{ region, district, address, country }`. `region`/`district` faqat foydalanuvchi kiritgan qiymatdan (pasport bergan IIB'dan taxmin qilinmaydi); `country` MVD `birthcountry`; `address` MVD `birthplace` erkin matni |

  | `passport` | object | TIN, foreign passport, visa info |

  | `registration` | object | Propiska: `{ region, district, country, address, postal_code, registration_date }`. `region`/`district`/`country` MVD `MVDAddressInfoService` propiskasidan `region`/`district` jadvallariga bog'lanadi (erkin matn fallback) |

  | `education` | array | Faqat shu CV-ga tegishli |

  | `experience` | array | Faqat shu CV-ga tegishli |

  | `family` | object | Candidate-level (barcha CV-larda bir xil) |

  | `languages` | array | Faqat shu CV |

  | `documents` | array | Faqat shu CV |

  | `driver` | object | License candidate-level, certificates CV-level |

  | `licenses` | array | Candidate-level kasbiy/biznes litsenziyalar (AGU `/dxa/service/license/v1/pin`). Har element: `{ name, document_type, register_number, registration_date, expiry_date, organization, activity_addresses[], activity_types[], is_from_mvd }`. `is_from_mvd=true` — MVD'dan, read-only; bo''sh massiv — litsenziya yo''q |

  | `education[].is_from_mvd` | bool | `true` — MVD'dan auto (oliy diplom yoki kolej/litsey), tahrirlanmaydi |

  | `courses` | array | Faqat shu CV |

  | `contact` | object | `{ phone, email, phone_is_custom, email_is_custom }` (CV override yoki profil qiymati) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
