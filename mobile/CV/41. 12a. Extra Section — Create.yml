info:
  name: 12a. Extra Section — Create
  type: http
  seq: 41
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/extra/conference'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Apple development\",\n  \"location\": \"Parij\",\n  \"start_date\": \"12.10.2026\",\n  \"end_date\": \"14.10.2026\",\n  \"description\": \"Build a complete iOS app with SwiftUI.\",\n  \"link\": \"https://developer.apple.com/tutorials\"\n}"
  auth: inherit
docs: |
  Ixtiyoriy CV bo'limiga yangi yozuv qo'shadi. Bo'lim turi URL'dagi `<section>`
  segmenti orqali beriladi (body'da emas — spoofing oldini oladi).

  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.

  ### 🔎 Path

  | Segment | Description |
  |---|---|
  | `<section>` | `certificate` \| `conference` \| `creative_work` \| `digital_skill_test` \| `hobby` \| `award` \| `membership` \| `project` \| `publication` \| `recommendation` \| `social_activity` \| `volunteering` |

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ✅ | Yozuv nomi |
  | `location` | string | ➖ | Joylashuv (erkin matn, masalan `Parij`) |
  | `start_date` | date | ➖ | `DD.MM.YYYY` |
  | `end_date` | date | ➖ | `DD.MM.YYYY`; `start_date` dan katta yoki teng |
  | `description` | string | ➖ | Tavsif |
  | `link` | string | ➖ | To'liq havola (URL) |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Noma'lum `<section>`, `name` bo'sh, sana/`link` noto'g'ri, `end_date` < `start_date` |
  | `403` | Shaxs tasdiqlanmagan (`verification_required`) |
  | `404` | CV topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
