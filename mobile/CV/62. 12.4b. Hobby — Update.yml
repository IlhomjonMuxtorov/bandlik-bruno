info:
  name: 12.4b. Hobby — Update
  type: http
  seq: 62
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/hobby/{{id}}'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Photography\",\n  \"description\": \"Landscape and street photography.\",\n  \"file_id\": 102\n}"
  auth: inherit
docs: |
  Mavjud "Xobbi va qiziqishlar" yozuvini yangilaydi. Body maydonlari Create bilan bir xil.

  **Auth:** `access_token` — `is_verified=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, yoki `file_id` mavjud bo'lmagan / tayyor bo'lmagan faylga ishora qiladi |
  | `403` | Shaxs tasdiqlanmagan / yozuv boshqa CV'ga tegishli |
  | `404` | CV yoki yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
