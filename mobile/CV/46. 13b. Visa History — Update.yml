docs: 'Viza tarixi yozuvini yangilash. Faqat yozuv egasi (nomzod) yangilay oladi.


  **Auth:** `access_token`.


  Request body `13a. Visa History — Create` bilan bir xil. `visa_file_id` yangi qiymatga
  o''zgartirilsa, eski biriktirilgan hujjat orphan sifatida o''chiriladi.


  ### 📤 Response

  `13. Visa History — List` bilan bir xil obyekt (`200`).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya (Create bilan bir xil qoidalar) |

  | `401` | Token yo''q yoki eskirgan |

  | `404` | Viza yozuvi topilmadi yoki boshqa nomzodga tegishli |

  '
