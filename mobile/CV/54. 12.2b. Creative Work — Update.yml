info:
  name: 12.2b. Creative Work — Update
  type: http
  seq: 54
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/creative-work/{{id}}'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Short film — \\\"City Lights\\\"\",\n  \"start_date\": \"01.03.2025\",\n  \"end_date\": \"15.06.2025\",\n  \"description\": \"Wrote, shot and edited a 12-minute short film.\"\n}"
  auth: inherit
docs: |
  Mavjud "Ijodiy ishlar" yozuvini yangilaydi. Body maydonlari Create bilan bir xil.

  **Auth:** `access_token` — `is_verified=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date` |
  | `403` | Shaxs tasdiqlanmagan / yozuv boshqa CV'ga tegishli |
  | `404` | CV yoki yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
