info:
  name: 12.9b. Volunteering — Update
  type: http
  seq: 82
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/volunteering/{{id}}'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Red Crescent volunteer\",\n  \"location\": \"Toshkent\",\n  \"start_date\": \"01.05.2023\",\n  \"end_date\": \"01.08.2023\",\n  \"description\": \"Helped organize donation drives.\",\n  \"file_id\": 107\n}"
  auth: inherit
docs: |
  Mavjud "Ko'ngillilik" yozuvini yangilaydi. Body maydonlari Create bilan bir xil.

  **Auth:** `access_token` — `is_verified=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date`, yoki `file_id` mavjud bo'lmagan / tayyor bo'lmagan faylga ishora qiladi |
  | `403` | Shaxs tasdiqlanmagan / yozuv boshqa CV'ga tegishli |
  | `404` | CV yoki yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
