info:
  name: 4a. Experience — Create
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"company_name\": \"Bandlik\",\n    \"position\": \"Buxgalter\"\
      ,\n    \"country_id\": 1,\n    \"city_id\": 1,\n    \"start_date\": \"15.01.2023\"\
      ,\n    \"description\": \"Hujjatlar bilan ishlash, oylik hisobotlarni tayyorlash\"\
      ,\n    \"achievements\": \"Yillik hisobotlarni avtomatlashtirdim\",\n    \"recommendation_file_id\"\
      : 42\n}"
  auth: inherit
docs: 'Yangi ish tajribasi qo''shish.


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `company_name` | string | ✅ | Kompaniya nomi |

  | `position` | string | ✅ | Lavozim |

  | `country_id` | int | ➖ | Ish joyi davlati — `GET /mobile/countries` dagi `id` |

  | `city_id` | int | ➖ | Ish joyi shahri — `GET /mobile/cities?country_id=<id>` dagi
  `id`. Tanlangan `country_id` ga tegishli bo''lishi shart |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | `null` = hozirgacha |

  | `description` | string | ➖ | Vazifalar va qilgan ishlar (erkin matn). Bo''sh matn
  `null` ga aylanadi |

  | `achievements` | string | ➖ | Ushbu ish o''rnidagi yutuqlar (erkin matn). Bo''sh
  matn `null` ga aylanadi |

  | `recommendation_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan tavsiyanoma
  hujjati ID (ish beruvchi bergan tavsiyanoma) |


  ### 📤 Response

  `4. Experience — List` bilan bir xil obyekt. `country` / `city` — `{ id, name }`
  yoki `null`; nomi qurilma tilida qaytadi (`user_device.language`, token''dagi
  `device_id` bo''yicha — `Accept-Language` header mobil modulda ishlatilmaydi).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya — jumladan `city_id` tanlangan `country_id` ga tegishli emas |

  | `403` | Shaxsi tasdiqlanmagan (`is_verified=false`) |

  | `404` | CV topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
