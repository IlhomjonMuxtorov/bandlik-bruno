info:
  name: 4a. Experience — Create
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"company_name\": \"Global Skillhub\",\n    \"position\": \"Buxgalter\"\
      ,\n    \"start_date\": \"15.01.2023\",\n    \"achievements\": \"Yillik hisobotlarni\
      \ avtomatlashtirdim\",\n    \"recommendation_file_id\": 42\n}"
  auth: inherit
docs: 'Yangi ish tajribasi qo''shish.


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `company_name` | string | ✅ | Kompaniya nomi |

  | `position` | string | ✅ | Lavozim |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | `null` = hozirgacha |

  | `achievements` | string | ➖ | Ushbu ish o''rnidagi yutuqlar (erkin matn). Bo''sh
  matn `null` ga aylanadi |

  | `recommendation_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan tavsiyanoma
  hujjati ID (ish beruvchi bergan tavsiyanoma) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
