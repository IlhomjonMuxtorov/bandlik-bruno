info:
  name: 4d. Experience — Update file
  type: http
  seq: 8
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience/1/file'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"file_id\": 42\n}"
  auth: inherit
docs: 'Tajriba yozuviga biriktirilgan hujjat faylini yangilash. **MVD'' dan
  sinxronlangan yozuvlar (`is_from_mvd=true`) uchun ham ruxsat etilgan** —
  MVD fayl yubormaganligi sababli, nomzod o''zi mehnat guvohnomasi/mehnat
  daftarchasi nusxasini biriktiradi.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `file_id` | int | ➖ | `/mobile/upload` orqali yuklangan fayl ID. Yuborilmasa
  yoki `null` bo''lsa, joriy fayl o''zgartirilmaydi. Yangi qiymat berilsa, eski fayl
  avtomatik o''chiriladi |


  ### 📤 Response


  To''liq `ExperienceOutputDTO` (List endpoint bilan bir xil struktura).


  ### ⚠️ Cheklovlar


  - MVD yozuvi uchun **boshqa maydonlarni** yangilab bo''lmaydi — buning uchun bu yerda
  faqat `file_id` ishlatiladi, qolgan maydonlar e''tiborga olinmaydi.

  - Oddiy yozuvlar uchun esa **`PATCH /experience/<id>`** orqali to''liq update qilinadi.

  '
