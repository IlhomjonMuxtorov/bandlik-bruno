info:
  name: CV Completion
  type: http
  seq: 34
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/completion'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth: inherit
docs: 'CV to''ldirilganlik foizini (`completion_percent`) va bo''limlar bo''yicha
  checklist''ni qaytaradi. Foiz **8 ta majburiy** bo''limdan to''ldirilganlari asosida
  hisoblanadi. 3 ta bo''lim ixtiyoriy va foizga kirmaydi: `courses`,
  `passport_identity` (JSHSHIR MVD''da yo''q — faqat qo''lda kiritiladi) va
  `documents` (skanlar MVD''da yo''q).


  **Auth:** `access_token`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {access_token}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz` (bo''lim `label`-lari uchun) |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `percent` | int | To''ldirilganlik foizi (0–100) |

  | `is_complete` | bool | Barcha majburiy bo''limlar to''ldirilganmi |

  | `missing` | string[] | To''ldirilmagan majburiy bo''limlar kalitlari |

  | `sections` | object[] | Har bir bo''lim: `key`, `label`, `required`, `filled` |


  ### 🔑 Bo''lim kalitlari (`sections[].key` / `missing[]`)


  | Key | Required | To''ldirilgan hisoblanadi |

  |---|:---:|---|

  | `personal` | ✅ | MVD passport ma''lumoti mavjud |

  | `birth_registration` | ✅ | Tug''ilgan joy (MVD) **va** ro''yxatdan o''tgan manzil
  mavjud |

  | `passport_identity` | ➖ | JSHSHIR (`tin`) to''ldirilgan. **Foizga kirmaydi** |

  | `education` | ✅ | CVda kamida 1 ta ta''lim yozuvi |

  | `experience` | ✅ | CVda kamida 1 ta ish tajribasi |

  | `family` | ✅ | Oilaviy holat tanlangan yoki kamida 1 ta oila a''zosi |

  | `languages` | ✅ | Kamida 1 ta til qo''shilgan |

  | `documents` | ➖ | CVga kamida 1 ta hujjat biriktirilgan. **Foizga kirmaydi** |

  | `driver_license` | ✅ | Haydovchilik guvohnomasi mavjud |

  | `courses` | ➖ | Kamida 1 ta qisqa muddatli kurs. **Foizga kirmaydi** |

  | `contact` | ✅ | `contact_phone` yoki user telefoni mavjud |


  > 88% = 8 ta majburiy bo''limdan aynan 1 tasi bo''sh — `missing[0]` o''sha bo''lim.
  `is_complete: true` bo''lsa CV `active` bo''ladi va vakansiyaga ariza berish ochiladi
  (ixtiyoriy bo''limlar bo''sh bo''lsa ham).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q yoki eskirgan |

  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
