info:
  name: CV Completion
  type: http
  seq: 34
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/completion'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth: inherit
docs: 'CV to''ldirilganlik foizini (`completion_percent`) va bo''limlar bo''yicha
  checklist''ni qaytaradi. Foiz 10 ta majburiy bo''limdan to''ldirilganlari asosida
  hisoblanadi (`courses` bo''limi ixtiyoriy вАФ foizga kirmaydi).


  **Auth:** `access_token`.


  ### рЯУЛ Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | вЬЕ | `Bearer {access_token}` |

  | `Accept-Language` | вЮЦ | `uz` \| `ru` \| `en`. Default: `uz` (bo''lim `label`-lari uchun) |


  ### рЯУ§ Response


  | Field | Type | Description |

  |---|---|---|

  | `percent` | int | To''ldirilganlik foizi (0вАУ100) |

  | `is_complete` | bool | Barcha majburiy bo''limlar to''ldirilganmi |

  | `missing` | string[] | To''ldirilmagan majburiy bo''limlar kalitlari |

  | `sections` | object[] | Har bir bo''lim: `key`, `label`, `required`, `filled` |


  ### рЯФС Bo''lim kalitlari (`sections[].key` / `missing[]`)


  | Key | Required | To''ldirilgan hisoblanadi |

  |---|:---:|---|

  | `personal` | вЬЕ | MVD passport ma''lumoti mavjud |

  | `birth_registration` | вЬЕ | Tug''ilgan joy (MVD) **va** ro''yxatdan o''tgan manzil
  mavjud |

  | `passport_identity` | вЬЕ | JSHSHIR (`tin`) to''ldirilgan |

  | `education` | вЬЕ | CVda kamida 1 ta ta''lim yozuvi |

  | `experience` | вЬЕ | CVda kamida 1 ta ish tajribasi |

  | `family` | вЬЕ | Oilaviy holat tanlangan yoki kamida 1 ta oila a''zosi |

  | `languages` | вЬЕ | Kamida 1 ta til qo''shilgan |

  | `documents` | вЬЕ | CVga kamida 1 ta hujjat biriktirilgan |

  | `driver_license` | вЬЕ | Haydovchilik guvohnomasi mavjud |

  | `courses` | вЮЦ | Kamida 1 ta qisqa muddatli kurs. **Foizga kirmaydi** |

  | `contact` | вЬЕ | `contact_phone` yoki user telefoni mavjud |


  > 90% = 10 ta majburiy bo''limdan aynan 1 tasi bo''sh вАФ `missing[0]` o''sha bo''lim.


  ### вЪ†пЄП Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q yoki eskirgan |

  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
