info:
  name: 10a. Course — Create
  type: http
  seq: 21
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/course'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"course_name\": \"Kompyuter bilimlari kursi\",\n    \"institution_name\": \"Najot Ta'lim\",\n    \"start_date\": \"2023-03-01\",\n    \"end_date\": \"2023-06-01\",\n    \"certificate_number\": \"NT-2023-456\",\n    \"certificate_file_id\": 42\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Yangi kurs qo'shish.

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `course_name` | string | ✅ | Kurs nomi |
  | `institution_name` | string | ✅ | O'quv markazi |
  | `start_date` | date | ✅ | `YYYY-MM-DD` |
  | `end_date` | date | ➖ | Tugagan sana |
  | `certificate_number` | string | ➖ | Sertifikat raqami |
  | `certificate_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan sertifikat fayl ID |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
