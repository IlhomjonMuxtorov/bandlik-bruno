info:
  name: Create CV
  type: http
  seq: 25
http:
  method: POST
  url: '{{base_url}}/mobile/cv'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"title\": \"Haydovchi CVim\",\n    \"is_primary\": false,\n    \"document_ids\": null,\n    \"driver_certificate_ids\": null\n}"
  auth: inherit
docs: 'Yangi CV yaratish.


  **Auth:** `access_token` â€” `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### đź“Ą Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `title` | string | âś… | CV nomi (foydalanuvchi ko''radigan) |

  | `photo_url` | string \| null | âž– | CV uchun maxsus rasm (bo''lmasa candidate rasmi)
  |

  | `is_primary` | bool \| null | âž– | `true` bo''lsa, eski primary CV avtomatik `false`
  bo''ladi. Birinchi CV bo''lsa, server avtomatik `true` qiladi |

  | `document_ids` | int[] \| null | âž– | CVga biriktiriladigan profil hujjat ID-lari.
  `null`/yuborilmasa â€” nomzodning **barcha** profil hujjatlari biriktiriladi (default);
  `[]` â€” hech biri; `[1,5]` â€” faqat shular |

  | `driver_certificate_ids` | int[] \| null | âž– | Xuddi shu mantiq haydovchilik
  sertifikatlari uchun |


  ### đź“¤ Response


  `201 Created` + to''liq CV (`/cv/{id}` formatida).


  > âš™ď¸Ź **status â€” read-only:** CV `status` (`draft`/`active`) endi mijoz tomonidan
  > yuborilmaydi. U 11 ta bo''limning to''ldirilganligidan avtomatik hisoblanadi
  > (10 ta majburiy band; qisqa muddatli kurs majburiy emas). Barcha majburiy
  > bandlar to''ldirilganda CV `active` bo''ladi va shundagina vakansiyaga ariza
  > topshirish mumkin. Foiz va qaysi band yetishmasligini `header.completion` da
  > ko''rish mumkin.


  ### âš ď¸Ź Errors


  | Code | Reason |

  |---|---|

  | `403` | Shaxs tasdiqlanmagan (`is_verified=false`) â€” javobda `verification_required: true` |

  | `456` | Guest â€” registratsiya tugatilmagan |

  | `400` | Validatsiya xatosi |

  | `401` | Token yo''q |


  > âś¨ **Auto-save:** yaratilgan CV ning `id` si avtomatik `cv_id` sifatida saqlanadi.
  CV qismidagi barcha endpointlar shu `{{cv_id}}` ni ishlatadi.


  > đź“Ž **Hujjat/sertifikat pooli:** hujjat va haydovchilik sertifikatlari endi
  > candidate (profil) darajasida saqlanadi (`/mobile/candidate/document`,
  > `/mobile/candidate/driver-certificate`). CV ulardan tanlangan qismini
  > biriktiradi â€” yangi CVda default barchasi biriktiriladi. Keyin CV qismidagi
  > `Document/Driver Certificate â€” Attach/Detach` orqali boshqariladi.


  > đź”„ **MVD avtomatik sinxronlash** (server background):

  > - Diplomalar â€” MinVUZ servisidan kelib `candidate_education` ga yoziladi

  > - Mehnat tarixi â€” Mintud servisidan kelib `candidate_experience` ga yoziladi

  > - Nikoh ma''lumoti â€” ZAGS dan kelib `candidate_spouse` ga yoziladi va
  > `candidate.marital_status` (`married` / `divorced` / `widowed`) avtomatik
  > o''rnatiladi. Foydalanuvchi `marital_status` ni qo''lda o''zgartirmaydi.

  >

  > Agar tegishli MVD xizmat topa olmasa yoki xato bersa â€” log ga yoziladi,
  > CV yaratish baribir davom etadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
  - type: after-response
    code: "const body = res.getBody();\nif (body && body.id) {\n  bru.setEnvVar('cv_id',\
      \ String(body.id));\n  console.log('cv_id saved: ' + body.id);\n}"
