info:
  name: Create CV
  type: http
  seq: 25
http:
  method: POST
  url: '{{base_url}}/mobile/cv'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"industry_id\": 1,\n    \"is_primary\": false,\n    \"document_ids\": null,\n    \"driver_certificate_ids\": null\n}"
  auth: inherit
docs: 'Yangi CV yaratish.


  **Auth:** `access_token` тАФ `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### ЁЯУе Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `industry_id` | int \| null | тЮЦ | CV sohasi (kasb yo''nalishi). Qiymat `GET
  /mobile/vacancy-industries` dan olinadi. `null`/yuborilmasa тАФ soha tanlanmagan. |

  | `title` | string | тЮЦ | **DEPRECATED** тАФ erkin matn CV nomi. `industry_id` bilan
  almashtirilmoqda; faqat eski mijozlar uchun qoldirilgan. |

  | `photo_url` | string \| null | тЮЦ | CV uchun maxsus rasm (bo''lmasa candidate rasmi)
  |

  | `is_primary` | bool \| null | тЮЦ | `true` bo''lsa, eski primary CV avtomatik `false`
  bo''ladi. Birinchi CV bo''lsa, server avtomatik `true` qiladi |

  | `document_ids` | int[] \| null | тЮЦ | CVga biriktiriladigan profil hujjat ID-lari.
  `null`/yuborilmasa тАФ nomzodning **barcha** profil hujjatlari biriktiriladi (default);
  `[]` тАФ hech biri; `[1,5]` тАФ faqat shular |

  | `driver_certificate_ids` | int[] \| null | тЮЦ | Xuddi shu mantiq haydovchilik
  sertifikatlari uchun |


  ### ЁЯУд Response


  `201 Created` + to''liq CV (`/cv/{id}` formatida).


  > тЪЩя╕П **status тАФ read-only:** CV `status` (`draft`/`active`) endi mijoz tomonidan
  > yuborilmaydi. U 11 ta bo''limning to''ldirilganligidan avtomatik hisoblanadi
  > (10 ta majburiy band; qisqa muddatli kurs majburiy emas). Barcha majburiy
  > bandlar to''ldirilganda CV `active` bo''ladi va shundagina vakansiyaga ariza
  > topshirish mumkin. Foiz va qaysi band yetishmasligini `header.completion` da
  > ko''rish mumkin.


  ### тЪая╕П Errors


  | Code | Reason |

  |---|---|

  | `403` | Shaxs tasdiqlanmagan (`is_verified=false`) тАФ javobda `verification_required: true` |

  | `456` | Guest тАФ registratsiya tugatilmagan |

  | `400` | Validatsiya xatosi |

  | `401` | Token yo''q |


  > тЬи **Auto-save:** yaratilgan CV ning `id` si avtomatik `cv_id` sifatida saqlanadi.
  CV qismidagi barcha endpointlar shu `{{cv_id}}` ni ishlatadi.


  > ЁЯУО **Hujjat/sertifikat pooli:** hujjat va haydovchilik sertifikatlari endi
  > candidate (profil) darajasida saqlanadi (`/mobile/candidate/document`,
  > `/mobile/candidate/driver-certificate`). CV ulardan tanlangan qismini
  > biriktiradi тАФ yangi CVda default barchasi biriktiriladi. Keyin CV qismidagi
  > `Document/Driver Certificate тАФ Attach/Detach` orqali boshqariladi.


  > ЁЯФД **MVD avtomatik sinxronlash** (server background):

  > - Diplomalar тАФ MinVUZ servisidan kelib `candidate_education` ga yoziladi

  > - Mehnat tarixi тАФ Mintud servisidan kelib `candidate_experience` ga yoziladi

  > - Nikoh ma''lumoti тАФ ZAGS dan kelib `candidate_spouse` ga yoziladi va
  > `candidate.marital_status` (`married` / `divorced` / `widowed`) avtomatik
  > o''rnatiladi. Foydalanuvchi `marital_status` ni qo''lda o''zgartirmaydi.

  > - Propiska manzil тАФ MVD address servisidan kelib `candidate.registration_*`
  > maydonlariga yoziladi (faqat bo''sh bo''lganda).

  > - Haydovchilik guvohnomasi тАФ MVD/GIBDD dan kelib `candidate_driver_license` ga
  > yoziladi (`source=mvd_gibdd`). Qo''lda kiritilgan yozuv (`source=manual`)
  > **ustiga yozilmaydi**; yuklangan skan fayl saqlanadi.

  >

  > Agar tegishli MVD xizmat topa olmasa yoki xato bersa тАФ log ga yoziladi,
  > CV yaratish baribir davom etadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
  - type: after-response
    code: "const body = res.getBody();\nif (body && body.id) {\n  bru.setEnvVar('cv_id',\
      \ String(body.id));\n  console.log('cv_id saved: ' + body.id);\n}"
