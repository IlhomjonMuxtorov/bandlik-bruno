info:
  name: Create CV
  type: http
  seq: 25
http:
  method: POST
  url: '{{base_url}}/mobile/cv'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"title\": \"Haydovchi CVim\",\n    \"is_primary\": false,\n   \
      \ \"status\": null\n}"
  auth: inherit
docs: 'Yangi CV yaratish.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `title` | string | ✅ | CV nomi (foydalanuvchi ko''radigan) |

  | `photo_url` | string \| null | ➖ | CV uchun maxsus rasm (bo''lmasa candidate rasmi)
  |

  | `is_primary` | bool \| null | ➖ | `true` bo''lsa, eski primary CV avtomatik `false`
  bo''ladi. Birinchi CV bo''lsa, server avtomatik `true` qiladi |

  | `status` | string \| null | ➖ | CV holati: `draft` (sukut) yoki `active`. Yangisi
  boshlang''ich `draft` — oxirgi bosqichda `active` o''rnatiladi |


  ### 📤 Response


  `201 Created` + to''liq CV (`/cv/{id}` formatida).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi |

  | `401` | Token yo''q |


  > ✨ **Auto-save:** yaratilgan CV ning `id` si avtomatik `cv_id` sifatida saqlanadi.
  CV qismidagi barcha endpointlar shu `{{cv_id}}` ni ishlatadi.


  > 🔄 **MVD avtomatik sinxronlash** (server background):

  > - Diplomalar — MinVUZ servisidan kelib `candidate_education` ga yoziladi

  > - Mehnat tarixi — Mintud servisidan kelib `candidate_experience` ga yoziladi

  > - Nikoh ma''lumoti — ZAGS dan kelib `candidate_spouse` ga yoziladi va
  > `candidate.marital_status` (`married` / `divorced` / `widowed`) avtomatik
  > o''rnatiladi. Foydalanuvchi `marital_status` ni qo''lda o''zgartirmaydi.

  >

  > Agar tegishli MVD xizmat topa olmasa yoki xato bersa — log ga yoziladi,
  > CV yaratish baribir davom etadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
  - type: after-response
    code: "const body = res.getBody();\nif (body && body.id) {\n  bru.setEnvVar('cv_id',\
      \ String(body.id));\n  console.log('cv_id saved: ' + body.id);\n}"
