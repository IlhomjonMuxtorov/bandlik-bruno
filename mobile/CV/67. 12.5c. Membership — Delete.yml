info:
  name: 12.5c. Membership — Delete
  type: http
  seq: 67
http:
  method: DELETE
  url: '{{base_url}}/mobile/cv/{{cv_id}}/membership/{{id}}'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  "Tarmoqlar va a'zoliklar" yozuvini o'chiradi. Muvaffaqiyatda `204 No Content`.

  **Auth:** `access_token` — `is_verified=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | Shaxs tasdiqlanmagan / yozuv boshqa CV'ga tegishli |
  | `404` | CV yoki yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
