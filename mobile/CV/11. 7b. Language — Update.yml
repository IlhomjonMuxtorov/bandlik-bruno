docs: 'Til darajasini yangilash. `language_level_id` tilning shkalasiga (`language.scale`)
  tegishli bo''lishi shart — aks holda `400` (`Validation failed`). Mos ro''yxat:
  `GET /mobile/language-levels?language_id={language_id}`.


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.

  '
