info:
  name: 12b. Extra Section — Update
  type: http
  seq: 42
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/extra/conference/1'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Apple development (updated)\",\n  \"location\": \"Parij\",\n  \"start_date\": \"12.10.2026\",\n  \"end_date\": \"15.10.2026\",\n  \"description\": \"Updated description.\",\n  \"link\": \"https://developer.apple.com/tutorials\"\n}"
  auth: inherit
docs: |
  Mavjud yozuvni yangilaydi. `<section>` o'zgarmaydi (yozuv yaratilganda
  belgilanadi). Body maydonlari Create bilan bir xil.

  **Auth:** `access_token` — `is_verified=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Validatsiya (`name` bo'sh, sana/`link` noto'g'ri) |
  | `403` | Shaxs tasdiqlanmagan / yozuv boshqa CV'ga tegishli |
  | `404` | CV yoki yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
