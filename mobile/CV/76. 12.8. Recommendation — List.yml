info:
  name: 12.8. Recommendation — List
  type: http
  seq: 76
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/recommendation'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  "Tavsiyalar" CV bo'limining barcha yozuvlari ro'yxati.
  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Yozuv ID |
  | `name` | string | Tavsiya bergan shaxsning to'liq ism-familiyasi. |
  | `role` | string \| null | Tavsiya bergan shaxsning roli/lavozimi (masalan `Menejer`). `null` — kiritilmagan. |
  | `phone` | string \| null | Tavsiya bergan shaxsning telefon raqami. `null` — kiritilmagan. |
  | `email` | string \| null | Tavsiya bergan shaxsning elektron pochtasi. Email formatida bo'lishi kerak. `null` — kiritilmagan. |
  | `description` | string \| null | Tavsif / tavsiya matni. `null` — kiritilmagan. |
  | `file` | object \| null | Biriktirilgan fayl: `{id, name, url, size, kind, kind_icon_url}`. `null` — fayl yo'q. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |
  | `456` | Guest-token — ro'yxatdan to'liq o'tish talab qilinadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
