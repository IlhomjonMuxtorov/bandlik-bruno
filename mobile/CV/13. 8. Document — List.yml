info:
  name: 8. Document — List
  type: http
  seq: 13
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/document'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  Shu CVga biriktirilgan hujjatlar ro'yxati. Hujjatlar candidate'ning profil
  pooliga tegishli (`/mobile/candidate/document`); bu yerda CVga biriktirilgan
  qismi ko'rinadi.

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Hujjat ID (pooldagi) |
  | `type` | string | `passport_scan` \| `foreign_passport_scan` \| `criminal_record_scan` \| `photo_3x4_scan` \| `health_certificate_scan` |
  | `title` | string | Fayl nomi |
  | `file_url` | string \| null | Fayl URL |
  | `file_size` | int \| null | Bayt |
  | `file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel` \| `other` |
  | `file_kind_icon_url` | string \| null | Standart ikonkaga to'liq URL |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
