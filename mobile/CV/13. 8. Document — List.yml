  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth: inherit
docs: 'Nomzod hujjatlari ro''yxati.


  **Auth:** `access_token`.


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Hujjat ID |

  | `type` | string | `passport_scan` \| `foreign_passport_scan` \| `criminal_record_scan`
  \| `photo_3x4_scan` |

  | `title` | string | Fayl nomi |

  | `file_url` | string | Fayl URL |

  | `file_size` | int \| null | Bayt |

  | `file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel` \| `other`
  |

  | `file_kind_icon_url` | string \| null | Standart ikonkaga to''liq URL |


  ### 📎 `type` qiymatlari


  - `passport_scan` — Ichki pasport nusxasi

  - `foreign_passport_scan` — Xorijiy (biometrik) pasport nusxasi

  - `criminal_record_scan` — Sudlanmaganlik haqida guvohnoma

  - `photo_3x4_scan` — 3.5 × 4.5 rasm

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
