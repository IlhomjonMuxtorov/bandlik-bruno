info:
  name: Update CV
  type: http
  seq: 27
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"title\": \"Haydovchi CVim — yangilangan\",\n    \"document_ids\": null,\n    \"driver_certificate_ids\": null\n}"
  auth: inherit
docs: 'CV meta ma''lumotlarini yangilash (title, photo, is_primary).


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `title` | string | ✅ | CV nomi |

  | `photo_url` | string \| null | ➖ | CV rasm override |

  | `is_primary` | bool \| null | ➖ | `true` bo''lsa boshqa CV-larda `is_primary`
  avtomatik `false` bo''ladi |

  | `document_ids` | int[] \| null | ➖ | Biriktirilgan hujjatlar to''plamini to''liq
  almashtiradi. `null`/yuborilmasa — tegilmaydi; `[]` — hammasi uziladi; `[1,5]` —
  faqat shular qoladi |

  | `driver_certificate_ids` | int[] \| null | ➖ | Xuddi shu mantiq sertifikatlar uchun |


  > 📎 Bitta hujjatni qo''shish/olib tashlash uchun bu yerda butun ro''yxat
  > yubormay, `Document/Driver Certificate — Attach/Detach` endpointlaridan
  > foydalaning.


  > ⚙️ **status — read-only:** `status` endi yuborilmaydi (yuborilsa e''tiborsiz
  > qoldiriladi). U bo''limlar to''ldirilishidan avtomatik hisoblanadi — qarang
  > `header.completion`. Barcha majburiy bandlar to''lganda CV `active` bo''ladi.


  ### 📤 Response


  To''liq CV (`/cv/{id}` formatida).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `403` | Shaxs tasdiqlanmagan (`is_verified=false`) — javobda `verification_required: true` |

  | `456` | Guest — registratsiya tugatilmagan |

  | `400` | Validatsiya xatosi |

  | `404` | CV topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
