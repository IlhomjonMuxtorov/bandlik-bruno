info:
  name: Update CV
  type: http
  seq: 27
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"title\": \"Haydovchi CVim — yangilangan\",\n    \"status\": \"active\"\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  CV meta ma'lumotlarini yangilash (title, photo, is_primary, status).

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `title` | string | ✅ | CV nomi |
  | `photo_url` | string \| null | ➖ | CV rasm override |
  | `is_primary` | bool \| null | ➖ | `true` bo'lsa boshqa CV-larda `is_primary` avtomatik `false` bo'ladi |
  | `status` | string \| null | ➖ | CV holati: `draft` yoki `active`. Oxirgi bosqichda `active` yuboring |

  ### 📤 Response

  To'liq CV (`/cv/{id}` formatida).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Validatsiya xatosi |
  | `404` | CV topilmadi |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
