info:
  name: 12.2a. Creative Work — Create
  type: http
  seq: 53
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/creative-work'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Short film — \\\"City Lights\\\"\",\n  \"start_date\": \"01.03.2025\",\n  \"end_date\": \"15.06.2025\",\n  \"description\": \"Wrote, shot and edited a 12-minute short film.\"\n}"
  auth: inherit
docs: |
  "Ijodiy ishlar" bo'limiga yangi yozuv qo'shadi.

  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ✅ | Ijodiy ish nomi. |
  | `start_date` | date | ➖ | Boshlangan sana. Format: `DD.MM.YYYY`. `null` — kiritilmagan. |
  | `end_date` | date | ➖ | Tugagan sana. Format: `DD.MM.YYYY`; `start_date`dan katta yoki teng bo'lishi kerak. `null` — kiritilmagan. |
  | `description` | string | ➖ | Tavsif (erkin matn). `null` — kiritilmagan. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date` |
  | `403` | Shaxs tasdiqlanmagan (`verification_required`) |
  | `404` | CV topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
