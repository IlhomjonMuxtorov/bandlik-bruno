info:
  name: 4b. Experience — Update
  type: http
  seq: 7
http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience/1'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"company_name\": \"Bandlik\",\n    \"position\": \"Senior\
      \ Buxgalter\",\n    \"country_id\": 1,\n    \"city_id\": 1,\n    \"start_date\"\
      : \"15.01.2023\",\n    \"description\": \"Buxgalteriya hisobini yuritish\",\n\
      \    \"achievements\": \"Jamoani boshqardim\",\n    \"recommendation_file_id\"\
      : 42\n}"
  auth: inherit
docs: 'Mavjud tajribani yangilash. Maydonlar `create` bilan bir xil.


  ℹ️ **MVD'' dan sinxronlangan yozuvlar (`is_from_mvd=true`):** body shu endpoint''ga
  yuborilganda faqat `recommendation_file_id` maydoni qabul qilinadi (MVD hujjat skanini
  bermaydi — nomzod o''zi biriktiradi). Qolgan maydonlar (`company_name`, `position`, va
  h.k.) jim e''tiborga olinmaydi.


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `company_name` | string | ✅ | Kompaniya nomi |

  | `position` | string | ✅ | Lavozim |

  | `country_id` | int | ➖ | Ish joyi davlati (`GET /mobile/countries`). Yuborilmasa
  `null` ga tushadi |

  | `city_id` | int | ➖ | Ish joyi shahri (`GET /mobile/cities?country_id=<id>`).
  Tanlangan `country_id` ga tegishli bo''lishi shart |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | `null` = hozirgacha |

  | `description` | string | ➖ | Vazifalar va qilgan ishlar (erkin matn). Bo''sh matn
  `null` ga aylanadi |

  | `achievements` | string | ➖ | Ushbu ish o''rnidagi yutuqlar (erkin matn). Bo''sh
  matn `null` ga aylanadi |

  | `recommendation_file_id` | int | ➖ | Yangi tavsiyanoma fayl ID. Eski fayl avtomatik
  o''chiriladi. Saqlash uchun joriy qiymat bo''lsa, qaytadan yuborilsin yoki maydon
  yuborilmasin |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
