info:
  name: 4. Experience — List
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Ish tajribasi ro''yxati.


  **Auth:** `access_token`.


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Tajriba ID |

  | `company_name` | string | Kompaniya nomi |

  | `position` | string | Lavozim |

  | `country` | object \| null | Ish joyi davlati — `{ id, name }`. Nomi qurilma tilida
  (token''dagi `device_id` → `user_device.language`; `Accept-Language` header mobil
  modulda e''tiborga olinmaydi). `null` — ko''rsatilmagan (MVD yozuvlarida doim `null`) |

  | `city` | object \| null | Ish joyi shahri — `{ id, name }`. `null` — ko''rsatilmagan |

  | `start_date` | date | `DD.MM.YYYY` |

  | `end_date` | date \| null | `null` — hozir ishlayapti |

  | `is_current` | bool | Hozirgi ish |

  | `description` | string \| null | Vazifalar va qilgan ishlar (erkin matn). `null`
  — kiritilmagan |

  | `achievements` | string \| null | Ushbu ish o''rnidagi yutuqlar (erkin matn). `null`
  — kiritilmagan |

  | `is_from_mvd` | bool | MVD sinxronlangan yozuv. `update`/`delete` taqiqlanadi, lekin
  `recommendation_file_id` ni `PATCH /experience/<id>` orqali yangilash mumkin |

  | `recommendation_file_url` | string \| null | Tavsiyanoma hujjati URL. `null` —
  biriktirilmagan |

  | `recommendation_file_size` | int \| null | Bayt |

  | `recommendation_file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel`
  \| `other` |

  | `recommendation_file_kind_icon_url` | string \| null | Standart ikonkaga to''liq URL |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
