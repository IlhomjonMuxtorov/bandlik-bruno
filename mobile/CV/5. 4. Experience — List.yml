info:
  name: 4. Experience — List
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Ish tajribasi ro''yxati.


  **Auth:** `access_token`.


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Tajriba ID |

  | `company_name` | string | Kompaniya nomi |

  | `position` | string | Lavozim |

  | `start_date` | date | `DD.MM.YYYY` |

  | `end_date` | date \| null | `null` — hozir ishlayapti |

  | `is_current` | bool | Hozirgi ish |

  | `is_from_mvd` | bool | MVD sinxronlangan yozuv. `update`/`delete` taqiqlanadi, lekin
  `file_id` ni `PATCH /experience/<id>/file` orqali yangilash mumkin |

  | `file_url` | string \| null | Hujjat URL (mehnat guvohnomasi va h.k.) |

  | `file_size` | int \| null | Bayt |

  | `file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel` \| `other`
  |

  | `file_kind_icon_url` | string \| null | Standart ikonkaga to''liq URL |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
