http:
  method: PATCH
  url: '{{base_url}}/mobile/cv/{{cv_id}}/education/1'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"education_level_id\": 4,\n    \"institution_name\": \"INHA University\"\
      ,\n    \"start_date\": \"01.09.2022\"\n}"
