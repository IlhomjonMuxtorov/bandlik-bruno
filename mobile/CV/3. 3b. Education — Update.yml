docs: 'Mavjud ta''limni yangilash. Maydonlar tarkibi `POST` bilan bir xil (`diploma_file_id`
  ham kiradi). Faqat o''z resurslari.


  ℹ️ **MVD'' dan sinxronlangan yozuvlar (`is_from_mvd=true`):** body shu endpoint''ga
  yuborilganda faqat `diploma_file_id` maydoni qabul qilinadi (MVD diplom
  metadatasini beradi, lekin nusxasini yubormaydi — nomzod o''zi skanni
  biriktiradi). Qolgan maydonlar (`institution_name`, `faculty`, va h.k.) jim
  e''tiborga olinmaydi.


  **Auth:** `access_token` — `is_verified=true` (tasdiqlangan shaxs) talab qilinadi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `403` | Shaxs tasdiqlanmagan (`is_verified=false`) — javobda `verification_required: true` |

  | `456` | Guest — registratsiya tugatilmagan |

  | `400` | Validatsiya |

  | `403` | Boshqa nomzodning resursi |

  | `404` | Topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
