docs: 'Yangi ta''lim qo''shish.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `education_level_id` | int | ✅ | Reference: education-levels |

  | `institution_name` | string | ✅ | O''quv muassasasi |

  | `faculty` | string | ➖ | Fakultet |

  | `specialty` | string | ➖ | Mutaxassislik |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | `null` — hozir o''qiyapti |

  | `diploma_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan diplom fayl ID
  |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya |

  | `401` | Token yo''q |

  | `404` | Nomzod topilmadi |

  '
