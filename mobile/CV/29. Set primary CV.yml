info:
  name: Set primary CV
  type: http
  seq: 29
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/set-primary'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Berilgan CV-ni primary qiladi. Eski primary CV avtomatik `is_primary = false`
  bo''ladi.


  **Auth:** `access_token`.


  ### 📤 Response


  To''liq CV (`/cv/{id}` formatida) — `is_primary: true` bilan.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | CV topilmadi |

  '
settings:
