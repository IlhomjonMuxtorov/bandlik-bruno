info:
  name: 12.7. Publication — List
  type: http
  seq: 72
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/publication'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  "Nashrlar" CV bo'limining barcha yozuvlari ro'yxati.
  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Yozuv ID |
  | `name` | string | Nashr nomi (sarlavha). |
  | `year` | date \| null | Nashr yili/sanasi. Format: `DD.MM.YYYY`. `null` — kiritilmagan. |
  | `link` | string \| null | To'liq havola (URL). `null` — kiritilmagan. |
  | `authors` | string \| null | Mualliflar ro'yxati (erkin matn). `null` — kiritilmagan. |
  | `journal_name` | string \| null | Jurnal / konferensiya nomi. `null` — kiritilmagan. |
  | `volume_issue_pages` | string \| null | Jild, son, sahifalar (masalan `3-jild, 2-son, 105-150 bet`). `null` — kiritilmagan. |
  | `publisher` | string \| null | Nashriyotchi nomi. `null` — kiritilmagan. |
  | `description` | string \| null | Tavsif (erkin matn). `null` — kiritilmagan. |
  | `file` | object \| null | Biriktirilgan fayl: `{id, name, url, size, kind, kind_icon_url}`. `null` — fayl yo'q. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | CV topilmadi yoki boshqa nomzodga tegishli |
  | `456` | Guest-token — ro'yxatdan to'liq o'tish talab qilinadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
