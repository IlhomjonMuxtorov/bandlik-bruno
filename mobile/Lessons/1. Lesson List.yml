info:
  name: Lesson List
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/courses/1/lessons'
  auth: inherit
docs: |-
  Kursning darslari (darslar) ro'yxati — har bir dars uchun joriy nomzod progressi bilan. Faqat faol + e'lon qilingan darslar (`is_active=true`, `status=active`) qaytariladi.

  > Eslatma: darslar ro'yxati kurs tafsiloti javobida ham (`GET /mobile/courses/{id}` → `lessons`) qaytadi.

  **Auth:** `access_token` (Bearer). Sotib olish **shart emas** — sotib olinmaganda **o'quv markazi `is_free=true` deb belgilagan darslar bepul ochiq**, qolganlari qulflangan. (Avvalgi avtomatik "boshidagi 2 ta" mantiq olib tashlandi.)

  ### 📤 Response

  Massiv, har element:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Dars ID |
  | `name` | string | Dars nomi |
  | `type` | int | `1` = lms.js, `2` = xAPI (index_api) |
  | `sort_order` | int | Tartib |
  | `progress` | float | Tugatish foizi (0–100) |
  | `is_passed` | bool | Dars o'tilgan/o'tilmagan |
  | `is_locked` | bool | Qulflangan dars. Sotib olingach hammasi `false`; sotib olinmaganda `is_free=true` darslar `false`, qolgani `true` |
  | `is_free` | bool | O'quv markazi shu darsni bepul deb belgilaganmi |
  | `play_url` | string \| null | O'ynatish URL; **qulflangan darsda `null`** |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz |
  | `404` | Kurs topilmadi yoki faol emas |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
