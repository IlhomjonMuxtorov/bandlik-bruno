http:
  method: GET
  url: '{{base_url}}/mobile/chats/unread-count'
  body:
    type: none
  auth: inherit
docs: |
  Nomzodning barcha (yashirilmagan) chatlari bo'yicha o'qilmagan xabarlarning umumiy soni — chat tab'idagi "badge" uchun bitta raqam. `chat_conversation.candidate_unread_count` denormalizatsiyalangan hisoblagichlarining yig'indisi; chat list bilan bir xil scoping (yashirilgan chatlar chiqarib tashlanadi).

  **Auth:** `access_token`.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {access_token}` |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `total_unread` | int | Barcha chatlardagi o'qilmagan xabarlarning umumiy soni (0 — agar hammasi o'qilgan bo'lsa) |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
