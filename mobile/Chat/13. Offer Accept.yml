http:
  method: POST
  url: '{{base_url}}/mobile/chats/1/offer/accept'
  auth: inherit
docs: |
  # POST /mobile/chats/&lt;id&gt;/offer/accept

  Nomzod chat ichidagi taklifni (Offer system-xabari) **qabul qiladi**. Bosqichlar
  yaratiladi, lekin **qabulda avtomatik to'lov (hold) bo'lmaydi** (Start → Pay → Execute).

  > ⚠️ **O'zgarish:** to'lov endi faqat admin/tashkilot guruhni **boshlagandan** keyin
  amalga oshadi. Qabuldan so'ng guruh `pending` holatda turadi; admin uni
  `POST /admin/chats/{id}/groups/{groupId}/start` orqali boshlaydi → guruh `awaiting_payment`
  bo'ladi va kandidat o'shanda to'laydi (`offer/fund`). To'langach bosqich `in_progress`.

  **Auth:** `access_token`. Chat `pending` taklifga ega bo'lishi shart.

  ## Funding (faqat boshlangan guruhlar)
  - To'lov **guruh bo'yicha** (all-or-nothing). `single_payment = false` → boshlangan guruhlar
    **navbat bilan** to'lanadi (`is_current`).
  - `single_payment = true` → boshlangan guruhlarning umumiy summasi bir martada.

  ### 📤 Response (200)

  Yangilangan `offer` obyekti (Chat Detail'dagi `offer` bilan bir xil shakl).
  `awaiting_amount > 0` bo'lsa → nomzodni hamyonni to'ldirishga yo'naltiring, keyin `offer/fund`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Taklif endi qabul qilib bo'lmaydi (pending emas / terminal) **yoki** nomzodda allaqachon boshqa **aktiv qabul qilingan taklif** bor |
  | `403` | Chat boshqa nomzodga tegishli |
  | `404` | Chat topilmadi yoki unda taklif yo'q |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
