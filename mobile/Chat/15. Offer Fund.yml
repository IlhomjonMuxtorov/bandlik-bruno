info:
  name: 15. Offer Fund
  type: http
  seq: 15
http:
  method: POST
  url: '{{base_url}}/mobile/chats/1/offer/fund'
  auth: inherit
docs: |
  # POST /mobile/chats/&lt;id&gt;/offer/fund

  Hamyon **to'ldirilgandan keyin** to'lovni qayta urinadi. To'lov faqat admin/tashkilot
  **boshlagan** (`awaiting_payment`) guruhlarga tegishli — boshlanmagan (`pending`) guruhlar
  to'lanmaydi (Start → Pay → Execute). `single_payment = false` → boshlangan guruhlar **navbat
  bilan** (guruh bo'yicha all-or-nothing); `single_payment = true` → barcha boshlangan guruhlar
  to'liq summa yetganda birga. To'langach bosqich `in_progress` va ijro muddati to'langan kundan boshlanadi.

  **Auth:** `access_token`. Taklif `confirmed` (qabul qilingan) bo'lishi shart.
  Idempotent — bir necha bor chaqirish xavfsiz. Balans hali yetmasa hech narsa o'zgarmaydi.

  ### 📤 Response (200)

  Yangilangan `offer` obyekti (`awaiting_amount` / `pending_amount` va funding summalari bilan).
  Per-guruh holat yuqori darajadagi `service_groups[]` da (Chat Detail bilan bir xil).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Taklif qabul qilinmagan |
  | `403` | Chat boshqa nomzodga tegishli |
  | `404` | Chat topilmadi yoki unda taklif yo'q |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
