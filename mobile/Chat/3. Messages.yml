info:
  name: Messages
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/chats/1/messages?limit=30'
  body:
    type: none
  auth: inherit
docs: |
  Paginated xabarlar (cursor pagination, eng yangidan eskigacha).

  **Auth:** `access_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `before_id` | int | ➖ | Eski xabarlarni yuklash uchun (scroll up). Shu ID dan oldingilar |
  | `after_id` | int | ➖ | FCM push qabul qilingach delta sync uchun |
  | `limit` | int | ➖ | Default `30`, max `100` |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {access_token}` |

  ### 📤 Response

  Massiv (DESC, eng yangi birinchi):

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | message id |
  | `conversation_id` | int | |
  | `type` | string | `text` \| `voice` \| `image` \| `document` \| `candidate_card` \| `offer` \| `rejection` \| `system` \| `call` |
  | `type_label` | string | tarjima qilingan |
  | `body` | string \| null | matn (yoki ovoz/rasm uchun caption) |
  | `sender` | object \| null | `{id, username, full_name?, profile_photo_url?}` — system message uchun `null`. XBA xodimi bo'lsa `full_name` va `profile_photo_url` qo'shiladi |
  | `attachment` | object \| null | `{id, name, mime_type, size, file_kind, url}` |
  | `voice_duration_sec` | int \| null | faqat `type=voice` da |
  | `system_payload` | object \| null | system msg ma'lumotlari (offer, rejection, call payload, candidate_card snapshot) |
  | `reply_to_id` | int \| null | |
  | `is_mine` | bool | viewer xabar muallifimi |
  | `is_read` | bool | viewer o'qiganmi |
  | `created_at` | int | unix ts |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Chat boshqa nomzodga tegishli |
  | `404` | Chat topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
