info:
  name: Chat Detail
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/mobile/chats/1'
  body:
    type: none
  auth: inherit
docs: |
  Bir chatning to'liq detali — list summary + pinlangan **candidate_card** snapshot + **service stages** tracker (faqat ariza qabul qilingan bo'lsa).

  **Auth:** `access_token`.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {access_token}` |

  ### 📤 Response

  List item DTO + qo'shimcha:

  | Field | Type | Description |
  |---|---|---|
  | `candidate_card` | object \| null | Pinlangan obyektivka. `{candidate_id, application_id, full_name, photo_url, phone, cv_id, cv_title, cover_message}`. Conversation ochilishda system message sifatida birinchi xabar sifatida |
  | `service_stages` | array | Stage tracker. Bo'sh massiv — ariza hali Accepted emas |
  | `offer` | object \| null | **Taklif + funding holati**. `null` — tashkilot arizani hali qabul qilmagan (pipeline yo'q). Nomzod taklifni shu yerdan **qabul/rad/bekor** qiladi: `POST /mobile/chats/<id>/offer/{accept,decline,fund,cancel}` |
  | `active_call` | object \| null | **Aktiv (davom etayotgan/jiringlayotgan) qo'ng'iroq**. `null` — qo'shiladigan qo'ng'iroq yo'q. Push kelmagan / chat qayta ochilgan holatda mijoz shu maydon orqali "Join" tugmasini ko'rsatadi va `POST /mobile/chats/<id>/video-call/join` chaqiradi. Obyekt: `{call_message_id, room_name, domain, started_by, started_at}` |

  `offer` obyekti (mavjud bo'lsa):

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Pipeline (taklif) id |
  | `journey_status` | string | `pending` (qabul kutilmoqda) / `course_in_progress` (qabul qilingan) / ... |
  | `confirmed` | bool | Taklif qabul qilinganmi (pul band qilish boshlanganmi) |
  | `currency` | string | Band qilish valyutasi (UZS) |
  | `required_amount` | int | Barcha xizmatlar jami (so'm) |
  | `funded_amount` | int | Band qilingan (boshlangan) summa |
  | `awaiting_amount` | int | Boshlash uchun yana yetishmayotgan summa (→ hamyonni to'ldirish) |
  | `reserved_amount` | int | Jami band qilingan |
  | `captured_amount` | int | Xizmatlarga yechib o'tkazilgan |
  | `remaining_hold` | int | Hali band'da turgan (bekor qilishda qaytadigan) |

  > Per-xizmat detal (summa, holat, muddat, mas'ul xodim) `service_stages[]` da — `offer` faqat jami ko'rsatkichlar.

  Har `service_stages[]` elementi:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | stage id |
  | `category` | string | `agency` \| `notarius` \| `insurance` \| `logistics` \| `visa` \| `translation_apostille` \| `training` |
  | `category_label` | string | tarjima qilingan label |
  | `service_name` | string \| null | vacancy_service snapshot nomi |
  | `amount` | int | **Xizmat summasi** (so'm) — qabul paytida snapshot qilinadi |
  | `currency` | string | Valyuta (UZS) |
  | `funded` | bool | Nomzod puli shu xizmat uchun band qilinganmi (`true` bo'lmaguncha tashkilot boshlay olmaydi) |
  | `status` | string | `pending` \| `in_progress` \| `completed` \| `overdue` \| `skipped` |
  | `status_label` | string | tarjima qilingan |
  | `responsible_user` | object \| null | `{id, username}` |
  | `deadline_at` | int \| null | unix ts |
  | `deadline_at_formatted` | string \| null | `d.m.Y H:i` (Asia/Tashkent) |
  | `completed_at` | int \| null | |
  | `completed_at_formatted` | string \| null | `d.m.Y H:i` (Asia/Tashkent) |
  | `progress_percent` | int | 0–100 |
  | `time_left_text` | string \| null | "7 d", "1 d, 2 h", "Deadline passed" — server-localized |
  | `sort_order` | int | UI tartibi |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Chat boshqa nomzodga tegishli |
  | `404` | Chat topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
