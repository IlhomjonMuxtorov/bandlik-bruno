info:
  name: Video Call Token
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/mobile/chats/1/video-call/token'
  headers: []
  body:
    type: none
  auth: inherit
docs: |
  Nomzod **yangi** qo'ng'iroq boshlaydi: Jitsi JWT chiqaradi (HS256), yangi xona (`bandlik-chat-{id}-{random}`) ochiladi. Server bir vaqtning o'zida shu chatga `type=call` system message yozadi va qarama-qarshi tomonga `incoming_call` (data-only) FCM push yuboradi — XBA xodimi `POST /admin/chats/<id>/video-call/join` orqali shu xonaga (`call_message_id` bilan) qo'shiladi.

  > Mavjud qo'ng'iroqqa **qo'shilish** uchun bu emas, `POST /mobile/chats/<id>/video-call/join` ishlatiladi (u yangi xona ochmaydi).

  **Auth:** `access_token`. Issued token `moderator=false` claim bilan.

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `token` | string | HS256 JWT |
  | `room_name` | string | `bandlik-chat-{conversation_id}-{shortRandom}` |
  | `domain` | string | `JITSI_DOMAIN` — host[:port] mijoz ulanadigan server (masalan `meet.isft.uz:8443`). Mijoz URL'ni quradi: `https://{domain}/{room_name}?jwt={token}` |
  | `expires_at` | int | unix ts (default 2h) |
  | `expires_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
  | `call_message_id` | int | Yaratilgan `type=call` system message `id`'si. Qo'ng'iroq tugaganda `call-end`/`call-decline` endpointlariga shu qiymat yuboriladi. |

  ### 📋 JWT Claims

  ```json
  {
    "aud": "jitsi",
    "iss": "JITSI_APP_ID",
    "sub": "JITSI_JWT_SUB",
    "room": "*",
    "iat": 1700000000,
    "exp": 1700007200,
    "moderator": false,
    "context": { "user": { "id": "..", "name": "..", "email": "..", "avatar": "" } }
  }
  ```

  > **Eslatma:** `sub` claim odatda `JITSI_DOMAIN`'dan farq qiladi — bu Jitsi server `mod_auth_token` kutadigan tenant identifikatori (masalan `lms.isft.uz`). `JITSI_JWT_SUB` env o'rnatilmasa, `JITSI_DOMAIN`'ga qaytadi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Chat boshqa nomzodga tegishli |
  | `500` | `JITSI_APP_SECRET` konfiguratsiya qilinmagan |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
