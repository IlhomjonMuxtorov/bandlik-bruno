http:
  method: GET
  url: '{{base_url}}/mobile/payments?per-page=20'
  auth: inherit
docs: 'Joriy nomzodning barcha to''lov urinishlari (Initiated → Pending → Success/Failed/Cancelled/Refunded).
  Sahifalangan, default `per-page=20`, sort `id DESC`.


  **Auth:** `access_token`.


  ### 🔎 Query Params


  | Param | Type | Description |

  |---|---|---|

  | `per-page` | int | 1..100 (default 20) |

  | `page` | int | 1+ |

  | `sort` | string | `id`, `created_at`, `paid_at` (`-` prefiks bilan teskari) |


  ### 📤 Response


  ```json

  {

    "items": [

      {

        "id": 42,

        "transaction_id": 101,

        "provider": "payme",

        "provider_payment_id": "65a2d6b89c2f4d3b8e9f1234",

