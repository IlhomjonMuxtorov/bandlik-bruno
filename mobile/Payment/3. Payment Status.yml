info:
  name: 3. Payment Status
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/payments/1'
  auth: inherit
docs: 'Bitta to''lovning joriy holatini polling qilish uchun. Mobile ilova kassir
  oynasiga qaytgandan keyin shu endpoint''ni 2–5 sekund oraliqda chaqirib turadi.

  **Status kodlari:**


  | Status | Label | Ma''nosi |

  |---|---|---|

  | 1 | Initiated | Gateway''ga so''rov yuborilgan, redirect_url tayyor |

  | 2 | Pending | Foydalanuvchi gateway oynasida |

  | 3 | Success | To''lov muvaffaqiyatli, Transaction yozildi |

  | 4 | Failed | Gateway xatosi |

  | 5 | Cancelled | Foydalanuvchi bekor qildi |

  | 6 | Refunded | Admin tomonidan qaytarildi |


  **Auth:** `access_token`. Faqat o''z to''lovingni ko''ra olasan.


  ### 📤 Response


  Yuqoridagi Payment DTO (History bilan bir xil shape).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `404` | Payment topilmadi yoki boshqa nomzodga tegishli |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
