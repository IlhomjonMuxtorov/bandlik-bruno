docs: 'Click webhook endpoint. Auth bypass â€” har gateway o''z signature''ini tekshiradi.
  `merchant_trans_id` bizdagi `Payment.id`''ga teng.


  **Click Pass formulasi:**


  ```

  sign_string = md5(

    click_trans_id +

    service_id +

    SECRET +

    merchant_trans_id +

    merchant_prepare_id +

    amount +

    action +

    sign_time

  )

  ```


  Faqat `action=1` (Complete) va `error=0` muvaffaqiyatli to''lov hisoblanadi.


  **IP allow-list:** `CLICK_ALLOWED_IPS` `.env` da o''rnatilgan bo''lsa, faqat shu
  IP/CIDR''lardan kelgan so''rov qabul qilinadi.


  ### đź“Ą Form Fields


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `click_trans_id` | string | âś… | Click tarafidagi transaction ID |

  | `service_id` | int | âś… | Click service ID (config''dagi `service_id`) |

  | `merchant_trans_id` | string | âś… | `Payment.id` (initiate paytida `transaction_param`
  sifatida yuborgan) |

  | `merchant_prepare_id` | string | âž– | Faqat `action=1` da, Prepare bosqichidan |

  | `amount` | float | âś… | UZS so''mda (biz tiyinga ko''paytirib saqlaymiz: amount
  * 100) |

  | `action` | int | âś… | 0=Prepare, 1=Complete |

  | `error` | int | âś… | 0=OK, manfiy=xato |

  | `sign_time` | string | âś… | `YYYY-MM-DD HH:MM:SS` |

  | `sign_string` | string | âś… | MD5 yuqoridagi formula bo''yicha |


  ### đź“¤ Response


  Click flat JSON kutadi:


  ```json

  {

    "click_trans_id": "987654321",

    "merchant_trans_id": "42",

    "merchant_prepare_id": "42",

    "merchant_confirm_id": "42",

    "error": 0,

    "error_note": "Success"

  }

  ```


  ### âš ď¸Ź Errors


  | Code | Reason |

  |---|---|

  | `401` | `signature_invalid` â€” sign_string noto''g''ri |

  | `400` | Provider yoqilmagan yoki payload buzilgan |

  | `403` | IP allow-list''dan tashqarida |

  '
