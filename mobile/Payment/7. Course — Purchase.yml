info:
  name: 7. Course — Purchase
  type: http
  seq: 7
http:
  method: POST
  url: '{{base_url}}/mobile/courses/1/purchase'
  headers:
  - name: Content-Type
    value: application/json
  auth: inherit
docs: |
  Nomzod kursni sotib oladi. Ichida `OrganizationServiceOrder` yaratiladi (yoki
  shu kurs uchun mavjud to'lanmagan order qayta ishlatiladi) va darhol nomzod
  HAMYON BALANSIDAN to'lanadi. Gateway CHAQIRILMAYDI — body kerak emas.

  **Auth:** `access_token` (nomzod).

  ### Request Body
  Bo'sh (kurs id URL'da). Provider/return_url endi kerak emas.

  ### Response (201)
  ```json
  {
    "order_id": 7,
    "transaction_id": 120,
    "amount": 500000,
    "currency": "UZS",
    "paid": true
  }
  ```

  ### Balans yetmasa — 402 Payment Required
  ```json
  {
    "status_code": 402,
    "message": "Insufficient balance. Please top up your wallet.",
    "insufficient_balance": true,
    "required": 500000,
    "available": 84000,
    "shortfall": 416000
  }
  ```
  Ilova "Balansni to'ldiring" oynasini ko'rsatadi → `POST /mobile/wallet/topup`
  (`shortfall` summasi bilan, Click/Payme) → to'ldirgach shu so'rov qayta yuboriladi
  (o'sha order qayta ishlatiladi, dublikat yaratilmaydi).

  ### Errors
  | Code | Reason |
  |---|---|
  | 402 | Balans yetarli emas (`insufficient_balance: true`, `shortfall`) |
  | 400 | Order yaratib bo'lmadi, validatsiya xatosi |
  | 401 | Token yo'q |
  | 404 | Kurs topilmadi yoki faol emas |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
