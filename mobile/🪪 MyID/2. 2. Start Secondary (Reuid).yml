info:
  name: 2. Start Secondary (Reuid)
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/mobile/my-id/start-secondary'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"reuid\": \"9b7e597e-893e-4e11-92cf-f4e7d4f923b1\",\n  \"threshold\": 0.85\n}"
  auth: inherit
docs: |
  # Reuid orqali session yaratish

  Oldin qilgan identifikatsiyaning reuid-i bilan qayta session yaratish. Parol tiklash yoki boshqa qurilmadan kirish uchun.

  **Auth:** none  
  **Returns:** `{ session_id }`

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `reuid` | string | ✅ | Qayta foydalanish uchun ID (oldin olingan) |
  | `phone` | string | ➖ | Telefon raqami |
  | `threshold` | number | ➖ | Yuz moslik progi, default: 0.85 |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
