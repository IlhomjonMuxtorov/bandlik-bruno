info:
  name: 1. Balance
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/wallet/balance'
  auth: inherit
docs: |
  # Hamyon (Wallet) — umumiy

  Nomzodning oldindan to'ldiriladigan ("prepaid") hamyoni. Nomzod hamyonni
  Click/Payme orqali to'ldiradi va xizmatlar (kurs, notarius, sug'urta, viza, ...)
  uchun shu **balansdan** to'laydi. Pulni qaytarib yechib bo'lmaydi (cash-out yo'q).

  ## Oqim
  1. **To'ldirish** — `POST /mobile/wallet/topup` → gateway sessiyasi (`redirect_url`)
     → foydalanuvchi to'laydi → gateway webhook (`/mobile/payments/webhook/<provider>`)
     → balans kreditlanadi.
  2. **To'lash** — `POST /mobile/wallet/pay` yoki `POST /mobile/courses/<id>/purchase`
     → balansdan yechiladi (gateway chaqirilmaydi). Balans yetmasa **402** + `shortfall`.
  3. **Ko'rish** — `balance` (joriy summa), `topups` (To'ldirishlar), `payments`
     (To'lovlar), `summary` (xizmat bo'yicha guruh).

  ## Birlik (MUHIM)
  Mobil API'da **barcha summalar SO'Mda**. Backend/ledger ichida esa **tiyinda**
  saqlanadi (1 so'm = 100 tiyin). Konversiya faqat mobil chegarada bo'ladi.
  Istisno: gateway webhook'lari (Payme JSON-RPC) tiyinda ishlaydi — pastdagi
  "Top-up Webhook" so'roviga qarang.

  ---

  # GET /mobile/wallet/balance

  Nomzod hamyoni joriy balansini qaytaradi (Hamyon ekranidagi "Umumiy summa" va
  Profil sahifasidagi "Hamyon: ... so'm"). Hamyon birinchi to'ldirishda avtomatik
  yaratiladi; hali yaratilmagan bo'lsa hammasi `0` qaytadi.

  **Auth:** `access_token` (nomzod). Bearer token majburiy.

  ## Response (200)
  ```json
  {
    "balance": 60000000,
    "hold": 20000000,
    "available": 40000000,
    "currency": "UZS"
  }
  ```

  | Maydon | Tip | Izoh |
  |---|---|---|
  | `balance` | int | Umumiy balans (so'm). |
  | `hold` | int | **Band qilingan** summa (so'm). Nomzod taklifni qabul qilganda (`POST /mobile/my-offers/<id>/accept`) xizmatlar uchun pul shu yerga o'tadi va xizmat yetkazilguncha band turadi. |
  | `available` | int | Sarflash mumkin bo'lgan summa (so'm) = `balance − hold`. |
  | `currency` | string | Valyuta kodi (hozircha doim `UZS`). |

  ## Errors
  | Code | Sabab |
  |---|---|
  | `401` | Token yo'q yoki yaroqsiz. |
  | `404` | Joriy foydalanuvchiga bog'langan nomzod topilmadi. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
