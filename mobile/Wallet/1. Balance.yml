info:
  name: 1. Balance
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/wallet/balance'
  auth: inherit
docs: |
  Nomzod hamyoni balansi (Hamyon ekrani "Umumiy summa" va Profil "Hamyon: ... so'm").
  Hamyon birinchi to'ldirishda yaratiladi; hali yo'q bo'lsa 0 qaytadi.

  **Auth:** `access_token` (nomzod).

  ### Response (200)
  ```json
  {
    "balance": 60000000,
    "available": 60000000,
    "currency": "UZS"
  }
  ```
  Eslatma: mobil API'da barcha summalar SO'Mda (backendda tiyinda saqlanadi).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
