info:
  name: 3. Top-up Webhook (Payme test)
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/mobile/payments/webhook/payme'
  headers:
  - name: Content-Type
    value: application/json
  - name: Authorization
    value: Basic UGF5Y29tOlJFUExBQ0VfV0lUSF9TRUNSRVQ=
  body:
    type: json
    data: |
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "CheckPerformTransaction",
        "params": {
          "amount": 1000000,
          "account": { "payment_id": 50 }
        }
      }
  auth: none
docs: |
  Top-up'ni Payme webhook orqali yakunlash (lokal test). MUHIM: account maydoni endi
  `service_order_id` emas, `payment_id` (Top-up'da yaratilgan Payment.id). Payme
  kabinetida ham account kaliti `payment_id` bo'lishi shart.

  DIQQAT — birlik: JSON-RPC `amount` bu yerda TIYINda (Payme protokoli) va saqlangan
  `payment.amount`ga teng. Bu mobil API'dagi so'm EMAS. Masalan, 50 000 so'mlik
  top-up -> `payment.amount = 5 000 000` tiyin -> webhook `amount: 5000000`.

  Authorization: `Basic base64("Paycom:" + PAYME_SECRET)`. Quyidagi placeholder'ni
  almashtiring:
  ```bash
  echo -n "Paycom:SIZNING_PAYME_SECRET" | base64
  ```

  ### Metodlar ketma-ketligi (har birini alohida yuboring)
  1. `CheckPerformTransaction` -> `result.allow = true`
  2. `CreateTransaction` (params.id = Payme tx id, account.payment_id) -> state 1
  3. `PerformTransaction` (params.id = o'sha tx id) -> state 2; SHU yerda balans kreditlanadi
  4. (ixtiyoriy) `CheckTransaction`, `CancelTransaction`, `GetStatement`

  CreateTransaction misoli:
  ```json
  {
    "jsonrpc": "2.0", "id": 2, "method": "CreateTransaction",
    "params": {
      "id": "65a2d6b89c2f4d3b8e9f1234",
      "time": 1735644000000,
      "amount": 1000000,
      "account": { "payment_id": 50 }
    }
  }
  ```
  PerformTransaction misoli:
  ```json
  {
    "jsonrpc": "2.0", "id": 3, "method": "PerformTransaction",
    "params": { "id": "65a2d6b89c2f4d3b8e9f1234" }
  }
  ```
  Perform'dan keyin `GET /mobile/wallet/balance` balans oshganini ko'rsatishi kerak.
