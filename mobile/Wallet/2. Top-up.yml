docs: |
  # POST /mobile/wallet/topup

  Hamyonni to'ldirish ("Hisobni to'ldirish" modali). Buyurtmaga bog'liq EMAS:
  ichida `purpose=wallet_topup`, `service_order_id=null` bo'lgan `Payment` yaratiladi
  va tanlangan gateway'dan to'lov sessiyasi (`redirect_url`) olinadi. Gateway
  muvaffaqiyatli webhook yuborgach, `LedgerService::recordCandidateTopup` balansni
  kreditlaydi (external gateway hisobidan â†’ nomzod hamyoni balansiga).

  **Auth:** `access_token` (nomzod). Bearer token majburiy.

  ## Request Body
  | Maydon | Tip | Majburiy | Izoh |
  |---|---|:---:|---|
  | `amount` | int | âś… | To'ldirish summasi **so'mda**. Minimal **1 000 so'm**. Backendda Ă—100 qilinib tiyinga aylantiriladi. |
  | `provider` | string | âś… | `click` yoki `payme`. `manual` MUMKIN EMAS. Mavjud provayderlar va ikonkalari `GET /mobile/wallet/providers` dan olinadi. |
  | `return_url` | string | âž– | To'lovdan keyin ilovaga qaytish uchun deep-link / URL. |

  ## Response (201)
  ```json
  {
    "payment_id": 50,
    "provider": "payme",
    "redirect_url": "https://checkout.paycom.uz/<base64>",
    "amount": 50000,
    "currency": "UZS",
    "expires_at": 1735650000
  }
  ```

  | Maydon | Tip | Izoh |
  |---|---|---|
  | `payment_id` | int | Yaratilgan `Payment.id`. Gateway account referensi shu (Payme `ac.payment_id`). |
  | `provider` | string | Tanlangan provider. |
  | `redirect_url` | string | Foydalanuvchi yo'naltiriladigan checkout URL. |
  | `amount` | int | So'mda (so'rovdagi `amount` bilan bir xil). |
  | `currency` | string | `UZS`. |
  | `expires_at` | int | Sessiya amal qilish muddati (unix timestamp). |
  | `expires_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  ## Keyingi qadam
  Ilova `redirect_url`ga yo'naltiradi. To'lov tugagach:
  - Holatni `GET /mobile/payments/{payment_id}` bilan polling qilish mumkin, yoki
  - `GET /mobile/wallet/balance` bilan balans oshganini tekshirish.
  - Real to'lov gateway webhook orqali tasdiqlanadi (lokal test uchun "3. Top-up
    Webhook" so'roviga qarang).

  ## Errors
  | Code | Sabab |
  |---|---|
  | `400` | Provider yoqilmagan/noto'g'ri (`manual` ham), summa minimaldan (`1 000 so'm`) kichik, validatsiya xatosi, gateway xatosi. |
  | `401` | Token yo'q. |
  | `403` | Shaxs tasdiqlanmagan (`verification_required: true`) â€” avval `POST /mobile/auth/verify-identity`. |
  | `456` | Mehmon (guest) â€” to'liq ro'yxatdan o'tish kerak. |
