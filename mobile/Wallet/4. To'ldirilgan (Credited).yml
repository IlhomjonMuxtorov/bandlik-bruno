info:
  name: 4. To'ldirilgan (Credited)
  type: http
  seq: 4
http:
  method: GET
  url: '{{base_url}}/mobile/wallet/topups?per-page=20'
  auth: inherit
docs: |
  # GET /mobile/wallet/topups — "To'ldirilgan" tab

  Hamyonga tushgan mablag'lar (muvaffaqiyatli to'ldirishlar) — ledger'dagi
  `type=CandidateTopup`, `status=Completed` bo'lgan `Transaction` yozuvlari,
  `id` bo'yicha kamayish tartibida (yangi → eski). Har bir qator real hamyon
  harakatini bildiradi (yashil `+` summa).

  **Auth:** `access_token` (nomzod).

  ## Query parametrlari (paginatsiya)
  | Param | Default | Izoh |
  |---|---|---|
  | `per-page` | 20 | Sahifadagi yozuvlar (1–100). |
  | `page` | 1 | Sahifa raqami. |

  Meta header'larda: `X-Pagination-Total-Count`, `X-Pagination-Page-Count`,
  `X-Pagination-Current-Page`, `X-Pagination-Per-Page`.

  ## Response (200) — hamyon tarixi qatorlari (amount so'mda)
  ```json
  [
    {
      "id": 50,
      "title": null,
      "amount": 560000,
      "currency": "UZS",
      "direction": "in",
      "date": "12.12.2026",
      "created_at": 1735649000
    }
  ]
  ```

  | Maydon | Tip | Izoh |
  |---|---|---|
  | `id` | int | Transaction id. |
  | `title` | null | To'ldirishda doim `null` — UI faqat sanani ko'rsatadi. |
  | `amount` | int | To'ldirilgan summa, **musbat** (so'm). |
  | `currency` | string | `UZS`. |
  | `direction` | string | Doim `in` (kirim — yashil `+`). |
  | `date` | string | `d.m.Y` (Asia/Tashkent), masalan `12.12.2026`. |
  | `created_at` | int | Unix timestamp. |

  > Faqat **yakunlangan** (ledger'ga tushgan) to'ldirishlar qaytadi —
  > to'lanmagan/bekor qilingan gateway urinishlari bu ro'yxatda yo'q.

  ## Errors
  | Code | Sabab |
  |---|---|
  | `401` | Token yo'q. |
