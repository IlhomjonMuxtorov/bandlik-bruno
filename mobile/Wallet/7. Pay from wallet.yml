http:
  method: POST
  url: '{{base_url}}/mobile/wallet/pay'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |
      {
        "service_order_id": 7
      }
  auth: inherit
docs: |
  # POST /mobile/wallet/pay

  Mavjud xizmat buyurtmasini (Notarius, Sug'urta, Viza, kurs, ...) nomzod hamyoni
  **balansidan** to'lash. Gateway CHAQIRILMAYDI â€” to'lov ichki ledger orqali bo'ladi:
  nomzod hamyonidan yechiladi, komissiya platformaga, qolgani (escrow rejimida) hold'ga
  yoki (direct rejimda) tashkilot hamyoniga o'tadi.

  Buyurtmaning **qolgan to'liq summasi** (`amount âˆ’ paid_amount`) yechiladi.

  > Kurs sotib olish uchun alohida, qulayroq endpoint bor:
  > `POST /mobile/courses/<id>/purchase` â€” buyurtma yaratib (yoki mavjud to'lanmaganini
  > qayta ishlatib), darhol balansdan to'laydi.

  **Auth:** `access_token` (nomzod).

  ## Request Body
  | Maydon | Tip | Majburiy | Izoh |
  |---|---|:---:|---|
  | `service_order_id` | int | âœ… | To'lanadigan `OrganizationServiceOrder.id`. Buyurtma joriy nomzodga tegishli (yoki `candidate_id = null`) bo'lishi shart. |

  ## Response (201) â€” summalar so'mda
  ```json
  {
    "order_id": 7,
    "transaction_id": 120,
    "amount": 245000,
    "currency": "UZS",
    "paid": true
  }
  ```

  | Maydon | Tip | Izoh |
  |---|---|---|
  | `order_id` | int | To'langan buyurtma id. |
  | `transaction_id` | int | Yaratilgan ledger Transaction id. |
  | `amount` | int | Yechilgan summa (so'm). |
  | `currency` | string | `UZS`. |
  | `paid` | bool | Doim `true` (muvaffaqiyatda). |

  ## Balans yetmasa â€” 402 Payment Required
  Balans yetmasa to'lov amalga oshmaydi va quyidagi javob qaytadi (summalar so'mda).
  Ilova "Balansni to'ldiring" oynasini ko'rsatib, `shortfall` summasi bilan
  `POST /mobile/wallet/topup` (Click/Payme) oqimiga yo'naltiradi; to'ldirgach shu
  so'rovni qayta yuboradi.
  ```json
  {
    "status_code": 402,
    "message": "Insufficient balance. Please top up your wallet.",
    "errors": ["Insufficient balance. Please top up your wallet."],
    "insufficient_balance": true,
    "required": 245000,
    "available": 84000,
    "shortfall": 161000
  }
  ```
  | Maydon | Izoh |
  |---|---|
  | `insufficient_balance` | Doim `true` â€” ilova shu flag bo'yicha to'ldirish oynasiga o'tadi. |
  | `required` | To'lov uchun kerakli summa (so'm). |
  | `available` | Joriy mavjud balans (so'm). |
  | `shortfall` | Yetishmayotgan summa (so'm) â€” to'ldirish oynasini shu bilan to'ldiring. |

  ## Idempotentlik
  Buyurtma to'langach `paid_amount` to'liq bo'ladi; takroriy so'rov **400 "Order is
  already paid"** qaytaradi (ikki marta yechilmaydi). Ledger darajasida ham
  `wallet_payment:order:{id}` idempotency kaliti himoya qiladi.

  ## Errors
  | Code | Sabab |
  |---|---|
  | `402` | Balans yetarli emas (`insufficient_balance: true`, `shortfall` bilan). |
  | `400` | Buyurtma to'liq to'langan, yoki boshqa nomzodning buyurtmasi. |
  | `401` | Token yo'q. |
  | `403` | Shaxs tasdiqlanmagan (`verification_required: true`) â€” avval `POST /mobile/auth/verify-identity`. |
  | `456` | Mehmon (guest) â€” to'liq ro'yxatdan o'tish kerak. |
  | `404` | Buyurtma topilmadi. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
