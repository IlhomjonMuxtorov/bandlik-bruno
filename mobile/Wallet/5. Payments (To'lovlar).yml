info:
  name: 5. Payments (To'lovlar)
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/mobile/wallet/payments?per-page=20'
  auth: inherit
docs: |
  "To'lovlar" tab — nomzod balansidan amalga oshirilgan xizmat to'lovlari
  (type=CandidatePayment, status=Completed bo'lgan Transaction'lar). Paginatsiya
  X-Pagination-* header'larida.

  **Auth:** `access_token` (nomzod).

  ### Response (200) — Transaction DTO ro'yxati
  ```json
  [
    {
      "id": 120, "type": 1, "type_label": "Candidate payment",
      "status": 2, "status_label": "Completed",
      "amount": 245000, "currency": "UZS",
      "service_order_id": 7, "created_at": 1735650500
    }
  ]
  ```
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
