info:
  name: 3. Get FAQ
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/faq'
  body:
    type: none
  auth:
    type: inherit
docs: |
  "Tez-tez beriladigan savollar" (FAQ) ekrani uchun aktiv savol/javoblar ro'yxati. `sort_order` bo'yicha tartiblangan. Matn qurilma tiliga ko'ra qaytariladi (uz | ru | en, default uz).

  **Auth:** Bearer JWT (guest yoki access token).

  ### 📤 Response

  ```json
  {
    "success": true,
    "data": [
      {
        "id": 1,
        "question": "Ariza qanday topshiriladi?",
        "answer": "Vakansiyani tanlang, ma'lumotlarni to'ldiring va \"Ariza topshirish\" tugmasini bosing."
      }
      // ...
    ],
    "message": "",
    "errors": {}
  }
  ```

  > ℹ️ Faqat `is_active = true` bo'lgan yozuvlar qaytariladi.
  > ⚡ Javob til bo'yicha keshlanadi (1 kun); admin FAQ'ni o'zgartirganda kesh yangilanadi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
