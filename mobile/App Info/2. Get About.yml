info:
  name: 2. Get About
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/mobile/about'
  body:
    type: none
  auth:
    type: inherit
docs: |
  "Biz haqimizda" ekrani uchun ilova tavsifi va logosi. Matn qurilma tiliga ko'ra qaytariladi (uz | ru | en, default uz).

  **Auth:** Bearer JWT (guest yoki access token).

  ### 📤 Response

  ```json
  {
    "success": true,
    "data": {
      "text": "Global Skill App — Global Skill Hub mijozlarini ...",
      "logo_url": "https://storage.bandlik.uz/icons/logo/logo.png"
    },
    "message": "",
    "errors": {}
  }
  ```

  > 🖼️ `logo_url`: admin maxsus logo yuklamagan bo'lsa, default `@storageUrl/icons/logo/logo.png` qaytariladi.
  > ⚡ Javob til bo'yicha keshlanadi (1 kun).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
