info:
  name: 1. Get Support
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/support'
  body:
    type: none
  auth:
    type: inherit
docs: |
  "Qo'llab-quvvatlash" ekrani uchun platforma kontakt ma'lumotlari (manzil, telefon, web-sayt, Telegram). Manzil qurilma tiliga ko'ra qaytariladi (uz | ru | en, default uz).

  **Auth:** Bearer JWT (guest yoki access token).

  ### 📤 Response

  ```json
  {
    "success": true,
    "data": {
      "address": "Afrosiyob ko'chasi, 14/1",
      "phone": "+998 55 172 00 00",
      "website": "https://bandlik.uz",
      "telegram": "@bandlik_uz"
    },
    "message": "",
    "errors": {}
  }
  ```

  > ⚡ Javob server tomondan til bo'yicha keshlanadi (1 kun). Admin sozlamani yangilaganda kesh avtomatik yangilanadi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
