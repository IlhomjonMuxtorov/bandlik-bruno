info:
  name: 4. Experience — List
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/experience'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Ish tajribasi ro'yxati.

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Tajriba ID |
  | `company_name` | string | Kompaniya nomi |
  | `position` | string | Lavozim |
  | `start_date` | date | `YYYY-MM-DD` |
  | `end_date` | date \| null | `null` — hozir ishlayapti |
  | `is_current` | bool | Hozirgi ish |

