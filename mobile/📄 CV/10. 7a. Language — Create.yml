info:
  name: 7a. Language — Create
  type: http
  seq: 10
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{ cv_id }}/language'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"language_id\": 1,\n    \"language_level_id\": 7\n}"
  auth:
    mode: bearer
    bearer: '{{ access_token }}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
