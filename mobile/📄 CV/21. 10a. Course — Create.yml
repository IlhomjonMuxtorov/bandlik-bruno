    data: "{\n    \"course_name\": \"Kompyuter bilimlari kursi\",\n    \"institution_name\": \"Najot Ta'lim\",\n    \"start_date\": \"2023-03-01\",\n    \"end_date\": \"2023-06-01\",\n    \"certificate_number\": \"NT-2023-456\"\n}"
