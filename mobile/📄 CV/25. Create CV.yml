info:
  name: Create CV
  type: http
  seq: 25
http:
  method: POST
  url: '{{base_url}}/mobile/cv'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"title\": \"Haydovchi CVim\",\n    \"summary\": \"10+ yil tajribali xalqaro yuk haydovchisi\",\n    \"target_profession\": \"International truck driver\",\n    \"target_country_id\": 1,\n    \"is_primary\": false\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Yangi CV yaratish.

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `title` | string | ✅ | CV nomi (foydalanuvchi ko'radigan) |
  | `summary` | string \| null | ➖ | Qisqacha tavsif |
  | `target_profession` | string \| null | ➖ | Maqsadli ixtisos |
  | `target_country_id` | int \| null | ➖ | `country.id` |
  | `photo_url` | string \| null | ➖ | CV uchun maxsus rasm (bo'lmasa candidate rasmi) |
  | `is_primary` | bool \| null | ➖ | `true` bo'lsa, eski primary CV avtomatik `false` bo'ladi. Birinchi CV bo'lsa, server avtomatik `true` qiladi |

  ### 📤 Response

  `201 Created` + to'liq CV (`/cv/{id}` formatida).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Validatsiya xatosi |
  | `401` | Token yo'q |

