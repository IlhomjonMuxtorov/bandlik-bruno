info:
  name: 3. Education — List
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/cv/{{cv_id}}/education'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Nomzodning **ta'lim ro'yxati**.

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Ta'lim ID |
  | `education_level` | object | `{ id, code, name }` |
  | `institution_name` | string | O'quv muassasasi |
  | `faculty` | string \| null | Fakultet |
  | `specialty` | string \| null | Mutaxassislik |
  | `start_date` | date | `YYYY-MM-DD` |
  | `end_date` | date \| null | `null` — hozir o'qiyapti |
  | `is_current` | bool | Hozir o'qiyaptimi |
  | `diploma_file_url` | string \| null | Diplom fayl URL |
  | `diploma_file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel` \| `other` |
  | `diploma_file_kind_icon_url` | string \| null | Standart ikonkaga to'liq URL |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
