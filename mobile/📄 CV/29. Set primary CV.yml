info:
  name: Set primary CV
  type: http
  seq: 29
http:
  method: POST
  url: '{{base_url}}/mobile/cv/{{cv_id}}/set-primary'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
