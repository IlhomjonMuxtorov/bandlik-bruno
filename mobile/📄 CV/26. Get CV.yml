info:
  name: Get CV
  type: http
  seq: 26
http:
  method: GET
  url: '{{ base_url }}/mobile/cv/{{ cv_id }}'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{ access_token }}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
