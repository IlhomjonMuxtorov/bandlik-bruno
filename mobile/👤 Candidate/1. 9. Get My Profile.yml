info:
  name: 9. Get My Profile
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/profile'
  headers:
  - name: Accept
    value: application/json
  auth:
    mode: bearer
    bearer: '{{ access_token }}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
