info:
  name: 11. Visa Types
  type: http
  seq: 11
http:
  method: GET
  url: '{{base_url}}/mobile/visa-types'
  headers:
  - name: Accept
    value: application/json
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Viza turlari dropdown uchun ma'lumotnomasi.

  **Auth:** `access_token`.

  ### рЯУЛ Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | вЬЕ | `Bearer {access_token}` |

  ### рЯУ§ Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `value` | string | Enum qiymati: `work_visa` \| `business_visa` \| `student_visa` \| `tourist_visa` \| `transit_visa` \| `family_visa` \| `residence_permit` \| `working_holiday` \| `seasonal_work` \| `skills_visa` \| `intra_company` \| `other` |
  | `label` | string | Lokalizatsiyalangan nom |

  ### вЪ†пЄП Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki muddati o'tgan |

