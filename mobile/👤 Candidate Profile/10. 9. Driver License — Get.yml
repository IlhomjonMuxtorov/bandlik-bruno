info:
  name: 9. Driver License — Get
  type: http
  seq: 10
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/driver-license'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Haydovchilik guvohnomasi + sertifikatlar.

  **Auth:** `access_token`.

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `has_license` | bool | Guvohnoma bormi |
  | `categories` | string \| null | Masalan `B,C,D` |
  | `license_number` | string \| null | Guvohnoma raqami |
  | `issue_date` | date \| null | Berilgan sana |
  | `expiry_date` | date \| null | Amal qilish muddati |
  | `certificates` | array | `[{ id, type, title, … }]` |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
