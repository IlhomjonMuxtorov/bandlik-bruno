info:
  name: 9a. Driver License — Upsert
  type: http
  seq: 11
http:
  method: PUT
  url: '{{base_url}}/mobile/candidate/driver-license'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"has_license\": true,\n    \"categories\": \"B,C,D\",\n    \"license_number\": \"AB1234567\",\n    \"issue_date\": \"2018-05-10\",\n    \"expiry_date\": \"2028-05-10\"\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Haydovchilik guvohnomasini yaratish yoki yangilash (`PUT` — upsert).

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `has_license` | bool | ✅ | Guvohnoma bormi |
  | `categories` | string | ➖ | Masalan `B,C,D` |
  | `license_number` | string | ➖ | Guvohnoma raqami |
  | `issue_date` | date | ➖ | Berilgan sana |
  | `expiry_date` | date | ➖ | Amal qilish muddati |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
