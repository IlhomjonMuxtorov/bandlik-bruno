info:
  name: 6a. Spouse — Upsert
  type: http
  seq: 8
http:
  method: PUT
  url: '{{base_url}}/mobile/candidate/spouse'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"full_name\": \"Karimova Dilshoda\",\n    \"birth_date\": \"10.08.1995\"\
      ,\n    \"marriage_date\": \"15.09.2020\"\n}"
  auth: inherit
docs: 'Turmush o''rtog''i yozuvini qo''lda yaratish yoki yangilash (`PUT` — upsert).
  Yozuv `source="manual"` bilan saqlanadi.


  > ZAGS dan olib kelingan yozuv (`source="mvd_zags"`) ustiga `PUT` yuborilsa —
  > `403 Forbidden` qaytadi. ZAGS yozuvini almashtirish uchun avval u
  > `/mobile/candidate/spouse/mvd-fetch` orqali qayta yangilanishi kerak.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `full_name` | string | ✅ | To''liq ism |

  | `birth_date` | date | ✅ | `DD.MM.YYYY` |

  | `marriage_date` | date | ➖ | Nikoh sanasi |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | `candidate.marital_status` ≠ `married` |

  | `403` | Yozuv ZAGS dan olib kelingan — o''zgartirilmaydi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
