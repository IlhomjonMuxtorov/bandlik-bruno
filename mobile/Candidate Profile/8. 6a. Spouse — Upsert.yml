http:
  method: PUT
  url: '{{base_url}}/mobile/candidate/spouse'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"full_name\": \"Karimova Dilshoda\",\n    \"birth_date\": \"1995-08-10\"\
      ,\n    \"marriage_date\": \"2020-09-15\"\n}"
  auth: inherit
docs: 'Turmush o''rtog''i yozuvini yaratish yoki yangilash (`PUT` — upsert).


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `full_name` | string | ✅ | To''liq ism |

  | `birth_date` | date | ✅ | `YYYY-MM-DD` |

  | `marriage_date` | date | ➖ | Nikoh sanasi |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | `candidate.marital_status` ≠ `married` |

  '
