info:
  name: 13. Phone — Request OTP
  type: http
  seq: 27
http:
  method: POST
  url: '{{base_url}}/mobile/candidate/phone/request-otp'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"phone\": \"+998901234567\"\n}"
  auth: inherit
docs: |-
  Profil (login) telefon raqamini o'zgartirish — 1-qadam. **Yangi** raqamga
  4 xonali SMS tasdiqlash kodini yuboradi.

  Oqim: avval shu endpoint bilan kod so'raladi, so'ng `PATCH /mobile/candidate/phone`
  ga `phone` + `code` yuboriladi.

  > **Telefon o'zgarmasa SMS yuborilmaydi.** `phone` joriy profil raqami bo'lsa —
  > javob `verification_required=false`, `sms_sent=false` qaytaradi va SMS
  > jo'natilmaydi.

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `phone` | string | ✅ | Yangi raqam. `+998901234567` yoki `901234567`. |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `phone_masked` | string | `+998 ** *** 4567` ko'rinishida |
  | `expires_in` | int | Kod amal qilish muddati (soniya, 0 — tasdiqlash kerak bo'lmaganda) |
  | `sms_sent` | bool | SMS haqiqatda yuborildimi (sandbox raqamda `false`) |
  | `verification_required` | bool | Tasdiqlash kerakmi. Joriy raqam kiritilsa `false` |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Raqam noto'g'ri, boshqa foydalanuvchida band yoki rate limit |
  | `401` | Token yo'q |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
