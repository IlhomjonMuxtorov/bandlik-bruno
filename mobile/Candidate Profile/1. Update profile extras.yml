info:
  name: Update profile extras
  type: http
  seq: 1
http:
  method: PATCH
  url: '{{base_url}}/mobile/candidate/profile-extras'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"tin\": \"29847012395712\",\n    \"had_visa_before\": true\n}"
  auth: inherit
docs: 'Nomzodning **passport / birth / registration** qo''shimcha maydonlarini yangilash.


  > Hamma maydon ixtiyoriy — faqat keladigan maydon yangilanadi.


  > **`marital_status` bu yerda QABUL QILINMAYDI.** U ZAGS xizmatidan avtomatik
  > olinadi (CV yaratish paytida, `POST /mobile/cv`). Foydalanuvchi qo''lda
  > spouse yozuvini kiritsa (`PUT /mobile/candidate/spouse`), `marital_status`
  > avtomatik `married` ga o''rnatiladi. Mavjud qiymat response ichida qaytariladi.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Description |

  |---|---|---|

  | `photo_file_id` | int | `/mobile/upload` qaytargan fayl ID si |

  | `tin` | string | TIN/INN |

  | `foreign_passport_number` | string | Xorijiy passport raqami |

  | `had_visa_before` | bool | Avval viza olinganmi? |

  | `additional_visa_country_id` | int | Qo''shimcha viza davlati ID |

  | `birth_region` / `birth_district` / `birth_address` | string | Tug''ilgan joy
  |

  | `registration_region` / `registration_district` / `registration_address` | string
  | Ro''yxat joyi |

  | `postal_code` | string | Pochta indeksi |

  | `registration_date` | date | `DD.MM.YYYY` |


  ### 📤 Response


  Profilning yangilangan holati. `marital_status` ham qaytariladi (read-only — bu
  endpoint orqali o''zgartirilmaydi).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi |

  | `401` | Token yo''q |

  | `404` | Nomzod topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
