info:
  name: 6. Spouse — Get
  type: http
  seq: 7
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/spouse'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Turmush o'rtog'i ma'lumotlari yoki `null`.

  > Faqat `marital_status = 'married'` bo'lganda mavjud.

  **Auth:** `access_token`.

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `full_name` | string | To'liq ism |
  | `birth_date` | date | `YYYY-MM-DD` |
  | `marriage_date` | date \| null | Nikoh sanasi |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
