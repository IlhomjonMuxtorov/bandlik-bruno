info:
  name: 9. Driver License — Get
  type: http
  seq: 10
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/driver-license'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Haydovchilik guvohnomasi + sertifikatlar.


  **Auth:** `access_token`.


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `has_license` | bool | Guvohnoma bormi |

  | `categories` | string \| null | Vergul bilan ajratilgan toifalar (`A,B,C,D,E,BE,CE,DE,TM,TB`
  ichidan). Masalan `A,B,C` |

  | `license_number` | string \| null | Guvohnoma raqami |

  | `issue_date` | date \| null | Berilgan sana |

  | `expiry_date` | date \| null | Amal qilish muddati |

  | `file_id` | int \| null | Guvohnoma skan fayl ID si |

  | `file_url` | string \| null | Skan faylga to''g''ri URL |

  | `file_size` | int \| null | Fayl o''lchami (bayt) |

  | `file_kind` | string \| null | `image` \| `pdf` \| ... |

  | `file_kind_icon_url` | string \| null | Fayl turi ikonkasi |

  | `certificates` | array | `[{ id, type, title, … }]` — Code 95 / ADR / Chip karta
  sertifikatlari |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
