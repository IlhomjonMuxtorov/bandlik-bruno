info:
  name: 8b. Visa — Update
  type: http
  seq: 14
http:
  method: PATCH
  url: '{{base_url}}/mobile/candidate/visa/1'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"visa_type\": \"work_visa\",\n    \"country_id\": 1,\n    \"entry_date\"\
      : \"15.03.2023\",\n    \"exit_date\": null,\n    \"diploma_file_id\": null\n\
      }"
  auth: inherit
docs: 'Vizani yangilash. Barcha maydonlar yuborilishi kerak (PUT uslubida).


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `visa_type` | string | ✅ | Enum qiymati |

  | `country_id` | int | ✅ | Davlat ID |

  | `entry_date` | date | ✅ | `DD.MM.YYYY` |

  | `exit_date` | date | ➖ | `DD.MM.YYYY` yoki `null` |

  | `diploma_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan hujjat fayl ID
  yoki `null` |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi |

  | `404` | Viza topilmadi yoki boshqa nomzodga tegishli |

  | `401` | Token yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
