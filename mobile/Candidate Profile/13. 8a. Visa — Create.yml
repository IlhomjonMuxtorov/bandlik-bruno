info:
  name: 8a. Visa — Create
  type: http
  seq: 13
http:
  method: POST
  url: '{{base_url}}/mobile/candidate/visa'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"visa_type\": \"work_visa\",\n    \"country_id\": 1,\n    \"entry_date\"\
      : \"15.03.2023\",\n    \"exit_date\": \"15.09.2023\",\n    \"diploma_file_id\"\
      : null\n}"
  auth: inherit
docs: 'Yangi vizani qo''shish.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `visa_type` | string | ✅ | `work_visa` \| `business_visa` \| `student_visa` \|
  `tourist_visa` \| `transit_visa` \| `family_visa` \| `residence_permit` \| `working_holiday`
  \| `seasonal_work` \| `skills_visa` \| `intra_company` \| `other` |

  | `country_id` | int | ✅ | Davlat ID (countries reference-dan) |

  | `entry_date` | date | ✅ | `DD.MM.YYYY` |

  | `exit_date` | date | ➖ | `DD.MM.YYYY`; `null` = hozir ham davlatda |

  | `diploma_file_id` | int | ➖ | `/mobile/upload` orqali yuklangan hujjat fayl ID
  |


  ### 📤 Response (`201 Created`)


  List endpointi bilan bir xil maydonlar.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi (noto''g''ri visa_type, mavjud bo''lmagan country_id
  va h.k.) |

  | `401` | Token yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
