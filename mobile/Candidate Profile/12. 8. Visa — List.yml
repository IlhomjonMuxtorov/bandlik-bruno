meta:
  name: 8. Visa — List
  type: http
  seq: 12
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/visa'
  auth: inherit
docs: |-
  [Nomzod o'zi yaratgan vizalar ro'yxatini olish.]

  **Auth:** `access_token`

  ### 📤 Response

  Massiv ko'rinishida vizalar ro'yxati qaytadi.

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Viza ID |
  | `visa_type` | string | Viza turi (`schengen`, `national`, `tourist` va h.k.) |
  | `visa_type_label` | string | Viza turi matni |
  | `country` | object \| null | Davlat ma'lumotlari (`id`, `name`) |
  | `entry_date` | string | Kirish sanasi (DD.MM.YYYY) |
  | `exit_date` | string \| null | Chiqish sanasi (DD.MM.YYYY) |
  | `is_current` | boolean | Hozirda amaldami |
  | `diploma_file_url` | string \| null | Viza hujjati havolasi |
  | `diploma_file_kind` | string \| null | Fayl turi (pdf, image) |
  | `diploma_file_kind_icon_url` | string \| null | Fayl turi ikonka havolasi |
