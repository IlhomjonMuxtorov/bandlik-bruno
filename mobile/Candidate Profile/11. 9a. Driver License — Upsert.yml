info:
  name: 9a. Driver License — Upsert
  type: http
  seq: 11
http:
  method: PUT
  url: '{{base_url}}/mobile/candidate/driver-license'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"has_license\": true,\n    \"categories\": \"A,B,C\",\n    \"license_number\"\
      : \"AB1234567\",\n    \"issue_date\": \"10.05.2018\",\n    \"expiry_date\":\
      \ \"10.05.2028\",\n    \"file_id\": 42\n}"
  auth: inherit
docs: 'Haydovchilik guvohnomasini yaratish yoki yangilash (`PUT` — upsert).


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `has_license` | bool | ✅ | Guvohnoma bormi |

  | `categories` | string | ➖ | Vergul bilan ajratilgan toifalar ro''yxati. Ruxsat
  etilganlari: `A, B, C, D, E, BE, CE, DE, TM, TB`. Masalan: `A,B,C` |

  | `license_number` | string | ➖ | Guvohnoma raqami |

  | `issue_date` | date | ➖ | Berilgan sana (`DD.MM.YYYY`) |

  | `expiry_date` | date | ➖ | Amal qilish muddati (`DD.MM.YYYY`) |

  | `file_id` | int | ➖ | `/mobile/upload` qaytargan fayl ID si (guvohnomaning skan
  nusxasi) |


  ### 📤 Response


  Yangilangan guvohnoma + sertifikatlar (`GET` bilan bir xil shaklda).


  > Qo''lda upsert qilinganda yozuv `source=manual` deb belgilanadi. Shu sababli
  keyingi CV yaratishlarda MVD/GIBDD avto-sync bu yozuvni **ustiga yozmaydi** —
  qo''lda kiritilgan ma''lumot saqlanib qoladi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
