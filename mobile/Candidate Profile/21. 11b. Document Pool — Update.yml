info:
  name: 11b. Document Pool — Update
  type: http
  seq: 21
http:
  method: PATCH
  url: '{{base_url}}/mobile/candidate/document/{{document_id}}'
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"type\": \"passport_scan\",\n    \"title\": \"Passport (yangilangan).pdf\",\n    \"file_id\": 43\n}"
  auth: inherit
docs: |
  Pool hujjatini yangilash. `file_id` yuborilsa, eski fayl o'chiriladi.

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `type` | string | ✅ | `passport_scan` \| `foreign_passport_scan` \| `criminal_record_scan` \| `photo_3x4_scan` |
  | `title` | string | ✅ | Fayl nomi |
  | `file_id` | int | ➖ | Yangi fayl ID; berilmasa hozirgi fayl saqlanadi |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Hujjat topilmadi (yoki boshqa nomzodga tegishli) |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
