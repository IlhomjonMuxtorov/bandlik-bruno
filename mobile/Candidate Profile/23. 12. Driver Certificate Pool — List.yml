info:
  name: 12. Driver Certificate Pool — List
  type: http
  seq: 23
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/driver-certificate'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  Nomzodning haydovchilik sertifikatlari "pool"i (profil darajasida, Code 95 /
  ADR / Chip card). Har bir CV ulardan tanlangan qismini biriktiradi.

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Sertifikat ID |
  | `type` | string | `code_95` \| `adr` \| `chip_card` |
  | `title` | string | Sertifikat nomi |
  | `certificate_number` | string \| null | Raqam |
  | `issue_date` | date \| null | Berilgan sana (`DD.MM.YYYY`) |
  | `expiry_date` | date \| null | Amal qilish muddati |
  | `file_url` | string \| null | Fayl URL |
  | `file_size` | int \| null | Bayt |
  | `file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel` \| `other` |
  | `file_kind_icon_url` | string \| null | Standart ikonkaga to'liq URL |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
