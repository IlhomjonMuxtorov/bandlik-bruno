info:
  name: 10b. Contact — Update
  type: http
  seq: 18
http:
  method: PATCH
  url: '{{base_url}}/mobile/candidate/contact'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"phone\": \"+998901234567\",\n    \"code\": \"1234\",\n    \"email\"\
      : \"candidate@example.com\"\n}"
  auth: inherit
docs: 'Nomzodning aloqa ma''lumotlarini (telefon + email) yangilash.


  Har ikkala maydon ham ixtiyoriy — faqat yuborilgan maydon yangilanadi
  (null/yuborilmagan maydon o''zgartirilmaydi).


  ⚠️ **Telefon raqamini o''zgartirish SMS tasdiqlashni talab qiladi.** Avval
  `POST /mobile/candidate/contact/request-otp` bilan yangi raqamga kod yuboring,
  so''ng shu yerda `phone` bilan birga `code` ni yuboring. Faqat `email`
  o''zgartirilayotgan bo''lsa, `code` kerak emas.


  **Auth:** `access_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `phone` | string | ➖ | `+998901234567` yoki `901234567`. Server `+998XXXXXXXXX` ga
  normallashtirilgan ko''rinishda saqlaydi. |

  | `code` | string | ➖ | 4 xonali SMS kod. **Faqat** `phone` o''zgartirilayotganda majburiy. |

  | `email` | string | ➖ | Elektron pochta |


  ### 📤 Response


  Yangilangan `{ phone, email }`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | `phone` o''zgargan, lekin `code` yuborilmagan |

  | `400` | SMS kod noto''g''ri yoki muddati o''tgan |

  | `400` | Email noto''g''ri yoki telefon allaqachon boshqa foydalanuvchida band |

  | `401` | Token yo''q |

  | `404` | Nomzod topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
