info:
  name: 11. Document Pool — List
  type: http
  seq: 19
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/document'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  Nomzodning hujjat "pool"i (profil darajasida). Bu hujjatlar candidate'ga
  tegishli; har bir CV ulardan tanlangan qismini biriktiradi (CV qismidagi
  `Document — Attach/Detach`ga qarang).

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Hujjat ID |
  | `type` | string | `passport_scan` \| `foreign_passport_scan` \| `criminal_record_scan` \| `photo_3x4_scan` \| `health_certificate_scan` |
  | `title` | string | Fayl nomi |
  | `file_url` | string \| null | Fayl URL |
  | `file_size` | int \| null | Bayt |
  | `file_kind` | string \| null | `pdf` \| `image` \| `word` \| `excel` \| `other` |
  | `file_kind_icon_url` | string \| null | Standart ikonkaga to'liq URL |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
