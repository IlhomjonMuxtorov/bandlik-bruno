info:
  name: 8b. Visa — Update
  type: http
  seq: 14
http:
  method: PATCH
  url: '{{base_url}}/mobile/candidate/visa/1'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n    \"visa_type\": \"work_visa\",\n    \"country_id\": 1,\n    \"entry_date\": \"2023-03-15\",\n    \"exit_date\": null,\n    \"diploma_file_url\": null\n}"
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Vizani yangilash. Barcha maydonlar yuborilishi kerak (PUT uslubida).

  **Auth:** `access_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `visa_type` | string | ✅ | Enum qiymati |
  | `country_id` | int | ✅ | Davlat ID |
  | `entry_date` | date | ✅ | `YYYY-MM-DD` |
  | `exit_date` | date | ➖ | `YYYY-MM-DD` yoki `null` |
  | `diploma_file_url` | string | ➖ | Hujjat fayli URL yoki `null` |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Validatsiya xatosi |
  | `404` | Viza topilmadi yoki boshqa nomzodga tegishli |
  | `401` | Token yo'q yoki muddati o'tgan |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
