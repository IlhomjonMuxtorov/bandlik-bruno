info:
  name: 8. Visa — List
  type: http
  seq: 12
http:
  method: GET
  url: '{{base_url}}/mobile/candidate/visa'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth:
    mode: bearer
    bearer: '{{access_token}}'
docs: |
  Nomzodning vizalari ro'yxati.

  **Auth:** `access_token`.

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Viza ID |
  | `visa_type` | string | Enum qiymati: `work_visa` \| `business_visa` \| `student_visa` \| `tourist_visa` \| `transit_visa` \| `family_visa` \| `residence_permit` \| `working_holiday` \| `seasonal_work` \| `skills_visa` \| `intra_company` \| `other` |
  | `visa_type_label` | string | Lokalizatsiyalangan nom |
  | `country` | object | `{ id, name }` — viza berilgan davlat |
  | `entry_date` | date | Davlatga kirgan sana `YYYY-MM-DD` |
  | `exit_date` | date \| null | Davlatdan chiqqan sana; `null` = hozir ham davlatda |
  | `is_current` | bool | `exit_date` `null` bo'lsa `true` |
  | `diploma_file_url` | string \| null | Yuklangan hujjat URL |
  | `diploma_file_kind` | string \| null | `pdf` \| `image` \| `word` \| `other` |
  | `diploma_file_kind_icon_url` | string \| null | Ikonka URL |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki muddati o'tgan |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
