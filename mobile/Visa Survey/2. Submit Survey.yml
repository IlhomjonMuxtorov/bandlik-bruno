info:
  name: 2. Submit Survey
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/mobile/visa-survey/submit'
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept-Language
      value: uz
  body:
    type: json
    data: |
      {
        "answers": {
          "gender": "erkak",
          "age": "y26",
          "education": "bak",
          "field": ["zavod", "qurilish"],
          "certificate": "intl",
          "foreign_exp": "uzoq",
          "uz_exp": "uz2",
          "language": ["de", "en"],
          "duration": "biryil",
          "documents": "hamma"
        }
      }
  auth:
    type: inherit
docs: |
  Foydalanuvchining javoblarini saqlaydi va natijani hisoblaydi. Har bir foydalanuvchi uchun bitta yozuv (upsert) — yangi topshirish eskisini almashtiradi.

  **Auth:** Bearer JWT (guest yoki access token).

  ### 📥 Request Body

  | Field | Type | Description |
  |---|---|---|
  | `answers.gender` | string | `erkak` \| `ayol` |
  | `answers.age` | string | `y18` \| `y26` \| `y36` \| `y46` |
  | `answers.education` | string | `bak` \| `mag` \| `kolej` \| `maktab` |
  | `answers.field` | string[] | Multi: `zavod`, `qurilish`, `qishloq`, ... |
  | `answers.certificate` | string | `intl` \| `uz` \| `no` |
  | `answers.foreign_exp` | string | `uzoq` \| `mavsumiy` \| `yoq` |
  | `answers.uz_exp` | string | `uz5` \| `uz2` \| `uz1` \| `noras` \| `yoq` |
  | `answers.language` | string[] | Multi: `de`, `en`, `pl`, `cz`, `other`, `ru`, `uz` |
  | `answers.duration` | string | `biryil` \| `mavsumiy` |
  | `answers.documents` | string | `hamma` \| `pasport` \| `hech` |

  ### 📤 Response (201 Created)

  ```json
  {
    "id": 42,
    "raw_score": 88,
    "score_percent": 97,
    "level": "strong",
    "color": "green",
    "country_matches": [
      { "code": "slovakia", "label": "Slovakia", "percent": 97, "level": "strong", "color": "green" }
    ],
    "recommendations": [
      { "code": "contact_consultant", "percent": null, "text": "Bandlik app orqali mutaxassis maslahatchiga murojaat qiling" }
    ],
    "answers": { },
    "created_at": 1748131200,
    "updated_at": 1748131200
  }
  ```

  > ⚠️ Submit qilingandan keyin keshlangan natija avtomatik invalidate qilinadi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
runtime:
  scripts:
    - type: after-response
      code: |
        const body = res.getBody();
        if (body && body.id) {
          bru.setEnvVar('visa_survey_id', String(body.id));
          console.log('visa_survey_id saved:', body.id);
        }
