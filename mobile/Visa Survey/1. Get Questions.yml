info:
  name: 1. Get Questions
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/visa-survey/questions'
  headers:
    - name: Accept-Language
      value: uz
  body:
    type: none
  auth:
    type: inherit
docs: |
  10 ta standart so'rovnoma savollarini variantlari bilan qaytaradi. Til `Accept-Language` header orqali tanlanadi (uz | ru | en, default uz).

  **Auth:** Bearer JWT (guest yoki access token).

  ### 📤 Response

  ```json
  {
    "language": "uz",
    "questions": [
      {
        "id": 1,
        "code": "gender",
        "title": "Jins",
        "type": 1,
        "max_points": 0,
        "options": [
          { "id": 1, "code": "erkak", "label": "Erkak", "points": 0 },
          { "id": 2, "code": "ayol",  "label": "Ayol",  "points": 0 }
        ]
      }
      // ...
    ]
  }
  ```

  > ⚡ Natija server tomondan til bo'yicha keshlanadi (1 kun). Qaytaruv vaqti birinchi marta 50–80ms, takroriy so'rovda 1–5ms.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
