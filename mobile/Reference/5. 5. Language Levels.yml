info:
  name: 5. Language Levels
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/mobile/language-levels'
  headers:
  - name: Accept
    value: application/json
  params:
  - name: language_id
    value: '9'
    type: query
    enabled: false
  - name: scale
    value: jlpt
    type: query
    enabled: false
  auth: inherit
docs: 'Til daraja ma''lumotnomasi. `language_id` bilan filtrlaganda shkala tilning
  o''zidan (`language.scale`) avtomatik aniqlanadi — masalan yapon tili uchun faqat
  JLPT darajalari qaytadi. `scale` bilan shkalani qo''lda ham berish mumkin.


  **Auth:** `access_token`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {access_token}` |


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `language_id` | int | ➖ | Til ID (`GET /mobile/languages`). Berilsa shkala shu
  tilning `language.scale` ustunidan avtomatik aniqlanadi va `scale` param e''tiborsiz
  qoldiriladi. Mavjud bo''lmagan ID → bo''sh massiv `[]`. |

  | `scale` | string | ➖ | Bitta shkala darajalari: `cefr` \| `hsk` \| `topik` \| `jlpt`
  \| `torfl` \| `ilr` \| `actfl` \| `clb` \| `nclc` \| `testdaf` \| `tocfl` \| `stanag`
  \| `oet` \| `dsh` \| `nt2` \| `eiken`. Faqat `language_id` berilmaganda ishlaydi.
  Ikkalasi ham berilmasa — barchasi. |


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Daraja ID |

  | `code` | string | Daraja kodi, masalan `A1` \| `native` \| `jlpt_n1` \| `hsk_3` |

  | `name` | string | Lokalizatsiyalangan nom |

  | `scale` | string | Daraja shkalasi: `cefr` \| `hsk` \| `jlpt` \| … |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
