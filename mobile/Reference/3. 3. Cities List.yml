info:
  name: 3. Cities List
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/mobile/cities'
  headers:
  - name: Accept
    value: application/json
  auth:
    type: bearer
    token: '{{guest_token}}'
docs: 'Aktiv shaharlar ro''yxati. `country_id` bo''yicha filterlash va/yoki `q` bo''yicha
  nom qidiruvi. Kamida bittasi (`country_id` yoki `q`) berilishi shart.


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`) — `sort_order` emas.


  **Auth:** har qanday yaroqli JWT.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `country_id` | int | ➖* | `countries` endpoint''dan olingan ID. Berilsa shu davlat
  shaharlari bilan cheklanadi; mavjud bo''lmasa `404`. |

  | `q` | string | ➖* | Nom bo''yicha qidiruv (`uz`/`ru`/`en`, registrga befarq, qisman
  moslik). `country_id` bilan birga ishlaydi. |


  > \* `country_id` yoki `q` — kamida bittasi majburiy. Ikkalasi ham bo''lmasa `400`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {token}` |


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Shahar ID |

  | `name` | string | Tilga mos nom. Fallback → `en` → `uz`. |


  ### 📋 Response Headers


  | Header | Description |

  |---|---|

  | `X-Pagination-Total-Count` | Qidiruv/filtrga mos jami natijalar soni (badge uchun).
  CORS `Access-Control-Expose-Headers` orqali ochiq, frontend o''qiy oladi. |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | `country_id` ham, `q` ham berilmagan |

  | `401` | Token yo''q, noto''g''ri yoki muddati o''tgan |

  | `404` | `country_id` topilmadi yoki faol emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
