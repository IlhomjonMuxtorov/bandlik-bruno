info:
  name: 15. Skills (Ko'nikmalar)
  type: http
  seq: 15
http:
  method: GET
  url: '{{base_url}}/mobile/skills?q=yuk'
  params:
  - name: q
    value: yuk
    type: query
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  Rezyume "Ko'nikmalar" qadami uchun tekis autocomplete. Talablar katalogining
  `professional_skills` **va** `industry` (8-guruh, sohaviy) guruhlari — barcha
  kichik guruhlari bilan — ichidagi aktiv ta'riflarni nom bo'yicha qidiradi.
  `q` bo'sh bo'lsa — birinchi 20 ta taklif.

  > Natijalar qurilma tili bo'yicha alifbo (A-Z) tartibida qaytadi (fallback `uz`).

  > Akkordeon ko'rinishidagi (soha bo'yicha guruhlangan) ro'yxat kerak bo'lsa —
  > `GET /mobile/skill-groups`. Ikkala endpoint bir xil to'plam ustida ishlaydi.

  Qaytgan `id` ni `POST /mobile/cv/{cv_id}/skill` ga `requirement_id`, yoki
  `PUT /mobile/cv/{cv_id}/skill` ga `requirement_ids[]` sifatida yuboriladi.

  **Auth:** `access_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Qidiruv matni (uz/ru/en bo'yicha `ILIKE`). Bo'sh → birinchi 20 ta |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {access_token}` |

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Katalog ta'rif ID (`vacancy_requirement.id`) — `requirement_id` sifatida yuboriladi |
  | `name` | string | Lokalizatsiyalangan ko'nikma nomi |
  | `code` | string \| null | Ta'rif kodi (`eq.forklift`, `ind.warehouse.wms`); `null` — kod yo'q |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki muddati o'tgan |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
