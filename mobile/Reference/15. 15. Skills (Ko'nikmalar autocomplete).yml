info:
  name: 15. Skills (Ko'nikmalar)
  type: http
  seq: 15
http:
  method: GET
  url: '{{base_url}}/mobile/skills?q=yuk'
  params:
  - name: q
    value: yuk
    type: query
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: |
  Rezyume "Ko'nikmalar" qadami uchun autocomplete. Talablar katalogining
  `professional_skills` guruhi (va uning barcha kichik guruhlari) ichidagi aktiv
  ta'riflarni nom bo'yicha qidiradi. `q` bo'sh bo'lsa — birinchi 20 ta taklif.

  > Natijalar `Accept-Language` bo'yicha alifbo (A-Z) tartibida qaytadi (fallback
  > `uz`).

  Qaytgan `id` ni `POST /mobile/cv/{cv_id}/skill` ga `requirement_id` sifatida
  yuboriladi.

  **Auth:** `access_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Qidiruv matni (uz/ru/en bo'yicha `ILIKE`). Bo'sh → birinchi 20 ta |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {access_token}` |

  ### 📤 Response *(massiv elementi)*

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Katalog ta'rif ID (`vacancy_requirement.id`) — `requirement_id` sifatida yuboriladi |
  | `name` | string | Lokalizatsiyalangan ko'nikma nomi |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki muddati o'tgan |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
