info:
  name: 1. Countries List
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/mobile/countries'
  headers:
  - name: Accept
    value: application/json
  auth:
    type: bearer
    token: '{{guest_token}}'
docs: 'Barcha aktiv davlatlar ro''yxatini qaytaradi.


  **Auth:** har qanday yaroqli JWT (`guest_token` yoki `access_token`).


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {token}` |


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `visa` | string | ➖ | `1` yuborilsa faqat `is_visa_available=true` davlatlar qaytadi.
  |

  | `q` | string | ➖ | Nom bo''yicha qidiruv (`uz`/`ru`/`en` ichidan, registrga befarq, qisman
  moslik). `visa` bilan birga ishlaydi. |


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Davlat ID |

  | `name` | string | Tanlangan tilga mos. Fallback → `uz`. |

  | `iso_code` | string | ISO 3166-1 alpha-2 (`DE`, `KR`, `PL`, …). Sinxronizatsiya
  uchun kalit. |

  | `flag_url` | string \| null | Bayroq rasmi (`flagcdn.com/w80/{iso}.png`) |

  | `image_url` | string \| null | Banner/cover rasmi |

  | `is_visa_available` | bool | `true` — viza rasmiylashtirish mumkin |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q, noto''g''ri yoki muddati o''tgan |


  > Boshqa xato qaytarmaydi — mavjud bo''lmasa bo''sh massiv `[]` qaytadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
