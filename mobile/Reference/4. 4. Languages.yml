info:
  name: 4. Languages
  type: http
  seq: 4
http:
  method: GET
  url: '{{base_url}}/mobile/languages'
  headers:
  - name: Accept
    value: application/json
  - name: Accept-Language
    value: uz
  auth: inherit
docs: 'Til ma''lumotnomasi. `Accept-Language` ga ko''ra lokalizatsiya qilingan nomlar
  qaytariladi.


  **Auth:** `access_token`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {access_token}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en` |


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Til ID |

  | `iso_code` | string | ISO 639-1 (`uz`, `ru`, `en`, …) |

  | `name` | string | Lokalizatsiyalangan nom |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
