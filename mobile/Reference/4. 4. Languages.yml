info:
  name: 4. Languages
  type: http
  seq: 4
http:
  method: GET
  url: '{{base_url}}/mobile/languages'
  headers:
  - name: Accept
    value: application/json
  auth: inherit
docs: 'Til ma''lumotnomasi. Tanlangan tilga ko''ra lokalizatsiya qilingan nomlar
  qaytariladi.


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`) — `sort_order` emas.


  **Auth:** `access_token`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {access_token}` |


  ### 📤 Response *(massiv elementi)*


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Til ID |

  | `iso_code` | string | ISO 639-1 (`uz`, `ru`, `en`, …) |

  | `name` | string | Lokalizatsiyalangan nom |

  | `scale` | string | Tilning standart daraja shkalasi (`cefr` \| `hsk` \| `jlpt` \|
  …) — darajalarni `GET /mobile/language-levels?scale=` bilan filtrlash uchun |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
