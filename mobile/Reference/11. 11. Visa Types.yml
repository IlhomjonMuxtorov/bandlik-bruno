info:
  name: 11. Visa Types
  type: http
  seq: 11
http:
  method: GET
  url: '{{base_url}}/mobile/visa-types'
  auth: inherit
docs: |
  Viza turlari ro'yxatini olish (ma'lumotnomalar uchun).

  > Ro'yxat tarjima qilingan `label` bo'yicha alifbo (A-Z) tartibida qaytadi — endi
  > enum deklaratsiya tartibida emas.

  **Auth:** `access_token`
  
  ### 📋 Headers
  
  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {token}` |
  
  ### 📤 Response
  
  ```json
  [
    {
      "value": "work_visa",
      "label": "Work visa"
    },
    {
      "value": "business_visa",
      "label": "Business visa"
    }
  ]
  ```
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `401` | Unauthorized (Token yaroqsiz yoki berilmagan) |
