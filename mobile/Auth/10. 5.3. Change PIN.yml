info:
  name: 5.3. Change PIN
  type: http
  seq: 10
http:
  method: POST
  url: '{{base_url}}/mobile/auth/change-pin'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"old_pin\": \"1234\",\n  \"new_pin\": \"5678\",\n  \"device_id\": \"\
      {{device_id}}\"\n}"
  auth: inherit
docs: 'Shu qurilманинг PIN-kodини yangilash. Eski PIN tekshirilgandan so''ng yangi
  PIN saqlanadi.


  > PIN **har qurilмага alohida** — `device_id` majburiy. O''zgartirish faqat shu
  qurilманинг PIN''ига ta''sir qiladi.


  > Har noto''g''ri `old_pin` urinish hisoblanadi (xuddi `login-with-pin` kabi). 3
  marta xato → shu qurilма 10 daqiqага bloklanadi.


  **Auth:** `access_token` majburiy.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `old_pin` | string | ✅ | Hozirgi 4 xonali PIN. |

  | `new_pin` | string | ✅ | Yangi 4 xonali PIN. |

  | `device_id` | string | ✅ | UUID. PIN o''zgartiriladigan qurilма (token egасиники). |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `is_pin_set` | bool | Har doim `true` |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | `old_pin`/`new_pin`/`device_id` yo''q yoki format xato |

  | `400` | `Device not found.` |

  | `400` | PIN o''rnatilmagan |

  | `400` | `old_pin` noto''g''ri → qolgan urinishlar soni qaytadi |

  | `400` | 3 marta xato → `{ blocked_for }` |

  | `401` | `access_token` yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
