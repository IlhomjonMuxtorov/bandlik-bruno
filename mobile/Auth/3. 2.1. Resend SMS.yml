info:
  name: 2.1. Resend SMS
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/mobile/auth/resend-sms'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"phone\": \"+998901234567\"\n}"
  auth:
    type: bearer
    token: '{{guest_token}}'
docs: 'MVD orqali takroriy tekshiruvisiz faqat SMS ni qayta jo''natadi.


  **Auth:** `guest_token` (1-qadamdan olingan).


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `phone` | string | ✅ | 2-qadamda ko''rsatilgan telefon (E.164). |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `phone_masked` | string | Yashirilgan telefon raqami |

  | `expires_in` | int | OTP muddati soniyalarda (`180`) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi |

  | `400` | OTP rate limit |

  | `400` | Avvalgi OTP so''rovi topilmadi |

  | `400` | SMS yuborishda xatolik |

  | `401` | `guest_token` yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
