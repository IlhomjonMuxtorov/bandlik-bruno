info:
  name: 2. Passport Auth
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/mobile/auth/passport'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"passport_series\": \"AA\",\n  \"passport_number\": \"1234567\",\n\
      \  \"birth_date\": \"15.05.1990\",\n  \"phone\": \"+998901234567\",\n  \"device_id\"\
      : \"{{device_id}}\"\n}"
  auth:
    type: bearer
    token: '{{guest_token}}'
docs: 'Pasport ma''lumotlarini **MVD GCP API** orqali tekshiradi va ko''rsatilgan
  telefonga 6 xonali OTP yuboradi.


  > **MVD ma''lumot bermasa (OneID blok / topilmadi / server xatosi) ham ro''yxatdan
  o''tish RAD ETILMAYDI.** Foydalanuvchi OTP orqali davom etadi va *tasdiqlanmagan
  mijoz* (`is_verified: false`) sifatida tizimga kiradi. Xizmatlardan foydalanish uchun
  keyin `POST /mobile/auth/verify-identity` orqali tasdiqlanishi kerak.


  **Auth:** `guest_token` (1-qadamdan olingan).


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `passport_series` | string | ✅ | 2 harf (`AA`, `AB`, …). Backend uppercase qiladi.
  |

  | `passport_number` | string | ✅ | 7 raqam (`1234567`). |

  | `birth_date` | string | ✅ | `DD.MM.YYYY` (masalan: `15.05.1990`). MVD tekshiruvi
  uchun. |

  | `phone` | string | ✅ | E.164 format (`+998901234567`). OTP shu raqamga yuboriladi.
  |

  | `device_id` | string | ✅ | UUID. Pasport ma''lumotlari shu qurilmaga bog''lanadi.
  |


  **Sandbox telefonlar:** `+998900000001` → kod `111111`, `+998900000002` → kod `222222`.


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `phone_masked` | string | Yashirilgan raqam: `+998 ** *** 5678` |

  | `expires_in` | int | OTP amal qilish vaqti soniyalarda (`180`) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi |

  | `400` | MVD: pasport muddati o''tgan (ma''lumot bor, lekin amal qilmaydi) |

  | `400` | OTP rate limit (telefon uchun so''rovlar oshdi) |

  | `400` | SMS yuborishda xatolik |

  | `401` | `guest_token` yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
