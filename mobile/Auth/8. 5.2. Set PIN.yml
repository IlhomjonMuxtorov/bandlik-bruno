info:
  name: 5.2. Set PIN
  type: http
  seq: 8
http:
  method: POST
  url: '{{base_url}}/mobile/auth/set-pin'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"pin\": \"1234\",\n  \"device_id\": \"{{device_id}}\"\n}"
  auth: inherit
docs: 'PIN yaratishning **1-bosqichi** ("Pin kod yarating"). Kiritilgan PIN serverда
  vaqtincha (cache, **hash** holida, 5 daqiqa) saqlanadi — hali yakuniy emas.


  > PIN **har qurilmага alohida** saqlanadi (`user_devices.pin_code_hash`). Shu sabab
  `device_id` majburiy — PIN qaysi qurilмага tegishliligini bildiradi.


  > PIN faqat **2-bosqich** — `confirm-pin` — qayta kiritilgan PIN bilan mos kelganda
  saqlanadi. `confirm-pin` chaqirilmasa, PIN o''rnatilmaydi.


  **Auth:** `access_token` majburiy.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `pin` | string | ✅ | 4 xonali raqam (`0000`–`9999`). Boshqa belgilar `400`. |

  | `device_id` | string | ✅ | UUID. PIN shu qurilмага o''rnatiladi (token egasiniki
  bo''lishi shart). |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `pending` | bool | Har doim `true` — PIN tasdiqlash kutilmoqda |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | `pin`/`device_id` yo''q yoki format xato |

  | `400` | `Device not found.` — qurilma topilmadi yoki bu user''ники emas |

  | `401` | `access_token` yo''q yoki muddati o''tgan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
