info:
  name: 3. Verify Phone (OTP)
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/mobile/auth/verify-phone'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"phone\": \"+998901234567\",\n  \"code\": \"123456\",\n  \"device_id\"\
      : \"{{device_id}}\"\n}"
  auth:
    type: bearer
    token: '{{guest_token}}'
docs: 'SMS orqali kelgan OTP kodni tasdiqlaydi. Muvaffaqiyatli bo''lsa guest hisob
  to''liq aktiv holatga o''tadi va to''liq token juft qaytaradi.


  > Agar ushbu pasport bilan boshqa aktiv hisob mavjud bo''lsa — qurilma ko''chiriladi,
  guest o''chiriladi.


  > **`is_verified`:** 2-qadamda (Passport Auth) MVD ma''lumot bergan bo''lsa hisob
  `is_verified: true` bo''ladi; MVD ma''lumot bermagan bo''lsa hisob aktiv, lekin
  `is_verified: false` (tasdiqlanmagan) — xizmatlar uchun `verify-identity` talab qilinadi.
  Profil holatini `GET /mobile/candidate/...` (`is_verified`) orqali tekshiring.


  **Auth:** `guest_token` (1-qadamdan olingan).


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `phone` | string | ✅ | 2-qadamda ko''rsatilgan telefon (E.164). |

  | `code` | string | ✅ | 6 xonali OTP kodi. Sandbox: `111111` / `222222`. |

  | `device_id` | string | ✅ | UUID. Token shu qurilmaga bog''lanadi. |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `access_token` | string | To''liq foydalanuvchi JWT (15 daqiqa). Payload: `{ sub,
  status: 1, type: 4 }` |

  | `refresh_token` | string | Yangilash tokeni (30 kun). **Rotation:** har yangilashda
  eski token bekor qilinadi. |

  | `expires_in` | int | `access_token` muddati soniyalarda (`900`) |

  | `token_type` | string | `Bearer` |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Validatsiya xatosi |

  | `400` | OTP noto''g''ri yoki muddati o''tgan (180 sek) |

  | `401` | `guest_token` yo''q yoki muddati o''tgan |


  > ✨ **Auto-save:** `access_token` va `refresh_token` avtomatik saqlanadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
  - type: after-response
    code: "const body = res.getBody();\nif (body && body.access_token) {\n  bru.setEnvVar('access_token',\
      \ body.access_token);\n  bru.setEnvVar('refresh_token', body.refresh_token);\n\
      \  console.log('access_token and refresh_token saved');\n}"
