docs: 'Sug''urta tashkilotning **Xodimlar** tabi.


  **Auth:** `admin_token`. Ruxsat: `insuranceView` (faqat superadmin/admin).


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | F.I.SH / rol / telefon bo''yicha qidiruv |

  | `is_active` | int (0\|1) | ➖ | |

  | `region_id` | int | ➖ | Viloyat bo''yicha filter |

  | `district_id` | int | ➖ | Tuman bo''yicha filter |

  | `page`, `per-page` | int | ➖ | Pagination |


  ### 📤 Response (`data.items[]` — `OrganizationEmployeeOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `organization_id` | int | |

  | `user_id` | int \| null | Agar xodim alohida login olsa |

  | `firstname`  | string        | Ism |

  | `lastname`   | string        | Familya |

  | `patronymic` | string \| null | Otasining ismi. `null` — yo''q yoki noma''lum |

  | `phone` | string \| null | |

  | `role` | string | "XBA agenti 1", "XBA admin" va h.k. |

  | `region` | object \| null | `{id, name: {uz, ru, en}}` |

  | `district` | object \| null | `{id, name: {uz, ru, en}}` |

  | `joined_at` | int \| null | Unix timestamp |

  | `joined_at_formatted` | string \| null | `d.m.Y H:i` (Asia/Tashkent) |

  | `is_active` | bool | |

  | `created_at` / `updated_at` | int | |

  | `created_at_formatted` / `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
