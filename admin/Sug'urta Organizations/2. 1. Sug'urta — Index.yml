info:
  name: 1. Sug'urta — Index
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/insurance?per-page=20'
  auth: inherit
docs: |-
  Sug'urta tashkilotlari ro'yxati. Faqat `type = 4` yozuvlar qaytadi.

  **"Davlatlar bo'yicha narxlash" formasidagi tashkilot dropdown'ining manbasi** —
  admin shu ro'yxatdan sug'urta tashkilotini tanlaydi, so'ngra
  `GET /admin/insurance-country-prices/by-organization?organization_id=…` chaqiriladi.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `is_active`, `page`, `per-page`.

  ### 📤 Response

  `data.items[]` — `OrganizationOutputDTO` (`type = 4`, `type_label = "Sug'urta"`). Har bir
  qatorga service-org `counts` obyekti qo'shiladi (batched, N+1 siz):

  | Field | Type | Description |
  |---|---|---|
  | `counts.employees_count` | int | Faol xodimlar soni ("Xodimlar"). |
  | `counts.clients_count` | int | Xizmat ko'rsatilgan distinct kandidatlar ("Mijozlar"). |
  | `counts.revenue` | int | Yakunlangan buyurtmalar summasi, UZS ("Daromadi"). |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
