info:
  name: 1. Upload File
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url}}/admin/upload'
  body:
    type: multipartForm
    data:
    - name: file
      type: file
      fileName: ''
  auth: inherit
docs: 'Faylni serverga yuklaydi va keyinchalik entity yaratish/yangilashda ishlatish
  uchun URL qaytaradi.


  **Auth:** `admin_token` (Bearer).


  ### Ruxsat etilgan fayl turlari


  | MIME / kengaytma | Turi |

  |---|---|

  | jpg, jpeg, png, gif, webp | Rasm |

  | pdf | PDF |

  | doc, docx | Word |

  | xls, xlsx | Excel |

  | mp3, m4a, aac, ogg, opus, wav, webm | Audio (ovozli xabar) |


  **Maksimal hajm:** 10 MB (audio fayllar uchun 25 MB)

  **Rasm maksimal o''lchami:** 8000×8000 px


  ### 📥 Request Body (multipart/form-data)


  | Maydon | Turi | Majburiy | Izoh |

  |---|---|:---:|---|

  | `file` | file | ✅ | Yuklanadigan fayl |


  ### 📤 Response (201)


  | Maydon | Turi | Izoh |

  |---|---|---|

  | `success` | bool | Doim `true` |

  | `data` | object | Yuklangan fayl ma''lumotlari |

  | `data.id` | int | Fayl yozuvining PK |

  | `data.uuid` | string | RFC-4122 UUID v4 |

  | `data.url` | string | Faylning to''liq public URL''i |

  | `data.original_name` | string | Brauzerdagi asl fayl nomi |

  | `data.file_size` | int | Bayt |

  | `data.file_kind` | string | `pdf` \| `image` \| `word` \| `excel` \| ... |

  | `data.file_kind_icon_url` | string\|null | Ikon rasmi URL |

  | `message` | string | Bo''sh string |

  | `errors` | object | Bo''sh object |


  ### ⚠️ Xatolar


  | Kod | Sabab |

  |---|---|

  | `400` | Fayl yuborilmagan, validatsiya xatosi, hajm oshib ketgan yoki rasm o''lchami
  ortiq |

  | `401` | Token yo''q yoki muddati o''tgan |

  | `403` | Admin ruxsat yo''q |

  | `413` | Fayl 10 MB dan katta (web-server darajasida) |

  | `422` | Serverda MIME tekshiruvi muvaffaqiyatsiz bo''ldi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
