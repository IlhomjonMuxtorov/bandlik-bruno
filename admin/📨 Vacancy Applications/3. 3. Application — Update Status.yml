info:
  name: 3. Application — Update Status
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/status'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"status\": \"accepted\",\n  \"notes\": \"Kuchli nomzod, kursga yo'naltirildi\",\n  \"hotel_preference\": true\n}"
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Ariza statusini o'zgartiradi:

  | To | Required | Side effect |
  |---|---|---|
  | `reviewed` | — | `reviewed_at` o'rnatiladi |
  | `accepted` | `notes` ➖, `hotel_preference` ➖ | **`vacancy_candidate` yozuvi yaratiladi** (status=`pending`) |
  | `rejected` | `reason` ✅ | `rejection_reason` saqlanadi |

  > Terminal statusdagi arizalar (`accepted` / `rejected`) qayta o'zgartirilmaydi.

  **Auth:** Admin yoki vakansiya egasi.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `status` | string | ✅ | `reviewed` \| `accepted` \| `rejected` |
  | `reason` | string | ⚠️ | `rejected` uchun majburiy |
  | `notes` | string | ➖ | `accepted` uchun pipeline yozuviga ko'chiriladi |
  | `hotel_preference` | bool | ➖ | `accepted` uchun |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Allaqachon hal qilingan / `reason` bo'sh / noto'g'ri status |
  | `403` | Boshqa tashkilot |

