info:
  name: 6. Form References (public, token-gated)
  type: http
  seq: 6
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-invitations/references/industries'
  headers:
  - name: X-Invitation-Token
    value: '{{invitation_token}}'
  - name: Accept-Language
    value: uz
  auth: none
docs: |
  **PUBLIC, lekin anonim emas** â€” `Authorization` header kerak emas, ammo amaldagi
  taklif tokeni **majburiy**. Login qilmagan ish beruvchi vakansiya formasini
  to'ldirishi uchun kerakli ma'lumotnomalarni qaytaradi.

  Javob formati `admin/vacancies/*` dagi mos reference endpointlar bilan **aynan bir
  xil** (bitta umumiy `VacancyReferenceTrait` ishlatiladi).

  **Auth:** talab qilinmaydi; token **`X-Invitation-Token` header** (tavsiya) yoki
  `?token=` query orqali majburiy. Query varianti log/tarixga sizishi mumkin â€” header
  afzal.

  ### đź”— Mavjud reference endpointlar

  Har biriga `X-Invitation-Token: {{invitation_token}}` header qo'shiladi:

  | Endpoint | Tavsif |
  |---|---|
  | `GET .../references/salary-currencies` | Maosh valyutalari (`code`, `symbol`, `label`). |
  | `GET .../references/industries` | Aktiv sohalar. |
  | `GET .../references/industry-categories` | Soha kategoriyalari. |
  | `GET .../references/requirement-categories` | Talablar taksonomiyasi (daraxt). |
  | `GET .../references/requirement-definitions` | Talab ta'riflari. Query: `industry_id`, `category_id`. |
  | `GET .../references/requirement-value-types` | `value_type` enum ro'yxati. |
  | `GET .../references/requirement-options/<id>` | Bitta talab uchun tanlov variantlari. |
  | `GET .../references/benefit-categories` | Imtiyozlar taksonomiyasi (daraxt). |
  | `GET .../references/benefit-definitions` | Imtiyoz ta'riflari. Query: `category_id`, `q`. |
  | `GET .../references/benefit-value-types` | Imtiyoz `value_type` enum ro'yxati. |
  | `GET .../references/benefit-options/<id>` | Bitta imtiyoz uchun tanlov variantlari. |
  | `GET .../references/documents` | Talab qilinadigan hujjatlar ro'yxati. |
  | `GET .../references/countries` | Aktiv davlatlar. |
  | `GET .../references/cities` | Davlat shaharlari. Query: `country_id` (**majburiy**). |
  | `GET .../references/languages` | Aktiv tillar, har biri o'z shkalasidagi darajalar bilan. |
  | `GET .../references/language-levels` | Til darajalari. Query: `scale` (ixtiyoriy; masalan `cefr`, `jlpt`). |
  | `GET .../references/service-categories` | Xizmat toifalari enum: `value`, `label`, `expected_organization_type`, `service_group_type`. |
  | `GET .../references/organizations` | Toifaga mos hamkor tashkilotlar. Query: `category` (**majburiy**; `insurance` \| `notarius` \| `logistics` \| `visa` \| `training`). |
  | `GET .../references/organizations/<id>/services` | Bitta tashkilotning aktiv xizmatlari. |
  | `GET .../references/educational-courses` | Tanlangan o'quv markazining vakansiya davlatiga biriktirilishi mumkin bo'lgan kurslari. Query: `organization_id`, `country_id` (**ikkalasi majburiy**). |
  | `GET .../references/insurance-country-prices` | Davlat bo'yicha aktiv sug'urta narxlari. Query: `country_id` (**majburiy**). |
  | `GET .../references/notary-translation-prices` | Notariusning tarjima narxlari. Query: `organization_id` (**majburiy**). |
  | `GET .../references/notary-apostille-prices` | Notariusning apostil/tasdiqlash narxlari. Query: `organization_id` (**majburiy**). |
  | `GET .../references/notary-other-service-prices` | Notariusning boshqa xizmat narxlari. Query: `organization_id` (**majburiy**). |

  > Yuqoridagilar `service_groups[].services[]` uchun `organization_id`,
  > `organization_service_id`, `educational_course_id`, `insurance_country_price_id`,
  > `notary_*_price_id` qiymatlarini, hamda vakansiyaning `country_id` / `city_id`,
  > `documents[]` va `language_requirements[]` maydonlarini to'ldiradi â€” ya'ni token-gated
  > formani to'liq yuborish uchun yetarli.

  ### đź“‹ Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Accept-Language` | âž– | `uz` \| `ru` \| `en`. Default: `uz`. Nomlar shu tilda qaytadi. |
  | `X-Invitation-Token` | âž– | `?token=` o'rniga ishlatish mumkin. |

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `400` | Token berilmagan; token noto'g'ri, muddati o'tgan yoki bekor qilingan; majburiy query param (`country_id` / `organization_id` / `category`) berilmagan yoki noto'g'ri. |
  | `404` | `requirement-options` / `benefit-options` uchun ta'rif topilmadi. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
