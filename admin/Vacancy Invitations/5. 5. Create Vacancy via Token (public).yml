docs: |
  **PUBLIC тАФ `Authorization` header talab qilinmaydi.** Taklif qilingan tashkilot
  tizimga kirmasdan to'liq vakansiya yaratadi. Vakansiya darhol XBA tasdig'i
  navbatiga yuboriladi.

  **Auth:** talab qilinmaydi. Token **`X-Invitation-Token` header** orqali beriladi
  (tavsiya). `?token=` query ham ishlaydi, lekin tavsiya etilmaydi тАФ token log/tarixga
  sizib ketishi mumkin.

  ### ЁЯФР Xavfsizlik

  > `organization_id` va `recruiter_id` **body'dan olinmaydi** тАФ ikkalasi ham
  > **tokendan** o'qiladi. Body'da boshqa qiymat yuborilsa, e'tiborsiz qoldiriladi.
  > Shu sabab sizib ketgan havola faqat o'zi biriktirilgan tashkilot uchun vakansiya
  > yarata oladi.

  Vakansiya taklif qilingan tashkilot **egasining (owner) logini nomidan** yaratiladi тАФ
  `created_by` va audit trail shu foydalanuvchiga bog'lanadi.

  ### ЁЯУе Request Body

  `POST /admin/vacancies` bilan **bir xil** (`VacancyInputDTO`), quyidagi farqlar bilan:

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | тАФ | тЫФ | Yuborilmaydi (yuborilsa e'tiborsiz). Tokendan olinadi. |
  | `recruiter_id` | тАФ | тЫФ | Yuborilmaydi (yuborilsa e'tiborsiz). Tokendan olinadi. |
  | `title` | string | тЬЕ | Vakansiya nomi. |
  | `employment_type` | string | тЬЕ | `full_time` \| `part_time` \| `contract` \| ... |
  | `country_id` | int | тЬЕ | Ish joyi davlati. |
  | `hiring_quota` | int | тЬЕ | Nechta nomzod olinadi. Min `1`. |
  | `contract_id` | int \| null | тЮЦ | `verify` qaytargan `contracts[]` dan tanlanadi. `null` тАФ shartnomasiz. |
  | `salary_gross` / `salary_net` | int | тЮЦ | **Odatiy birlikda** (so'm/dollar), tiyinda emas. |
  | `requirements` | array | тЬЕ | Kamida bitta talab bo'lishi shart. |
  | `documents` | array | тЬЕ | Kamida bitta talab qilinadigan hujjat bo'lishi shart. |
  | `service_groups` | array | тЬЕ | Kamida `training` (kurs biriktirilgan) va `xba` (bitta `agency` xizmati) guruhlari shart. |

  ### ЁЯУд Response

  `201` тАФ to'liq `VacancyDetailOutputDTO`. Diqqatga sazovor maydonlar:

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Yaratilgan vakansiya id. |
  | `status` | string | `pending_approval` тАФ boshqaruvchi org XBA **agenti** bo'lsa (ota-XBA ko'rib chiqadi). `pending_association` тАФ boshqaruvchi org **ildiz** XBA bo'lsa (assotsiatsiya navbati). Hech qachon `draft` emas va hech qachon o'z-o'zidan chop etilmaydi. |
  | `organization` | object | Tokendagi XBA org (agent bo'lsa тАФ uning ota tashkiloti). |
  | `recruiter` | object | Tokendagi ish beruvchi/rekruter org. |

  > Yaratish va tasdiqqa yuborish **atomar**: tasdiqqa yuborish validatsiyasi
  > yiqilsa, vakansiya umuman saqlanmaydi (osilib qolgan `draft` qolmaydi).

  ### тЪая╕П Errors

  | Code | Reason |
  |---|---|
  | `400` | Token yo'q/noto'g'ri/muddati o'tgan/bekor qilingan; vakansiya validatsiyasi yiqildi (talab yo'q, hujjat yo'q, kurs yo'q, agency xizmati yo'q va h.k.). |
  | `403` | Taklif qilingan tashkilotda aktiv owner login yo'q. |
settings:
