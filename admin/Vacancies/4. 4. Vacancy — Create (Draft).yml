docs: |
  Yangi vakansiya yaratadi — boshlanishi `status = draft`. Wizardning barcha 8 bosqich
  ma'lumotlari bitta tranzaksiyada saqlanadi.

  **Auth:** `admin_token` yoki Employer/Recruiter (faqat o'z tashkiloti uchun).

  ### 📥 Request Body

  **Asosiy maydonlar (1-bosqich):**

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ✅ | **XBA** tashkiloti (boshqaruvchi agentlik). Faqat `XBA`-type org qabul qilinadi — aks holda `422`. |
  | `recruiter_id` | int | ➖ | Biriktirilgan **ish beruvchi YOKI rekruter** ("Ish beruvchi / Rekruter" tanlovi). Faqat `EMPLOYER` yoki `RECRUITER`-type org qabul qilinadi — aks holda `422`. |
  | `industry_id` | int | ➖ | Soha ID |
  | `title` | string | ✅ | Sarlavha |
  | `description` | string | ➖ | Tavsif (HTML/markdown) |
  | `experience_level` | string | ➖ | `none` \| `one_to_three` \| `three_to_six` |
  | `employment_type` | string | ✅ | `full_time` \| `part_time` \| `seasonal` \| `contract` |
  | `hiring_quota` | int | ✅ | Necha kishi kerak (>=1) |
  | `duration_months_min` / `_max` | int | ➖ | Ish davomiyligi |
  | `work_schedule` | string | ➖ | `5_2` \| `6_1` \| `2_2` \| `shift` \| `flexible` |
  | `work_time_from` / `_to` | string | ➖ | `HH:MM` |
  | `salary_gross` / `_currency` | int / string | ➖ | Maosh (tavsifiy). Valyuta: `UZS` \| `USD` \| `EUR` (boshqasi → `422`). Default `UZS`. Xizmat narxlari valyutasiga ta'sir qilmaydi — ular `UZS`-da qoladi. |
  | `salary_net` / `_currency` | int / string | ➖ | Valyuta: `UZS` \| `USD` \| `EUR`. |
  | `country_id` | int | ✅ | |
  | `city_id` | int | ➖ | |
  | `address` | string | ➖ | |
  | `hide_address_from_clients` | bool | ➖ | Default `false` |
  | `deadline_at` | string | ➖ | `DD.MM.YYYY` |

  **Child kolleksiyalar:**

  | Field | Type | Description |
  |---|---|---|
  | `requirements[]` | array | `{id, sort_order}` — vacancy_requirement katalog IDsi |
  | `benefits[]` | array | `{id, sort_order}` — vacancy_benefit katalog IDsi |
  | `documents[]` | array | `{id, sort_order}` — vacancy_document katalog IDsi |
  | `service_groups[]` | array | **Xizmatlar TASHKILOT guruhlari bo'yicha (majburiy).** Har bir guruh: `{organization_id, payment_deadline_days, execution_deadline_days, sort_order, services:[…]}`. Bitta tashkilot = bitta guruh; guruh bir nechta kategoriyani qamrashi mumkin (masalan notarius tashkilotning `notary_translation` + `notary_apostille` + `notary_other` xizmatlari bitta guruhda). `organization_id` faqat guruhda — nested xizmatlar undan meros oladi. Ikkala muddat (kunlarda) > 0. `payment_deadline_days` — kandidatning to'lash muddati (guruh boshlangandan); `execution_deadline_days` — bajarish muddati (to'langandan) |
  | `service_groups[].services[]` | array | Guruhning xizmatlari: `{category, organization_service_id?, educational_course_id?, notary_*_price_id?, insurance_country_price_id?, price?, currency?, service_name?, duration_text?, notes?, sort_order?}`. Har xizmat o'z `category` siga ega (bir kategoriya faqat bitta tashkilotda bo'lishi mumkin). `educational_course_id` faqat `category="training"` da majburiy. `organization_service_id` berilsa narx/nom snapshot qilinadi (override `price`/`service_name` orqali) |
  | `single_payment` | bool | `1 tada 100% lik to'lov` toggle |
  | `payment_steps[]` | array | `{step_type, title, amount, currency, sort_order}` (faqat `single_payment=false` da) |

  **⚠️ Agentlik xizmati (majburiy):** xizmatlar orasida **aniq bitta** `category = "agency"` xizmati bo'lishi shart, va uning guruhi (`organization_id`) vakansiyaning `organization_id` ga teng bo'lishi kerak; agentlik xizmatining `service_name` to'ldirilgan va `price > 0` bo'lishi zarur. Agentlik narxi `total_service_amount` ga kiritiladi.

  **🔖 Shablon sifatida saqlash (wizard checkboxi):** `save_as_template = true` (bool, ➖) yuborilsa, vakansiya yaratilgach shu wizard formasi `vacancy_template` sifatida ham saqlanadi — **xuddi shu tranzaksiyada** (shablon saqlash xato bo'lsa vakansiya ham yaratilmaydi). Shablon nomi `template_name` (string, ➖); berilmasa vakansiya `title`'i ishlatiladi (200 belgigacha qisqartiriladi). Shablon vakansiyaning `organization_id`'iga biriktiriladi va keyin `GET /admin/vacancy-templates` da ko'rinadi.

  ### 📤 Response (`data`)

  Full detail DTO (View bilan bir xil). `status` = `draft`, `total_service_amount` snapshot narxlar yig'indisi (agentlik narxi bilan). `service_groups[]` nested `services[]` bilan qaytadi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi. Jumladan: `organization_id` XBA-type emas; `recruiter_id` EMPLOYER/RECRUITER-type emas |
  | `400` | Snapshot xatosi (Organization service topilmadi / boshqa tashkilotga tegishli); `agency` xizmati yo'q yoki narxi 0; **service_groups** xatosi (tashkilot takrorlangan, bir kategoriya ikki tashkilotda, organization yo'q, muddat 0/yo'q, yoki guruhda xizmat yo'q) |
  | `403` | Non-admin: aktyorning org'i na `organization_id` (XBA) na `recruiter_id` ga mos kelmasa |
