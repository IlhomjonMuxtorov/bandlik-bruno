docs: |
  Yangi vakansiya yaratadi ‚Äî boshlanishi `status = draft`. Wizardning barcha 8 bosqich
  ma'lumotlari bitta tranzaksiyada saqlanadi.

  **Auth:** `admin_token` yoki Employer/Recruiter (faqat o'z tashkiloti uchun).

  ### üì• Request Body

  **Asosiy maydonlar (1-bosqich):**

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ‚úÖ | **XBA** tashkiloti (boshqaruvchi agentlik). Faqat `XBA`-type org qabul qilinadi ‚Äî aks holda `422`. |
  | `recruiter_id` | int | ‚ûñ | Biriktirilgan **ish beruvchi YOKI rekruter** ("Ish beruvchi / Rekruter" tanlovi). Faqat `EMPLOYER` yoki `RECRUITER`-type org qabul qilinadi ‚Äî aks holda `422`. |
  | `contract_id` | int | ‚ûñ | Bog'langan **XBA shartnomasi** (`organization_contract.id`). `null` = bog'lanmagan. Berilsa: tanlangan `recruiter_id` org'ga tegishli, aktiv va **bekor qilinmagan** bo'lishi shart; `vacancy`-tip shartnomada kvota (`candidate_count`) band slotlardan oshmasligi tekshiriladi. Tasdiqlanmagan (`pending`/`rejected`) shartnoma **tanlanishi mumkin**, ammo shunday vakansiya shartnoma `approved` (va bekor qilinmagan) bo'lmaguncha tasdiqlanmaydi. Picker: `GET /admin/contracts?organization_id={recruiter_id}&is_cancelled=false`. |
  | `industry_id` | int | ‚ûñ | Soha ID |
  | `title` | string | ‚úÖ | Sarlavha |
  | `description` | string | ‚ûñ | Tavsif (HTML/markdown) |
  | `experience_months` | int | ‚ûñ | Talab qilinadigan ish tajribasi (oylarda). `0` = tajriba talab qilinmaydi. Default: `0`. |
  | `employment_type` | string | ‚úÖ | `full_time` \| `part_time` \| `seasonal` \| `contract` |
  | `hiring_quota` | int | ‚úÖ | Necha kishi kerak (>=1) |
  | `duration_months_min` / `_max` | int | ‚ûñ | Ish davomiyligi |
  | `work_schedule` | string | ‚ûñ | `5_2` \| `6_1` \| `2_2` \| `shift` \| `flexible` |
  | `work_time_from` / `_to` | string | ‚ûñ | `HH:MM` |
  | `salary_gross` / `_currency` | int / string | ‚ûñ | Maosh (tavsifiy) ‚Äî **major unitda** (o'z valyutasida; client uchun o'zgarish yo'q). Valyuta: `UZS` \| `USD` \| `EUR` \| `RUB` \| `GBP` \| `KRW` \| `JPY` \| `TRY` \| `AED` \| `SAR` \| `KZT` \| `PLN` \| `QAR` \| `KWD` (boshqasi ‚Üí `422`). To'liq ro'yxat: `GET /admin/vacancies/salary-currencies`. Default `UZS`. Xizmat narxlari valyutasiga ta'sir qilmaydi ‚Äî ular `UZS`-da qoladi. |
  | `salary_net` / `_currency` | int / string | ‚ûñ | **Major unitda** (o'z valyutasida). Valyuta: yuqoridagi bilan bir xil ro'yxat. |
  | `country_id` | int | ‚úÖ | |
  | `city_id` | int | ‚ûñ | |
  | `address` | string | ‚ûñ | Manzil (1-qator) ‚Äî max 500 |
  | `address2` | string | ‚ûñ | Manzil (2-qator) ‚Äî kvartira / ofis va h.k. (max 500) |
  | `state` | string | ‚ûñ | Shtat / viloyat / o'lka nomi (max 150) |
  | `postal_code` | string | ‚ûñ | Pochta indeksi (max 30) |
  | `hide_address_from_clients` | bool | ‚ûñ | Default `false`. `true` bo'lsa barcha manzil maydonlari (`address`, `address2`, `state`, `postal_code`) nomzodga ko'rsatilmaydi |
  | `deadline_at` | string | ‚ûñ | `DD.MM.YYYY`. O'tmishdagi (orqa) sana bo'lmasligi kerak ‚Äî bugun ruxsat, kechagi va undan oldingi sana ‚Üí `422`. |

  **Child kolleksiyalar:**

  | Field | Type | Description |
  |---|---|---|
  | `requirements[]` | array | **Tiplangan talablar.** Har element: `{id, sort_order, is_mandatory?, ‚Ä¶value}`. `id` ‚Äî `vacancy_requirement` (definition) IDsi; qiymat maydoni definition `value_type`iga bog'liq: `integer_range` ‚Üí `value_int_min`+`value_int_max`; `integer` ‚Üí `value_int_min`; `boolean` ‚Üí `value_bool`; `level` ‚Üí `value_level_id`; `single_select`/`multi_select`/`reference_single`/`reference_multi` ‚Üí `value_refs` (kod/id massiv); `text` ‚Üí `value_text` (`{uz,ru,en}`). `is_mandatory` (bool, ‚ûñ, default `true`) ‚Äî majburiy/afzal. Pickable definition'lar: `GET /admin/vacancies/requirement-definitions?industry_category_id=‚Ä¶`; tanlovlar: `GET /admin/vacancies/requirement-options/{id}` |
  | `language_requirements[]` | array | **Til talablari** (alohida). Har element: `{language_id, min_language_level_id, is_mandatory?, certificate_type?, certificate_min_score?, sort_order?}`. `min_language_level_id` ‚Äî `language_level` (CEFR/HSK/TOPIK shkalasi). `certificate_type` ‚Äî `ielts`\|`toefl`\|`delf`\|`goethe`\|`hsk`\|`topik` (‚ûñ). `certificate_min_score` ‚Äî string, masalan `6.5`/`B2`/`HSK5` (‚ûñ) |
  | `benefits[]` | array | **Tiplangan imtiyozlar.** Har element: `{id, sort_order, ‚Ä¶value}`. `id` ‚Äî `vacancy_benefit` (definition) IDsi; qiymat maydoni definition `value_type`iga bog'liq: `boolean` ‚Üí `value_bool`; `percent` ‚Üí `value_min` (0‚Äì100); `percent_range` ‚Üí `value_min`+`value_max`; `days` ‚Üí `value_min`; `percent_or_money` ‚Üí `mode` (`percent`\|`money`) + (`percent` ‚Üí `value_min` \| `money` ‚Üí `amount`+`currency`); `money` ‚Üí `amount`+`currency`. `amount` ‚Äî major birlik (so'm/dollar); `is_free` (bool, ‚ûñ) ‚Äî to'liq bepul (faqat `percent`/`percent_range`). **1-guruh (`salary.*`) money rejimida `currency` vakansiya gross/net valyutasiga teng bo'lishi shart.** Pickable definition'lar: `GET /admin/vacancies/benefit-definitions?q=‚Ä¶`; tanlovlar: `GET /admin/vacancies/benefit-options/{id}` |
  | `documents[]` | array | `{id, sort_order}` ‚Äî vacancy_document katalog IDsi |
  | `service_groups[]` | array | **Xizmatlar TASHKILOT guruhlari bo'yicha (majburiy).** Har bir guruh: `{organization_id, payment_deadline_days, execution_deadline_days, sort_order, services:[‚Ä¶]}`. Bitta tashkilot = bitta guruh; guruh bir nechta kategoriyani qamrashi mumkin (masalan notarius tashkilotning `notary_translation` + `notary_apostille` + `notary_other` xizmatlari bitta guruhda). `organization_id` faqat guruhda ‚Äî nested xizmatlar undan meros oladi. Ikkala muddat (kunlarda) > 0. `payment_deadline_days` ‚Äî kandidatning to'lash muddati (guruh boshlangandan); `execution_deadline_days` ‚Äî bajarish muddati (to'langandan). **Tartib:** saqlashda qayta tartiblanadi ‚Äî reorderable guruhlar (course/insurance/notarius) boshida (yuborilgan `sort_order` bo'yicha), fixed guruhlar (visa‚Üíagency‚Üílogistics) oxirida (qat'iy). Guruhning turi uning xizmatlari kategoriyasidan aniqlanadi |
  | `service_groups[].services[]` | array | Guruhning xizmatlari: `{category, organization_service_id?, educational_course_id?, notary_*_price_id?, insurance_country_price_id?, price?, currency?, service_name?, duration_text?, notes?, sort_order?}`. Har xizmat o'z `category` siga ega (bir kategoriya faqat bitta tashkilotda bo'lishi mumkin). `educational_course_id` `category="training"` da majburiy ‚Äî va vakansiya darajasida kamida bitta `training` xizmati + kurs **har doim** talab qilinadi (pastga qarang). `organization_service_id` berilsa narx/nom snapshot qilinadi (override `price`/`service_name` orqali). **Training kurslari uchun `price` override e'tiborga olinmaydi** ‚Äî narx kursdan snapshot qilinadi (ADR 0005) |
  | `single_payment` | bool | `1 tada 100% lik to'lov` toggle. `false` bo'lsa to'lov rejasi `service_groups[]` ning o'zi ‚Äî guruhlar ketma-ket (yuqoridagi tartibda) to'lanadi |

  > To'lov rejasi alohida yuborilmaydi ‚Äî `service_groups[]` (har guruh o'z xizmat narxlari snapshot'i bilan) to'lov rejasining o'zidir. Eski `payment_steps[]` maydoni olib tashlangan; yuborilsa e'tiborga olinmaydi.

  > **Birlik (breaking):** `service_groups[].services[].price` override'i va `insurance_coverage_amount` endi **so'mda (major unit)** yuboriladi ‚Äî avvalgi tiyin EMAS. Backend tiyinda saqlaydi; javobdagi `price`, `insurance_coverage_amount` va `total_service_amount` ham so'mda qaytadi. Admin frontend uchun breaking change.

  **‚öÝÔ∏è Agentlik xizmati (majburiy):** xizmatlar orasida **aniq bitta** `category = "agency"` xizmati bo'lishi shart, va uning guruhi (`organization_id`) vakansiyaning `organization_id` ga teng bo'lishi kerak; agentlik xizmatining `service_name` to'ldirilgan va `price > 0` bo'lishi zarur. Agentlik narxi `total_service_amount` ga kiritiladi.

  **‚öÝÔ∏è Kurs (majburiy):** har bir vakansiyada **kamida bitta** `category = "training"` xizmati bo'lishi va unga `educational_course_id` biriktirilgan bo'lishi shart. Aks holda `400` ‚Äî `At least one training service with a course is required`.

  **‚öÝÔ∏è Kurslar narxi (ADR 0005):** eski yagona `combined_price` **bekor qilindi**. Training summasi = biriktirilgan kurslar snapshot narxlari **yig'indisi** (boshqa guruhlar kabi). Narx kursda belgilanadi, vakansiyada o'zgartirilmaydi (override yo'q). Kurs valyutasi vakansiya valyutasiga mos bo'lishi shart ‚Äî aks holda `400` `Course currency must match the vacancy currency`.

  **üîñ Shablon sifatida saqlash (wizard checkboxi):** `save_as_template = true` (bool, ‚ûñ) yuborilsa, vakansiya yaratilgach shu wizard formasi `vacancy_template` sifatida ham saqlanadi ‚Äî **xuddi shu tranzaksiyada** (shablon saqlash xato bo'lsa vakansiya ham yaratilmaydi). Shablon nomi `template_name` (string, ‚ûñ); berilmasa vakansiya `title`'i ishlatiladi (200 belgigacha qisqartiriladi). Shablon vakansiyaning `organization_id`'iga biriktiriladi va keyin `GET /admin/vacancy-templates` da ko'rinadi.

  ### üì§ Response (`data`)

  Full detail DTO (View bilan bir xil). `status` = `draft`, `total_service_amount` = **barcha** xizmatlar narxi yig'indisi (training kurslar ham per-service qo'shiladi) ‚Äî **so'mda (major unit)**. `service_groups[]` nested `services[]` bilan, `sort_order` bo'yicha tartiblangan (reorderable oldinda, visa‚Üíagency‚Üílogistics oxirida) va har biri `is_reorderable` (bool) maydonini qaytaradi ‚Äî FE shu flag bo'yicha sudraladigan/qulflangan elementlarni ajratadi. (`combined_price` maydoni olib tashlandi ‚Äî ADR 0005.)

  **`auto_approval`** (object) ‚Äî vakansiya keyin avtomatik chop etilishi haqida ma'lumot (FE "submit'dan keyin N daqiqada avto-chop etiladi" deb ko'rsatishi uchun):

  | Field | Type | Description |
  |---|---|---|
  | `enabled` | bool | Global avto-tasdiq yoqilganmi (`AppSetting`) |
  | `window_minutes` | int | Standart kutish oynasi (daqiqa). Default `180` (3 soat) |
  | `eligible` | bool | XBA org ishonchlimi (`organization.auto_approve_vacancies`) ‚Äî birinchi vakansiya qo'lda tasdiqlangach `true` bo'ladi |
  | `estimated_publish_at` | int \| null | Avto-chop etilish vaqti (unix). **Faqat** `enabled && eligible && status=pending_approval` bo'lganda qiymat; create'da (draft) `null`, chunki hali submit qilinmagan |
  | `estimated_publish_at_formatted` | string \| null | `DD.MM.YYYY HH:MM` yoki `null` |

  > Create javobida vakansiya hali `draft` ‚Äî shu sabab `estimated_publish_at` `null`. Aniq vaqt **Submit** javobida (pending_approval) qaytadi.

  ### ‚öÝÔ∏è Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi. Jumladan: `organization_id` XBA-type emas; `recruiter_id` EMPLOYER/RECRUITER-type emas; `deadline_at` o'tmishdagi (orqa) sana ‚Äî `Deadline cannot be in the past`; `contract_id` tanlangan ish beruvchi/rekruterga tegishli emas yoki kvota to'lgan |
  | `400` | Snapshot xatosi (Organization service topilmadi / boshqa tashkilotga tegishli); `agency` xizmati yo'q yoki narxi 0; **kurs yo'q** ‚Äî `training` xizmati yoki uning `educational_course_id` si yo'q; **service_groups** xatosi (tashkilot takrorlangan, bir kategoriya ikki tashkilotda, organization yo'q, muddat 0/yo'q, yoki guruhda xizmat yo'q) |
  | `403` | Non-admin: aktyorning org'i na `organization_id` (XBA) na `recruiter_id` ga mos kelmasa |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
