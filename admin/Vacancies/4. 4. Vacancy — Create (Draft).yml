docs: |
  Yangi vakansiya yaratadi — boshlanishi `status = draft`. Wizardning barcha 8 bosqich
  ma'lumotlari bitta tranzaksiyada saqlanadi.

  **Auth:** `admin_token` yoki Employer/Recruiter (faqat o'z tashkiloti uchun).

  ### 📥 Request Body

  **Asosiy maydonlar (1-bosqich):**

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ✅ | **XBA** tashkiloti (boshqaruvchi agentlik). Faqat `XBA`-type org qabul qilinadi — aks holda `422`. |
  | `recruiter_id` | int | ➖ | Biriktirilgan **ish beruvchi YOKI rekruter** ("Ish beruvchi / Rekruter" tanlovi). Faqat `EMPLOYER` yoki `RECRUITER`-type org qabul qilinadi — aks holda `422`. |
  | `industry_id` | int | ➖ | Soha ID |
  | `title` | string | ✅ | Sarlavha |
  | `description` | string | ➖ | Tavsif (HTML/markdown) |
  | `experience_months` | int | ➖ | Talab qilinadigan ish tajribasi (oylarda). `0` = tajriba talab qilinmaydi. Default: `0`. |
  | `employment_type` | string | ✅ | `full_time` \| `part_time` \| `seasonal` \| `contract` |
  | `hiring_quota` | int | ✅ | Necha kishi kerak (>=1) |
  | `duration_months_min` / `_max` | int | ➖ | Ish davomiyligi |
  | `work_schedule` | string | ➖ | `5_2` \| `6_1` \| `2_2` \| `shift` \| `flexible` |
  | `work_time_from` / `_to` | string | ➖ | `HH:MM` |
  | `salary_gross` / `_currency` | int / string | ➖ | Maosh (tavsifiy) — **major unitda** (o'z valyutasida; client uchun o'zgarish yo'q). Valyuta: `UZS` \| `USD` \| `EUR` \| `RUB` \| `GBP` \| `KRW` \| `JPY` \| `TRY` \| `AED` \| `SAR` \| `KZT` \| `PLN` \| `QAR` \| `KWD` (boshqasi → `422`). To'liq ro'yxat: `GET /admin/vacancies/salary-currencies`. Default `UZS`. Xizmat narxlari valyutasiga ta'sir qilmaydi — ular `UZS`-da qoladi. |
  | `salary_net` / `_currency` | int / string | ➖ | **Major unitda** (o'z valyutasida). Valyuta: yuqoridagi bilan bir xil ro'yxat. |
  | `country_id` | int | ✅ | |
  | `city_id` | int | ➖ | |
  | `address` | string | ➖ | Manzil (1-qator) — max 500 |
  | `address2` | string | ➖ | Manzil (2-qator) — kvartira / ofis va h.k. (max 500) |
  | `state` | string | ➖ | Shtat / viloyat / o'lka nomi (max 150) |
  | `postal_code` | string | ➖ | Pochta indeksi (max 30) |
  | `hide_address_from_clients` | bool | ➖ | Default `false`. `true` bo'lsa barcha manzil maydonlari (`address`, `address2`, `state`, `postal_code`) nomzodga ko'rsatilmaydi |
  | `deadline_at` | string | ➖ | `DD.MM.YYYY`. O'tmishdagi (orqa) sana bo'lmasligi kerak — bugun ruxsat, kechagi va undan oldingi sana → `422`. |

  **Child kolleksiyalar:**

  | Field | Type | Description |
  |---|---|---|
  | `requirements[]` | array | **Tiplangan talablar.** Har element: `{id, sort_order, is_mandatory?, …value}`. `id` — `vacancy_requirement` (definition) IDsi; qiymat maydoni definition `value_type`iga bog'liq: `integer_range` → `value_int_min`+`value_int_max`; `integer` → `value_int_min`; `boolean` → `value_bool`; `level` → `value_level_id`; `single_select`/`multi_select`/`reference_single`/`reference_multi` → `value_refs` (kod/id massiv); `text` → `value_text` (`{uz,ru,en}`). `is_mandatory` (bool, ➖, default `true`) — majburiy/afzal. Pickable definition'lar: `GET /admin/vacancies/requirement-definitions?industry_category_id=…`; tanlovlar: `GET /admin/vacancies/requirement-options/{id}` |
  | `language_requirements[]` | array | **Til talablari** (alohida). Har element: `{language_id, min_language_level_id, is_mandatory?, certificate_type?, certificate_min_score?, sort_order?}`. `min_language_level_id` — `language_level` (CEFR/HSK/TOPIK shkalasi). `certificate_type` — `ielts`\|`toefl`\|`delf`\|`goethe`\|`hsk`\|`topik` (➖). `certificate_min_score` — string, masalan `6.5`/`B2`/`HSK5` (➖) |
  | `benefits[]` | array | `{id, sort_order}` — vacancy_benefit katalog IDsi |
  | `documents[]` | array | `{id, sort_order}` — vacancy_document katalog IDsi |
  | `service_groups[]` | array | **Xizmatlar TASHKILOT guruhlari bo'yicha (majburiy).** Har bir guruh: `{organization_id, payment_deadline_days, execution_deadline_days, sort_order, services:[…]}`. Bitta tashkilot = bitta guruh; guruh bir nechta kategoriyani qamrashi mumkin (masalan notarius tashkilotning `notary_translation` + `notary_apostille` + `notary_other` xizmatlari bitta guruhda). `organization_id` faqat guruhda — nested xizmatlar undan meros oladi. Ikkala muddat (kunlarda) > 0. `payment_deadline_days` — kandidatning to'lash muddati (guruh boshlangandan); `execution_deadline_days` — bajarish muddati (to'langandan). **Tartib:** saqlashda qayta tartiblanadi — reorderable guruhlar (course/insurance/notarius) boshida (yuborilgan `sort_order` bo'yicha), fixed guruhlar (visa→agency→logistics) oxirida (qat'iy). Guruhning turi uning xizmatlari kategoriyasidan aniqlanadi |
  | `service_groups[].services[]` | array | Guruhning xizmatlari: `{category, organization_service_id?, educational_course_id?, notary_*_price_id?, insurance_country_price_id?, price?, currency?, service_name?, duration_text?, notes?, sort_order?}`. Har xizmat o'z `category` siga ega (bir kategoriya faqat bitta tashkilotda bo'lishi mumkin). `educational_course_id` `category="training"` da majburiy — va vakansiya darajasida kamida bitta `training` xizmati + kurs **har doim** talab qilinadi (pastga qarang). `organization_service_id` berilsa narx/nom snapshot qilinadi (override `price`/`service_name` orqali) |
  | `service_groups[].combined_price` | int | **Training (kurslar) guruhi uchun umumiy narx — majburiy** (`> 0`). Major unitda (so'm). Tanlangan barcha kurslar uchun BITTA umumiy narx; har kursning alohida narxi `total_service_amount` ga **kirmaydi** (faqat info bo'lib qoladi, mobil'ga uzatilmaydi). Backend tiyinda saqlaydi; javobda so'mda qaytadi. Training-dan boshqa guruhlarda yuborilmaydi |
  | `service_groups[].combined_price_currency` | string | `combined_price` valyutasi (➖, default `UZS`). Vakansiya xizmat valyutasiga (`UZS`) mos bo'lishi kerak — aks holda umumiy summaga kirmaydi |
  | `single_payment` | bool | `1 tada 100% lik to'lov` toggle. `false` bo'lsa to'lov rejasi `service_groups[]` ning o'zi — guruhlar ketma-ket (yuqoridagi tartibda) to'lanadi |

  > To'lov rejasi alohida yuborilmaydi — `service_groups[]` (har guruh o'z xizmat narxlari snapshot'i bilan) to'lov rejasining o'zidir. Eski `payment_steps[]` maydoni olib tashlangan; yuborilsa e'tiborga olinmaydi.

  > **Birlik (breaking):** `service_groups[].services[].price` override'i va `insurance_coverage_amount` endi **so'mda (major unit)** yuboriladi — avvalgi tiyin EMAS. Backend tiyinda saqlaydi; javobdagi `price`, `insurance_coverage_amount` va `total_service_amount` ham so'mda qaytadi. Admin frontend uchun breaking change.

  **⚠️ Agentlik xizmati (majburiy):** xizmatlar orasida **aniq bitta** `category = "agency"` xizmati bo'lishi shart, va uning guruhi (`organization_id`) vakansiyaning `organization_id` ga teng bo'lishi kerak; agentlik xizmatining `service_name` to'ldirilgan va `price > 0` bo'lishi zarur. Agentlik narxi `total_service_amount` ga kiritiladi.

  **⚠️ Kurs (majburiy):** har bir vakansiyada **kamida bitta** `category = "training"` xizmati bo'lishi va unga `educational_course_id` biriktirilgan bo'lishi shart. Aks holda `400` — `At least one training service with a course is required`.

  **⚠️ Kurslar umumiy narxi (majburiy):** training guruhda `combined_price` (`> 0`, so'm) yuborilishi shart — tanlangan kurslar uchun bitta umumiy narx. Yo'q yoki `<= 0` bo'lsa `400` — `Combined course price is required`. Bu narx `total_service_amount` ga kiritiladi; alohida kurs narxlari hisoblanmaydi.

  **🔖 Shablon sifatida saqlash (wizard checkboxi):** `save_as_template = true` (bool, ➖) yuborilsa, vakansiya yaratilgach shu wizard formasi `vacancy_template` sifatida ham saqlanadi — **xuddi shu tranzaksiyada** (shablon saqlash xato bo'lsa vakansiya ham yaratilmaydi). Shablon nomi `template_name` (string, ➖); berilmasa vakansiya `title`'i ishlatiladi (200 belgigacha qisqartiriladi). Shablon vakansiyaning `organization_id`'iga biriktiriladi va keyin `GET /admin/vacancy-templates` da ko'rinadi.

  ### 📤 Response (`data`)

  Full detail DTO (View bilan bir xil). `status` = `draft`, `total_service_amount` = (training'dan boshqa xizmatlar narxi) + training guruh `combined_price` — **so'mda (major unit)**. `service_groups[]` nested `services[]` bilan, `sort_order` bo'yicha tartiblangan (reorderable oldinda, visa→agency→logistics oxirida) va har biri `is_reorderable` (bool) hamda `combined_price` / `combined_price_currency` (training guruhda set, boshqalarda `null`) maydonlarini qaytaradi — FE shu flag bo'yicha sudraladigan/qulflangan elementlarni ajratadi.

  **`auto_approval`** (object) — vakansiya keyin avtomatik chop etilishi haqida ma'lumot (FE "submit'dan keyin N daqiqada avto-chop etiladi" deb ko'rsatishi uchun):

  | Field | Type | Description |
  |---|---|---|
  | `enabled` | bool | Global avto-tasdiq yoqilganmi (`AppSetting`) |
  | `window_minutes` | int | Standart kutish oynasi (daqiqa). Default `180` (3 soat) |
  | `eligible` | bool | XBA org ishonchlimi (`organization.auto_approve_vacancies`) — birinchi vakansiya qo'lda tasdiqlangach `true` bo'ladi |
  | `estimated_publish_at` | int \| null | Avto-chop etilish vaqti (unix). **Faqat** `enabled && eligible && status=pending_approval` bo'lganda qiymat; create'da (draft) `null`, chunki hali submit qilinmagan |
  | `estimated_publish_at_formatted` | string \| null | `DD.MM.YYYY HH:MM` yoki `null` |

  > Create javobida vakansiya hali `draft` — shu sabab `estimated_publish_at` `null`. Aniq vaqt **Submit** javobida (pending_approval) qaytadi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi. Jumladan: `organization_id` XBA-type emas; `recruiter_id` EMPLOYER/RECRUITER-type emas; `deadline_at` o'tmishdagi (orqa) sana — `Deadline cannot be in the past` |
  | `400` | Snapshot xatosi (Organization service topilmadi / boshqa tashkilotga tegishli); `agency` xizmati yo'q yoki narxi 0; **kurs yo'q** — `training` xizmati yoki uning `educational_course_id` si yo'q; **service_groups** xatosi (tashkilot takrorlangan, bir kategoriya ikki tashkilotda, organization yo'q, muddat 0/yo'q, yoki guruhda xizmat yo'q) |
  | `403` | Non-admin: aktyorning org'i na `organization_id` (XBA) na `recruiter_id` ga mos kelmasa |
