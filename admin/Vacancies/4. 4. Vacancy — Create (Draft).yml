docs: |
  Yangi vakansiya yaratadi â€” boshlanishi `status = draft`. Wizardning barcha 8 bosqich
  ma'lumotlari bitta tranzaksiyada saqlanadi.

  **Auth:** `admin_token` yoki Employer/Recruiter (faqat o'z tashkiloti uchun).

  ### đź“Ą Request Body

  **Asosiy maydonlar (1-bosqich):**

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | âś… | **XBA** tashkiloti (boshqaruvchi agentlik). Faqat `XBA`-type org qabul qilinadi â€” aks holda `422`. |
  | `recruiter_id` | int | âž– | Biriktirilgan **ish beruvchi YOKI rekruter** ("Ish beruvchi / Rekruter" tanlovi). Faqat `EMPLOYER` yoki `RECRUITER`-type org qabul qilinadi â€” aks holda `422`. |
  | `industry_id` | int | âž– | Soha ID |
  | `title` | string | âś… | Sarlavha |
  | `description` | string | âž– | Tavsif (HTML/markdown) |
  | `experience_level` | string | âž– | `none` \| `one_to_three` \| `three_to_six` |
  | `employment_type` | string | âś… | `full_time` \| `part_time` \| `seasonal` \| `contract` |
  | `hiring_quota` | int | âś… | Necha kishi kerak (>=1) |
  | `duration_months_min` / `_max` | int | âž– | Ish davomiyligi |
  | `work_schedule` | string | âž– | `5_2` \| `6_1` \| `2_2` \| `shift` \| `flexible` |
  | `work_time_from` / `_to` | string | âž– | `HH:MM` |
  | `salary_gross` / `_currency` | int / string | âž– | Maosh (tavsifiy) â€” **major unitda** (so'm/dollar, o'z valyutasida; client uchun o'zgarish yo'q). Valyuta: `UZS` \| `USD` \| `EUR` (boshqasi â†’ `422`). Default `UZS`. Xizmat narxlari valyutasiga ta'sir qilmaydi â€” ular `UZS`-da qoladi. |
  | `salary_net` / `_currency` | int / string | âž– | **Major unitda** (so'm/dollar, o'z valyutasida). Valyuta: `UZS` \| `USD` \| `EUR`. |
  | `country_id` | int | âś… | |
  | `city_id` | int | âž– | |
  | `address` | string | âž– | |
  | `hide_address_from_clients` | bool | âž– | Default `false` |
  | `deadline_at` | string | âž– | `DD.MM.YYYY` |

  **Child kolleksiyalar:**

  | Field | Type | Description |
  |---|---|---|
  | `requirements[]` | array | `{id, sort_order}` â€” vacancy_requirement katalog IDsi |
  | `benefits[]` | array | `{id, sort_order}` â€” vacancy_benefit katalog IDsi |
  | `documents[]` | array | `{id, sort_order}` â€” vacancy_document katalog IDsi |
  | `service_groups[]` | array | **Xizmatlar TASHKILOT guruhlari bo'yicha (majburiy).** Har bir guruh: `{organization_id, payment_deadline_days, execution_deadline_days, sort_order, services:[â€¦]}`. Bitta tashkilot = bitta guruh; guruh bir nechta kategoriyani qamrashi mumkin (masalan notarius tashkilotning `notary_translation` + `notary_apostille` + `notary_other` xizmatlari bitta guruhda). `organization_id` faqat guruhda â€” nested xizmatlar undan meros oladi. Ikkala muddat (kunlarda) > 0. `payment_deadline_days` â€” kandidatning to'lash muddati (guruh boshlangandan); `execution_deadline_days` â€” bajarish muddati (to'langandan). **Tartib:** saqlashda qayta tartiblanadi â€” reorderable guruhlar (course/insurance/notarius) boshida (yuborilgan `sort_order` bo'yicha), fixed guruhlar (visaâ†’agencyâ†’logistics) oxirida (qat'iy). Guruhning turi uning xizmatlari kategoriyasidan aniqlanadi |
  | `service_groups[].services[]` | array | Guruhning xizmatlari: `{category, organization_service_id?, educational_course_id?, notary_*_price_id?, insurance_country_price_id?, price?, currency?, service_name?, duration_text?, notes?, sort_order?}`. Har xizmat o'z `category` siga ega (bir kategoriya faqat bitta tashkilotda bo'lishi mumkin). `educational_course_id` `category="training"` da majburiy â€” va vakansiya darajasida kamida bitta `training` xizmati + kurs **har doim** talab qilinadi (pastga qarang). `organization_service_id` berilsa narx/nom snapshot qilinadi (override `price`/`service_name` orqali) |
  | `single_payment` | bool | `1 tada 100% lik to'lov` toggle. `false` bo'lsa to'lov rejasi `service_groups[]` ning o'zi â€” guruhlar ketma-ket (yuqoridagi tartibda) to'lanadi |

  > To'lov rejasi alohida yuborilmaydi â€” `service_groups[]` (har guruh o'z xizmat narxlari snapshot'i bilan) to'lov rejasining o'zidir. Eski `payment_steps[]` maydoni olib tashlangan; yuborilsa e'tiborga olinmaydi.

  > **Birlik (breaking):** `service_groups[].services[].price` override'i va `insurance_coverage_amount` endi **so'mda (major unit)** yuboriladi â€” avvalgi tiyin EMAS. Backend tiyinda saqlaydi; javobdagi `price`, `insurance_coverage_amount` va `total_service_amount` ham so'mda qaytadi. Admin frontend uchun breaking change.

  **âš ď¸Ź Agentlik xizmati (majburiy):** xizmatlar orasida **aniq bitta** `category = "agency"` xizmati bo'lishi shart, va uning guruhi (`organization_id`) vakansiyaning `organization_id` ga teng bo'lishi kerak; agentlik xizmatining `service_name` to'ldirilgan va `price > 0` bo'lishi zarur. Agentlik narxi `total_service_amount` ga kiritiladi.

  **âš ď¸Ź Kurs (majburiy):** har bir vakansiyada **kamida bitta** `category = "training"` xizmati bo'lishi va unga `educational_course_id` biriktirilgan bo'lishi shart. Aks holda `400` â€” `At least one training service with a course is required`.

  **đź”– Shablon sifatida saqlash (wizard checkboxi):** `save_as_template = true` (bool, âž–) yuborilsa, vakansiya yaratilgach shu wizard formasi `vacancy_template` sifatida ham saqlanadi â€” **xuddi shu tranzaksiyada** (shablon saqlash xato bo'lsa vakansiya ham yaratilmaydi). Shablon nomi `template_name` (string, âž–); berilmasa vakansiya `title`'i ishlatiladi (200 belgigacha qisqartiriladi). Shablon vakansiyaning `organization_id`'iga biriktiriladi va keyin `GET /admin/vacancy-templates` da ko'rinadi.

  ### đź“¤ Response (`data`)

  Full detail DTO (View bilan bir xil). `status` = `draft`, `total_service_amount` snapshot narxlar yig'indisi (agentlik narxi bilan) â€” **so'mda (major unit)**. `service_groups[]` nested `services[]` bilan, `sort_order` bo'yicha tartiblangan (reorderable oldinda, visaâ†’agencyâ†’logistics oxirida) va har biri `is_reorderable` (bool) maydonini qaytaradi â€” FE shu flag bo'yicha sudraladigan/qulflangan elementlarni ajratadi.

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi. Jumladan: `organization_id` XBA-type emas; `recruiter_id` EMPLOYER/RECRUITER-type emas |
  | `400` | Snapshot xatosi (Organization service topilmadi / boshqa tashkilotga tegishli); `agency` xizmati yo'q yoki narxi 0; **kurs yo'q** â€” `training` xizmati yoki uning `educational_course_id` si yo'q; **service_groups** xatosi (tashkilot takrorlangan, bir kategoriya ikki tashkilotda, organization yo'q, muddat 0/yo'q, yoki guruhda xizmat yo'q) |
  | `403` | Non-admin: aktyorning org'i na `organization_id` (XBA) na `recruiter_id` ga mos kelmasa |
