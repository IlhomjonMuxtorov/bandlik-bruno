info:
  name: 17. Vacancy — Requirement Definitions (reference)
  type: http
  seq: 17
http:
  method: GET
  url: '{{base_url}}/admin/vacancies/requirement-definitions'
  params:
  - name: industry_id
    value: '1'
    enabled: false
  - name: category_id
    value: ''
    enabled: false
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |-
  Vakansiya tanlashi mumkin bo'lgan faol talab andozalari — vakansiya sohasiga
  ko'ra filtrlangan (global + shu **fine `vacancy_industry`**ga tegishli 8-guruh
  checkbox'lari). Tarjima `Accept-Language` bo'yicha. `choices` bu ro'yxatda
  **qaytmaydi** — kerak bo'lganda `Requirement Options` orqali lazy yuklang.

  **Auth:** `admin_token` yoki Employer/Recruiter token.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `industry_id` | int | ➖ | Vakansiyaning `industry_id`si. Global + shu sohaga tegishli. Berilmasa — faqat global. |
  | `category_id` | int | ➖ | Kategoriya bo'yicha filtr. |

  ### 📤 Response (`data[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `code` | string \| null | Mashina kodi. |
  | `title` / `description` | string \| null | `Accept-Language` tarjimasi. |
  | `category_id` / `category_code` | int \| null / string \| null | Taksonomiya kategoriyasi. |
  | `value_type` | string | Qiymat tipi (widget tanlash uchun). |
  | `reference_source` | string \| null | Ref jadval / enum. |
  | `options` | array \| null | Inline tanlovlar (label `Accept-Language` bo'yicha). |
  | `unit` | string \| null | `years` \| `cm` \| `kg` ... |
  | `industry_id` | int \| null | Fine `vacancy_industry` tie. `null` — global. |
  | `is_system` / `is_resume_bound` | bool | Qulflangan / rezyumga bog'langan ta'rif belgilari. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
