info:
  name: 6. Vacancy — Submit for approval
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/admin/vacancies/1/submit'
  auth: inherit
docs: 'Draft yoki rejected vakansiyani SuperAdmin tasdiqlashiga yuboradi. Status `pending_approval`
  ga o''tadi va `vacancy_status_log` ga yozuv qo''shiladi.


  **Auth:** Employer / Recruiter (vakansiya egasi) yoki Admin.


  ### ⚠️ Validation


  Kamida quyidagilar to''ldirilgan bo''lishi kerak (aks holda 400):

  - 1+ talab (`requirements`)

  - 1+ hujjat (`documents`)

  - Yo `single_payment = true`, yoki 1+ payment_step


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Draft/Rejected emas, yoki majburiy bo''limlar bo''sh |

  | `403` | Boshqa tashkilotning vakansiyasi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
