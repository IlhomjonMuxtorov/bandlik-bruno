info:
  name: 6. Vacancy вАФ Submit for approval
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/admin/vacancies/1/submit'
  auth: inherit
docs: |
  Draft yoki rejected vakansiyani tasdiq navbatiga yuboradi. `submitted_at` (submit vaqti)
  yoziladi va `vacancy_status_log` ga yozuv qo'shiladi. **Ikki fazali yo'naltirish:**

  - **Agentlik vakansiyasi** (`agent_organization_id != null`, ya'ni XBA agent yaratgan) вЖТ
    `pending_approval` (1-faza вАФ parent root XBA'ning navbati, HAR DOIM qo'lda ko'rib chiqiladi,
    auto-tasdiq yo'q). Root XBA `POST /admin/vacancies/{id}/approve-agency` /
    `reject-agency` bilan ko'rib chiqadi.
  - **Root XBA'ning o'z vakansiyasi** (`agent_organization_id = null`) вЖТ to'g'ridan-to'g'ri
    `pending_association` (2-faza вАФ Uyushma navbati; XBA o'zini o'zi tasdiqlamaydi).

  **Auth:** Employer / Recruiter / XBA (agent yoki root, vakansiya egasi) yoki Admin.

  ### вЪ†пЄП Validation

  Kamida quyidagilar to'ldirilgan bo'lishi kerak (aks holda 400):
  - 1+ talab (`requirements`)
  - 1+ hujjat (`documents`)
  - `price > 0` bo'lgan agentlik (`agency`) xizmati

  ### рЯУ§ Response (`data`)

  Full detail DTO (View bilan bir xil), `status` = `pending_approval` (agentlik vakansiyasi)
  yoki `pending_association` (root XBA'ning o'z vakansiyasi / boshqa tashkilot turlari).
  Javobda **`auto_approval`** (object) bo'ladi вАФ bu yerda `submitted_at` mavjud, shu sabab
  `estimated_publish_at` aniq qiymat qaytaradi (ishonchli org + global toggle yoniq bo'lsa):

  | Field | Type | Description |
  |---|---|---|
  | `enabled` | bool | Global avto-tasdiq yoqilganmi |
  | `window_minutes` | int | Kutish oynasi (daqiqa), default `180` |
  | `eligible` | bool | XBA org ishonchlimi (`organization.auto_approve_vacancies`) |
  | `estimated_publish_at` | int \| null | Avto-chop etilish vaqti (unix) = `max(submitted_at, org.vacancy_trusted_at) + window_minutes*60`. `enabled && eligible` bo'lmasa `null` |
  | `estimated_publish_at_formatted` | string \| null | `DD.MM.YYYY HH:MM` yoki `null` |

  > Org ishonchsiz (`eligible=false`) yoki global toggle o'chiq bo'lsa вАФ vakansiya faqat qo'lda tasdiqlanadi, `estimated_publish_at = null`.

  > **Oyna boshlanishi:** `max(submitted_at, trusted_at)`. Org ishonchli bo'lishidan oldin submit qilingan vakansiya, trust berilgach **darhol** avto-chop etilmaydi вАФ trust vaqtidan to'liq yangi oyna hisoblanadi.

  > **Agentlik vakansiyasi (`pending_approval`) uchun `auto_approval` вАФ informatsion, HALI amal qilmaydi.** Auto-tasdiq cron'i (`vacancy/auto-approve-pending`) faqat `pending_association` (2-faza) holatidagi vakansiyalarni ko'radi вАФ `pending_approval` 1-faza **har doim qo'lda** ko'rib chiqiladi (root XBA `approve-agency`/`reject-agency` orqali). Shu sabab `estimated_publish_at` bu bosqichda hisoblanib chiqsa ham, vakansiya root XBA uni `approve-agency` bilan `pending_association`ga o'tkazmaguncha avtomatik chop etilmaydi вАФ bu safar `submitted_at` qayta belgilanadi va oyna 2-fazadan qayta hisoblanadi.

  ### вЪ†пЄП Errors

  | Code | Reason |
  |---|---|
  | `400` | Draft/Rejected emas, yoki majburiy bo'limlar bo'sh |
  | `403` | Boshqa tashkilotning vakansiyasi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
