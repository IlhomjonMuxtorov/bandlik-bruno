info:
  name: 7. Vacancy — Reject (admin only)
  type: http
  seq: 7
http:
  method: POST
  url: '{{base_url}}/admin/vacancies/1/reject'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"reason\": \"Maosh diapazoni real emas\"\n}"
  auth: inherit
docs: 'SuperAdmin vakansiyani rad etadi. Sabab (`reason`) majburiy va `rejection_reason`
  ga saqlanadi. Vakansiya egasi ko''rishi mumkin.


  **Auth:** `admin_token` (faqat `UserType::Admin`).


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `reason` | string | ✅ | Rad etish sababi (bo''sh emas). |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Status `pending_approval` emas yoki `reason` bo''sh |

  | `403` | Admin emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
