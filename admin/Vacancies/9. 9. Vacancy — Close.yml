info:
  name: 9. Vacancy — Close
  type: http
  seq: 9
http:
  method: POST
  url: '{{base_url}}/admin/vacancies/1/close'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"reason\": \"Barcha o'rinlar to'ldirildi\"\n}"
  auth: inherit
docs: 'Vakansiyani yopadi/bekor qiladi (`closed`). Mobile feed''da ko''rinmay qoladi.
  Sabab (`reason`) **majburiy**: `rejection_reason` ga saqlanadi (detalda ko''rinadi,
  rad etish bilan bir xil) va status log tarixiga yoziladi.


  **Auth:** Admin yoki vakansiya egasi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `reason` | string | ✅ | Yopish/bekor qilish sababi (bo''sh emas). |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | `reason` bo''sh |

  | `403` | Vakansiya egasi ham, admin ham emas |

  | `404` | Vakansiya topilmadi |


  > Allaqachon `closed` / `archived` vakansiyani qayta yopish — no-op (o''zgarishsiz
  qaytadi).

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
