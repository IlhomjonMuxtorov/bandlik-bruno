info:
  name: 18. Vacancy — Requirement Value Types (reference)
  type: http
  seq: 18
http:
  method: GET
  url: '{{base_url}}/admin/vacancies/requirement-value-types'
  headers:
  - name: Authorization
    value: 'Bearer {{admin_token}}'
  auth: inherit
docs: |-
  `value_type` enum ro'yxati — har bir talab uchun qaysi widget chizilishini
  belgilaydi (yosh=range, ha/yo'q=checkbox, ref/enum=dropdown, multi=multi-select).

  **Auth:** `admin_token` yoki Employer/Recruiter token.

  ### 📤 Response (`data[]`)

  | Field | Type | Description |
  |---|---|---|
  | `value` | string | Qiymat tipi kodi. |
  | `label` | string | Tarjima qilingan nom. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
