docs: 'Vakansiyaning barcha status o''zgarishlari tarixini qaytaradi (audit).


  **Auth:** Admin yoki vakansiya egasi.


  ### 📤 Response (`data`)


  Massiv:


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Log ID |

  | `from_status` / `_label` | string \| null | Oldingi status |

  | `to_status` / `_label` | string | Yangi status |

  | `reason` | string \| null | Sabab / izoh |

  | `actor_user_id` | int \| null | O''zgartirgan foydalanuvchi |

  | `actor_name` | string \| null | Username |

  | `created_at` | int | Unix timestamp |

  '
settings:
