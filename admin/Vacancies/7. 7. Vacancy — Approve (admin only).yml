docs: 'SuperAdmin pending_approval statusdagi vakansiyani tasdiqlaydi — status `approved`,
  `published_at` o''rnatiladi, mobile feed''da ko''rinadi.


  **Auth:** `admin_token` (faqat `UserType::Admin`).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Status `pending_approval` emas |

  | `400` | Bog''langan shartnoma amalda emas (tasdiqlanmagan yoki bekor qilingan) — `Vacancy cannot be approved until its contract is approved` |

  | `403` | Admin emas |

  | `404` | Vakansiya topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
