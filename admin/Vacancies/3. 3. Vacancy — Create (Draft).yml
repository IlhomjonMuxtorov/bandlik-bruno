docs: 'Yangi vakansiya yaratadi â€” boshlanishi `status = draft`. Wizardning barcha
  8 bosqich ma''lumotlari bitta tranzaksiyada saqlanadi.


  **Auth:** `admin_token` yoki Employer/Recruiter (faqat o''z tashkiloti uchun).


  ### đź“Ą Request Body


  **Asosiy maydonlar (1-bosqich):**


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `organization_id` | int | âś… | Ish beruvchi yoki rekruter tashkiloti |

  | `recruiter_id` | int | âž– | Agar Employer yaratayotgan bo''lsa, biriktirgan rekruter
  |

  | `industry_id` | int | âž– | Soha ID |

  | `title` | string | âś… | Sarlavha |

  | `description` | string | âž– | Tavsif (HTML/markdown) |

  | `experience_level` | string | âž– | `none` \| `one_to_three` \| `three_to_six` |

  | `employment_type` | string | âś… | `full_time` \| `part_time` \| `seasonal` \| `contract` |

  | `hiring_quota` | int | âś… | Necha kishi kerak (>=1) |

  | `duration_months_min` / `_max` | int | âž– | Ish davomiyligi |

  | `work_schedule` | string | âž– | `5_2` \| `6_1` \| `2_2` \| `shift` \| `flexible`
  |

  | `work_time_from` / `_to` | string | âž– | `HH:MM` |

  | `salary_gross` / `_currency` | int / string | âž– | `UZS` \| `USD` \| `EUR` |

  | `salary_net` / `_currency` | int / string | âž– | |

  | `country_id` | int | âś… | |

  | `city_id` | int | âž– | |

  | `address` | string | âž– | |

  | `hide_address_from_clients` | bool | âž– | Default `false` |

  | `deadline_at` | string | âž– | `DD.MM.YYYY` |


  **Child kolleksiyalar:**


  | Field | Type | Description |

  |---|---|---|

  | `requirements[]` | array | `{id, sort_order}` â€” vacancy_requirement katalog IDsi |

  | `benefits[]` | array | `{id, sort_order}` â€” vacancy_benefit katalog IDsi |

  | `documents[]` | array | `{id, sort_order}` â€” vacancy_document katalog IDsi |

  | `services[]` | array | `{category, organization_id, organization_service_id, educational_course_id,
  price, currency, service_name, duration_text, notes}` â€” `educational_course_id`
  faqat `category="training"` da majburiy; berilganda `service_name`, `price`, `currency`
  kursdan avtomatik olinadi (override qilmoqchi bo''lsangiz yuborsa bo''ladi) |

  | `single_payment` | bool | `1 tada 100% lik to''lov` toggle |

  | `payment_steps[]` | array | `{step_type, title, amount, currency, sort_order}`
  (faqat `single_payment=false` da) |


  **Snapshot:** har bir `services[]` elementi uchun `organization_service_id` berilsa,
  narx va nom shu xizmatdan olinadi (override `price` yoki `service_name` orqali ham
  bo''ladi).


  **âš ď¸Ź Agentlik xizmati (majburiy):** `services[]` ichida `category = "agency"` bo''lgan
  **aniq bitta** qator bo''lishi shart. Uning `organization_id` vakansiyaning `organization_id`
  ga teng bo''lishi, `service_name` to''ldirilgan va `price` 0 dan katta bo''lishi
  zarur. `organization_service_id` berilmaydi (agentlik o''z xizmati â€” katalog yozuvi
  shart emas). Agentlik narxi `total_service_amount` ga kiritiladi.


  ### đź“¤ Response (`data`)


  Full detail DTO (View bilan bir xil). `status` = `draft`, `total_service_amount`
  snapshot narxlar yig''indisi (shu jumladan agentlik xizmati narxi).


  ### âš ď¸Ź Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi |

  | `400` | Snapshot xatosi (Organization service topilmadi yoki tegishli organizatsiyaga
  emas), yoki `services[]` da `agency` qatori yo''q / narxi 0 / boshqa tashkilotga
  tegishli |

  | `403` | Boshqa tashkilot uchun yaratish |

  '
