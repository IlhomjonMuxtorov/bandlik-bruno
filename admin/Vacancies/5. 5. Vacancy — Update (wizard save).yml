info:
  name: 5. Vacancy вЂ” Update (wizard save)
  type: http
  seq: 5
http:
  method: PUT
  url: '{{base_url}}/admin/vacancies/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |
      {
        "organization_id": 1,
        "title": "Restoran Xizmatchisi (yangilangan)",
        "employment_type": "full_time",
        "hiring_quota": 15,
        "country_id": 1,
        "requirements": [{ "id": 1, "sort_order": 0 }],
        "benefits": [{ "id": 1, "sort_order": 0 }],
        "documents": [{ "id": 1, "sort_order": 0 }],
        "service_groups": [
          {
            "organization_id": 1,
            "payment_deadline_days": 3,
            "execution_deadline_days": 7,
            "sort_order": 0,
            "services": [
              { "category": "agency", "service_name": "Agentlik xizmati", "price": 1500000, "currency": "UZS", "sort_order": 0 }
            ]
          },
          {
            "organization_id": 4,
            "payment_deadline_days": 5,
            "execution_deadline_days": 14,
            "sort_order": 1,
            "services": [
              { "category": "training", "educational_course_id": 12 }
            ]
          }
        ],
        "single_payment": true,
        "payment_steps": []
      }
  auth: inherit
docs: |
  Vakansiyani to'liq qayta saqlaydi вЂ” barcha child kolleksiyalar
  (requirements/benefits/documents/service_groups+services/payment_steps) **butunlay
  almashtiriladi** (delete + insert).

  **Auth:** `admin_token` yoki vakansiya egasi.

  > **Eslatma:** faqat `draft` yoki `rejected` statusdagi vakansiyalarni Employer/Recruiter
  tahrirlay oladi. `approved` / `closed` вЂ” faqat admin orqali.

  ### рџ“Ґ Request Body

  Create bilan bir xil (yuqorida) вЂ” `service_groups[]` (bitta tashkilot = bitta guruh, bir
  kategoriya faqat bitta tashkilotda, ikki muddat, nested `services[]` har biri o'z `category`
  si bilan) bu yerda ham majburiy.

  **вљ пёЏ Agentlik xizmati (majburiy):** Update'da ham aniq bitta `category = "agency"` xizmati
  (vakansiya `organization_id` guruhiga tegishli, `price > 0`, `service_name` to'ldirilgan)
  bo'lishi shart вЂ” aks holda 400.

  **вљ пёЏ Kurs (majburiy):** Update'da ham kamida bitta `category = "training"` xizmati +
  `educational_course_id` bo'lishi shart вЂ” aks holda `400` `At least one training service with a course is required`.

  **вљ пёЏ To'lovlar tartibi (`payment_steps`):** Create bilan bir xil qoida вЂ” har step **mos
  xizmatga ega** bo'lishi shart (aks holda `400`), backend tartibni majburlaydi
  (`course`/`insurance`/`notarius` boshida вЂ” client tartibida; `visa`в†’`agency_fee`в†’`logistics`
  oxirida вЂ” qat'iy, ularning `sort_order`'i e'tiborga olinmaydi). Batafsil вЂ” **Create** docs.

  **вљ пёЏ service_groups tartibi:** `payment_steps` bilan bir xil qoidada saqlashda qayta
  tartiblanadi (reorderable guruhlar boshida вЂ” client tartibida; visaв†’agencyв†’logistics oxirida).
  Javobda `service_groups[]` va `payment_steps[]` har biri `is_reorderable` (bool) qaytaradi.

  ### вљ пёЏ Errors

  | Code | Reason |
  |---|---|
  | `404` | Vakansiya topilmadi |
  | `403` | Approved/closed vakansiyalar tahrirlanmaydi (egasi uchun) |
  | `422` | Validatsiya xatosi. Jumladan: `organization_id` XBA-type emas; `recruiter_id` EMPLOYER/RECRUITER-type emas |
  | `400` | Agentlik guruhi/xizmati; **kurs yo'q** (`training` xizmati yoki `educational_course_id` yo'q); service_groups validatsiyasi xatosi; **to'lov bosqichi mos xizmatsiz** (`Payment step "{type}" has no matching service`) yoki noto'g'ri `step_type` |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
