info:
  name: 5. Vacancy — Update (wizard save)
  type: http
  seq: 5
http:
  method: PUT
  url: '{{base_url}}/admin/vacancies/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |
      {
        "organization_id": 1,
        "title": "Restoran Xizmatchisi (yangilangan)",
        "employment_type": "full_time",
        "hiring_quota": 15,
        "country_id": 1,
        "requirements": [{ "id": 1, "sort_order": 0, "is_mandatory": true, "value_int_min": 21, "value_int_max": 45 }],
        "language_requirements": [{ "language_id": 3, "min_language_level_id": 4, "is_mandatory": true, "sort_order": 0 }],
        "benefits": [{ "id": 1, "mode": "money", "amount": 50, "currency": "USD", "sort_order": 0 }, { "id": 12, "value_min": 20, "value_max": 50, "sort_order": 1 }],
        "documents": [{ "id": 1, "sort_order": 0 }],
        "service_groups": [
          {
            "organization_id": 1,
            "payment_deadline_days": 3,
            "execution_deadline_days": 7,
            "sort_order": 0,
            "services": [
              { "category": "agency", "service_name": "Agentlik xizmati", "price": 1500000, "currency": "UZS", "sort_order": 0 }
            ]
          },
          {
            "organization_id": 4,
            "payment_deadline_days": 5,
            "execution_deadline_days": 14,
            "sort_order": 1,
            "services": [
              { "category": "training", "educational_course_id": 12 },
              { "category": "training", "educational_course_id": 15 }
            ]
          }
        ],
        "single_payment": true
      }
  auth: inherit
docs: |
  Vakansiyani to'liq qayta saqlaydi — barcha child kolleksiyalar
  (requirements/benefits/documents/service_groups+services) **butunlay
  almashtiriladi** (delete + insert).

  **Auth:** `admin_token` yoki vakansiya egasi.

  > **Eslatma:** faqat `draft` yoki `rejected` statusdagi vakansiyalarni Employer/Recruiter
  tahrirlay oladi. `approved` / `closed` — faqat admin orqali.

  ### 📥 Request Body

  Create bilan bir xil (yuqorida) — `service_groups[]` (bitta tashkilot = bitta guruh, bir
  kategoriya faqat bitta tashkilotda, ikki muddat, nested `services[]` har biri o'z `category`
  si bilan) bu yerda ham majburiy.

  > **`deadline_at` (orqa sana):** muddat o'tmishdagi (orqa) sana bo'lmasligi kerak — bugun
  ruxsat. Bu tekshiruv faqat `deadline_at` **o'zgartirilganda** ishlaydi; eski qiymat
  o'zgarmasdan yuborilsa (muddati allaqachon o'tgan vakansiyalar) — xato bermaydi. O'zgartirib
  orqa sana qo'yilsa → `422`.

  **⚠️ Agentlik xizmati (majburiy):** Update'da ham aniq bitta `category = "agency"` xizmati
  (vakansiya `organization_id` guruhiga tegishli, `price > 0`, `service_name` to'ldirilgan)
  bo'lishi shart — aks holda 400.

  **⚠️ Kurs (majburiy):** Update'da ham kamida bitta `category = "training"` xizmati +
  `educational_course_id` bo'lishi shart — aks holda `400` `At least one training service with a course is required`.

  **⚠️ Kurslar narxi (ADR 0005):** eski `combined_price` **bekor qilindi**. Training summasi =
  biriktirilgan kurslar snapshot narxlari **yig'indisi**; narx kursda belgilanadi, vakansiyada
  override yo'q. Kurs valyutasi vakansiya valyutasiga mos bo'lishi shart — aks holda `400`
  `Course currency must match the vacancy currency`. Javob `service_groups[]` da `combined_price`
  maydoni endi yo'q.

  **⚠️ service_groups tartibi:** saqlashda qayta tartiblanadi (reorderable guruhlar —
  course/insurance/notarius — boshida, client tartibida; visa→agency→logistics oxirida, qat'iy).
  Javobda `service_groups[]` har biri `is_reorderable` (bool) qaytaradi.

  > To'lov rejasi alohida yuborilmaydi — `service_groups[]` ning o'zi to'lov rejasi.
  Eski `payment_steps[]` maydoni olib tashlangan; yuborilsa e'tiborga olinmaydi.

  > **Birlik (breaking):** `service_groups[].services[].price` override'i va
  `insurance_coverage_amount` endi **so'mda (major unit)** yuboriladi — avvalgi tiyin EMAS.
  Backend tiyinda saqlaydi; javobdagi `price`, `insurance_coverage_amount` va
  `total_service_amount` ham so'mda qaytadi. Admin frontend uchun breaking change.
  `salary_gross` / `salary_net` esa avvalgidek major unitda (client uchun o'zgarish yo'q).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Vakansiya topilmadi |
  | `403` | Approved/closed vakansiyalar tahrirlanmaydi (egasi uchun) |
  | `422` | Validatsiya xatosi. Jumladan: `organization_id` XBA-type emas; `recruiter_id` EMPLOYER/RECRUITER-type emas; `deadline_at` o'zgartirilib o'tmishdagi (orqa) sanaga qo'yilsa — `Deadline cannot be in the past` |
  | `400` | Agentlik guruhi/xizmati; **kurs yo'q** (`training` xizmati yoki `educational_course_id` yo'q); service_groups validatsiyasi xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
