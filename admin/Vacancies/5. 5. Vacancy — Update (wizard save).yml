info:
  name: 5. Vacancy — Update (wizard save)
  type: http
  seq: 5
http:
  method: PUT
  url: '{{base_url}}/admin/vacancies/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"title\": \"Restoran Xizmatchisi (yangilangan)\"\
      ,\n  \"employment_type\": \"full_time\",\n  \"hiring_quota\": 15,\n  \"country_id\"\
      : 1,\n  \"requirements\": [{\"title\": \"Polsha tili A2\", \"is_required\":\
      \ true}],\n  \"benefits\": [{\"title\": \"Bepul turar joy\"}],\n  \"documents\"\
      : [{\"title\": \"Sudlanmaganlik\", \"is_required\": true}],\n  \"services\"\
      : [{\"category\": \"agency\", \"organization_id\": 1, \"service_name\": \"Agentlik\
      \ xizmati\", \"price\": 1500000, \"currency\": \"UZS\", \"sort_order\": 0}, {\"\
      category\": \"training\", \"organization_id\": 4, \"educational_course_id\":\
      \ 12, \"sort_order\": 1}],\n\
      \  \"single_payment\": true,\n  \"payment_steps\": []\n}"
  auth: inherit
docs: 'Vakansiyani to''liq qayta saqlaydi — barcha child kolleksiyalar (requirements/benefits/documents/services/payment_steps)
  **butunlay almashtiriladi** (delete + insert).


  **Auth:** `admin_token` yoki vakansiya egasi.


  > **Eslatma:** faqat `draft` yoki `rejected` statusdagi vakansiyalarni Employer/Recruiter
  tahrirlay oladi. `approved` / `closed` — faqat admin orqali.


  ### 📥 Request Body


  Create bilan bir xil (yuqorida).


  **⚠️ Agentlik xizmati (majburiy):** Update so''rovida ham `services[]` ichida `category
  = "agency"` qatori (vakansiyaning `organization_id` ga tegishli, `price > 0`, `service_name`
  to''ldirilgan) bo''lishi shart — aks holda 400 qaytadi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Vakansiya topilmadi |

  | `403` | Approved/closed vakansiyalar tahrirlanmaydi (egasi uchun) |

  | `422` | Validatsiya xatosi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
