info:
  name: 1. Vacancy — Index
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/vacancies'
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: 'Vakansiyalar ro''yxati. Admin barchasini ko''radi; Employer/Recruiter faqat
  o''z tashkilotiniki + biriktirilgan rekruterligini.


  **Auth:** `admin_token` yoki org foydalanuvchi.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Sarlavha bo''yicha (ILIKE). |

  | `status` | string | ➖ | `draft` \| `pending_approval` \| `pending_association` \| `approved`
  \| `rejected` \| `closed` \| `archived`. |

  | `organization_id` | int | ➖ | Tashkilot ID (admin uchun). Root XBA''ning `organization_id`''si
  uning barcha agentlari vakansiyalarini ham qamrab oladi. |

  | `recruiter_id` | int | ➖ | Rekruter tashkiloti ID. |

  | `agent_id` | int | ➖ | XBA agent tashkiloti ID bo''yicha toraytiradi (`agent_organization_id`).
  Faqat **admin** yoki **root XBA** aktori uchun ishlaydi (root XBA — o''z agentlaridan birini
  tanlaydi); boshqa aktorlar uchun e''tiborga olinmaydi. XBA agent aktori esa avtomatik
  faqat o''z yaratgan vakansiyalarini ko''radi (`agent_id` yubormasa ham). |

  | `country_id` | int | ➖ | Davlat ID. |

  | `industry_id` | int | ➖ | Soha ID. |

  | `employment_type` | string | ➖ | `full_time` \| `part_time` \| `seasonal` \| `contract`. |

  | `experience_months_min` | int | ➖ | Talab qilinadigan tajriba (oy) shu qiymatdan **kam bo''lmagan** vakansiyalar (`experience_months >=`). |

  | `experience_months_max` | int | ➖ | Talab qilinadigan tajriba (oy) shu qiymatdan **katta bo''lmagan** vakansiyalar (`experience_months <=`). |

  | `per-page` | int | ➖ | 1..100, default 20. |


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {token}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en` |


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `items` | array | Vakansiya ro''yxati |

  | `pagination` | object | `{ page, page_size, total_count, page_count }` |


  > Har bir `items[]` elementida `created_by` va `updated_by` maydonlari bor:
  `{ id: int, name: string\|null }` (yo''q bo''lsa `null`). `name` — `username`,
  yo''q bo''lsa `email`. Vakansiyani kim yaratgani va kim oxirgi marta o''zgartirgani
  shu maydonlarda ko''rinadi.


  > Har bir `items[]` elementida `rejection_reason` (string\|null) bor — `rejected`
  yoki `closed` vakansiya uchun rad etish/yopish sababi. Admin ro''yxatdayoq (masalan
  Rejected/Closed tablarda) sababni ochmasdan ko''radi; boshqa statuslarda `null`.


  > Har bir `items[]` elementida approval maydonlari bor: `approved_by` (int\|null —
  tasdiqlagan `user.id`), `approved_at` (int\|null — Unix ts), `approved_at_formatted`
  (string\|null — `DD.MM.YYYY HH:MM`), `is_auto_approved` (bool). Tasdiqlanmaganda
  uchalasi `null`, `is_auto_approved=false`. **Auto-approve** (cron timeout) bo''lsa
  `approved_by` baribir `null` qoladi, `approved_at` to''ladi va
  `is_auto_approved=true` — qo''lda tasdiqdan shu flag bilan farqlanadi.


  > **Ikki fazali tasdiq (XBA agentlik):** Har bir `items[]` elementida `agent`
  (object\|null) bor — `{ id, name }`: vakansiyani yaratgan XBA **agent** tashkiloti;
  `null` bo''lsa vakansiyani root XBA''ning o''zi yaratgan. `organization` maydoni bunda
  ham har doim **root XBA** brendini ko''rsatadi (agent vakansiyasi ham root XBA nomi ostida
  chop etiladi). Status oqimi: agent vakansiyasi `draft → pending_approval →
  (root XBA `approve-agency`) → pending_association → (Uyushma `approve`) → approved`; root
  XBA''ning o''z vakansiyasi 1-fazani o''tkazib yuboradi: `draft → pending_association →
  approved`. Har fazada rad etish → `rejected`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Org foydalanuvchisi (org_id yo''q yoki Employer/Recruiter emas) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
