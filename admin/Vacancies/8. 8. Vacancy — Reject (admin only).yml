info:
  name: 8. Vacancy — Reject (admin only)
  type: http
  seq: 8
http:
  method: POST
  url: '{{base_url}}/admin/vacancies/1/reject'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"reason\": \"Maosh diapazoni real emas\"\n}"
  auth: inherit
docs: 'SuperAdmin/Admin (Uyushma) — 2-fazada `pending_association` statusdagi vakansiyani
  rad etadi. Sabab (`reason`) majburiy va `rejection_reason` ga saqlanadi. Vakansiya egasi
  ko''rishi mumkin.


  > 1-fazadagi (`pending_approval`, agentlik) rad etish uchun bu endpoint **ishlatilmaydi** —
  root XBA `POST /admin/vacancies/{id}/reject-agency` dan foydalanadi.


  **Auth:** `admin_token` (faqat `UserType::Admin`).


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `reason` | string | ✅ | Rad etish sababi (bo''sh emas). |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Status `pending_association` emas yoki `reason` bo''sh — `"Only vacancies pending association approval can be rejected"` |

  | `403` | Admin emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
