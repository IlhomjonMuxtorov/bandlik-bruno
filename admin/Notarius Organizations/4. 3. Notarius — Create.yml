docs: 'Yangi Notarius tashkilotini yaratadi. `application/json` so''rov — xatti-harakat
  XBA `Create` bilan bir xil, yagona farq: `type = 2`.


  **Auth:** `admin_token`.


  ### 📥 Request Body


  XBA `Create` endpointidagi to''liq ro''yxat. Fayl maydonlari: `license_file_id`,
  `logo_id` (oldindan `/admin/upload` orqali yuklangan fayl ID).


  ### 📤 Response


  `201` — `OrganizationOutputDTO` (`type = 2`).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi |

  | `400` | Fayl ID topilmadi yoki `status=uploading` |

