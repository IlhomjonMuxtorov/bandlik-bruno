info:
  name: 0. Notarius — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/notarius/stats'
  auth: inherit
docs: |-
  Notarius modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta).

  **Auth:** `admin_token`. Ruxsat: `notariusView` (faqat superadmin/admin). XBA rollari
  (`xba_admin`/`xba_manager`/`xba_viewer`, `partnerOrgView`) bu endpointga kira olmaydi — `403`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS). |
  | `this_month_candidates` | int | Joriy oyda shu tur vakansiyalariga kelgan nomzodlar (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan shu tur vakansiyalari. |
  | `refunded_amount` | int | Yakunlangan refund summasi (`transaction.type = REFUND`, `status = COMPLETED`). |

  > Faqat `type = NOTARIUS (2)` yozuvlari bo'yicha hisoblanadi. Vakansiyaga ega bo'lmagan
  > turlarda `this_month_candidates` / `this_month_vacancies` `0` bo'lishi mumkin.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
