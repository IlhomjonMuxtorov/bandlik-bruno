info:
  name: 1. Notarius — Index
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/notarius?per-page=20'
  auth: inherit
docs: |-
  Notarius tashkilotlari ro'yxati. Faqat `type = 2` yozuvlar qaytadi.

  **Auth:** `admin_token`. Ruxsat: `partnerOrgView` (XBA: xba_admin/xba_manager/xba_viewer) yoki superadmin/admin.

  ### 🔎 Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `is_active`, `page`, `per-page`.

  ### 📤 Response

  `data.items[]` — `OrganizationOutputDTO` (`type = 2`, `type_label = "Notarius"`).

  > **`counts` ko'rinishi ruxsatga bog'liq:** har bir qatorga service-org `counts` obyekti
  > (batched, N+1 siz) faqat chaqiruvchida `notariusView` ruxsati bo'lsa (`superadmin`/`admin`)
  > qo'shiladi. XBA rollari (`partnerOrgView` — `xba_admin`/`xba_manager`/`xba_viewer`) uchun
  > `counts` maydoni javobda **umuman chiqmaydi** (kalit yo'q, `null` ham emas).

  | Field | Type | Description |
  |---|---|---|
  | `counts` | object | Faqat `notariusView` ruxsati (superadmin/admin) borlarga chiqadi — `{employees_count, clients_count, revenue}`. `partnerOrgView`gina bo'lgan XBA foydalanuvchi uchun bu kalit javobda UMUMAN CHIQMAYDI (null emas — field yo'q). |
  | `counts.employees_count` | int | Faol xodimlar soni ("Xodimlar"). Faqat `notariusView` bilan. |
  | `counts.clients_count` | int | Xizmat ko'rsatilgan distinct kandidatlar ("Mijozlar"). Faqat `notariusView` bilan. |
  | `counts.revenue` | int | Yakunlangan buyurtmalar summasi, UZS ("Daromadi"). Faqat `notariusView` bilan. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
