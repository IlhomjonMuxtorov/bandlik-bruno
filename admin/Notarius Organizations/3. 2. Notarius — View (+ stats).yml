info:
  name: 2. Notarius — View (+ stats)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/notarius/1'
  auth: inherit
docs: "Bitta Notarius tashkiloti + `stats` sub-object:\n\n```json\n{\n  \"id\": 1,\n\
  \  \"type\": 2,\n  \"type_label\": \"Notarius\",\n  \"name\": \"...\",\n  ...\n\
  \  \"stats\": {\n    \"total_revenue\": 48000000,\n    \"clients_count\": 1920,\n\
  \    \"services_count\": 3,\n    \"employees_count\": 12\n  }\n}\n```\n\n> **Eslatma:**\
  \ Notarius xizmatlari uchta belgilangan kategoriyadan iborat — Tarjima, Apostil va\
  \ Boshqa — har biri o'z per-org narx jadvaliga ega. Shuning uchun `stats.services_count`\
  \ har bir notarius tashkiloti uchun doimo `3` qaytaradi.\n\n**Auth:**\
  \ `admin_token`.\n\n### ⚠️ Errors\n\n| Code | Reason |\n|---|---|\n| `404` | Notarius\
  \ topilmadi (cross-type isolation: XBA/Visa id'si bilan urinilganda ham 404) |\n"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
