info:
  name: 1. Candidates Pipeline — Index (per vacancy)
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/vacancies/1/candidates'
  auth: inherit
docs: 'Vakansiya pipeline''idagi nomzodlar (`accepted_at DESC`).


  **Auth:** Admin yoki vakansiya egasi.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `status` | string | ➖ | `pending` \| `course_in_progress` \| `course_passed` \|
  `course_failed` \| `visa_pending` \| `departed` \| `dropped_out` |

  | `per-page` | int | ➖ | 1..100 |


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `items` | array | Pipeline elementlari |

  | `pagination` | object | |


  Har bir element:


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `candidate` | object | `{id, full_name, phone, photo_url}` |

  | `journey_status` / `_label` | string | |

  | `course_progress_percent` | int | 0..100 |

  | `collected_amount` / `_currency` | int / string | To''plangan summa |

  | `hotel_preference` | bool | |

  | `accepted_at` / `departed_at` | int \| null | |

  | `stages` | array | "Joriy status" bosqichlari (`sort_order ASC`). Har biri: `{id,
  category, category_label, service_name, amount, currency, funded, status, status_label,
  responsible_user, deadline_at, completed_at, progress_percent, sort_order}` |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
