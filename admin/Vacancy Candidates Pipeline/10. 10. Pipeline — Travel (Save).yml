docs: >
  "Safar ma'lumotlari" ni saqlash (upsert — to'liq almashtirish; bir kandidatga
  bitta yozuv). Sana maydonlari unix timestamp (sekund).


  **Auth:** `access_token` (admin yoki o'z tashkiloti aktyori).


  ### 📥 Request Body (barchasi ixtiyoriy)

  Parvoz: `departure_country/city/airport`, `departure_at`, `arrival_country/city/airport`,
  `arrival_at`. Bilet: `airline`, `flight_number`, `aircraft`. Kuzatuvchi:
  `sender_name/phone/address`, `sender_at`. Kutib oluvchi: `receiver_name/phone`,
  `receiver_pickup_address`, `receiver_pickup_at`. `notes`.


  ### 📤 Response (`data`) — saqlangan travel obyekti (Get bilan bir xil shakl).
