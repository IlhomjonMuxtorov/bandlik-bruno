info:
  name: 4. Pipeline — Drop Out
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-candidates/1/drop-out'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"reason\": \"Nomzod muddatni o'tkazdi\"\n}"
  auth: inherit
docs: 'Pipeline''ni **bekor qiladi** (erta chiqish): `pipeline_outcome = cancelled`,
  `current_stage = cancelled`, `cancel_reason` saqlanadi, hali band qilingan (settle
  qilinmagan) mablag'' kandidatga qaytariladi va ochiq bosqichlar `skipped` ga o''tadi,
  chat yopiladi. Allaqachon yakunlangan/bekor qilingan pipeline uchun no-op.


  **Auth:** Admin yoki vakansiya egasi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `reason` | string | ✅ | Bekor qilish sababi — `cancel_reason` ga yoziladi |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `success` | boolean | Request success status |

  | `data` | object | Yangilangan pipeline yozuvi — `Pipeline — View` bilan bir xil shakl (`pipeline_outcome=cancelled`, `current_stage=cancelled`, `cancel_reason` to''ldirilgan; `stages[]` + `service_groups[]`) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Invalid request data |

  | `401` | Unauthorized |

  | `404` | Not found |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
