docs: >
  Kandidat detal "Safar ma'lumotlari" tab — parvoz + avia bilet + kuzatuvchi/kutib
  oluvchi shaxs. Hali kiritilmagan bo'lsa `data: null`.


  **Auth:** `access_token` (admin yoki o'z tashkiloti aktyori).


  ### 📤 Response (`data`)

  `{id, flight:{departure{country,city,airport,at(+formatted)}, arrival{...}, airline,
  flight_number, aircraft}, sender{name,phone,address,at(+formatted)},
  receiver{name,phone,pickup_address,pickup_at(+formatted)}, notes, created_at, updated_at}`
  yoki `null`.
