info:
  name: 2. Pipeline — View
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-candidates/1'
  auth: inherit
docs: 'Pipeline yozuvi tafsiloti.


  **Auth:** Admin yoki vakansiya egasi.


  ### 📤 Response

  Global Index elementi bilan bir xil shakl (`id, vacancy, candidate, journey_status,
  course_progress_percent, collected_amount, stages[], service_groups[]`).

  - `stages[]` — tekis ro''yxat; har biri `responsible_user` (xizmatni beruvchi tashkilot
  useri: `{id, username, full_name, phone, photo_url}`) va `organization`
  (`{id, name, type, type_label, logo_url}`) bilan boyitilgan.

  - `service_groups[]` — bosqichlar **tashkilot bo''yicha guruhlangan** + guruh bo''yicha
  ketma-ket to''lov holati: `{organization, responsible_user, stages[], required_amount,
  funded_amount, awaiting_amount, currency, started, awaiting_start, fully_funded, is_current, payment_deadline_at, paid_percent, progress_percent}`.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
