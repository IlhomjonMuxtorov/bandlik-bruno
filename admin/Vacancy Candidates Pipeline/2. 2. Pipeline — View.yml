info:
  name: 2. Pipeline — View
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-candidates/1'
  auth: inherit
docs: 'Pipeline yozuvi tafsiloti.


  **Auth:** Admin yoki vakansiya egasi.


  ### 📤 Response

  Global Index elementi bilan bir xil shakl (`id, vacancy, candidate, match_score,
  pipeline_outcome(+_label), current_stage(+_label), course_progress_percent,
  collected_amount, stages[], service_groups[]`).

  - `match_score` (int|null) — "Mos kelish darajasi": kandidatning visa-survey foizi
  vakansiya davlati bo''yicha (survey yo''q bo''lsa `null`).

  - `stages[]` — tekis ro''yxat; har biri `responsible_user` (xizmatni beruvchi tashkilot
  useri: `{id, username, full_name, phone, photo_url}`), `organization`
  (`{id, name, type, type_label, logo_url}`) va **`documents[]`** (bosqich hujjatlari:
  `{id, type, title, upload_file:{url, original_name, file_size, ...}, created_at}`) bilan boyitilgan.

  - `service_groups[]` — bosqichlar **tashkilot bo''yicha guruhlangan** + guruh bo''yicha
  ketma-ket to''lov holati: `{service_group_id, organization, responsible_user, stages[], required_amount,
  funded_amount, awaiting_amount, currency, started, awaiting_start, fully_funded, is_current, payment_deadline_at, paid_percent, progress_percent}`.
  `service_group_id` (int|null) — guruhning `VacancyServiceGroup.id`''si.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
