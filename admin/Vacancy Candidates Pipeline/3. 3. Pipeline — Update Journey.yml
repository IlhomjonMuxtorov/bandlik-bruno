info:
  name: 3. Pipeline — Update Journey
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-candidates/1/journey'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "collected_amount": 1500000,
        "collected_currency": "UZS",
        "notes": "Naqd to'lov qabul qilindi"
      }
  auth: inherit
docs: 'Pipeline yozuvining **naqd-pul hisobi va izohini** yangilaydi (partial — faqat
  berilgan maydonlar o''zgaradi).


  **Auth:** Admin yoki vakansiya egasi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `collected_amount` | int | ➖ | Odatiy birlikda (so''m / dollar / evro) |

  | `collected_currency` | string | ➖ | `UZS` \| `USD` \| `EUR` |

  | `notes` | string | ➖ | Bo''sh string yuborilsa `null` ga o''rnatiladi |


  > **`journey_status` BU YERDA QABUL QILINMAYDI** — u butunlay olib tashlandi. Pipeline
  holati endi xizmat guruhlaridan kelib chiqadi: `pipeline_outcome` (`active` \| `completed`
  \| `cancelled`) oxirgi guruh tasdiqlanganda yoki bekor qilinganda avtomatik o''rnatiladi,
  `current_stage` esa joriy guruhdan hisoblanadi. Pipeline''ni **bekor qilish** uchun alohida
  `drop-out` endpointidan foydalaning.


  > **`course_progress_percent` ham QABUL QILINMAYDI** — kurs progressi LMS orqali
  boshqariladi (rekruter/admin emas). 100% ga yetganda Training guruhi avtomatik tasdiqlanadi
  va keyingi guruh ochiladi.


  ### 📤 Response


  Yangilangan pipeline yozuvi — `Pipeline — View` bilan bir xil shakl. Holat maydonlari:
  `pipeline_outcome` (+`_label`), `current_stage` (+`_label`); `stages[]` + `service_groups[]`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Noto''g''ri summa / valyuta |

  | `403` | Boshqa tashkilot |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
