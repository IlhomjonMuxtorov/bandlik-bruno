info:
  name: 3. Pipeline — Update Journey
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-candidates/1/journey'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "journey_status": "course_in_progress",
        "collected_amount": 1500000,
        "collected_currency": "UZS",
        "notes": "Kurs muvaffaqiyatli boshlandi"
      }
  auth: inherit
docs: 'Pipeline yozuvini yangilaydi (partial — faqat berilgan maydonlar o''zgaradi).


  **Auth:** Admin yoki vakansiya egasi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `journey_status` | string | ➖ | Yangi status |

  | `collected_amount` | int | ➖ | Odatiy birlikda (so''m / dollar / evro) |

  | `collected_currency` | string | ➖ | `UZS` \| `USD` \| `EUR` |

  | `notes` | string | ➖ | Bo''sh string yuborilsa `null` ga o''rnatiladi |


  > **`course_progress_percent` bu yerda QABUL QILINMAYDI.** Kurs progressi nomzodning
  haqiqiy kurs tugatishi (LMS) orqali boshqariladi — rekruter yoki admin uni qo''lda
  o''zgartira olmaydi. Progress 100% ga yetganda Training guruhi avtomatik tasdiqlanadi
  va keyingi guruh ochiladi.


  > `journey_status = departed` qilinganda `departed_at` avtomatik o''rnatiladi (agar
  bo''sh bo''lsa).


  > **Terminal holatdan chiqib bo''lmaydi.** Pipeline allaqachon yakunlangan
  (`departed` / `dropped_out` / `course_failed` / `visa_rejected`) bo''lsa, `journey_status`
  ni boshqa qiymatga o''zgartirishga urinish `400` qaytaradi — yopilgan jarayonni qayta
  ochish mexanizmi yo''q.


  > **Eslatma:** `departed` ga o''tish endi XBA (agency) holdini **avtomatik settle
  qilmaydi** — XBA xizmati alohida tasdiqlanadi (group `confirm`).


  ### 📤 Response


  Yangilangan pipeline yozuvi — `Pipeline — View` bilan bir xil shakl (`stages[]` +
  `service_groups[]`; `responsible_user` xizmatni beruvchi tashkilotdan: `{id, username,
  full_name, phone, photo_url}`).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400` | Noto''g''ri status / progress diapazoni / valyuta; yoki yakunlangan (terminal) pipeline ni qayta ochishga urinish |

  | `403` | Boshqa tashkilot |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
