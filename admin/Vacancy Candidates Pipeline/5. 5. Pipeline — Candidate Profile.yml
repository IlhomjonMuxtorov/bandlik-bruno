info:
  name: 5. Pipeline — Candidate Profile
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-candidates/1/profile'
  auth: inherit
params: {}
headers:
  - name: Accept-Language
    value: uz
    enabled: true
docs: >
  Kandidat detal "Umumiy ma'lumot" tab — to'liq profil (mobil CV / lead profili
  bilan bir xil shakl, `CvOutputDTO`). CV bor bo'lsa to'liq, yo'q bo'lsa minimal
  (CV-scoped bo'limlar bo'sh).


  **Auth:** `access_token` (admin yoki o'z tashkiloti aktyori).


  ### 📤 Response (`data`)

  `header, personal, birth_place, passport, registration, education[], experience[],
  family, languages[], documents[], driver, courses[], visas[], contact, legal, medical`.


  **`registration`** (Yashash manzili — MVD `MVDAddressInfoService`): yuqori darajada
  **joriy** manzil — faol vaqtinchalik ro'yxat bo'lsa o'sha, aks holda doimiy propiska.


  | Field | Type | Description |

  |---|---|---|

  | `type` | string \| null | `permanent` \| `temporary`; `null` — MVD hali sinxronlanmagan |

  | `country` \| `region` \| `district` | string \| null | Ma'lumotnomadan bog'langan nom (`Accept-Language`); bog'lanmasa MVD xom kirill qiymati |

  | `mahalla` | string \| null | MFY nomi — UzKad ma'lumotnomasidan lotin yozuvida, bo'lmasa MVD `Maxalla.Value` |

  | `street` | string \| null | Ko'cha nomi — 1C ma'lumotnomasidan (`Street.Guid` kodi bo'yicha) lotin yozuvida, bo'lmasa MVD `Street.Value` |

  | `street_type` | string \| null | Ko'cha turi lokalizatsiyalangan nomi (Ko'cha, Berk ko'cha, Qishloq, Shox ko'cha …) |

  | `address` | string \| null | MVD `Address` — uy/xonadon darajasidagi erkin matn |

  | `cadastre` | string \| null | Turar-joy kadastr raqami; `null` — MVD bermagan |

  | `postal_code` | string \| null | Pochta indeksi — nomzod profilidan (MVD indeks qaytarmaydi) |

  | `registration_date` | string \| null | Ro'yxatga olingan sana (`d.m.Y`) |

  | `valid_until` | string \| null | Vaqtinchalik ro'yxat muddati (`d.m.Y`); doimiy propiskada `null` |

  | `full_address` | string \| null | To'liq manzil: `Viloyat, Tuman, MFY, Ko'cha, uy` |

  | `permanent` | object \| null | Doimiy propiska yozuvi (shu kalitlar bilan); `null` — MVD qaytarmagan |

  | `temporary` | array | Vaqtinchalik ro'yxatlar (yangisi birinchi), har biri `valid_until` bilan |



  > **BREAKING:** `birth_place` endi qat'iy MVD-derived: `{ address, country }`. Eski
  > `region`/`district` kalitlari OLIB TASHLANDI. `address` kaliti QOLADI, lekin
  > qiymati boshqa manbadan: endi MVD `birthplace` erkin matni (masalan tuman nomi),
  > avvalgi "nomzod kiritgan ko'cha/uy manzili" EMAS (`null` — MVD topilmagan);
  > `country` — tug'ilgan davlat, `country.gcp_code` orqali lokalizatsiya, bo'lmasa
  > xom MVD qiymati (`null` — noma'lum).
  >
  > `passport.citizenship` (yangi) — `{ id, name }`. `id` — GCP davlat kodi
  > (`country.gcp_code`); `null` — MVD kod bermagan yoki davlat mos kelmagan. `name` —
  > `country` relation orqali lokalizatsiya, bo'lmasa xom MVD fuqarolik qiymati.


  **`legal`** (Huquqiy holat — МВД/МИБ'dan): `criminal_record` (Sudlanganlik),
  `insolvent` (Insofsiz/to'lovga qobiliyatsiz ro'yxati), `travel_ban` (Chet elga
  chiqish taqiqi). Har biri `status` (`clean` \| `has_record` \| `pending` \|
  `not_checked` \| `error`) + `has_record` + tafsilotlar (`execution_docs[]` /
  `bans[]` — `residual_balance` so'mda).


  **`medical`** (Tibbiy ma'lumotlar — Минздрав'dan): `narcology`, `psychiatry`.
  Har biri `status` + `is_registered` + `med_org` + `registered_at`.


  > `legal`/`medical` kandidat **ariza topshirganda** avtomatik tortib kelinadi
  > (navbat jobi). Qo'lda yangilash: `POST .../refresh-background-checks`.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
