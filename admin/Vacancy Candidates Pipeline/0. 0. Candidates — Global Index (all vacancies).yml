docs: 'Global "Kandidatlar" ekrani — barcha vakansiyalar bo''yicha nomzodlar. Endi har
  nomzodning **CV ma''lumotlari ustun sifatida** (`candidate.cv`) qaytadi va Airtable
  uslubidagi **ustunma-ustun filtr/sort** (`filter` daraxti + `sort`) qo''llab-quvvatlanadi.
  Mavjud ustunlar/operatorlar ro''yxati: `GET /admin/candidates/columns`.


  **Auth:** Admin barcha nomzodlarni ko''radi; tashkilot aktyori (XBA/rekruter)
  faqat o''z tashkiloti vakansiyalari (egasi yoki rekruteri) nomzodlari bilan
  cheklanadi. Tashkilot scope''i **majburiy tashqi AND** — `filter` daraxti uni
  hech qachon kengaytira olmaydi.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Global qidiruv — FISH (pasport) yoki telefon/username (ILIKE). `filter` bilan AND |

  | `district` | string | ➖ | `candidates.registration_district` aniq moslik (legacy sugar) |

  | `status` | string | ➖ | Legacy: pipeline outcome `active` \| `completed` \| `cancelled` |

  | `stage` | string | ➖ | Legacy: `awaiting` \| `training` \| `translation_apostil` \| `insurance` \| `visa` \| `xba` \| `logistics` \| `completed` \| `cancelled` |

  | `stage_category` | string | ➖ | Legacy: `agency` \| `notarius` \| `insurance` \| `logistics` \| `visa` \| `translation_apostille` \| `training` \| `notary_translation` \| `notary_apostille` \| `notary_other` |

  | `stage_status` | string | ➖ | Legacy: `pending` \| `awaiting_payment` \| `in_progress` \| `completed` \| `overdue` \| `payment_overdue` \| `skipped` |

  | `filter` | string (JSON) | ➖ | **Airtable filtr daraxti** (pastga qarang). `q` + legacy paramlar bilan AND. Noto''g''ri ustun/operator → `422` |

  | `sort` | string | ➖ | Ko''p darajali sort: `col:dir,col2:dir2` (`dir` = `asc`\|`desc`). Faqat `sortable` ustunlar (`/columns` da `sortable=true`); aks holda `422`. Doim `id DESC` tiebreaker qo''shiladi |

  | `include` | string | ➖ | `cv` berilsa har qatorga **to''liq nested CV** (`cv` obyekti) ham qo''shiladi; bu holda `per-page` 1..30 |

  | `per-page` | int | ➖ | 1..100 (default 20); `include=cv` da 1..30 |

  | `page` | int | ➖ | 1-indeksli |


  ### 🌳 Filter daraxti (`filter`)


  Rekursiv guruh: `{"conjunction":"and"|"or","conditions":[ <condition> | <group> ]}`.

  Condition: `{"field":"<key>","op":"<operator>","value":<value>}`.

  Maks chuqurlik 5, maks 50 condition. Operator ustunning `value_type`''iga mos
  kelishi shart (`/columns` dan oling). Misol:


  ```json

  {"conjunction":"and","conditions":[
    {"field":"age","op":"between","value":[21,45]},
    {"field":"sex","op":"eq","value":1},
    {"conjunction":"or","conditions":[
      {"field":"languages","op":"has_any_of","value":[1,2]},
      {"field":"education_level","op":"has_all_of","value":[3,4]}
    ]}
  ]}

  ```


  Operatorlar: `eq, ne, contains, not_contains, gt, gte, lt, lte, between,
  is_empty, is_not_empty, is_any_of, is_none_of, has_any_of, has_all_of,
  has_none_of, is_true, is_false`. Reference ustunlar **ID** bo''yicha filtrlanadi
  (i18n matn emas). `age`/sana ustunlari kalendar qiymat qabul qiladi.


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `items` | array | Nomzodlar |

  | `pagination` | object | `{page, page_size, total_count, page_count}` |


  Har bir element (avvalgi maydonlar saqlangan: `id`, `vacancy`, `match_score`,
  `pipeline_outcome`/`_label`, `cancel_reason`, `current_stage`/`_label`,
  `course_progress_percent`, `collected_amount`/`_currency`, `service_groups[]`).


  **`candidate` ildizi** (`full_name`/`phone`/`photo_url` yonida):


  | Field (candidate) | Type | Description |

  |---|---|---|

  | `age` | int \| null | Pasport `birth_date`''dan yosh; `null` — noma''lum |

  | `location` | string \| null | "Viloyat, Tuman" propiska satri (Manzil ustuni); `null` — noma''lum |


  **`candidate.cv`** — CV ustunlari (`age` va `location` bu yerda EMAS — ildizda):


  | Field (candidate.cv) | Type | Description |

  |---|---|---|

  | `cv_id` | int \| null | Tanlangan CV (ariza CV''si → fallback primary); `null` agar CV yo''q |

  | `cv_status` | string \| null | `draft` \| `active` |

  | `cv_completion_percent` | int \| null | 0..100 |

  | `sex` / `sex_label` | int \| null / string \| null | 1 = erkak, 2 = ayol |

  | `marital_status` / `_label` | string \| null | `single` \| `married` \| `divorced` \| `widowed` |

  | `had_visa_before` | bool | |

  | `foreign_passport_present` | bool | MVD aktiv zagran-pasport mavjudligi |

  | `nationality_id` / `citizenship_id` | int \| null | |

  | `registration_region` / `registration_district` | object \| null | `{id, name}` |

  | `education` | array | `[{id, name}]` — tanlangan CV''dagi ta''lim darajalari |

  | `experience_years` | int | Umumiy ish staji (yil) |

  | `languages` | array | `[{id, name, level_id, level_name}]` |

  | `license_has` / `license_count` | bool / int | Kasbiy litsenziya |

  | `driver_categories` | array | `["B","C",...]` |

  | `driver_certificates` | array | `[{type, label}]` |

  | `background` | object | `{criminal_record, insolvent_debtor, travel_ban, narcology, psychiatry}` — bool |

  | `last_workplace` | object \| null | Oxirgi ish joyi `{company_name, position, is_current, start_date, end_date}`; `null` — tajriba yo''q |

  | `last_visa` | object \| null | Oxirgi viza `{country_id, country_name, visa_type, visa_type_label, entry_date, exit_date}`; `null` — viza yo''q |

  | `documents` | array | Hujjat turlari `[{type, label}]` (noyob, `candidate_document` pool) |


  Yangi **filtrlanuvchi** ustunlar (`/columns`): `last_visa_country` (eng so''nggi viza
  mamlakati), `documents_type` (hujjat turlari), `last_workplace` (kompaniya nomi matn),
  `course` (kurs nomi bo''yicha matn qidiruv — qo''lda kiritilgan + MinVUZ qisqa-kurslar,
  `filter` daraxti orqali).


  `include=cv` berilganda element''ga `cv` (to''liq nested CvOutput) ham qo''shiladi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `400/401` | Token yo''q/eskirgan |

  | `403` | Tashkilotsiz aktyor |

  | `422` | `filter` JSON noto''g''ri, noma''lum ustun/operator, yoki sort qilib bo''lmaydigan ustun |

  '
