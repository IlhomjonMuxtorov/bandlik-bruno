docs: 'Global "Kandidatlar" ekrani — barcha vakansiyalar bo''yicha nomzodlar (default `id
  DESC` — eng yangi avval; `sort` orqali o''zgartiriladi).


  **Auth:** Admin barcha nomzodlarni ko''radi; tashkilot aktyori (XBA/rekruter)
  faqat o''z tashkiloti vakansiyalari (egasi yoki rekruteri) nomzodlari bilan
  cheklanadi.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | FISH (pasport ism/familiya/otasining ismi) yoki telefon/username bo''yicha qidiruv (ILIKE) |

  | `district` | string | ➖ | `candidates.registration_district` bo''yicha aniq moslik (free-text) |

  | `status` | string | ➖ | Pipeline outcome: `active` \| `completed` \| `cancelled` |

  | `stage` | string | ➖ | Derive qilingan bosqich: `awaiting` \| `training` \|
  `translation_apostil` \| `insurance` \| `visa` \| `xba` \| `logistics` \|
  `completed` \| `cancelled` |

  | `stage_category` | string | ➖ | Bosqich (Joriy status ikonkasi) kategoriyasi:
  `agency` \| `notarius` \| `insurance` \| `logistics` \| `visa` \|
  `translation_apostille` \| `training` \| `notary_translation` \|
  `notary_apostille` \| `notary_other` |

  | `stage_status` | string | ➖ | Bosqich holati: `pending` \| `awaiting_payment` \| `in_progress` \|
  `completed` \| `overdue` \| `payment_overdue` \| `skipped` |

  | `sort` | string | ➖ | `id` \| `accepted_at` \| `course_progress_percent` \|
  `collected_amount` (oldiga `-` qo''yilsa kamayish tartibida) |

  | `per-page` | int | ➖ | 1..100 (default 20) |

  | `page` | int | ➖ | 1-indeksli |


  > Eslatma: `stage_category` va `stage_status` birga yoki alohida berilishi mumkin —
  nomzodda mos bosqich mavjud bo''lsa (EXISTS) filtrlanadi.


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `items` | array | Nomzodlar |

  | `pagination` | object | `{page, page_size, total_count, page_count}` |


  Har bir element:


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Pipeline id |

  | `vacancy` | object | `{id, title, organization: {id, name}}` — topshirgan vakansiya + XBA tashkiloti |

  | `candidate` | object | `{id, full_name, phone, photo_url}` |

  | `match_score` | int \| null | Mos kelish darajasi (visa-survey, vakansiya davlati bo''yicha; `null` agar survey yo''q) |

  | `pipeline_outcome` / `_label` | string | `active` \| `completed` \| `cancelled` |

  | `cancel_reason` | string \| null | Drop Out sababi; faqat `cancelled` holatida, aks holda `null` |

  | `current_stage` / `_label` | string | `awaiting` \| `training` \| `translation_apostil` \| `insurance` \| `visa` \| `xba` \| `logistics` \| `completed` \| `cancelled` (joriy guruhdan derive qilinadi) |

  | `course_progress_percent` | int | 0..100 — Kurs progressi |

  | `collected_amount` / `_currency` | int / string | To''lagan summa |

  | `service_groups` | array | **Xizmat GURUHI = kuzatiladigan birlik**; Start→Pay→Execute→Complete→Confirm
  holatini guruh darajasida olib yuradi (eski top-level `stages[]` massiv olib tashlangan). Har biri:
  `{service_group_id, group_type, completion_flow, organization, responsible_user, services[], status,
  status_label, required_amount, funded_amount, awaiting_amount, discount_amount, currency, started,
  awaiting_start, fully_funded, is_current, started_at, payment_deadline_at, execution_deadline_at,
  completed_at, time_left_text, skipped, fully_completed, confirmed, can_start, can_complete,
  can_confirm, can_reject, last_attempt, documents[]}` (admin summalar ham **so''m**da — major unit).
  `responsible_user` = `{id, username, full_name, phone, photo_url}`; `organization` = `{id, name, type, type_label, logo_url}`;
  `documents[]` = guruh hujjatlari `{id, type, title, upload_file:{url, original_name, ...}, created_at, created_at_formatted}` |

  | `service_groups[].services` | array | Guruh ichidagi billing line-item''lar: `{id, service_id,
  category, category_label, service_name, amount, discount_amount, original_amount, currency, sort_order,
  course_progress_percent}`. `course_progress_percent` (int\|null) — `training` kursning jonli progressi (0–100); kursga bog''lanmagan line uchun `null` |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
