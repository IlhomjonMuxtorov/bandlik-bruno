info:
  name: 0. Candidates — Global Index (all vacancies)
  type: http
  seq: 0
http:
  method: GET
  url: '{{base_url}}/admin/candidates?q=&district=&status=&stage_category=&stage_status=&per-page=20'
  auth: inherit
params:
  query:
    - name: q
      value: ''
      enabled: true
    - name: district
      value: ''
      enabled: true
    - name: status
      value: ''
      enabled: true
    - name: stage_category
      value: ''
      enabled: true
    - name: stage_status
      value: ''
      enabled: true
    - name: per-page
      value: '20'
