http:
  method: POST
  url: '{{base_url}}/admin/xba-agents'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"XBA Tashkent Agent 1\",\n  \"brand_name\": \"XBA Tashkent Agent MChJ\",\n  \"legal_name\": \"XBA Tashkent Agent OOO\",\n  \"description\": \"Toshkent shahridagi XBA agentligi\",\n  \"license_number\": \"LIC-AGT-001-2026\",\n  \"region_id\": 10,\n  \"district_id\": 1001,\n  \"address\": \"Amir Temur ko'chasi 5\",\n  \"phone\": \"+998941202201\",\n  \"email\": \"info@xba-agent1.uz\",\n  \"website_url\": \"https://xba-agent1.uz\",\n  \"responsible_first_name\": \"Jasur\",\n  \"responsible_last_name\": \"Qodirov\",\n  \"login\": \"xba_agent1\",\n  \"password\": \"secret123\",\n  \"telegram_url\": \"https://t.me/xba_agent1\",\n  \"is_active\": 1,\n  \"license_file_ids\": [15],\n  \"logo_id\": 16,\n  \"parent_organization_id\": 3\n}"
