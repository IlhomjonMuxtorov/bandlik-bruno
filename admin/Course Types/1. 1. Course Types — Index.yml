info:
  name: 1. Course Types — Index
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/course-types'
  auth: inherit
docs: |-
  Kurs turlari ro'yxati (paginatsiya bilan). "Kurs turi" — admin tomonidan boshqariladigan ma'lumotnoma; kurs yaratishda `category_id` shu jadvaldan tanlanadi.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Nom bo'yicha qidiruv (JSONB `name` bo'yicha `ILIKE`). |
  | `is_active` | int (0\|1) | ➖ | Faolligi bo'yicha filtr. |
  | `page` | int | ➖ | Sahifa raqami (default `1`). |
  | `per-page` | int | ➖ | Sahifa hajmi (1–100, default `20`). |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |

  ### 📤 Response (`data.items[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Kurs turi ID |
  | `name` | string | `Accept-Language` bo'yicha lokalizatsiya qilingan nom |
  | `is_active` | bool | |
  | `sort_order` | int | |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
