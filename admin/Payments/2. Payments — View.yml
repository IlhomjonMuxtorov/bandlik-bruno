docs: 'Bitta Payment haqida to''liq ma''lumot — `callback_payload` (gateway raw response)
  bilan birga, debug uchun.


  **Auth:** `admin_token`.


  ### 📤 Response


  Payment DTO + `callback_payload` (jsonb). `amount` — **so''m**da (valyutaga mos
  major unit; DB tiyinda saqlaydi).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Admin emas |

  | `404` | Payment topilmadi |

  '
