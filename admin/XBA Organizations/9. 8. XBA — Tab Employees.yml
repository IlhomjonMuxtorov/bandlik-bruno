info:
  name: '8. XBA тАФ Tab: Employees'
  type: http
  seq: 9
http:
  method: GET
  url: '{{base_url}}/admin/xba/1/employees?per-page=20'
  auth: inherit
docs: |-
  XBA tashkilotning **Xodimlar** tabi.

  **Auth:** `admin_token`.

  ### ЁЯФО Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | тЮЦ | F.I.SH / rol / telefon bo'yicha qidiruv |
  | `is_active` | int (0\|1) | тЮЦ | |
  | `page`, `per-page` | int | тЮЦ | Pagination |

  ### ЁЯУд Response (`data.items[]` тАФ `OrganizationEmployeeOutputDTO`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `organization_id` | int | |
  | `user_id` | int \| null | Agar xodim alohida login olsa |
  | `full_name` | string | |
  | `phone` | string \| null | |
  | `role` | string | "XBA agenti 1", "XBA admin" va h.k. |
  | `language` | string | `uz` \| `ru` \| `en` (default `uz`) |
  | `profile_photo_url` | string \| null | To'liq URL (pre-upload qilingan rasm) |
  | `vacancies_count` | int | Xodim ishlagan distinct vakansiyalar (xizmat buyurtmalari orqali) |
  | `candidates_count` | int | Xodim xizmat ko'rsatgan distinct nomzodlar |
  | `joined_at` | int \| null | Unix timestamp |
  | `joined_at_formatted` | string \| null | `d.m.Y H:i` (Asia/Tashkent) |
  | `is_active` | bool | |
  | `created_at` / `updated_at` | int | |
  | `created_at_formatted` / `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  > `vacancies_count` / `candidates_count` butun tashkilot uchun bitta agregat
  > so'rovda hisoblanadi (N+1 yo'q) va `organization_service_order.employee_id`
  > orqali bog'lanadi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
