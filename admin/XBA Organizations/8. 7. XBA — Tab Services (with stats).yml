docs: 'XBA tashkilotning **Xizmatlari** tabi (rasmda ko''rinadigan jadval).


  Har bir xizmat uchun per-service aggregate stats — `jarayonda / bajarilgan / bekor
  qilingan / daromad` (UZS) — bitta query''da hisoblanadi (no N+1).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Xizmat nomi / izoh bo''yicha qidiruv |

  | `is_active` | int (0\|1) | ➖ | |

  | `page`, `per-page` | int | ➖ | Pagination |


  ### 📤 Response (`data.items[]` — `OrganizationServiceOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `organization_id` | int | |

  | `name` | string | "Hujjatlarni notarial tasdiqlash" |

  | `description` | string \| null | |

  | `price` | int | UZS so''mda |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `in_progress_count` | int | Status = `1` |

  | `completed_count` | int | Status = `2` |

  | `cancelled_count` | int | Status = `3` |

  | `revenue` | int | Yakunlangan buyurtmalar summasi (UZS) |

  | `created_at` | int | |

  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  | `updated_at` | int | |

  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
