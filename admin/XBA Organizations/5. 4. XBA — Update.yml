docs: 'Mavjud XBA tashkilotini yangilaydi. `application/json` — faqat o''zgartirmoqchi
  bo''lgan maydonlarni yuborish kifoya.


  > PHP `PUT + multipart` cheklangani uchun update **`POST`** orqali amalga oshiriladi.


  Login/parol yuborilsa bog''langan `User` ham yangilanadi. Yangi fayl ID yuborilganda
  eski `upload_file` FK yangilanadi.


  **Auth:** `admin_token`.


  ### 📥 Request Body


  Barcha maydonlar **ixtiyoriy** (faqat o''zgaradiganlarini yuboring). To''liq ro''yxat
  — `Create` endpointidagi kabi. Fayl maydonlari: `license_file_ids` (massiv), `logo_id`.


  > **Litsenziya fayllari (`license_file_ids`):** to''liq to''plam semantikasi. Yuborilgan
  massiv yangi to''plamga aylanadi — ro''yxatda qolmagan eski litsenziya fayllari o''chiriladi
  (orphan tozalanadi), yangilari biriktiriladi. `[]` yuborilsa barcha litsenziyalar olib
  tashlanadi. Maydon umuman yuborilmasa — mavjud litsenziyalar o''zgarmaydi.


  > **Avto-geokod (lat/lng):** koordinata yuborilmasa va `address` o''zgartirilsa (yoki
  tashkilotda koordinata umuman yo''q bo''lsa), backend yangi manzildan koordinatani qayta
  aniqlaydi. `latitude`/`longitude` aniq yuborilsa — qo''lda kiritilgan qiymat ustun turadi.


  > **`auto_approve_vacancies`** (bool, ➖) — XBA vakansiya timeout avto-tasdiq trust flagi
  override. Org birinchi vakansiyasi qo''lda tasdiqlangach avtomatik `true` bo''ladi; admin bu
  yerda qo''lda `true` (oldindan ishonchli) yoki `false` (avto-tasdiqni o''chirish) qila oladi.
  Yuborilmasa o''zgarmaydi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | XBA topilmadi (yoki id boshqa partner turida) |

  | `422` | Validatsiya xatosi |

  | `400` | Fayl ID topilmadi yoki `status=uploading` |

  > **Mas''ul shaxs sinxronizatsiyasi:** `responsible_first_name` / `responsible_last_name` / `responsible_middle_name` tahrirlansa, tashkilotning mas''ul shaxsi (admin xodim) ismi ham mos ravishda yangilanadi (ikki tomonlama).

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
