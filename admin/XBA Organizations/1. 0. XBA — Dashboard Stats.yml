info:
  name: 0. XBA — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/xba/stats'
  auth: inherit
docs: |-
  XBA modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta).

  **Auth:** `admin_token`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS). |
  | `this_month_candidates` | int | Joriy oyda XBA vakansiyalariga kelgan nomzodlar soni (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan XBA vakansiyalari soni. |
  | `refunded_amount` | int | Yakunlangan refund summasi (`transaction.type = REFUND`, `status = COMPLETED`). |

  > Faqat `type = XBA (1)` yozuvlari bo'yicha hisoblanadi. Vakansiyaga ega bo'lmagan
  > partner turlarida `this_month_candidates` / `this_month_vacancies` tabiiy `0` bo'ladi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
