info:
  name: 1. XBA ‚Äî Index
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/xba?per-page=20'
  auth: inherit
docs: |-
  XBA tashkilotlari ro'yxati (paginatsiya + filtrlar). Faqat `type = 1` yozuvlar qaytadi.

  **Auth:** `admin_token`.

  ### üîé Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ‚ûñ | Nom / brand / yuridik nom / litsenziya / mas'ul shaxs / telefon bo'yicha `ILIKE` qidiruv. |
  | `region_id` | int | ‚ûñ | Viloyat filtri. |
  | `district_id` | int | ‚ûñ | Tuman filtri. |
  | `is_active` | int (0\|1) | ‚ûñ | Faolligi bo'yicha filtr. |
  | `page` | int | ‚ûñ | Sahifa raqami. |
  | `per-page` | int | ‚ûñ | Sahifa hajmi (1‚Äì100). |

  ### üìã Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ‚úÖ | `Bearer {{ _.admin_token }}` |
  | `Accept-Language` | ‚ûñ | `uz` \| `ru` \| `en` |

  ### üì§ Response (`data.items[]` ‚Äî `OrganizationOutputDTO`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `type` | int | `1` (XBA) |
  | `type_label` | string | `"XBA"` |
  | `name` | string | Bitta tilli (registratsion nom) |
  | `brand_name` | string \| null | Brend nomi ("... MChJ") |
  | `legal_name` | string \| null | Yuridik nomi ("... OOO") |
  | `description` | string \| null | Tashkilot haqida |
  | `license_number` | string | Unique (`type` bo'yicha) |
  | `region` | object | `{id, name, is_active, sort_order}` |
  | `district` | object | `{id, region_id, name, is_active, sort_order}` |
  | `address` | string | |
  | `phone` | string | Call-center |
  | `email` | string \| null | |
  | `website_url` | string \| null | |
  | `responsible_person` | string | Bo'laklardan yig'ilgan yaxlit F.I.SH. |
  | `responsible_first_name` | string | Mas'ul shaxs ismi |
  | `responsible_last_name` | string | Mas'ul shaxs familiyasi |
  | `responsible_middle_name` | string \| null | Mas'ul shaxs otasining ismi / sharifi |
  | `login` | string \| null | XBA egasining login'i |
  | `license_files` | object[] | Litsenziya hujjatlari (0+). Har element: `id`, `uuid`, `url`, `original_name`, `file_size`, `file_kind`, `file_kind_icon_url` |
  | `logo_url` | string \| null | To'liq URL |
  | `telegram_url` | string \| null | |
  | `instagram_url` | string \| null | |
  | `facebook_url` | string \| null | |
  | `x_url` | string \| null | |
  | `is_active` | bool | |
  | `counts` | object | Har bir qator uchun agregat: `{agents_count, employees_count, vacancies_count, candidates_count, revenue}`. Joriy sahifa uchun batch hisoblanadi (N+1 yo'q). |
  | `created_at` | int | Unix timestamp |
  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
  | `updated_at` | int | Unix timestamp |
  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  > **`counts`** ‚Äî `agents_count` endi **haqiqiy son**: shu root XBA'ga tegishli **faol**
  > XBA agentlar soni (`organization.parent_organization_id = shu_id AND is_active`,
  > `OrganizationRepository::agentCountsForOrganizations()`). Faqat root XBA yozuvlarida
  > ma'noli ‚Äî bu ro'yxat (`GET /admin/xba`) allaqachon `root_only` bilan filtrlangan, agentlar
  > bu yerda ko'rinmaydi (ular uchun alohida `GET /admin/xba-agents`, `XBA Agents` papkasiga
  > qarang). `employees_count` = faol xodimlar (`organization_employee`, `is_active`);
  > `vacancies_count` = tashkilot vakansiyalari (root XBA'niki + barcha agentlarining, chunki
  > agentlik vakansiyasi ham `organization_id` = root XBA bilan saqlanadi); `candidates_count` =
  > tashkilot vakansiyalariga bog'langan distinct nomzodlar; `revenue` = yakunlangan servis
  > buyurtmalari summasi (so'm). Ro'yxat (Index) javobida har bir elementga qo'shiladi; detal
  > (`View`) javobida esa `stats` ichida kengaytirilgan ko'rsatkichlar bo'ladi (`counts` emas).

  > **`parent_organization_id`** (int\|null) va **`parent`** (`{id, name}`\|null) maydonlari
  > ham javobda bor, lekin bu ro'yxat faqat root XBA'larni qaytargani uchun ikkalasi ham har
  > doim `null` bo'ladi. Agentlarda esa (`GET /admin/xba-agents`) shu maydonlar to'ldirilgan
  > holda keladi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
