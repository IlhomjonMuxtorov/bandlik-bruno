info:
  name: 2. XBA — View
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/xba/1'
  auth: inherit
docs: |-
  Bitta XBA tashkiloti haqida to'liq ma'lumot + `stats` blok.

  **Auth:** `admin_token`.

  ### 📤 `stats` (detal sahifa kartochkalari)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Yakunlangan buyurtmalar summasi (UZS). |
  | `clients_count` | int | Tashkilot xizmatlaridan foydalangan distinct nomzodlar. |
  | `services_count` | int | Tashkilot xizmatlari soni. |
  | `employees_count` | int | Faol xodimlar soni (Xodimlar tab badge'i). |
  | `active_vacancies_count` | int | Arxivlanmagan vakansiyalar (Aktiv vakansiyalar tab badge'i). |
  | `archived_vacancies_count` | int | Arxivlangan vakansiyalar (Arxiv vakansiyalar tab badge'i). |
  | `this_month_candidates` | int | Joriy oyda tashkilot vakansiyalariga kelgan nomzodlar (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan vakansiyalar. |
  | `refunded_amount` | int | Tashkilotga tegishli yakunlangan refund summasi. |

  > **Ko'p tillilik:** faqat `description` xom `{uz, ru, en}` obyekt sifatida,
  > qo'shimcha `description_localized` esa joriy til (`Accept-Language`, fallback `uz`)
  > uchun string bilan qaytadi. `name`, `address`, `address2`, `state`, `postal_code` esa
  > **bitta tilli** oddiy string (tarjima qilinmaydi).

  > **Mas'ul shaxs:** `responsible_first_name` / `responsible_last_name` /
  > `responsible_middle_name` bo'laklari va ulardan yig'ilgan yaxlit `responsible_person` bilan qaytadi.

  > Cross-type isolation: agar `id` boshqa partner turidagi yozuvga tegishli bo'lsa — `404`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | XBA topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
