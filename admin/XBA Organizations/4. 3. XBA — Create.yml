info:
  name: 3. XBA — Create
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/admin/xba'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"XBA Tashkent\",\n  \"brand_name\": \"XBA Tashkent MChJ\",\n  \"legal_name\": \"XBA Tashkent OOO\",\n  \"description\": \"Toshkent shahar XBA tashkiloti\",\n  \"license_number\": \"LIC-001-2026\",\n  \"region_id\": 10,\n  \"district_id\": 1001,\n  \"address\": \"Toshkent sh., Yunusobod tumani, Amir Temur ko'chasi 1\",\n  \"phone\": \"+998941202200\",\n  \"email\": \"info@xba-tashkent.uz\",\n  \"website_url\": \"https://xba-tashkent.uz\",\n  \"responsible_person\": \"Kamolbek Sardorov\",\n  \"login\": \"xba_tashkent\",\n  \"password\": \"secret123\",\n  \"telegram_url\": \"https://t.me/xba_tashkent\",\n  \"instagram_url\": \"https://instagram.com/xba_tashkent\",\n  \"facebook_url\": \"https://facebook.com/xba_tashkent\",\n  \"x_url\": \"https://x.com/xba_tashkent\",\n  \"is_active\": 1,\n  \"license_file_id\": 10,\n  \"logo_id\": 11\n}"
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Yangi XBA tashkilotini yaratadi. `application/json` so'rov.

  Service quyidagilarni bir DB tranzaksiyasida bajaradi:
  1. Yangi `User` (`TYPE_PARTNER`, `STATUS_ACTIVE`) yaratiladi — `username = login`, `password_hash`.
  2. `organization` jadvalga `type = 1` bilan yozadi.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ✅ | XBA nomi (max 200) |
  | `brand_name` | string | ➖ | Brend nomi (max 200) |
  | `legal_name` | string | ➖ | Yuridik nomi (max 200) |
  | `description` | string | ➖ | Tashkilot haqida |
  | `license_number` | string | ✅ | `type + license_number` unique (max 64) |
  | `region_id` | int | ✅ | FK `region.id` — viloyat |
  | `district_id` | int | ✅ | FK `district.id` — tuman |
  | `address` | string | ✅ | Manzil (max 500) |
  | `phone` | string | ✅ | Call-center raqami (max 20) |
  | `email` | string | ➖ | Email |
  | `website_url` | string | ➖ | URL (https sxema avtomatik qo'shiladi) |
  | `responsible_person` | string | ✅ | Mas'ul shaxs F.I.SH. |
  | `login` | string | ✅ | Min 3 belgi. Unique. |
  | `password` | string | ✅ | Min 6 belgi |
  | `telegram_url` | string | ➖ | URL |
  | `instagram_url` | string | ➖ | URL |
  | `facebook_url` | string | ➖ | URL |
  | `x_url` | string | ➖ | URL |
  | `is_active` | bool (0\|1) | ➖ | Default `1` |
  | `license_file_id` | int | ➖ | `/admin/upload` orqali oldindan yuklangan fayl ID |
  | `logo_id` | int | ➖ | `/admin/upload` orqali oldindan yuklangan fayl ID |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  ### 📤 Response

  `201` — yaratilgan XBA `OrganizationOutputDTO` formatida.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi (`license_number` band, `region_id`/`district_id` topilmadi, parol qisqa va h.k.) |
  | `400` | `license_file_id` yoki `logo_id` topilmadi yoki `status=uploading` |
  | `401` | Token yo'q yoki yaroqsiz |
  | `403` | Super-admin emas |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
