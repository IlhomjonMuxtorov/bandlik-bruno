docs: 'Yangi XBA tashkilotini yaratadi. `application/json` so''rov.


  Service quyidagilarni bir DB tranzaksiyasida bajaradi:

  1. Yangi `User` (`TYPE_PARTNER`, `STATUS_ACTIVE`) yaratiladi — `username = login`,
  `password_hash`.

  2. `organization` jadvalga `type = 1` bilan yozadi.


  **Auth:** `admin_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `name` | object | ✅ | XBA nomi — ko''p tilli `{uz, ru, en}` (har biri max 200). Oddiy string ham qabul qilinadi → `{uz}`. |

  | `brand_name` | string | ➖ | Brend nomi (max 200) |

  | `legal_name` | string | ➖ | Yuridik nomi (max 200) |

  | `description` | object | ➖ | Tashkilot haqida — ko''p tilli `{uz, ru, en}` |

  | `license_number` | string | ✅ | `type + license_number` unique (max 64) |

  | `region_id` | int | ✅ | FK `region.id` — viloyat |

  | `district_id` | int | ✅ | FK `district.id` — tuman |

  | `address` | object | ✅ | Manzil — ko''p tilli `{uz, ru, en}` (har biri max 500) |

  | `phone` | string | ✅ | Call-center raqami (max 20) |

  | `email` | string | ➖ | Email |

  | `website_url` | string | ➖ | URL (https sxema avtomatik qo''shiladi) |

  | `responsible_person` | string | ✅ | Mas''ul shaxs F.I.SH. |

  | `login` | string | ✅ | Min 3 belgi. Unique. |

  | `password` | string | ✅ | Min 6 belgi |

  | `telegram_url` | string | ➖ | URL |

  | `instagram_url` | string | ➖ | URL |

  | `facebook_url` | string | ➖ | URL |

  | `x_url` | string | ➖ | URL |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `license_file_id` | int | ➖ | `/admin/upload` orqali oldindan yuklangan fayl ID
  |

  | `logo_id` | int | ➖ | `/admin/upload` orqali oldindan yuklangan fayl ID |


  > **Ko''p tillilik:** `name`, `description`, `address` — JSONB `{uz, ru, en}` obyekt sifatida
  saqlanadi. Obyekt yuborilsa o''sha tillar yoziladi; oddiy string yuborilsa `{uz}` ga
  o''raladi (orqaga moslik). Misol: `"name": { "uz": "XBA Toshkent", "ru": "XBA Ташкент",
  "en": "XBA Tashkent" }`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |


  ### 📤 Response


  `201` — yaratilgan XBA `OrganizationOutputDTO` formatida. Ko''p tilli maydonlar (`name`,
  `description`, `address`) xom `{uz, ru, en}` obyekt + joriy til (`Accept-Language`) uchun
  `name_localized` / `description_localized` / `address_localized` string bilan qaytadi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi (`license_number` band, `region_id`/`district_id` topilmadi,
  parol qisqa va h.k.) |

  | `400` | `license_file_id` yoki `logo_id` topilmadi yoki `status=uploading` |

  | `401` | Token yo''q yoki yaroqsiz |

  | `403` | Super-admin emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
