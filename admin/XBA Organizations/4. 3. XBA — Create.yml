docs: 'Yangi XBA tashkilotini yaratadi. `application/json` so''rov.


  Service quyidagilarni bir DB tranzaksiyasida bajaradi:

  1. Yangi `User` (`TYPE_PARTNER`, `STATUS_ACTIVE`) yaratiladi — `username = login`,
  `password_hash`.

  2. `organization` jadvalga `type = 1` bilan yozadi.


  **Auth:** `admin_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `name` | string | ✅ | XBA nomi — bitta tilli (max 200) |

  | `brand_name` | string | ➖ | Brend nomi (max 200) |

  | `legal_name` | string | ➖ | Yuridik nomi (max 200) |

  | `description` | object | ➖ | Tashkilot haqida — ko''p tilli `{uz, ru, en}` |

  | `license_number` | string | ✅ | `type + license_number` unique (max 64) |

  | `region_id` | int | ✅ | FK `region.id` — viloyat |

  | `district_id` | int | ✅ | FK `district.id` — tuman |

  | `latitude` | float | ➖ | Geo kenglik (lat) — barcha turlar uchun ixtiyoriy. Oraliq `-90`..`90`. |

  | `longitude` | float | ➖ | Geo uzunlik (lng) — barcha turlar uchun ixtiyoriy. Oraliq `-180`..`180`. |

  | `address` | string | ✅ | Manzil (1-qator) — bitta tilli (max 500) |

  | `address2` | string | ➖ | Manzil (2-qator) — kvartira / ofis va h.k. (max 500) |

  | `state` | string | ➖ | Shtat / viloyat / o''lka nomi (max 150) |

  | `postal_code` | string | ➖ | Pochta indeksi (max 30) |

  | `phone` | string | ✅ | Call-center raqami (max 20) |

  | `email` | string | ➖ | Email |

  | `website_url` | string | ➖ | URL (https sxema avtomatik qo''shiladi) |

  | `responsible_first_name` | string | ✅ | Mas''ul shaxs ismi (max 100) |

  | `responsible_last_name` | string | ✅ | Mas''ul shaxs familiyasi (max 100) |

  | `responsible_middle_name` | string | ➖ | Mas''ul shaxs otasining ismi / sharifi (max 100) |

  | `login` | string | ✅ | Min 3 belgi. Unique. |

  | `password` | string | ✅ | Min 6 belgi |

  | `telegram_url` | string | ➖ | URL |

  | `instagram_url` | string | ➖ | URL |

  | `facebook_url` | string | ➖ | URL |

  | `x_url` | string | ➖ | URL |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `license_file_id` | int | ➖ | `/admin/upload` orqali oldindan yuklangan fayl ID
  |

  | `logo_id` | int | ➖ | `/admin/upload` orqali oldindan yuklangan fayl ID |


  > **Ko''p tillilik:** faqat `description` — JSONB `{uz, ru, en}` obyekt sifatida
  saqlanadi. Obyekt yuborilsa o''sha tillar yoziladi; oddiy string yuborilsa `{uz}` ga
  o''raladi (orqaga moslik). `name` va `address` (hamda `address2` / `state` / `postal_code`)
  esa **bitta tilli** oddiy string — tarjima qilinmaydi.


  > **Avto-geokod (lat/lng):** `latitude`/`longitude` yuborilmasa, backend `address`
  matnidan (`state` + `postal_code` bilan boyitilgan) Yandex Geocoder orqali koordinatani
  avtomatik aniqlaydi. Ikkalasi ham yuborilsa — qo''lda kiritilgan qiymat ustun turadi
  (geokod ishlamaydi). Geokod so''rovi tashkilot turiga moslashtiriladi (O''zbek turlari:
  viloyat + tuman; xalqaro turlar: davlat + shahar konteksti). Kalit
  (`YANDEX_GEOCODER_KEY`) sozlanmagan yoki manzil topilmasa — koordinata `null` qoladi,
  saqlash baribir muvaffaqiyatli bo''ladi. Bu barcha tashkilot turlari uchun amal qiladi.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |


  ### 📤 Response


  `201` — yaratilgan XBA `OrganizationOutputDTO` formatida. `name`, `address`, `address2`,
  `state`, `postal_code` — bitta tilli string. Ko''p tilli `description` xom `{uz, ru, en}`
  obyekt + joriy til (`Accept-Language`) uchun `description_localized` string bilan qaytadi.
  Mas''ul shaxs `responsible_first_name` / `responsible_last_name` / `responsible_middle_name`
  bo''laklari va yaxlit `responsible_person` bilan qaytadi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi (`license_number` band, `region_id`/`district_id` topilmadi,
  parol qisqa va h.k.) |

  | `400` | `license_file_id` yoki `logo_id` topilmadi yoki `status=uploading` |

  | `401` | Token yo''q yoki yaroqsiz |

  | `403` | Super-admin emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
