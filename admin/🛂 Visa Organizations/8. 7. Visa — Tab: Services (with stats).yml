info:
  name: '7. Visa — Tab: Services (with stats)'
  type: http
  seq: 8
http:
  method: GET
  url: '{{base_url}}/admin/visa/1/services?per-page=20'
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Visa tashkilotning **Xizmatlari** tabi (rasmda ko'rinadigan jadval).

  Har bir xizmat uchun per-service aggregate stats — `jarayonda / bajarilgan / bekor qilingan / daromad` (UZS) — bitta query'da hisoblanadi (no N+1).

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Xizmat nomi / izoh bo'yicha qidiruv |
  | `is_active` | int (0\|1) | ➖ | |
  | `page`, `per-page` | int | ➖ | Pagination |

  ### 📤 Response (`data.items[]` — `OrganizationServiceOutputDTO`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `organization_id` | int | |
  | `name` | string | "Hujjatlarni notarial tasdiqlash" |
  | `description` | string \| null | |
  | `price` | int | UZS so'mda |
  | `is_active` | bool | |
  | `sort_order` | int | |
  | `in_progress_count` | int | Status = `1` |
  | `completed_count` | int | Status = `2` |
  | `cancelled_count` | int | Status = `3` |
  | `revenue` | int | Yakunlangan buyurtmalar summasi (UZS) |
  | `created_at` | int | |
  | `updated_at` | int | |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
