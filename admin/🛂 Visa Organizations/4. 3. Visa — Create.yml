info:
  name: 3. Visa — Create
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/admin/visa'
  body:
    type: multipartForm
    data:
    - name: name
      value: Visa Express
    - name: brand_name
      value: Visa Express MChJ
    - name: license_number
      value: VISA-001-2026
    - name: region_id
      value: '10'
    - name: district_id
      value: '1001'
    - name: address
      value: Toshkent sh., Mirzo Ulug'bek tumani
    - name: phone
      value: '+998901112233'
    - name: email
      value: info@visa-express.uz
    - name: website_url
      value: https://visa-express.uz
    - name: responsible_person
      value: Aziz Karimov
    - name: login
      value: visa_express
    - name: password
      value: secret123
    - name: is_active
      value: '1'
    - name: license_file
      type: file
      fileName: ''
    - name: logo
      type: file
      fileName: ''
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Yangi Viza tashkilotini yaratadi. Request body va xatti-harakat XBA `Create` bilan **bir xil** — yagona farq: organization `type = 5` saqlanadi va fayllar `@storage/web/source/organization/visa/*` ga yuklanadi.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  XBA `Create` endpointidagi kabi to'liq ro'yxat (`name`, `brand_name`, `legal_name`, `license_number`, `region_id`, `district_id`, `address`, `phone`, `email`, `website_url`, `responsible_person`, `login`, `password`, social URL'lar, `license_file`, `logo`).

  ### 📤 Response

  `201` — `OrganizationOutputDTO` (`type = 5`, `type_label = "Viza"`).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi |
  | `401` | Token yo'q |
  | `403` | Super-admin emas |

