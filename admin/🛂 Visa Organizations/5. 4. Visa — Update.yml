info:
  name: 4. Visa — Update
  type: http
  seq: 5
http:
  method: POST
  url: '{{base_url}}/admin/visa/1'
  body:
    type: multipartForm
    data:
    - name: phone
      value: '+998901112299'
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Mavjud Viza tashkilotini yangilaydi. `multipart/form-data` — faqat o'zgartirmoqchi bo'lgan maydonlarni yuborish kifoya. XBA `Update` bilan bir xil semantika.

  **Auth:** `admin_token`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Viza topilmadi |
  | `422` | Validatsiya xatosi |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
