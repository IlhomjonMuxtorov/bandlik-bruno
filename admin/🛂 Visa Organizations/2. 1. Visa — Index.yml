docs: |
  Viza tashkilotlari ro'yxati. Faqat `type = 5` yozuvlar qaytadi.

  **Auth:** `admin_token`.

  ### ЁЯФО Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `is_active`, `page`, `per-page`.

  ### ЁЯУд Response

  `data.items[]` тАФ `OrganizationOutputDTO` (XBA bilan bir xil shaklda, `type = 5`, `type_label = "Viza"`).

