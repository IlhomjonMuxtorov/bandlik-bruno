info:
  name: 3. Profile — Change Password
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/me/change-password'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"current_password\": \"oldSecret123\",\n  \"new_password\": \"newSecret123\",\n  \"confirm_password\": \"newSecret123\"\n}"
  auth: inherit
docs: |
  Joriy foydalanuvchining parolini o'zgartiradi. Barcha foydalanuvchi turlari uchun
  bir xil (parol `user` jadvalida saqlanadi).

  **Auth:** `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `current_password` | string | ✅ | Joriy parol (tekshiriladi) |
  | `new_password` | string | ✅ | Yangi parol — kamida **8** belgi |
  | `confirm_password` | string | ✅ | `new_password` bilan bir xil bo'lishi shart |

  ### ⚠️ Errors

  | Code | Field | Reason |
  |---|---|---|
  | `422` | `current_password` | Joriy parol noto'g'ri / bo'sh |
  | `422` | `new_password` | Bo'sh yoki 8 belgidan kam |
  | `422` | `confirm_password` | `new_password` bilan mos kelmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
