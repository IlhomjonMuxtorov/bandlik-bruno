info:
  name: 2. Postal Code Lookup
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/geocode/postal?postal_code=100000&country_code=UZ'
  auth: inherit
docs: |-
  Zip/pochta kodini geografik ma'lumotga (davlat, shahar, viloyat, koordinata)
  aylantiradi — **lokal GeoNames `postal_code` ma'lumotnoma jadvali** orqali
  (tashqi API chaqirilmaydi, tarmoq xatosi bo'lmaydi). Ish beruvchi (employer)
  tashkilot yaratish formasida maydonlarni avtomatik to'ldirish uchun
  ishlatiladi.

  > **Oldingi versiyadan farqi:** bu endpoint avval Yandex Geocoder orqali
  > ishlar edi (bitta natija, `address` maydoni to'ldirilgan). Endi manba —
  > oldindan import qilingan GeoNames jadvali; javob shakli **ro'yxatga**
  > o'zgardi (`data.results[]`), chunki bitta pochta kodi bir nechta joy nomiga
  > mos kelishi mumkin. `data.results[].address` endi doim `null`
  > (GeoNames'da ko'cha darajasidagi manzil yo'q) — maydon faqat eski
  > frontend kod bilan moslik uchun saqlangan.
  >
  > Ma'lumot bazasi oldindan `php yii postal-code-sync/import` bilan
  > to'ldirilgan bo'lishi kerak — jadval bo'sh bo'lsa, har qanday kod uchun
  > `results: []` qaytadi.
  >
  > Pochta kodlari global miqyosda unikal emas — `country_code` berilmasa,
  > bitta zip bir nechta davlatga tegishli natijalarni qaytarishi mumkin
  > (masalan Amerika va Yevropaning ko'plab shaharlarida bir xil raqamli
  > kodlar takrorlanadi). Bunday holatda frontend foydalanuvchiga tanlov
  > ko'rsatishi kerak (`results` massividan birini tanlash).

  **Auth:** `admin_token` (Bearer).

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `postal_code` | string | ✅ | Qidiriladigan zip/pochta kodi (masalan `"100000"`). Bo'sh bo'lsa `422` qaytadi. |
  | `country_code` | string | ➖ | ISO 3166-1 alpha-2 davlat kodi (masalan `"UZ"`) — berilsa, natijalar shu davlat bilan filtrlanadi (odatda 1 ta natija qaytadi). Berilmasa — barcha davlatlar bo'yicha qidiriladi, bir nechta natija qaytishi mumkin. |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Har bir natijadagi `country_name` / `city_name` shu tilda lokalizatsiya qilinadi. Default: `uz`. |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `success` | bool | Doim `true` (natija topilmasa ham — bo'sh `results` xato hisoblanmaydi). |
  | `data.postal_code` | string | So'ralgan pochta kodi, o'zgarishsiz qaytariladi (ro'yxat darajasida, har bir natija ichida ham takrorlanadi). |
  | `data.results` | array | GeoNames'dan topilgan mos kelgan qatorlar ro'yxati. Hech narsa topilmasa — bo'sh massiv (`[]`), xato emas. |
  | `data.results[].country_id` | int \| null | Qator import qilinganda `country_code` bo'yicha bog'langan `country` jadvali id'si. Mos davlat topilmagan bo'lsa `null`. |
  | `data.results[].country_name` | string \| null | `Accept-Language` bo'yicha lokalizatsiya qilingan davlat nomi. `country_id` `null` bo'lsa — `null`. |
  | `data.results[].city_id` | int \| null | GeoNames joy nomi (`place_name`) bo'yicha, davlat ichida best-effort qidirilib topilgan `city` jadvali id'si. **Ko'pincha `null`** — faqat `country_id` topilgan va inglizcha joy nomi bazadagi shahar nomiga aniq mos kelgan holatda to'ldiriladi. |
  | `data.results[].city_name` | string \| null | Lokalizatsiya qilingan shahar nomi. `city_id` `null` bo'lsa — `null`. |
  | `data.results[].state` | string \| null | GeoNames'ning viloyat/provinsiya nomi (`admin1_name`), xom holda — ma'lumotnoma jadvaliga bog'lanmagan. Topilmasa `null`. |
  | `data.results[].place_name` | string | GeoNames'dagi shahar/joy nomi, manba tilida (odatda inglizcha yoki mahalliy transliteratsiya). Lokalizatsiya qilinmaydi — `city_name`dan farqli. |
  | `data.results[].address` | null | **Har doim `null`.** GeoNames'da ko'cha darajasidagi manzil yo'q; maydon faqat eski (Yandex asosidagi) javob formati bilan moslik uchun saqlangan. |
  | `data.results[].postal_code` | string | Ushbu qatorning pochta kodi (so'ralgan kod bilan bir xil). |
  | `data.results[].latitude` | float \| null | GeoNames qator markazining kengligi (`-90..90`). Ma'lumotlar to'plamida yo'q bo'lsa `null`. |
  | `data.results[].longitude` | float \| null | GeoNames qator markazining uzunligi (`-180..180`). Ma'lumotlar to'plamida yo'q bo'lsa `null`. |
  | `message` | string | Doim bo'sh qator (`""`). |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki muddati o'tgan. |
  | `403` | Admin `ownProfileManage` ruxsati yo'q. |
  | `422` | `postal_code` query parametri yuborilmagan yoki bo'sh. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
