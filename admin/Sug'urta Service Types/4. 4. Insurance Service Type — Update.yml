docs: 'Mavjud sug''urta xizmat turini tahrirlaydi. Faqat berilgan maydonlar yangilanadi
  (partial update).


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  Yaratish (Create) bilan bir xil maydonlar, lekin barchasi optional. `code` ham
  o''zgartirilishi mumkin, lekin unique cheklov saqlanadi.


  ### 📤 Response


  `200` — `InsuranceServiceTypeOutputDTO`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Xizmat turi topilmadi |

  | `422` | Validatsiya xatolari (Create bilan bir xil) |

  '
