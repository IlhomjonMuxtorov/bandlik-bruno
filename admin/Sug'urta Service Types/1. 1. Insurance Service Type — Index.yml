docs: 'Global sug''urta xizmat turlari katalogi (KASKO, Tibbiy, Sayohat (VZR), Hayot,
  вА¶). Admin boshqaradi. Skrinshotdagi "Sug''urta xizmatlari" formasi va vakansiya
  yaratishdagi narxlash dropdown''ini to''ldirish uchun ishlatiladi.


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`), agar `sort` yuborilmagan bo''lsa.


  **Auth:** `admin_token`.


  ### рЯФО Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | вЮЦ | `code` yoki `name->>''uz''/''ru''/''en''` bo''yicha ILIKE |

  | `is_active` | int (0\|1) | вЮЦ | |

  | `page`, `per-page` | int | вЮЦ | Pagination (`per-page` 1вАУ300, default 20). |

  | `sort` | string | вЮЦ | Berilmasa вАФ A-Z. `sort_order` вАФ eski tahririy tartib.
  Ruxsat etilgan: `id` \| `sort_order` \| `code` \| `created_at` (har biri `-` prefiks
  bilan kamayuvchi bo''lishi mumkin). |


  ### рЯУ§ Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `code` | string | `kasko`, `medical`, `travel`, `life` |

  | `name` | object | `{uz, ru, en}` JSONB |

  | `name_localized` | string | `Accept-Language` header bo''yicha tanlangan til |

  | `description` | object | `{uz, ru, en}` JSONB (ixtiyoriy) |

  | `description_localized` | string | |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` / `updated_at` | int | |

  | `created_at_formatted` / `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
