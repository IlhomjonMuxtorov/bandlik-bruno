http:
  method: POST
  url: '{{base_url}}/admin/vacancy-requirements'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": {\n    \"uz\": \"Polsha tili (A2)\",\n    \"ru\": \"Польский язык (A2)\",\n    \"en\": \"Polish language (A2)\"\n  },\n  \"description\": {\n    \"uz\": \"Minimal A2 darajasi talab qilinadi\",\n    \"ru\": \"Требуется минимальный уровень A2\",\n    \"en\": \"Minimum A2 level required\"\n  }\n}"
  auth: inherit
docs: |
  Yangi vakansiya talabi yaratadi.

  **Auth:** Faqat `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | object | ✅ | `{ uz, ru, en }` — max 500 belgi |
  | `description` | object | ➖ | `{ uz, ru, en }` — max 2000 belgi |

  ### 📤 Response (201)

  Yaratilgan element: `{ id, name, description, created_at, updated_at }`

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Admin emas |
  | `422` | `name` bo'sh yoki noto'g'ri format |