info:
  name: 2. Employee — Create
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/admin/xba-employees'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"firstname\": \"Rustam\",\n  \"lastname\": \"Qodirov\",\n  \"patronymic\": null,\n  \"phone\": \"+998942030000\",\n  \"role\": \"xba_manager\",\n  \"login\": \"rustam.qodirov\",\n  \"password\": \"Secret123\",\n  \"language\": \"uz\",\n  \"profile_photo_file_id\": null,\n  \"region_id\": 1,\n  \"district_id\": 101,\n  \"address\": \"Toshkent sh., Chilonzor, 5-uy\",\n  \"passport_series\": \"AA\",\n  \"passport_number\": \"1234567\",\n  \"email\": \"xodim@example.uz\",\n  \"birth_date\": \"1990-01-15\",\n  \"is_active\": 1\n}"
  auth: inherit
docs: |-
  Yangi xodim qo'shadi. `joined_at` yuborilmasa hozirgi vaqt sifatida o'rnatiladi.
  Joylashuv maydonlaridan (`region_id`, `district_id`) hech biri yuborilmasa —
  tashkilotning joylashuvi avtomatik olinadi (bittasi yuborilsa meros ishlamaydi).
  `district_id` tanlangan `region_id`ga tegishli bo'lishi tekshiriladi.

  **Login (ixtiyoriy):** `login` + `password` ikkalasi yuborilsa, xodim uchun login
  hisobi (`user`, type = Employee, status = Active) yaratiladi va biriktiriladi.
  Ikkalasi ham yuborilmasa — xodim loginsiz oddiy yozuv bo'lib qoladi (keyin Update
  orqali login berish mumkin). Login berilgan va `role` catalog roli (`xba_*`)
  bo'lsa — shu chaqiruvning o'zida rol biriktiriladi (`employeeRoleAssign` huquqi
  talab qilinadi). Xodim haqiqatda tizimga kirishi uchun: login + faol XBA tashkiloti
  + biriktirilgan rol kerak (phase-1 faqat XBA tizimga kira oladi).

  **Auth:** `admin_token`.

  ### 📥 Request Body (JSON)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ✅ | XBA `organization.id` (type = 1) |
  | `login` | string\|null | ➖ | Login (username), ≥ 3 belgi, unique. `password` bilan birga yuborilsa login hisobi yaratiladi. `null` — login berilmaydi |
  | `password` | string\|null | ➖ | Login paroli, ≥ 8 belgi. `login` bilan birga yuboriladi. `null` — login berilmaydi |
  | `firstname`  | string       | ✅ | Ism. Max 100 |
  | `lastname`   | string       | ✅ | Familya. Max 100 |
  | `patronymic` | string\|null | ➖ | Otasining ismi. Max 100. `null` — yo'q yoki noma'lum |
  | `phone` | string | ➖ | Max 20 |
  | `address` | string\|null | ➖ | Erkin matnli manzil. Max 255. `null` — kiritilmagan |
  | `passport_series` | string\|null | ➖ | UZ pasport seriyasi, masalan `AA`. Max 2. `null` — kiritilmagan |
  | `passport_number` | string\|null | ➖ | UZ pasport raqami, masalan `1234567`. Max 7. `null` — kiritilmagan |
  | `email` | string\|null | ➖ | Xodim elektron pochtasi. Max 255. `null` — kiritilmagan |
  | `birth_date` | string\|null | ➖ | Tug'ilgan sana `YYYY-MM-DD`. `null` — kiritilmagan |
  | `role` | string | ✅ | Login berilganda — catalog roli (`xba_manager` \| `xba_operator` \| `xba_viewer`), shu chaqiruvda biriktiriladi (`employeeRoleAssign` kerak). Loginsiz — erkin yorliq (max 50). `admin` qiymati taqiqlangan |
  | `language` | string | ➖ | `uz` \| `ru` \| `en`. Default `uz` |
  | `profile_photo_file_id` | int | ➖ | Pre-upload qilingan rasm `upload_file.id` (READY holatda) |
  | `region_id` | int | ➖ | Viloyat `region.id`. Yuborilmasa tashkilotniki olinadi |
  | `district_id` | int | ➖ | Tuman `district.id`. Yuborilmasa tashkilotniki olinadi |
  | `joined_at` | int | ➖ | Unix timestamp. Default = hozir |
  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  ### 📤 Response

  `201` — `OrganizationEmployeeOutputDTO` (`language`, `profile_photo_url`,
  `region` / `district` obyektlari — `{id, name: {uz, ru, en}}` yoki `null`,
  `vacancies_count`, `candidates_count` bilan).
  Shuningdek `passport_series`, `passport_number`, `email`, `birth_date` maydonlari ham qaytariladi (string\|null).

  Javobda `login` (username \| null) va `has_login` (bool) maydonlari ham bo'ladi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi: `profile_photo_file_id` READY emas; `login` < 3 belgi yoki band; `password` < 8 belgi; `login`/`password` faqat bittasi yuborilgan |
  | `403` | `role` catalog roli bilan berilgan, lekin `employeeRoleAssign` huquqi yo'q |

  > **Mas'ul shaxs himoyasi:** `role` = `admin` qiymati bilan xodim yaratib bo'lmaydi — tashkilot mas'ul shaxsi (egasi) faqat tashkilot yaratilganda tayinlanadi va doimiy (`403`).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
