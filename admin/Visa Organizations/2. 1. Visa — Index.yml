info:
  name: 1. Visa — Index
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/visa?per-page=20'
  auth: inherit
docs: |-
  Viza tashkilotlari ro'yxati. Faqat `type = 5` yozuvlar qaytadi.

  **Auth:** `admin_token`. Ruxsat: `partnerOrgView` (XBA: xba_admin/xba_manager/xba_viewer)
  yoki superadmin/admin.

  ### 🔎 Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `is_active`, `page`, `per-page`.

  ### 📤 Response

  `data.items[]` — `OrganizationOutputDTO` (`type = 5`, `type_label = "Viza"`).

  | Field | Type | Description |
  |---|---|---|
  | `counts` | object | Faqat `visaView` ruxsati (superadmin/admin) borlarga chiqadi — `{employees_count, clients_count, revenue}`. `partnerOrgView`gina bo'lgan XBA foydalanuvchi uchun bu kalit javobda UMUMAN CHIQMAYDI (null emas — field yo'q). |
  | `counts.employees_count` | int | Faol xodimlar soni ("Xodimlar"). Faqat `visaView` bilan. |
  | `counts.clients_count` | int | Xizmat ko'rsatilgan distinct kandidatlar ("Mijozlar"). Faqat `visaView` bilan. |
  | `counts.revenue` | int | Yakunlangan buyurtmalar summasi, UZS ("Daromadi"). Faqat `visaView` bilan. |

  Har element `created_by` / `created_by_name` / `updated_by` / `updated_by_name` ham qaytaradi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
