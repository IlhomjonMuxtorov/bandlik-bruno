info:
  name: 2. Visa — View
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/visa/1'
  auth: inherit
docs: |-
  Bitta Viza tashkiloti haqida to'liq ma'lumot + `stats`.

  **Auth:** `admin_token`. Ruxsat: `partnerOrgView` (XBA: xba_admin/xba_manager/xba_viewer)
  yoki superadmin/admin.

  ### 📤 Response (`data` — `OrganizationOutputDTO`)

  Asosiy maydonlardan tashqari audit maydonlari ham qaytadi (detal sahifasidagi
  "Kim tomonidan yaratilgan" uchun):

  | Field | Type | Description |
  |---|---|---|
  | `created_by` | int \| null | Yaratuvchi foydalanuvchi `id`. |
  | `created_by_name` | string \| null | Yaratuvchi ismi (admin profil F.I.SH, aks holda login/email). |
  | `updated_by` | int \| null | Oxirgi tahrirlovchi `id`. |
  | `updated_by_name` | string \| null | Oxirgi tahrirlovchi ismi. |
  | `stats` | object | Faqat `visaView` ruxsati (superadmin/admin) borlarga to'liq obyekt qaytadi. `partnerOrgView`gina bo'lgan XBA foydalanuvchi uchun bu kalit javobda UMUMAN CHIQMAYDI (null emas — field yo'q). |

  `stats` obyektida `total_revenue`, `clients_count`, `services_count`, `employees_count`,
  `active_vacancies_count`, `archived_vacancies_count`, `this_month_candidates`,
  `this_month_vacancies`, `refunded_amount` kabi detal kartalari bo'ladi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Viza tashkilot topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
