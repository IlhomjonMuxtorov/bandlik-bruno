info:
  name: 0. Visa — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/visa/stats'
  auth: inherit
docs: |-
  Visa modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta).

  **Auth:** `admin_token`. Ruxsat: `visaView` (faqat superadmin/admin). XBA rollari
  (`xba_admin`/`xba_manager`/`xba_viewer`, `partnerOrgView`) bu endpointga kira olmaydi — `403`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi, UZS ("Umumiy daromad"). |
  | `this_month_candidates` | int | Joriy oyda shu tur vakansiyalariga kelgan nomzodlar (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan shu tur vakansiyalari. |
  | `refunded_amount` | int | Yakunlangan refund summasi (`transaction.type = REFUND`, `status = COMPLETED`) ("Qaytarilgan to'lovlar"). |
  | `this_month_revenue` | int | Joriy oyda yakunlangan buyurtmalar summasi, UZS ("Shu oydagi daromad"). |
  | `holding_amount` | int | Shu tur tashkilot hamyonlaridagi eskrou (`wallet.hold_balance`) summasi, UZS ("Holdingdagi summa"). |

  > Faqat `type = VISA (5)` yozuvlari bo'yicha hisoblanadi. Vakansiyaga ega bo'lmagan
  > turlarda `this_month_candidates` / `this_month_vacancies` `0` bo'lishi mumkin.
  > `this_month_revenue` va `holding_amount` xizmat-tipdagi tashkilotlar (Visa/Notarius/...)
  > pul kartalari uchun; faqat to'ldirilganda qaytadi.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
