docs: |
  Mavjud "Konferensiya va seminarlar" yozuvini yangilaydi. Body Create bilan bir xil.

  **Auth:** `applicationCvManage`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana yoki `link` formati noto'g'ri, `end_date` < `start_date` |
  | `403` | `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV / yozuv topilmadi |
