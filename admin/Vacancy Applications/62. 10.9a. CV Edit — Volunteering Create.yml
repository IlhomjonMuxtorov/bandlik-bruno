info:
  name: 10.9a. CV Edit — Volunteering Create
  type: http
  seq: 62
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/cv/volunteering'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Red Crescent volunteer\",\n  \"location\": \"Toshkent\",\n  \"start_date\": \"01.05.2023\",\n  \"end_date\": \"01.08.2023\",\n  \"description\": \"Helped organize donation drives.\",\n  \"file_id\": 107\n}"
  auth: inherit
docs: |
  Arizaga biriktirilgan CV'ning "Ko'ngillilik" bo'limiga yangi yozuv qo'shadi.
  Bu yozuvlar har doim nomzod tomonidan kiritilgan (MVD manbasi yo'q) — hammasi
  tahrirlanadi.
  **Auth:** `applicationCvManage`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ✅ | Ko'ngillilik faoliyati / tashkilot nomi (sarlavha). |
  | `location` | string | ➖ | Joylashuv (erkin matn). `null` — kiritilmagan. |
  | `start_date` | date | ➖ | Boshlangan sana. Format: `DD.MM.YYYY`. `null` — kiritilmagan. |
  | `end_date` | date | ➖ | Tugagan sana. Format: `DD.MM.YYYY`; `start_date`dan katta yoki teng bo'lishi kerak. `null` — kiritilmagan. |
  | `description` | string | ➖ | Tavsif (erkin matn). `null` — kiritilmagan. |
  | `file_id` | int | ➖ | Avval `/mobile/upload` orqali yuklangan (`status=ready`) faylning ID'si. `null` — fayl biriktirilmagan / o'zgartirilmaydi. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date`, yoki `file_id` mavjud bo'lmagan / tayyor bo'lmagan faylga ishora qiladi |
  | `403` | Boshqa tashkilot / `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
