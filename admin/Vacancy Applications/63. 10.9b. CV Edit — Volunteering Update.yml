docs: |
  Mavjud "Ko'ngillilik" yozuvini yangilaydi. Body Create bilan bir xil.

  **Auth:** `applicationCvManage`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date`, yoki `file_id` mavjud bo'lmagan / tayyor bo'lmagan faylga ishora qiladi |
  | `403` | `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV / yozuv topilmadi |
