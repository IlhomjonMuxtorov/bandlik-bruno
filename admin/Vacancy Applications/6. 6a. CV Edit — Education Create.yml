info:
  name: 6a. CV Edit — Education Create
  type: http
  seq: 6
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/cv/education'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"education_level_id\": 3,\n  \"institution_name\": \"INHA University\"\
      ,\n  \"faculty\": \"Axborot texnologiyalari\",\n  \"specialty\": \"Axborot\
      \ xavfsizligi\",\n  \"start_date\": \"01.09.2022\",\n  \"end_date\": \"30.06.2026\"\
      \n}"
  auth: inherit
docs: 'Arizaga biriktirilgan CV''ga yangi (qo''lda kiritilgan) ta''lim yozuvi qo''shadi.
  Yangi yozuv har doim manual — MVD orqali sinxronlanmaydi.


  **Auth:** `applicationCvManage` — faqat `xba_admin` / `xba_manager`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `education_level_id` | int | ✅ | Reference: education-levels |

  | `institution_name` | string | ✅ | O''quv muassasasi |

  | `faculty` | string | ➖ | Fakultet |

  | `specialty` | string | ➖ | Mutaxassislik |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | `null` — hozir o''qiyapti |

  | `diploma_file_id` | int | ➖ | `/admin/upload` orqali yuklangan diplom fayl ID |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Ariza / CV topilmadi |

  | `403` | Boshqa tashkilot yoki `applicationCvManage` yo''q |

  | `403` | Ariza faol emas (`applied`/`reviewed`/`accepted` emas) — CV endi
  tahrirlanmaydi |

  | `400` | Validatsiya |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
