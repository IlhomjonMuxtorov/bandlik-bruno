info:
  name: 10.8b. CV Edit — Recommendation Update
  type: http
  seq: 60
http:
  method: PATCH
  url: '{{base_url}}/admin/vacancy-applications/1/cv/recommendation/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"John Smith\",\n  \"role\": \"Senior Manager\",\n  \"phone\": \"+998901234567\",\n  \"email\": \"john.smith@example.com\",\n  \"description\": \"Worked together for 2 years at ACME Corp.\",\n  \"file_id\": 106\n}"
  auth: inherit
docs: |
  Mavjud "Tavsiyalar" yozuvini yangilaydi. Body Create bilan bir xil.

  **Auth:** `applicationCvManage`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, `email` formati noto'g'ri, yoki `file_id` mavjud bo'lmagan / tayyor bo'lmagan faylga ishora qiladi |
  | `403` | `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV / yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
