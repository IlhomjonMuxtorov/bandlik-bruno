info:
  name: 3. Application — Update Status
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/status'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"status\": \"accepted\",\n  \"notes\": \"Kuchli nomzod, kursga yo'naltirildi\"\
      \n}"
  auth: inherit
docs: 'Ariza statusini o''zgartiradi:


  | To | Required | Side effect |

  |---|---|---|

  | `reviewed` | — | `reviewed_at` + `reviewed_by` o''rnatiladi |

  | `accepted` | `notes` ➖ | **`vacancy_candidate` yozuvi yaratiladi**
  (status=`pending`), `decided_at` + `decided_by` o''rnatiladi |

  | `rejected` | `reason` ✅ | `rejection_reason`, `decided_at` + `decided_by` saqlanadi |


  > Aktor — so''rovni yuborgan foydalanuvchi (`Authorization` token egasi): admin yoki
  chat orqali qaror qabul qilgan XBA xodimi. `accepted` / `rejected` da `reviewed_by`
  bo''sh bo''lsa, o''sha aktor bilan to''ldiriladi.


  > Terminal statusdagi arizalar (`accepted` / `rejected`) qayta o''zgartirilmaydi.


  **Auth:** Admin yoki vakansiya egasi.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `status` | string | ✅ | `reviewed` \| `accepted` \| `rejected` |

  | `reason` | string | ⚠️ | `rejected` uchun majburiy |

  | `notes` | string | ➖ | `accepted` uchun pipeline yozuviga ko''chiriladi |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | `rejected` uchun `reason` bo''sh (field-level xato) |

  | `400` | Allaqachon hal qilingan / noto''g''ri status |

  | `403` | Boshqa tashkilot |

  | `409` | Nomzodda allaqachon aktiv (qabul qilingan) offer mavjud — yangi offer yaratilmaydi
  |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
