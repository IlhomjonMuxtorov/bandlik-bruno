info:
  name: 1. Applications — Index (per vacancy)
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/vacancies/1/applications'
  auth: inherit
docs: 'Vakansiyaga topshirilgan barcha arizalar (`applied_at DESC`).


  **Auth:** Admin yoki vakansiya egasi.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `status` | string | ➖ | `applied` \| `reviewed` \| `accepted` \| `rejected` |

  | `per-page` | int | ➖ | 1..100 |


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `items` | array | Ariza ro''yxati (`{id, vacancy, candidate, cv, status, status_label,
  hotel_preference, applied_at}`) |

  | `candidate` | object | `{id, full_name, phone, photo_url, location}` — `location`
  = `"Viloyat, Tuman"` (ro''yxat manzilidan) |

  | `experience_years` / `experience_months` / `experience_total_months` | int | Ariza
  CV''sidan hisoblangan umumiy ish tajribasi |

  | `match_score` | int \| null | Moslik darajasi (% ). Hozircha har doim `null` —
  keyinchalik ulanadi |

  | `pagination` | object | `{page, page_size, total_count, page_count}` |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
