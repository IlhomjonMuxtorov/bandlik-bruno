info:
  name: 9a. CV Edit — Course Create
  type: http
  seq: 15
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/cv/course'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"course_name\": \"Ingliz tili kursi\",\n  \"institution_name\":\
      \ \"IELTS Center\",\n  \"start_date\": \"01.01.2023\",\n  \"end_date\": \"\
      01.06.2023\",\n  \"certificate_number\": \"12345\"\n}"
  auth: inherit
docs: 'Arizaga biriktirilgan CV''ga yangi (qo''lda kiritilgan) qisqa muddatli
  kurs yozuvi qo''shadi. Yangi yozuv har doim manual.


  **Auth:** `applicationCvManage` — faqat `xba_admin` / `xba_manager`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `course_name` | string | ✅ | Kurs nomi |

  | `institution_name` | string | ✅ | O''quv markazi |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | |

  | `certificate_number` | string | ➖ | Sertifikat raqami |

  | `certificate_file_id` | int | ➖ | Sertifikat fayli (`/admin/upload`) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Ariza / CV topilmadi |

  | `403` | Boshqa tashkilot yoki `applicationCvManage` yo''q |

  | `403` | Ariza faol emas (`applied`/`reviewed`/`accepted` emas) — CV endi
  tahrirlanmaydi |

  | `400` | Validatsiya |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
