    data: "{\n  \"name\": \"Deep learning for low-resource languages\",\n  \"year\": \"15.06.2024\",\n  \"link\": \"https://example.org/paper/123\",\n  \"authors\": \"A. Karimov, B. Yusupova\",\n  \"journal_name\": \"International Journal of NLP\",\n  \"volume_issue_pages\": \"3-jild, 2-son, 105-150 bet\",\n  \"publisher\": \"Springer\",\n  \"description\": \"Peer-reviewed research paper.\",\n  \"file_id\": 105\n}"
