info:
  name: 10.2a. CV Edit — Creative Work Create
  type: http
  seq: 41
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/cv/creative-work'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Short film — \\\"City Lights\\\"\",\n  \"start_date\": \"01.03.2025\",\n  \"end_date\": \"15.06.2025\",\n  \"description\": \"Wrote, shot and edited a 12-minute short film.\"\n}"
  auth: inherit
docs: |
  Arizaga biriktirilgan CV'ning "Ijodiy ishlar" bo'limiga yangi yozuv qo'shadi.
  Bu yozuvlar har doim nomzod tomonidan kiritilgan (MVD manbasi yo'q) — hammasi
  tahrirlanadi.
  **Auth:** `applicationCvManage`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ✅ | Ijodiy ish nomi. |
  | `start_date` | date | ➖ | Boshlangan sana. Format: `DD.MM.YYYY`. `null` — kiritilmagan. |
  | `end_date` | date | ➖ | Tugagan sana. Format: `DD.MM.YYYY`; `start_date`dan katta yoki teng bo'lishi kerak. `null` — kiritilmagan. |
  | `description` | string | ➖ | Tavsif (erkin matn). `null` — kiritilmagan. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date` |
  | `403` | Boshqa tashkilot / `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
