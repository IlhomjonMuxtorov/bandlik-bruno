  name: 10.5b. CV Edit — Membership Update
  type: http
  seq: 51
http:
  method: PATCH
  url: '{{base_url}}/admin/vacancy-applications/1/cv/membership/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"IEEE Member\",\n  \"start_date\": \"01.01.2024\",\n  \"end_date\": null,\n  \"is_ongoing\": true,\n  \"description\": \"Active member of the IEEE Computer Society.\",\n  \"file_id\": 103\n}"
  auth: inherit
docs: |
  Mavjud "Tarmoqlar va a'zoliklar" yozuvini yangilaydi. Body Create bilan bir xil.

  **Auth:** `applicationCvManage`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | `name` bo'sh, sana formati noto'g'ri, `end_date` < `start_date` (agar `is_ongoing=false`), yoki `file_id` mavjud bo'lmagan / tayyor bo'lmagan faylga ishora qiladi |
  | `403` | `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV / yozuv topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
