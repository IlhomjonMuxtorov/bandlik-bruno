info:
  name: 10a. CV Edit — Extra Create
  type: http
  seq: 35
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/cv/extra/conference'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": \"Apple development\",\n  \"location\": \"Parij\",\n  \"start_date\": \"12.10.2026\",\n  \"end_date\": \"14.10.2026\",\n  \"description\": \"Build a complete iOS app.\",\n  \"link\": \"https://developer.apple.com/tutorials\"\n}"
  auth: inherit
docs: |
  Arizaga biriktirilgan CV'ga ixtiyoriy bo'lim yozuvi qo'shadi. Bo'lim turi
  URL'dagi `<section>` segmentida. Bu yozuvlar har doim nomzod tomonidan
  kiritilgan (MVD manbasi yo'q) — hammasi tahrirlanadi.

  **Auth:** `applicationCvManage`.

  ### 🔎 Path

  | Segment | Description |
  |---|---|
  | `<section>` | `certificate` \| `conference` \| `creative_work` \| `digital_skill_test` \| `hobby` \| `award` \| `membership` \| `project` \| `publication` \| `recommendation` \| `social_activity` \| `volunteering` |

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ✅ | Yozuv nomi |
  | `location` | string | ➖ | Joylashuv (erkin matn) |
  | `start_date` | date | ➖ | `DD.MM.YYYY` |
  | `end_date` | date | ➖ | `DD.MM.YYYY`; `start_date` dan katta yoki teng |
  | `description` | string | ➖ | Tavsif |
  | `link` | string | ➖ | To'liq havola (URL) |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Noma'lum `<section>` yoki validatsiya |
  | `403` | Boshqa tashkilot / `applicationCvManage` yo'q / ariza faol emas |
  | `404` | Ariza / CV topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
