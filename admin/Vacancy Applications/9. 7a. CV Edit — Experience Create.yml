info:
  name: 7a. CV Edit — Experience Create
  type: http
  seq: 9
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-applications/1/cv/experience'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"company_name\": \"ABC LLC\",\n  \"position\": \"Sotuv menejeri\"\
      ,\n  \"start_date\": \"01.02.2021\",\n  \"end_date\": \"01.02.2023\",\n  \"\
      achievements\": \"Oylik savdoni 20% ga oshirdi\"\n}"
  auth: inherit
docs: 'Arizaga biriktirilgan CV''ga yangi (qo''lda kiritilgan) ish tajribasi
  yozuvi qo''shadi. Yangi yozuv har doim manual.


  **Auth:** `applicationCvManage` — faqat `xba_admin` / `xba_manager`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `company_name` | string | ✅ | Kompaniya nomi |

  | `position` | string | ✅ | Lavozim |

  | `start_date` | date | ✅ | `DD.MM.YYYY` |

  | `end_date` | date | ➖ | `null` — hozir ishlamoqda |

  | `achievements` | string | ➖ | Erkin matn yutuqlar |

  | `recommendation_file_id` | int | ➖ | Tavsiyanoma fayli (`/admin/upload`) |


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Ariza / CV topilmadi |

  | `403` | Boshqa tashkilot yoki `applicationCvManage` yo''q |

  | `403` | Ariza faol emas (`applied`/`reviewed`/`accepted` emas) — CV endi
  tahrirlanmaydi |

  | `400` | Validatsiya |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
