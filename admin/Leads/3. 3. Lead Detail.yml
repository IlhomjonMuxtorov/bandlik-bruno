info:
  name: 3. Lead Detail
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/leads/1'
  auth: inherit
params: {}
headers:
  - name: Accept-Language
    value: uz
    enabled: true
docs: >
  Bitta lead (foydalanuvchi) to'liq profili ‚Äî "Foydalanuvchi" detal sahifasi.
  `id` = **user id**.


  > Soft-deleted (tombstone) leadlar ham ochiladi (ilgari `404` qaytar edi) ‚Äî admin
  > ketgan nomzod profili + arizalarini ko'ra oladi.


  Profil mobil CV profili bilan bir xil shaklda (`CvOutputDTO`). Lead'da primary CV
  bo'lsa ‚Äî to'liq profil; CV bo'lmasa ("Yangi") ‚Äî minimal profil: shaxsiy/pasport/
  manzil + candidate-owned bo'limlar (oila, tillar, vizalar, haydovchilik), CV-scoped
  bo'limlar (`education`, `experience`, `documents`, `courses`) bo'sh massiv.


  **Auth:** `access_token` (admin).


  ### üìã Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Accept-Language` | ‚ûñ | `uz` \| `ru` \| `en`. Default `uz` |


  ### üì§ Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `lead` | object | `{id, candidate_id, full_name, phone, photo_url, funnel_status, funnel_status_label, source, source_label, created_at, created_at_formatted}` |

  | `profile` | object \| null | `CvOutputDTO` shakli: `header, personal, birth_place, passport, registration, education[], experience[], family, languages[], documents[], driver, courses[], visas[], contact`. Candidate yo'q bo'lsa `null` |
  | `profile.registration` | object | Yashash manzili (MVD `MVDAddressInfoService`). Yuqori darajada **joriy** manzil ‚Äî faol vaqtinchalik ro'yxat, aks holda doimiy propiska: `{ type, country, region, district, mahalla, street, street_type, address, cadastre, postal_code, registration_date, valid_until, full_address, permanent, temporary[] }`. To'liq ta'rif: `Vacancy Candidates Pipeline ‚Üí 5. Candidate Profile` |


  > **BREAKING:** `profile.birth_place` endi qat'iy MVD-derived: `{ address, country }`.
  > Eski `region`/`district` kalitlari OLIB TASHLANDI ‚Äî MVD ularni ajratmaydi. `address`
  > kaliti QOLADI, lekin qiymati boshqa manbadan: endi MVD `birthplace` erkin matni
  > (masalan tuman nomi), avvalgi "nomzod kiritgan ko'cha/uy manzili" EMAS (`null` ‚Äî
  > MVD topilmagan); `country` ‚Äî tug'ilgan davlat, `country.gcp_code` orqali
  > lokalizatsiya, bo'lmasa xom MVD qiymati (`null` ‚Äî noma'lum).
  >
  > `profile.passport.citizenship` (yangi) ‚Äî `{ id, name }`. `id` ‚Äî GCP davlat kodi
  > (`country.gcp_code`); `null` ‚Äî MVD kod bermagan yoki davlat mos kelmagan. `name` ‚Äî
  > `country` relation orqali lokalizatsiya, bo'lmasa xom MVD fuqarolik qiymati.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
