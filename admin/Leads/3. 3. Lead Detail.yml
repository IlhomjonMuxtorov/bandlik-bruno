info:
  name: 3. Lead Detail
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/leads/1'
  auth: inherit
params: {}
headers:
  - name: Accept-Language
    value: uz
    enabled: true
docs: >
  Bitta lead (foydalanuvchi) to'liq profili — "Foydalanuvchi" detal sahifasi.
  `id` = **user id**.


  Profil mobil CV profili bilan bir xil shaklda (`CvOutputDTO`). Lead'da primary CV
  bo'lsa — to'liq profil; CV bo'lmasa ("Yangi") — minimal profil: shaxsiy/pasport/
  manzil + candidate-owned bo'limlar (oila, tillar, vizalar, haydovchilik), CV-scoped
  bo'limlar (`education`, `experience`, `documents`, `courses`) bo'sh massiv.


  **Auth:** `access_token` (admin).


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default `uz` |


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `lead` | object | `{id, candidate_id, full_name, phone, photo_url, funnel_status, funnel_status_label, source, source_label, created_at, created_at_formatted}` |

  | `profile` | object \| null | `CvOutputDTO` shakli: `header, personal, birth_place, passport, registration, education[], experience[], family, languages[], documents[], driver, courses[], visas[], contact`. Candidate yo'q bo'lsa `null` |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
