docs: >
  "Foydalanuvchilar" (super admin) / "Leadlar" (admin) ekrani â€” nomzod-tipidagi
  (`user.type = candidate`) real leadlar. **Anonim guestlar** (`status = Guest` â€”
  ilova ochgan, lekin passport/profil to'ldirmagan) ro'yxatdan **chiqariladi**.
  To'liq funnel: ariza bermagandan (Yangi) to rad etilgan / boshqa ishga
  o'tganlargacha. "Kandidatlar" (`GET /admin/candidates`) shu ro'yxatning *qabul
  qilingan* (pipeline) qismi.


  Funnel "Holati" mavjud ma'lumotdan **hisoblanadi** (saqlanmaydi).


  **Auth:** `access_token` (admin).


  ### đź”Ž Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | âž– | FISH (pasport ism/familiya/otasining ismi) yoki `username` / `phone` (ILIKE) |

  | `status` | string | âž– | Funnel tab: `new` \| `applied` \| `in_interview` \| `confirmed` \| `moved_to_other_job` \| `rejected` |

  | `country_id` | int | âž– | Lead bog'langan vakansiya davlati |

  | `organization_id` | int | âž– | Lead bog'langan vakansiya XBA tashkiloti (egasi yoki rekruteri) |

  | `gender` | int | âž– | `1` = erkak, `2` = ayol (`passport_data.sex`) |

  | `age_from` | int | âž– | Minimal yosh (`user.birth_date` bo'yicha) |

  | `age_to` | int | âž– | Maksimal yosh |

  | `experience` | string | âž– | Ish tajribasi guruhi: `none` (tajriba yo'q) \| `1-3` \| `3-6` \| `6+` (yil) |

  | `education_level_ids` | int[] | âž– | Ta'lim darajasi id'lari. `?education_level_ids=2,3` yoki `education_level_ids[]=2` |

  | `language_ids` | int[] | âž– | Til id'lari |

  | `language_level_ids` | int[] | âž– | Til darajasi id'lari (`language_ids` bilan birga) |

  | `driver_categories` | string[] | âž– | Haydovchilik kategoriyalari: `A` \| `B` \| `C` \| `D` \| `E` \| `BE` \| `CE` \| `DE` \| `TM` \| `TB`. `?driver_categories=B,C` |

  | `last_visa_country_id` | int | âž– | Eng so'nggi viza (`entry_date` max) mamlakati bo'yicha filtr (`candidate_visa`) |

  | `last_workplace` | string | âž– | Ish joyi kompaniya nomi bo'yicha matn qidiruv (ILIKE, `candidate_experience.company_name`) |

  | `applications_from` | int | âž– | Minimal arizalar soni (`>= N`). `0` â€” filtrlamaydi |

  | `applications_to` | int | âž– | Maksimal arizalar soni (`<= N`); arizasiz leadlar ham kiradi |

  | `filter` | string (JSON) | âž– | **Airtable filter tree** â€” rekursiv `{conjunction: and\|or, conditions: [{field, op, value} \| <nested group>]}`. Ruxsat etilgan `field`/`op`/`options` uchun `GET /admin/leads/columns`. Yuqoridagi flat paramlar bilan **AND** birikadi. Noto'g'ri field/op â†’ `422` |

  | `sort` | string | âž– | Katalog ustunlari bo'yicha multi-sort: `col:asc\|desc` vergul bilan. Faqat `sortable` ustunlar: `full_name`, `age`, `sex`, `marital_status`, `created_at`, `applications_count`. Misol: `sort=age:desc,full_name:asc`. Default: `id DESC` |

  | `per-page` | int | âž– | 1..100 (default 20); `page` 1-indeksli |


  > **Filter tree** kandidatlar sahifasi bilan bir xil mexanizm. Profil ustunlari
  (yosh, jins, ta'lim, til, viza, backgroundâ€¦) candidatdan olinadi; **opportunity**
  ustunlari (`vacancy_id`, `country_id`, `organization_id`) = "lead'ning birorta
  arizasi/pipeline'i mos"; `funnel_status` = hisoblangan bosqich; `match_score` =
  birorta surveyed davlat foizi â‰Ą N. Ustunlar reyestri: `GET /admin/leads/columns`.


  > Lookup ro'yxatlari: `GET /admin/countries`, `/admin/xba`, `/admin/languages`,
  `/admin/education-levels`, `/admin/language-levels`, `/admin/driver-license-categories`.


  ### đź“¤ Response (`data`)


  `items[]` + `pagination {page, page_size, total_count, page_count}`. Har element:


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | User id |

  | `candidate` | object | `{id, full_name, phone, photo_url, location, age, education, last_workplace, last_visa}` (`id` `null` bo'lishi mumkin) |

  | `candidate.age` | int \| null | Yosh (pasport `birth_date` bo'yicha); `null` â€” noma'lum |

  | `candidate.education` | object[] | Primary CV ta'lim darajalari `[{id, name}]` (noyob) |

  | `candidate.last_workplace` | object \| null | Oxirgi ish joyi `{company_name, position, is_current, start_date, end_date}`; `null` â€” tajriba yo'q |

  | `candidate.last_visa` | object \| null | Oxirgi viza `{country_id, country_name, visa_type, visa_type_label, entry_date, exit_date}`; `null` â€” viza yo'q |

  | `vacancy` | object \| null | Vakil vakansiya `{id, title}` |

  | `current_application_id` | int \| null | Vakil ariza id â€” single/bulk amal va Chat uchun |

  | `applications_count` | int | Nomzodning barcha arizalari soni (har qanday status) |

  | `experience_years` / `_months` / `_total_months` | int | Primary CV bo'yicha tajriba |

  | `match_score` | int \| null | Vakil vakansiya davlatiga viza-survey moslik foizi; `null` â€” survey yo'q. **Eslatma:** `match_score` **filtri** esa *birorta* surveyed davlat â‰Ą N (ko'rsatilgan qiymatdan farqli) |

  | `funnel_status` / `_label` | string | Hisoblangan "Holati" |

  | `source` / `_label` | string \| null | `web` \| `telegram` \| `instagram` \| `tanish` \| `other` |

  | `created_at` / `_formatted` | int / string | |


  ### âš ď¸Ź Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo'q / eskirgan |

  | `403` | Admin emas |

  | `422` | Noto'g'ri `filter` (JSON xato, noma'lum `field`, ustun tipiga mos kelmaydigan `op`) yoki noto'g'ri `sort` ustuni |
