docs: >
  "Foydalanuvchilar" (super admin) / "Leadlar" (admin) ekrani — nomzod-tipidagi
  (`user.type = candidate`) real leadlar. **Anonim guestlar** (`status = Guest` —
  ilova ochgan, lekin passport/profil to'ldirmagan) ro'yxatdan **chiqariladi**.
  To'liq funnel: ariza bermagandan (Yangi) to rad etilgan / boshqa ishga
  o'tganlargacha. "Kandidatlar" (`GET /admin/candidates`) shu ro'yxatning *qabul
  qilingan* (pipeline) qismi.


  Funnel "Holati" mavjud ma'lumotdan **hisoblanadi** (saqlanmaydi).


  **Auth:** `access_token` (admin).


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | FISH (pasport ism/familiya/otasining ismi) yoki `username` / `phone` (ILIKE) |

  | `status` | string | ➖ | Funnel tab: `new` \| `applied` \| `in_interview` \| `confirmed` \| `moved_to_other_job` \| `rejected` |

  | `country_id` | int | ➖ | Lead bog'langan vakansiya davlati |

  | `organization_id` | int | ➖ | Lead bog'langan vakansiya XBA tashkiloti (egasi yoki rekruteri) |

  | `gender` | int | ➖ | `1` = erkak, `2` = ayol (`passport_data.sex`) |

  | `age_from` | int | ➖ | Minimal yosh (`user.birth_date` bo'yicha) |

  | `age_to` | int | ➖ | Maksimal yosh |

  | `experience` | string | ➖ | Ish tajribasi guruhi: `none` (tajriba yo'q) \| `1-3` \| `3-6` \| `6+` (yil) |

  | `education_level_ids` | int[] | ➖ | Ta'lim darajasi id'lari. `?education_level_ids=2,3` yoki `education_level_ids[]=2` |

  | `language_ids` | int[] | ➖ | Til id'lari |

  | `language_level_ids` | int[] | ➖ | Til darajasi id'lari (`language_ids` bilan birga) |

  | `driver_categories` | string[] | ➖ | Haydovchilik kategoriyalari: `A` \| `B` \| `C` \| `D` \| `E` \| `BE` \| `CE` \| `DE` \| `TM` \| `TB`. `?driver_categories=B,C` |

  | `sort` | string | ➖ | `id` \| `created_at` (default `id DESC`) |

  | `per-page` | int | ➖ | 1..100 (default 20); `page` 1-indeksli |


  > Lookup ro'yxatlari: `GET /admin/countries`, `/admin/xba`, `/admin/languages`,
  `/admin/education-levels`, `/admin/language-levels`, `/admin/driver-license-categories`.


  ### 📤 Response (`data`)


  `items[]` + `pagination {page, page_size, total_count, page_count}`. Har element:


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | User id |

  | `candidate` | object | `{id, full_name, phone, photo_url, location}` (`id` `null` bo'lishi mumkin) |

  | `vacancy` | object \| null | Vakil vakansiya `{id, title}` |

  | `current_application_id` | int \| null | Vakil ariza id — single/bulk amal va Chat uchun |

  | `experience_years` / `_months` / `_total_months` | int | Primary CV bo'yicha tajriba |

  | `match_score` | int \| null | Hozircha `null` |

  | `funnel_status` / `_label` | string | Hisoblangan "Holati" |

  | `source` / `_label` | string \| null | `web` \| `telegram` \| `instagram` \| `tanish` \| `other` |

  | `created_at` / `_formatted` | int / string | |
settings:
