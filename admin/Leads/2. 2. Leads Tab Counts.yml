info:
  name: 2. Leads Tab Counts
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/leads/counts?q=&country_id=&organization_id='
  auth: inherit
params:
  query:
    - name: q
      value: ''
      enabled: true
    - name: country_id
      value: ''
      enabled: true
    - name: organization_id
      value: ''
      enabled: true
docs: >
  Funnel tab badge sanoqlari — "Holati" tablari uchun raqamlar. `q` /
  `country_id` / `organization_id` filtrlari hisobga olinadi; `status` tabning
  o'zi e'tiborga olinmaydi.


  Olti funnel tab sanog'i jami `all` ga teng bo'ladi (bosqichlar o'zaro istisno
  qiluvchi, to'liq qoplaydigan bo'lim).


  **Auth:** `access_token` (admin).


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `all` | int | Barcha leadlar (filtr bilan) |

  | `yangi` | int | Hali ariza bermagan |

  | `ariza_topshirgan` | int | Arizasi `applied` |

  | `suhbatda` | int | Arizasi `reviewed` |

  | `tasdiqlangan` | int | Faol (terminal bo'lmagan) pipeline'da |

  | `boshqa_ishga_otgan` | int | Pipeline'da `departed` |

  | `rad_etilgan` | int | Arizasi `rejected` yoki pipeline terminal-fail |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
