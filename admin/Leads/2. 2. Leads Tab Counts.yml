info:
  name: 2. Leads Tab Counts
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/leads/counts?q=&country_id=&organization_id='
  auth: inherit
params:
  query:
    - name: q
      value: ''
      enabled: true
    - name: country_id
      value: ''
      enabled: true
    - name: organization_id
      value: ''
      enabled: true
docs: >
  Funnel tab badge sanoqlari — "Holati" tablari uchun raqamlar. `q` /
  `country_id` / `organization_id` filtrlari hisobga olinadi; `status` tabning
  o'zi e'tiborga olinmaydi.


  Olti funnel tab sanog'i jami `all` ga teng bo'ladi (bosqichlar o'zaro istisno
  qiluvchi, to'liq qoplaydigan bo'lim). `all` va funnel tablar faqat **tirik**
  leadlarni sanaydi; soft-deleted tombstone'lar bularga **kirmaydi** — ular alohida
  `deleted` tally'da (ro'yxatda esa badge bilan ko'rinadi).


  **Auth:** `access_token` (admin).


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `all` | int | Barcha leadlar (filtr bilan) |

  | `new` | int | Hali ariza bermagan |

  | `applied` | int | Arizasi `applied` |

  | `in_interview` | int | Arizasi `reviewed` |

  | `confirmed` | int | Faol (terminal bo'lmagan) pipeline'da |

  | `moved_to_other_job` | int | Pipeline'da `departed` |

  | `rejected` | int | Arizasi `rejected` yoki pipeline terminal-fail |

  | `deleted` | int | Soft-deleted (tombstone) hisoblar soni — `all`/funnel'dan **tashqarida** |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
