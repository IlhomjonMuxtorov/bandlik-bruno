info:
  name: 3. Forgot Password
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/auth/forgot-password'
  headers:
  - name: Content-Type
    value: application/json
  - name: Accept-Language
    value: uz
  body:
    type: json
    data: "{\n  \"email\": \"user@example.com\"\n}"
  auth:
    type: none
docs: |-
  Email orqali parolni tiklash so'rovi. Har doim bir xil muvaffaqiyat javobini
  qaytaradi (foydalanuvchi mavjudligini oshkor qilmaydi — enumeration yo'q).
  Tiklash havolasi **faqat** faol va **email'i tasdiqlangan** (`email_verified_at`
  to'ldirilgan) hisobga yuboriladi. Havola `queueNotification` navbati orqali
  jo'natiladi va `{ADMIN_PANEL_URL}/{lang}/auth/reset-password?token=...` shakliga ega.

  Token bir martalik, `password_reset` maqsadi bilan `user_email_token` jadvalida
  **sha256 hash** ko'rinishida saqlanadi (raw token faqat email'da). Amal muddati
  30 daqiqa. Rate-limit: har email uchun soatiga 5, har IP uchun soatiga 15.

  **Auth:** talab qilinmaydi.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `email` | string | ✅ | Hisob email manzili. Noto'g'ri formatli/mavjud bo'lmagan email ham bir xil `200` beradi |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Email va javob tili. Default: `uz` |

  ### 📤 Response

  `200` — doimiy xabar: `If the email exists, a reset link has been sent.`
  (`data: null`). Email topilgan-topilmaganidan qat'i nazar bir xil.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | `email` noto'g'ri formatda (lekin oqim baribir sirni oshkor qilmaydi) |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
