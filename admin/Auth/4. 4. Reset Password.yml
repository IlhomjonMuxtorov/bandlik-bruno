info:
  name: 4. Reset Password
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/admin/auth/reset-password'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"token\": \"<raw-token-from-email>\",\n  \"password\": \"newSecret8\",\n  \"password_repeat\": \"newSecret8\"\n}"
  auth:
    type: none
docs: |-
  Email havolasidagi bir martalik tokenni iste'mol qilib, yangi parol o'rnatadi.
  Muvaffaqiyatdan keyin token `used_at` bilan bekor qilinadi (qayta ishlatib
  bo'lmaydi) va foydalanuvchining barcha refresh tokenlari revoke qilinadi (qayta
  to'liq login talab qilinadi; amaldagi access JWT o'z ≤24h muddati tugaguncha
  ishlaydi — ADR-235 pariteti). Hodisa audit log'ga yoziladi (`password_reset`).

  **Auth:** talab qilinmaydi (token o'zi avtorizatsiya).

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `token` | string | ✅ | Email'dagi havoladan olingan raw token |
  | `password` | string | ✅ | Yangi parol. Min 8 belgi |
  | `password_repeat` | string | ✅ | Parol takrori; `password` bilan bir xil bo'lishi shart |

  ### 📤 Response

  `200` — `Password has been reset. Please sign in with your new password.` (`data: null`).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Token yo'q/noto'g'ri/muddati tugagan/allaqachon ishlatilgan; `password` < 8; `password_repeat` mos emas |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
