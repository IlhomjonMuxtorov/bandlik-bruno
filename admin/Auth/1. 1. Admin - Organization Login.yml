info:
  name: 1. Admin / Organization Login
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url}}/admin/auth/login'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"login\": \"admin\",\n  \"password\": \"secret\"\n}"
  auth: inherit
docs: |
  Admin paneliga login/parol orqali kirish. Muvaffaqiyatli bo'lsa JWT qaytaradi.

  Qabul qilinadigan foydalanuvchi turlari:

  | `type` | Kim |
  |:---:|---|
  | `1` | `TYPE_ADMIN` — Super-admin |
  | `5` | `TYPE_PARTNER` — Tashkilot (XBA / Notarius / Logistika / Sug'urta / Visa) |

  > Tashkilot uchun `username` + `password` `OrganizationService::create()` ichida `dto->login` / `dto->password` qiymatlaridan yaratiladi va shu yerda ishlatiladi.

  **Auth:** talab qilinmaydi.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `login` | string | ✅ | Username yoki email |
  | `password` | string | ✅ | Parol |

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `token` | string | JWT — keyingi so'rovlarda `Bearer {token}` |

  > ✨ **Auto-save:** muvaffaqiyatli login `afterResponseScript` orqali tokenni `admin_token` environment variable'iga avtomatik yozadi. Boshqa endpointlar `{{ _.admin_token }}` orqali shu tokenni ishlatadi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi yoki login/parol noto'g'ri |
  | `403` | Foydalanuvchi `TYPE_ADMIN` yoki `TYPE_PARTNER` emas |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const token = body?.data?.token;
        if (token) {
          bru.setEnvVar('admin_token', token);
          console.log('admin_token saved');
        } else {
          console.warn('Login response did not contain data.token');
        }
