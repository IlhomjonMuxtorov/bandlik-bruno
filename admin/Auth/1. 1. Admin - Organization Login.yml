info:
  name: 1. Admin - Organization Login
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url}}/admin/auth/login'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"login\": \"admin\",\n  \"password\": \"secret\"\n}"
  auth:
    type: none
docs: |
  Admin paneliga login/parol orqali kirish. Muvaffaqiyatli bo'lsa JWT qaytaradi.

  **Kirish RBAC asosida** (ADR 0009). Kirish qarori `user.type` emas, balki ikki shart bilan
  (`AuthService::adminPanelDenialReason()`):
  1. `TYPE_PARTNER` (tashkilot egasi) yoki `TYPE_EMPLOYEE` bo'lsa — tashkilotning
     `OrganizationType`'i login whitelist'ida bo'lishi shart (`OrganizationType::canLogIn()`).
     **3-bosqich (joriy) holatda barcha tashkilot turlari ochiq**: XBA, Ish beruvchi,
     Rekruter, Viza, Notarius, Logistika, Sug'urta, O'quv markazi.
  2. Foydalanuvchida kamida bitta **RBAC roli** biriktirilgan bo'lishi shart
     (`rbac_auth_assignment` bo'sh emas).

  | `type` | Kim | Kirish |
  |:---:|---|---|
  | `1` | `TYPE_ADMIN` — Super-admin | ✅ `superadmin` roli biriktirilgan bo'lsa |
  | `6` | `TYPE_EMPLOYEE` — Tashkilot sub-xodimi (`organization_employee`) | ✅ **barcha tashkilot turlari** ochiq (login endi majburiy — har bir xodim login hisobi bilan yaratiladi) + roli bo'lsa |
  | `5` | `TYPE_PARTNER` — Tashkilot egasi | ✅ **barcha tashkilot turlari** (XBA, Ish beruvchi, Rekruter, Viza, Notarius, Logistika, Sug'urta, O'quv markazi) + roli bo'lsa |

  > **Endpoint o'zgarmadi.** Yangi endpoint yo'q — barcha tashkilot turlari (Viza,
  > Notarius, Logistika, Sug'urta, O'quv markazi) egalari ham xuddi shu
  > `POST /admin/auth/login` orqali kiradi. Frontendda alohida "partner login"
  > oqimi kerak emas.

  > **Parolni unutdingizmi?** `Forgot Password` → `Reset Password` (email orqali).
  > Google bilan kirish uchun `Google Login`.

  > **Lockout eslatmasi.** Kirish RBAC roliga bog'liq. Agar `migrate/up` ishlagan
  > (`rbac_auth_*` jadvallari bor), lekin `rbac-migrate/up` ishlamagan bo'lsa — hech kimda rol
  > yo'q va **hamma** (jumladan `admin`) `403` oladi. Yechim: `php console/yii rbac-migrate/up`
  > (mavjud adminlarga `superadmin` avtomatik biriktiriladi), yoki
  > `php console/yii rbac/assign superadmin <login>`.
  >
  > Tashkilot egasi uchun `username` + `password` `OrganizationService::create()` ichida
  > yaratiladi; egaga mos katalog roli (`xba_admin` / `employer_admin` / `recruiter_admin` /
  > `visa_admin` / `notarius_admin` / `logistics_admin` / `insurance_admin` /
  > `educational_center_admin`) ham o'sha yerda biriktiriladi. Xodim login'i esa
  > `POST /admin/{type}-employees` orqali yaratiladi — `login`/`password` endi
  > **majburiy** (pastga qarang: har bir turdagi Employees papkasidagi `Create`).

  **Auth:** talab qilinmaydi.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `login` | string | ✅ | Username yoki email |
  | `password` | string | ✅ | Parol |

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `token` | string | JWT — keyingi so'rovlarda `Bearer {token}` |

  > ✨ **Auto-save:** muvaffaqiyatli login `afterResponseScript` orqali tokenni `admin_token` environment variable'iga avtomatik yozadi. Boshqa endpointlar `{{ _.admin_token }}` orqali shu tokenni ishlatadi.

  ### ⚠️ Errors

  | Code | Reason | Message |
  |---|---|---|
  | `422` | Validatsiya xatosi yoki login/parol noto'g'ri | — |
  | `403` | Tashkilot turi hali whitelist'da emas (`OrganizationType::canLogIn()` — hozircha barcha mavjud turlar `true`, faqat kelajakdagi yangi org turi uchun qoldirilgan) | `Your organization does not have admin panel access yet.` |
  | `403` | RBAC roli biriktirilmagan (rol yo'q / `rbac-migrate/up` ishlamagan) | `Your account has no access role assigned. Ask a Super Admin to grant one.` |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const token = body?.data?.token;
        if (token) {
          bru.setEnvVar('admin_token', token);
          console.log('admin_token saved');
        } else {
          console.warn('Login response did not contain data.token');
        }
