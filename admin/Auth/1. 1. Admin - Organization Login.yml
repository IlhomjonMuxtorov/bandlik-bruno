info:
  name: 1. Admin - Organization Login
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url}}/admin/auth/login'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"login\": \"admin\",\n  \"password\": \"secret\"\n}"
  auth:
    type: none
docs: |
  Admin paneliga login/parol orqali kirish. Muvaffaqiyatli bo'lsa JWT qaytaradi.

  **Kirish RBAC asosida** (ADR 0009). Kirish qarori `user.type` emas, balki ikki shart bilan
  (`AuthService::adminPanelDenialReason()`):
  1. `TYPE_PARTNER` (tashkilot egasi) yoki `TYPE_EMPLOYEE` bo'lsa тАФ tashkilotning
     `OrganizationType`'i login whitelist'ida bo'lishi shart (`OrganizationType::canLogIn()`).
     **1-bosqich XBA**'ni, **2-bosqich Ish beruvchi (`EMPLOYER`) va Rekruter (`RECRUITER`)**'ni ochdi.
  2. Foydalanuvchida kamida bitta **RBAC roli** biriktirilgan bo'lishi shart
     (`rbac_auth_assignment` bo'sh emas).

  | `type` | Kim | Kirish |
  |:---:|---|---|
  | `1` | `TYPE_ADMIN` тАФ Super-admin | тЬЕ `superadmin` roli biriktirilgan bo'lsa |
  | `6` | `TYPE_EMPLOYEE` тАФ Tashkilot sub-xodimi (`organization_employee`) | тЬЕ org turi ochiq + roli bo'lsa |
  | `5` | `TYPE_PARTNER` тАФ Tashkilot egasi | тЬЕ **XBA / Ish beruvchi / Rekruter** + roli bo'lsa ┬╖ тЫФ Viza, Notarius, Logistika, Sug'urta, O'quv markazi hali emas |

  > **Parolni unutdingizmi?** `Forgot Password` тЖТ `Reset Password` (email orqali).
  > Google bilan kirish uchun `Google Login`.

  > **Lockout eslatmasi.** Kirish RBAC roliga bog'liq. Agar `migrate/up` ishlagan
  > (`rbac_auth_*` jadvallari bor), lekin `rbac-migrate/up` ishlamagan bo'lsa тАФ hech kimda rol
  > yo'q va **hamma** (jumladan `admin`) `403` oladi. Yechim: `php console/yii rbac-migrate/up`
  > (mavjud adminlarga `superadmin` avtomatik biriktiriladi), yoki
  > `php console/yii rbac/assign superadmin <login>`.
  >
  > Tashkilot egasi uchun `username` + `password` `OrganizationService::create()` ichida
  > yaratiladi; egaga mos katalog roli (`xba_admin` / `employer_admin` / `recruiter_admin`)
  > ham o'sha yerda biriktiriladi.

  **Auth:** talab qilinmaydi.

  ### ЁЯУе Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `login` | string | тЬЕ | Username yoki email |
  | `password` | string | тЬЕ | Parol |

  ### ЁЯУд Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `token` | string | JWT тАФ keyingi so'rovlarda `Bearer {token}` |

  > тЬи **Auto-save:** muvaffaqiyatli login `afterResponseScript` orqali tokenni `admin_token` environment variable'iga avtomatik yozadi. Boshqa endpointlar `{{ _.admin_token }}` orqali shu tokenni ishlatadi.

  ### тЪая╕П Errors

  | Code | Reason | Message |
  |---|---|---|
  | `422` | Validatsiya xatosi yoki login/parol noto'g'ri | тАФ |
  | `403` | Tashkilot turi hali whitelist'da emas (XBA / Ish beruvchi / Rekruter'dan boshqa) | `Your organization does not have admin panel access yet.` |
  | `403` | RBAC roli biriktirilmagan (rol yo'q / `rbac-migrate/up` ishlamagan) | `Your account has no access role assigned. Ask a Super Admin to grant one.` |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const token = body?.data?.token;
        if (token) {
          bru.setEnvVar('admin_token', token);
          console.log('admin_token saved');
        } else {
          console.warn('Login response did not contain data.token');
        }
