info:
  name: 0. Ish beruvchi — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/employers/stats'
  auth: inherit
docs: |-
  Ish beruvchi modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta).

  **Auth:** `admin_token`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS). |
  | `this_month_candidates` | int | Joriy oyda shu tur vakansiyalariga kelgan nomzodlar (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan shu tur vakansiyalari. |
  | `refunded_amount` | int | Yakunlangan refund summasi (`transaction.type = REFUND`, `status = COMPLETED`). |

  > Faqat `type = EMPLOYER (6)` yozuvlari bo'yicha hisoblanadi. Vakansiya/nomzod count'lari
  > **`vacancy.recruiter_id`** bo'yicha bog'lanadi (ish beruvchiga biriktirilgan vakansiyalar;
  > `vacancy.organization_id` doim XBA agentligi). `total_revenue` / `refunded_amount` esa
  > tashkilotning o'z buyurtma/tranzaksiyalari bo'yicha.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
