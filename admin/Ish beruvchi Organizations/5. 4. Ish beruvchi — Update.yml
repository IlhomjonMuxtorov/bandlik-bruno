info:
  name: 4. Ish beruvchi — Update
  type: http
  seq: 5
http:
  method: POST
  url: '{{base_url}}/admin/employers/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"phone\": \"+998944452399\"\n}"
  auth: inherit
docs: |
  Mavjud Ish beruvchi tashkilotini yangilaydi. `application/json` — faqat o'zgaradigan maydonlarni yuborish kifoya.

  **Auth:** `employerManage`. Super Admin — har qanday tashkilotni; XBA (org actor) — faqat o'zi onboard qilgan (`onboarded_by_organization_id`) tashkilotni.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | `employerManage` permission yo'q |
  | `404` | Topilmadi yoki boshqa tashkilot onboard qilgan (cross-org) |

  > **Mas'ul shaxs sinxronizatsiyasi:** `responsible_first_name` / `responsible_last_name` / `responsible_middle_name` tahrirlansa, tashkilotning mas'ul shaxsi (admin xodim) ismi ham mos ravishda yangilanadi (ikki tomonlama).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
