docs: |
  **Soft delete** — `is_active = false`, bog'liq `User.status = STATUS_INACTIVE`.

  **Auth:** `employerManage`. XBA faqat o'zi onboard qilgan tashkilotni o'chira oladi; boshqasiniki `404`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | `employerManage` permission yo'q |
  | `404` | Topilmadi yoki cross-org |
