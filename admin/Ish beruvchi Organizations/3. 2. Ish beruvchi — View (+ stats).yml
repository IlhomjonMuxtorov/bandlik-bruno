info:
  name: 2. Ish beruvchi — View (+ stats)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/employers/1'
  auth: inherit
docs: |-
  Bitta Ish beruvchi tashkiloti (`type = 6`) + `stats` sub-object.

  **Auth:** `admin_token`.

  ### 📤 Response — `stats`

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Yakunlangan servis buyurtmalari summasi (so'm) |
  | `clients_count` | int | Distinct mijozlar (nomzodlar) |
  | `services_count` | int | Xizmatlar soni |
  | `employees_count` | int | Faol xodimlar |
  | `active_vacancies_count` | int | Arxivlanmagan vakansiyalar (badge) |
  | `archived_vacancies_count` | int | Arxiv vakansiyalar (badge) |
  | `this_month_candidates` | int | Shu oydagi nomzodlar |
  | `this_month_vacancies` | int | Shu oydagi vakansiyalar |
  | `refunded_amount` | int | Qaytarilgan to'lovlar summasi |

  > **Bog'lanish qoidasi:** vakansiyaga oid ko'rsatkichlar (`active_vacancies_count`,
  > `archived_vacancies_count`, `this_month_candidates`, `this_month_vacancies`)
  > **`recruiter_id = <employer id>`** bo'yicha hisoblanadi (`vacancy.organization_id`
  > doim XBA agentligi). `total_revenue` / `clients_count` / `services_count` /
  > `employees_count` / `refunded_amount` esa tashkilotning o'z id'si bo'yicha.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Ish beruvchi topilmadi (cross-type isolation: XBA/Visa id'si bilan urinilganda ham 404) |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
