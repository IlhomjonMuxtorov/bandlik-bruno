info:
  name: 3. Vacancy — Create (Draft)
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/vacancies'
  headers:
  - name: Content-Type
    value: application/json
  - name: Accept-Language
    value: uz
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"industry_id\": 1,\n  \"title\": \"Restoran Xizmatchisi\",\n  \"description\": \"Zamonaviy restoranda ofitsiant.\",\n  \"experience_level\": \"junior\",\n  \"employment_type\": \"full_time\",\n  \"hiring_quota\": 12,\n  \"duration_months_min\": 6,\n  \"duration_months_max\": 12,\n  \"work_schedule\": \"5_2\",\n  \"work_time_from\": \"08:00\",\n  \"work_time_to\": \"18:00\",\n  \"salary_gross\": 1500,\n  \"salary_gross_currency\": \"USD\",\n  \"salary_net\": 1200,\n  \"salary_net_currency\": \"USD\",\n  \"country_id\": 1,\n  \"address\": \"Warszawa, Marszalkowska 1\",\n  \"hide_address_from_clients\": true,\n  \"deadline_at\": \"2026-07-01\",\n  \"requirements\": [\n    {\"title\": \"Polsha tili A2 darajada\", \"is_required\": true},\n    {\"title\": \"18-45 yosh oraligida\", \"is_required\": true}\n  ],\n  \"benefits\": [\n    {\"title\": \"Bepul turar joy\"},\n    {\"title\": \"Transport bilan ta'minlanadi\"}\n  ],\n  \"documents\": [\n    {\"\
      title\": \"Sudlanmaganlik haqida hujjat\", \"allowed_mime\": \"application/pdf\", \"is_required\": true},\n    {\"title\": \"Tibbiy ko'rik xulosasi\",       \"allowed_mime\": \"application/pdf\", \"is_required\": true}\n  ],\n  \"services\": [\n    {\"category\": \"notarius\",  \"organization_id\": 2, \"organization_service_id\": 1, \"duration_text\": \"20 kun\"},\n    {\"category\": \"insurance\", \"organization_id\": 3, \"organization_service_id\": 5}\n  ],\n  \"single_payment\": false,\n  \"payment_steps\": [\n    {\"step_type\": \"agency_fee\",             \"title\": \"Agentlik xizmati to'lovi\", \"amount\": 1000000, \"currency\": \"UZS\", \"sort_order\": 0},\n    {\"step_type\": \"translation_apostille\", \"title\": \"Tarjima apostil\",         \"amount\": 800000,  \"currency\": \"UZS\", \"sort_order\": 1},\n    {\"step_type\": \"training\",              \"title\": \"O'quv kursi\",             \"amount\": 1500000, \"currency\": \"UZS\", \"sort_order\": 2}\n  ]\n}"
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Yangi vakansiya yaratadi — boshlanishi `status = draft`. Wizardning barcha 8 bosqich ma'lumotlari bitta tranzaksiyada saqlanadi.

  **Auth:** `admin_token` yoki Employer/Recruiter (faqat o'z tashkiloti uchun).

  ### 📥 Request Body

  **Asosiy maydonlar (1-bosqich):**

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ✅ | Ish beruvchi yoki rekruter tashkiloti |
  | `recruiter_id` | int | ➖ | Agar Employer yaratayotgan bo'lsa, biriktirgan rekruter |
  | `industry_id` | int | ➖ | Soha ID |
  | `title` | string | ✅ | Sarlavha |
  | `description` | string | ➖ | Tavsif (HTML/markdown) |
  | `experience_level` | string | ➖ | `any` \| `junior` \| `mid` \| `senior` |
  | `employment_type` | string | ✅ | `full_time` \| `part_time` \| `shift` \| `contract` \| `internship` |
  | `hiring_quota` | int | ✅ | Necha kishi kerak (>=1) |
  | `duration_months_min` / `_max` | int | ➖ | Ish davomiyligi |
  | `work_schedule` | string | ➖ | `5_2` \| `6_1` \| `2_2` \| `shift` \| `flexible` |
  | `work_time_from` / `_to` | string | ➖ | `HH:MM` |
  | `salary_gross` / `_currency` | int / string | ➖ | `UZS` \| `USD` \| `EUR` |
  | `salary_net` / `_currency` | int / string | ➖ | |
  | `country_id` | int | ✅ | |
  | `city_id` | int | ➖ | |
  | `address` | string | ➖ | |
  | `hide_address_from_clients` | bool | ➖ | Default `false` |
  | `deadline_at` | string | ➖ | `YYYY-MM-DD` |

  **Child kolleksiyalar:**

  | Field | Type | Description |
  |---|---|---|
  | `requirements[]` | array | `{title, description, is_required, sort_order}` |
  | `benefits[]` | array | `{title, description, sort_order}` |
  | `documents[]` | array | `{title, description, allowed_mime, is_required, sort_order}` |
  | `services[]` | array | `{category, organization_id, organization_service_id, price, currency, service_name, duration_text, notes}` |
  | `single_payment` | bool | `1 tada 100% lik to'lov` toggle |
  | `payment_steps[]` | array | `{step_type, title, amount, currency, sort_order}` (faqat `single_payment=false` da) |

  **Snapshot:** har bir `services[]` elementi uchun `organization_service_id` berilsa, narx va nom shu xizmatdan olinadi (override `price` yoki `service_name` orqali ham bo'ladi).

  ### 📤 Response (`data`)

  Full detail DTO (View bilan bir xil). `status` = `draft`, `total_service_amount` snapshot narxlar yig'indisi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi |
  | `400` | Snapshot xatosi (Organization service topilmadi yoki tegishli organizatsiyaga emas) |
  | `403` | Boshqa tashkilot uchun yaratish |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
