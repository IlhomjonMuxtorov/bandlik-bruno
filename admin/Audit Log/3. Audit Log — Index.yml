info:
  name: 3. Audit Log — Index
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/audit-log?per-page=20&category=approved&actor_type=1&actor_org_id=&q=&date_from=&date_to='
  auth: inherit
docs: 'Audit jurnali asosiy ro''yxati — sahifalangan, filtirlanadigan. Har bir
  yozuv bitta foydalanuvchi harakatini ifodalaydi (vakansiya yaratildi, ariza
  tasdiqlandi va h.k.). Yozuvlar asinxron tarzda `queueAudit` orqali yoziladi —
  request hech qachon to''sib qolmaydi.


  **Auth:** `admin_token`.


  ### 🔎 Query Params


  | Param | Type | Description |

  |---|---|---|

  | `q` | string | description / entity_label / actor_name bo''yicha qidiruv (ILIKE) |

  | `category` | string | `created` \| `updated` \| `approved` \| `deleted` —
  UI tab kaliti |

  | `entity_type` | string | `vacancy` \| `vacancy_application` \| `candidate`
  \| `user` \| `organization` \| `payment` \| `transaction` \| `payout_request` |

  | `actor_type` | int | UserType — 1=Admin, 2=Recruiter, 3=Employer, 4=Candidate, 5=Partner |

  | `actor_org_id` | int | Bajaruvchining tashkiloti (Organization.id) |

  | `date_from` | int | Unix timestamp — boshlanish vaqti |

  | `date_to` | int | Unix timestamp — yakuniy vaqt |

  | `per-page` | int | 1..100 |

  | `sort` | string | `id`, `created_at` |


  ### 📤 Response


  ```json

  {
    "items": [
      {
        "id": 9421,
        "entity_type": "vacancy",
        "entity_id": 87,
        "entity_label": "Welder for Poland",
        "action": "approve",
        "action_label": "Tasdiqlash",
        "category": "approved",
        "category_label": "Tasdiqlanganlar",
        "description": "admin Welder for Poland vakansiyasini tasdiqladi",
        "actor_user_id": 1,
        "actor_type": 1,
        "actor_type_label": "Admin",
        "actor_org_id": null,
        "actor_org_name": null,
        "actor_name": "admin",
        "created_at": 1748678400
      }
    ],
    "pagination": {
      "page": 1,
      "page_size": 20,
      "total_count": 1490,
      "page_count": 75
    }
  }

  ```


  ### 📝 Notes


  - Diff payload (`data_before` / `data_after` / `changed_attrs` / `context`)
    indexda EMAS — kichik bo''lib qolish uchun. To''liq diff uchun /view chaqiring.

  - Yozuv asinxron tarzda yoziladi — yangi event paydo bo''lishi uchun
    `php console/yii queue-audit/listen --verbose` ishlab turishi kerak.

  - Faza 1da quyidagi entity_type''lar kuzatiladi: vacancy, vacancy_application,
    candidate, user, organization, payment, transaction, payout_request.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Admin emas |

  | `422` | Filtr validatsiyasi muvaffaqiyatsiz |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
