docs: |
  **"Davlatlar bo'yicha narxlash" formasining asosiy saqlash endpoint'i.** Bitta
  `(tashkilot + davlat)` blokidagi barcha xizmat satrlarini **bitta so'rovda** saqlaydi.
  Forma `+ Xizmat qo'shish` bilan qo'shilgan satrlarning hammasi shu yerga yuboriladi.

  Bir nechta davlat (badge `2`) bo'lsa, har bir davlat bloki uchun alohida `sync`
  chaqiriladi.

  **Auth:** `admin_token`.

  ### đź§  Sync mantiqi (bitta tranzaksiyada)

  - `services[]` da **`id` bor** satr â†’ mavjud yozuv **yangilanadi**.
  - `services[]` da **`id` yo'q** satr â†’ **yangi** yozuv yaratiladi.
  - Shu `(org, country)` uchun bazada bor, lekin payloadda `id` si **kelmagan** satrlar
    â†’ **o'chiriladi** (diff-delete).
  - Biror satr xato bo'lsa â€” butun tranzaksiya **rollback**, hech nima saqlanmaydi.

  ### đź“Ą Request Body (JSON)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | âś… | Sug'urta tashkilot (`type = 4`) |
  | `country_id` | int | âś… | Davlat |
  | `services` | array | âś… | Xizmat satrlari (quyidagi maydonlar bilan) |
  | `services[].id` | int | âž– | Mavjud satrni yangilash uchun. Yo'q bo'lsa â€” yangi satr |
  | `services[].insurance_service_type_id` | int | âś… | Global katalog xizmat turi |
  | `services[].coverage_amount` | int | âś… | Qoplash summasi, â‰Ą 0 |
  | `services[].price` | int | âś… | Narx, â‰Ą 0 |
  | `services[].currency` | string | âž– | Default `UZS`. Variantlar: `UZS`, `USD`, `EUR` |
  | `services[].is_active` | bool (0\|1) | âž– | Default `1` |
  | `services[].sort_order` | int | âž– | Default `0` |

  ### đź“¤ Response (`data`)

  `200` â€” `Group Read` bilan **bir xil shakl**: saqlangandan keyingi `(org + country)`
  guruhi (`services[]` har birida yangi `id`).

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `422` | `organization_id` / `country_id` berilmagan; `organization_id` sug'urta turida emas ("Organization must be an insurance company"); payloadda takroriy `(service_type, coverage)` (`services.<index>`); satr validatsiyasi xatosi (`services.<index>.<field>`); DB unique-kalit to'qnashuvi |
  | `404` | `country_id` mavjud emas |
