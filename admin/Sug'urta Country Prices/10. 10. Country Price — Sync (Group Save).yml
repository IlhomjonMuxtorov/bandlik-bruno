info:
  name: 10. Country Price вЂ” Sync (Group Save)
  type: http
  seq: 10
http:
  method: POST
  url: '{{base_url}}/admin/insurance-country-prices/sync'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "organization_id": 2,
        "country_id": 1,
        "services": [
          { "id": 7, "insurance_service_type_id": 1, "coverage_amount": 50000000, "coverage_currency": "USD", "currency": "UZS", "price": 350000 },
          { "insurance_service_type_id": 2, "coverage_amount": 20000000, "coverage_currency": "UZS", "currency": "UZS", "price": 180000 }
        ]
      }
  auth: inherit
docs: |
  **"Davlatlar bo'yicha narxlash" formasining asosiy saqlash endpoint'i.** Bitta
  `(tashkilot + davlat)` blokidagi barcha xizmat satrlarini **bitta so'rovda** saqlaydi.
  Forma `+ Xizmat qo'shish` bilan qo'shilgan satrlarning hammasi shu yerga yuboriladi.

  Bir nechta davlat (badge `2`) bo'lsa, har bir davlat bloki uchun alohida `sync`
  chaqiriladi.

  **Auth:** `admin_token`.

  ### рџ§  Sync mantiqi (bitta tranzaksiyada)

  - `services[]` da **`id` bor** satr в†’ mavjud yozuv **yangilanadi**.
  - `services[]` da **`id` yo'q** satr в†’ **yangi** yozuv yaratiladi.
  - Shu `(org, country)` uchun bazada bor, lekin payloadda `id` si **kelmagan** satrlar
    в†’ **o'chiriladi** (diff-delete).
  - Biror satr xato bo'lsa вЂ” butun tranzaksiya **rollback**, hech nima saqlanmaydi.

  ### рџ“Ґ Request Body (JSON)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | вњ… | Sug'urta tashkilot (`type = 4`) |
  | `country_id` | int | вњ… | Davlat |
  | `services` | array | вњ… | Xizmat satrlari (quyidagi maydonlar bilan) |
  | `services[].id` | int | вћ– | Mavjud satrni yangilash uchun. Yo'q bo'lsa вЂ” yangi satr |
  | `services[].insurance_service_type_id` | int | вњ… | Global katalog xizmat turi |
  | `services[].coverage_amount` | int | вњ… | Qoplash summasi, в‰Ґ 0 вЂ” major unit, `coverage_currency` valyutasida |
  | `services[].coverage_currency` | string | вћ– | Qoplash valyutasi. Default `UZS`. `UZS` \| `USD` \| `EUR` (narx valyutasidan mustaqil) |
  | `services[].price` | int | вњ… | Narx, в‰Ґ 0 вЂ” so'mda (major unit), `currency` valyutasida |
  | `services[].currency` | string | вћ– | Faqat `UZS` (default; boshqasi в†’ `422`) |
  | `services[].is_active` | bool (0\|1) | вћ– | Default `1` |
  | `services[].sort_order` | int | вћ– | Default `0` |

  > **Birlik:** client `price` va `coverage_amount` ni major unitda yuboradi (`price` вЂ”
  > `currency`, `coverage_amount` вЂ” `coverage_currency` valyutasida); backend tiyinda
  > saqlaydi va javobda yana major unitda qaytaradi.

  ### рџ“¤ Response (`data`)

  `200` вЂ” `Group Read` bilan **bir xil shakl**: saqlangandan keyingi `(org + country)`
  guruhi (`services[]` har birida yangi `id`).

  ### вљ пёЏ Errors

  | Code | Reason |
  |---|---|
  | `422` | `organization_id` / `country_id` berilmagan; `organization_id` sug'urta turida emas ("Organization must be an insurance company"); `country_id` mavjud emas ("Country not found"); payloadda takroriy `(service_type, coverage)` (`services.<index>`); satr validatsiyasi xatosi (`services.<index>.<field>`); DB unique-kalit to'qnashuvi |

  > Eslatma: `sync` barcha xatolarni `sendError` (`422`) orqali qaytaradi вЂ” `Group Read` /
  > `By Organization` dan farqli (ular org/davlat topilmasa `404` beradi).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
