info:
  name: 3. Country Price — Create
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/insurance-country-prices'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 2,\n  \"country_id\": 1,\n  \"insurance_service_type_id\"\
      : 1,\n  \"coverage_amount\": 50000000,\n  \"price\": 350000,\n  \"currency\"\
      : \"UZS\",\n  \"is_active\": 1,\n  \"sort_order\": 0\n}"
  auth: inherit
docs: 'Yangi davlat-narxi satrini yaratadi. Skrinshotdagi forma har bir qator uchun
  bu endpoint''ni chaqiradi: `O''zbekiston` → `KASKO` → qoplash `50 000 000` → `350
  000 so''m`.


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `organization_id` | int | ✅ | Sug''urta tashkilot (`type === INSURANCE`) |

  | `country_id` | int | ✅ | Davlat |

  | `insurance_service_type_id` | int | ✅ | Global katalog xizmat turi |

  | `coverage_amount` | int | ✅ | Qoplash summasi, ≥ 0 |

  | `price` | int | ✅ | Narx, ≥ 0 |

  | `currency` | string | ➖ | Default `UZS`. Variantlar: `UZS`, `USD`, `EUR` |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `sort_order` | int | ➖ | Default `0` |


  ### 📤 Response


  `201` — `InsuranceCountryPriceOutputDTO` (nested `organization`, `country`, `service_type`
  bilan).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | `(organization_id, country_id, service_type_id, coverage_amount)` kombinatsiyasi
  allaqachon mavjud → "A price for this combination already exists"; `organization_id`
  sug''urta turida emas → "Organization must be an insurance company"; `country_id`
  yoki `insurance_service_type_id` mavjud emas |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
