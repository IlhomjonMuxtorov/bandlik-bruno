info:
  name: 1. Country Price — Index
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/insurance-country-prices?organization_id=2&per-page=20'
  auth: inherit
docs: 'Sug''urta tashkilotining davlat-bo''yicha narx-katalogi: har bir `(davlat ×
  xizmat turi × qoplash summasi)` kombinatsiyasi uchun alohida satr.


  Skrinshotdagi "Davlatlar bo''yicha narxlash" formasini to''ldirish uchun ishlatiladi.


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `organization_id` | int | ➖ | Faqat ushbu sug''urta tashkilotining narxlari |

  | `country_id` | int | ➖ | Faqat ushbu davlat |

  | `insurance_service_type_id` | int | ➖ | Faqat ushbu xizmat turi (KASKO/Tibbiy/…) |

  | `is_active` | int (0\|1) | ➖ | |

  | `page`, `per-page` | int | ➖ | Pagination |

  | `sort` | string | ➖ | `id` \| `sort_order` \| `price` \| `coverage_amount` \| `created_at` |


  ### 📤 Response (`data.items[]` — `InsuranceCountryPriceOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `organization_id` | int | |

  | `organization` | object | `{id, name, type}` |

  | `country_id` | int | |

  | `country` | object | `{id, name, name_localized}` |

  | `insurance_service_type_id` | int | |

  | `service_type` | object | `{id, code, name, name_localized}` |

  | `coverage_amount` | int | Qoplash summasi |

  | `price` | int | |

  | `currency` | string | |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` / `updated_at` | int | |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
