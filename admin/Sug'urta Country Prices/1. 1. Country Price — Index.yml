http:
  method: GET
  url: '{{base_url}}/admin/insurance-country-prices?organization_id=2&per-page=20'
  auth: inherit
docs: 'Sug''urta tashkilotining davlat-bo''yicha narx-katalogining **tekis (flat)**
  ro''yxati: har bir `(davlat × xizmat turi × qoplash summasi)` kombinatsiyasi uchun
  alohida satr. Umumiy filtrlash/qidiruv uchun (pagination bilan).


  **Skrinshotdagi "Davlatlar bo''yicha narxlash" formasi uchun bularni ishlating:**

  - `GET .../by-organization?organization_id=…` — tashkilot narx kiritgan davlatlar
  (paginationli), har biri xizmatlari bilan guruhlangan (formaning asosiy yuklash endpoint''i).

  - `GET .../group?organization_id=…&country_id=…` — bitta davlat blokini yuklash.

  - `POST .../sync` — bitta `(tashkilot + davlat)` blokini saqlash (upsert + diff-delete).

  Tashkilot dropdown manbasi: `GET /admin/insurance` (`type = 4`).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `organization_id` | int | ➖ | Faqat ushbu sug''urta tashkilotining narxlari |

  | `country_id` | int | ➖ | Faqat ushbu davlat |

  | `insurance_service_type_id` | int | ➖ | Faqat ushbu xizmat turi (KASKO/Tibbiy/…) |

  | `is_active` | int (0\|1) | ➖ | |

  | `page`, `per-page` | int | ➖ | Pagination |

  | `sort` | string | ➖ | `id` \| `sort_order` \| `price` \| `coverage_amount` \| `created_at` |


  ### 📤 Response (`data.items[]` — `InsuranceCountryPriceOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `organization_id` | int | |

  | `organization` | object | `{id, name, type}` |

  | `country_id` | int | |

  | `country` | object | `{id, name, name_localized}` |

  | `insurance_service_type_id` | int | |

  | `service_type` | object | `{id, code, name, name_localized}` |

  | `coverage_amount` | int | Qoplash summasi — major unit, `coverage_currency` valyutasida
  (tiyin EMAS) |

  | `price` | int | So''mda — major unit, `currency` valyutasida (tiyin EMAS) |

  | `currency` | string | |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` / `updated_at` | int | |

  | `created_at_formatted` / `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
