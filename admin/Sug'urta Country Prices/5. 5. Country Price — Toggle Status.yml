docs: '`is_active` ni aksiga aylantiradi. Inactive narx satrlari `available/{countryId}`
  ro''yxatiga chiqmaydi va vakansiya formasidagi dropdown''da ko''rsatilmaydi.


  **Auth:** `admin_token`.


  ### 📤 Response


  `200` — `InsuranceCountryPriceOutputDTO` (yangi `is_active` qiymati bilan).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Narx satri topilmadi |

  '
