docs: 'Mavjud davlat-narxi satrini tahrirlaydi — **granular (bitta satr)** operatsiya.
  Faqat berilgan maydonlar yangilanadi (partial update).


  **Eslatma:** "Davlatlar bo''yicha narxlash" formasi odatda butun davlat blokini
  `POST .../sync` orqali saqlaydi (u ham yangilash/o''chirishni o''zi hal qiladi). Bu
  endpoint bitta satrni nuqtali tahrirlash uchun saqlanib qoladi.


  **MUHIM:** Bu yerda narx o''zgartirilsa, mavjud vakansiyalardagi snapshot saqlangan
  narxlar (vacancy_service jadvalida) o''zgarmaydi — chunki ular attach-paytida frozen
  bo''ladi. Faqat keyinchalik yaratiladigan yangi vakansiyalarga ta''sir qiladi.


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  Yaratish (Create) bilan bir xil maydonlar, lekin barchasi optional. Unique cheklov
  (org+country+type+coverage) saqlanadi.


  ### 📤 Response


  `200` — `InsuranceCountryPriceOutputDTO`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `404` | Narx satri topilmadi |

  | `422` | Yangi kombinatsiya boshqa satr bilan to''qnashdi; org turi noto''g''ri |

  '
settings:
  encodeUrl: true
  timeout: 0
