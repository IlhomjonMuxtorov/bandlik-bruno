info:
  name: 20. 1. Languages — Index
  type: http
  seq: 20
http:
  method: GET
  url: '{{base_url}}/admin/languages'
  auth: inherit
docs: 'Tillar ro''yxati (paginatsiya bilan).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Nom bo''yicha qidiruv (JSONB `name` bo''yicha `ILIKE`). |

  | `is_active` | int (0\|1) | ➖ | Faolligi bo''yicha filtr. |

  | `page` | int | ➖ | Sahifa raqami (default `1`). |

  | `per-page` | int | ➖ | Sahifa hajmi (1–100, default `20`). |


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### 📤 Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `name` | string | Til bo''yicha tarjima |

  | `iso_code` | string | ISO kod (masalan `uz`, `ru`, `en`) |

  | `scale` | string | Daraja shkalasi: `cefr` \| `hsk` \| `topik`. |

  | `is_active` | bool | |

  | `sort_order` | int | |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
