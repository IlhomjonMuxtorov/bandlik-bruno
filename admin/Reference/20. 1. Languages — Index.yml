info:
  name: 20. 1. Languages — Index
  type: http
  seq: 20
http:
  method: GET
  url: '{{base_url}}/admin/languages'
  auth: inherit
docs: 'Tillar ro''yxati (paginatsiya bilan).


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`) — `sort_order` emas, agar `sort` yuborilmagan bo''lsa.


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Nom bo''yicha qidiruv (JSONB `name` bo''yicha `ILIKE`). |

  | `is_active` | int (0\|1) | ➖ | Faolligi bo''yicha filtr. |

  | `page` | int | ➖ | Sahifa raqami (default `1`). |

  | `per-page` | int | ➖ | Sahifa hajmi (1–300, default `20`). |

  | `sort` | string | ➖ | Berilmasa — A-Z. `sort_order` — eski tahririy tartib.
  Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at` \|
  `-created_at`. |


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### 📤 Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `name` | object | Tahrirlash uchun xom i18n: `{ uz, ru, en }`. |

  | `name_localized` | string | `Accept-Language` bo''yicha tarjima (fallback `uz`).
  |

  | `iso_code` | string | ISO kod (masalan `uz`, `ru`, `en`) |

  | `scale` | string | Daraja shkalasi: `cefr` \| `hsk` \| `topik` \| `jlpt` \| `torfl`
  \| `ilr` \| `actfl` \| `clb` \| `nclc` \| `testdaf` \| `tocfl` \| `stanag` \| `oet` \|
  `dsh` \| `nt2` \| `eiken`. |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `levels` | array | Shu tilning scale darajalari (read-only), scale tartibida:
  `[{ id, code, name: { uz, ru, en }, name_localized }]` — masalan `jlpt` uchun
  `N5..N1`. |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
