info:
  name: 47. 2. Vacancy Industry Category — View
  type: http
  seq: 47
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-industry-categories/1'
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |
  Bitta kategoriyani ID bo'yicha qaytaradi (barcha tillar bilan).

  **Auth:** `admin_token` (faqat `admin`).

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `name` | object | `{"uz": "...", "ru": "...", "en": "..."}` |
  | `is_active` | bool | |
  | `sort_order` | int | |
  | `industries_count` | int | Shu kategoriyaga tegishli sohalar (`vacancy_industry`) soni. |
  | `created_at` / `updated_at` | int | Unix timestamp (+ `_formatted`) |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Kategoriya topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
