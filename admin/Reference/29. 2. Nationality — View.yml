info:
  name: 29. 2. Nationality — View
  type: http
  seq: 29
http:
  method: GET
  url: '{{base_url}}/admin/nationalities/19'
  auth: inherit
docs: |
  Bitta millat ma'lumotlarini olish.

  **Auth:** `admin_token`.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | GCP SP_ID |
  | `name` | string | Til bo'yicha tarjima |
  | `is_active` | bool | |
  | `sort_order` | int | |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Millat topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
