info:
  name: 21. 2. Language — View
  type: http
  seq: 21
http:
  method: GET
  url: '{{base_url}}/admin/languages/1'
  auth: inherit
docs: 'Bitta til ma''lumotlarini olish.


  **Auth:** `admin_token`.


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### 📤 Response


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `name` | object | Tahrirlash uchun xom i18n: `{ uz, ru, en }`. |

  | `name_localized` | string | `Accept-Language` bo''yicha tarjima (fallback `uz`).
  |

  | `iso_code` | string | ISO kod |

  | `scale` | string | Daraja shkalasi: `cefr` \| `hsk` \| `jlpt` \| … (16 ta). |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `levels` | array | Shu tilning scale darajalari (read-only): `[{ id, code, name:
  { uz, ru, en }, name_localized }]`. |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
