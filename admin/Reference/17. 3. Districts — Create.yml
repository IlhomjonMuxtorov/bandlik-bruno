  | `region_id` | int | ✅ | Viloyat ID. Viloyat mavjud bo''lishi kerak. |

  | `name` | object (JSON) | ✅ | `{"uz": "...", "ru": "...", "en": "..."}` |

  | `is_active` | int (0\|1) | ➖ | Default: 1 |

  | `sort_order` | int | ➖ | Default: 0 |

