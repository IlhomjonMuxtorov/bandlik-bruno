info:
  name: 56. 11. Requirement Definitions тАФ Index
  type: http
  seq: 56
http:
  method: GET
  url: '{{base_url}}/admin/requirement-definitions'
  params:
  - name: category_id
    value: ''
    enabled: false
  - name: industry_id
    value: ''
    enabled: false
  - name: value_type
    value: ''
    enabled: false
  - name: is_matchable
    value: '1'
    enabled: false
  - name: q
    value: ''
    enabled: false
  headers:
  - name: Authorization
    value: 'Bearer {{admin_token}}'
  auth: inherit
docs: |-
  Talab andozalari (definition) katalogi тАФ paginatsiyalangan ro'yxat. Admin to'liq
  3-tilli `name`/`description` ko'radi.

  > Ro'yxat `Accept-Language` bo'yicha alifbo (A-Z) tartibida qaytadi (fallback
  > `uz`) тАФ `sort_order` emas, agar `sort` yuborilmagan bo'lsa.

  **Auth:** `admin_token` (faqat `admin`).

  ### ЁЯФО Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `category_id` | int | тЮЦ | Kategoriya bo'yicha filtr. |
  | `industry_id` | int | тЮЦ | Global + shu **fine `vacancy_industry`**ga (8-guruh) tegishlilar. `''` тАФ faqat global. |
  | `value_type` | string | тЮЦ | `integer_range` \| `boolean` \| `level` \| `reference_multi` ... |
  | `is_matchable` | int (0\|1) | тЮЦ | Nomzodga moslanadiganlar. |
  | `q` | string | тЮЦ | Nom bo'yicha qidiruv (uz/ru/en). |
  | `page`, `per-page` | int | тЮЦ | Pagination (`per-page` 1тАУ300, default 20). |
  | `sort` | string | тЮЦ | Berilmasa тАФ A-Z. `sort_order` тАФ eski tahririy tartib.
  Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at` \| `-created_at`. |

  ### ЁЯУд Response (`data[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `code` | string \| null | Mashina kodi, masalan `age`, `cert.driving_license`. |
  | `name` / `description` | object | `{uz,ru,en}`. |
  | `value_type` | string | Qiymat tipi. |
  | `reference_source` | string \| null | Ref jadval yoki `enum:Class`. |
  | `unit` | string \| null | `years` \| `cm` \| `kg` ... |
  | `industry_id` | int \| null | Fine `vacancy_industry` tie. `null` тАФ global. |
  | `is_system` | bool | `true` тАФ kodga bog'langan, qulflangan (admin tahrir/o'chira olmaydi). |
  | `is_resume_bound` | bool | `true` тАФ nomzod rezyumesi maydoniga bog'langan (bo'y, vazn, surat, sog'liq, tavsiya-xat soni). |
  | `match_key` / `is_matchable` | string \| null / bool | Matching dispatch kaliti. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
