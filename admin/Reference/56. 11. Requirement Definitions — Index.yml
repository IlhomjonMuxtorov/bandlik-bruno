http:
  method: GET
  url: '{{base_url}}/admin/requirement-definitions'
  params:
  - name: category_id
    value: ''
    enabled: false
  - name: industry_category_id
    value: ''
    enabled: false
  - name: value_type
    value: ''
    enabled: false
  - name: is_matchable
    value: '1'
    enabled: false
  - name: q
    value: ''
    enabled: false
  headers:
