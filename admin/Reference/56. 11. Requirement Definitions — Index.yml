docs: |-
  Talab andozalari (definition) katalogi — paginatsiyalangan ro'yxat. Admin to'liq
  3-tilli `name`/`description` ko'radi.

  **Auth:** `admin_token` (faqat `admin`).

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `category_id` | int | ➖ | Kategoriya bo'yicha filtr. |
  | `industry_category_id` | int | ➖ | Global + shu sohaga tegishlilar. `''` — faqat global. |
  | `value_type` | string | ➖ | `integer_range` \| `boolean` \| `level` \| `reference_single` ... |
  | `is_matchable` | int (0\|1) | ➖ | Nomzodga moslanadiganlar. |
  | `q` | string | ➖ | Nom bo'yicha qidiruv (uz/ru/en). |

  ### 📤 Response (`data[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `code` | string \| null | Mashina kodi, masalan `age`, `cert.driving_license`. |
  | `name` / `description` | object | `{uz,ru,en}`. |
  | `value_type` | string | Qiymat tipi. |
  | `reference_source` | string \| null | Ref jadval yoki `enum:Class`. |
  | `unit` | string \| null | `years` \| `cm` \| `kg` ... |
  | `industry_category_id` | int \| null | `null` — global. |
  | `match_key` / `is_matchable` | string \| null / bool | Matching dispatch kaliti. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
