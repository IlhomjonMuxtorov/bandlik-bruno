info:
  name: 3. Countries — Create
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/countries'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": {\"uz\": \"Germaniya\", \"ru\": \"Германия\", \"en\": \"Germany\"},\n  \"iso_code\": \"DE\",\n  \"is_visa_available\": 1,\n  \"is_active\": 1,\n  \"flag_id\": 10,\n  \"image_id\": 11\n}"
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Yangi davlat qo'shadi. `application/json` so'rov.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | object (JSON) | ✅ | `{"uz": "...", "ru": "...", "en": "..."}` |
  | `iso_code` | string | ✅ | 2 ta xarfli kod (masalan `DE`, `US`) |
  | `is_visa_available` | int (0\|1) | ➖ | Default: 0 |
  | `is_active` | int (0\|1) | ➖ | Default: 0 |
  | `sort_order` | int | ➖ | Default: 0 |
  | `flag_id` | int | ➖ | `/admin/upload` orqali yuklangan bayroq fayl ID |
  | `image_id` | int | ➖ | `/admin/upload` orqali yuklangan rasm fayl ID |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi |
  | `400` | `flag_id` yoki `image_id` topilmadi yoki `status=uploading` |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
