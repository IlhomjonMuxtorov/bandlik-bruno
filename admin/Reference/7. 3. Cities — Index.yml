info:
  name: 3. Cities — Index
  type: http
  seq: 7
http:
  method: GET
  url: '{{base_url}}/admin/cities?country_id=1'
  auth: inherit
docs: 'Shaharlar ro''yxati. Odatda `country_id` bo''yicha filterlanadi.


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`) — `sort_order` emas, agar `sort` yuborilmagan bo''lsa.


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `country_id` | int | ➖ | Davlat bo''yicha filtr |

  | `q` | string | ➖ | Nom bo''yicha qidiruv |

  | `is_active` | int (0\|1) | ➖ | Faolligi bo''yicha filtr |

  | `page` | int | ➖ | Sahifa raqami |

  | `per-page` | int | ➖ | Sahifa hajmi (1–300, default `20`). |

  | `sort` | string | ➖ | Berilmasa — A-Z. `sort_order` — eski tahririy tartib.
  Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at` \|
  `-created_at`. |


  ### 📤 Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `country_id` | int | |

  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` | int | |

  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  | `updated_at` | int | |

  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
