docs: |
  Yangi millat qo'shadi.

  **Auth:** `admin_token`.

  ### 📥 Request Body (multipart/form-data)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `id` | int | ✅ | GCP SP_ID (manual PK) |
  | `name` | object (JSON) | ✅ | `{"uz": "...", "ru": "...", "en": "..."}` |
  | `is_active` | int (0\|1) | ➖ | Default: 1 |
  | `sort_order` | int | ➖ | Default: 0 |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi (`id` / `name` talab qilinadi) |
