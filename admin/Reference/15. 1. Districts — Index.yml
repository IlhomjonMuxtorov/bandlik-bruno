info:
  name: 15. 1. Districts — Index
  type: http
  seq: 15
http:
  method: GET
  url: '{{base_url}}/admin/districts?region_id=10'
  auth: inherit
docs: 'Tumanlar ro''yxati (region bo''yicha paginatsiya bilan).


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`) — `sort_order` emas, agar `sort` yuborilmagan bo''lsa.


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `region_id` | int | ➖ | Viloyat bo''yicha filtr. |

  | `q` | string | ➖ | Nom bo''yicha qidiruv (JSONB `name` bo''yicha `ILIKE`). |

  | `is_active` | int (0\|1) | ➖ | Faolligi bo''yicha filtr. |

  | `page` | int | ➖ | Sahifa raqami (default `1`). |

  | `per-page` | int | ➖ | Sahifa hajmi (1–300, default `20`). |

  | `sort` | string | ➖ | Berilmasa — A-Z. `sort_order` — eski tahririy tartib.
  Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at` \|
  `-created_at`. |


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### 📤 Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | GCP SP_ID |

  | `region_id` | int | |

  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |

  | `is_active` | bool | |

  | `sort_order` | int | |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
