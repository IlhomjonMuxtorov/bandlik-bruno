info:
  name: 57. 12. Requirement Definition — View
  type: http
  seq: 57
http:
  method: GET
  url: '{{base_url}}/admin/requirement-definitions/1'
  headers:
  - name: Authorization
    value: 'Bearer {{admin_token}}'
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |-
  Bitta talab andozasi — resolved `choices` (ref/enum/inline) bilan.

  **Auth:** `admin_token` (faqat `admin`).

  ### 📤 Response (qo'shimcha)

  | Field | Type | Description |
  |---|---|---|
  | `choices` | array | `[{value,label}]` — `Accept-Language` bo'yicha tarjima. Scalar tiplar uchun bo'sh. |
  | `industry_id` | int \| null | Fine `vacancy_industry` tie (8-guruh). `null` — global. |
  | `is_system` | bool | `true` — qulflangan (tahrir/o'chirish 403). |
  | `is_resume_bound` | bool | `true` — nomzod rezyumesi maydoniga bog'langan. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
