info:
  name: 1. Countries — Index
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/countries'
  auth: inherit
docs: 'Davlatlar ro''yxati (paginatsiya bilan). Natijalar `Accept-Language` tili bo''yicha
  **alfavit (A-Z)** tartibida qaytadi (til yo''q bo''lsa `uz` fallback) — `sort_order` emas.


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Nom bo''yicha qidiruv (JSONB `name` bo''yicha `ILIKE`). |

  | `is_active` | int (0\|1) | ➖ | Faolligi bo''yicha filtr. |

  | `is_visa_available` | int (0\|1) | ➖ | Viza beradigan davlatlar. |

  | `exclude_priced_for_org` | int | ➖ | Sug''urta tashkilot `organization.id` (`type = 4`). Berilsa,
  o''sha tashkilotga **allaqachon narx biriktirilgan** davlatlar ro''yxatdan chiqariladi — "Davlatlar
  bo''yicha narxlash" formasida yangi davlat qo''shish dropdown''i uchun (dublikat blok / unique-kalit
  konfliktining oldini oladi). Active yoki inactive — har qanday narx satri bo''lsa, davlat chiqariladi. |

  | `page` | int | ➖ | Sahifa raqami (default `1`). |

  | `per-page` | int | ➖ | Sahifa hajmi (1–300, default `20`). Butun davlatlar to''plamini
  (~240) bir sahifada olish uchun `250` beriladi (dropdown to''liq A-Z). |

  | `sort` | string | ➖ | Berilmasa — natija yuqorida aytilgan A-Z tartibda. `sort_order`
  qiymati eski **tahririy (editorial)** tartibni qaytaradi (masalan boshqaruv jadvali
  uchun). Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at`
  \| `-created_at`. |


  ### 📋 Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### 📤 Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |

  | `iso_code` | string \| null | ISO 3166-1 alpha-2 (`UZ`) |

  | `iso_alpha3` | string \| null | ISO 3166-1 alpha-3 (`UZB`) |

  | `gcp_code` | int \| null | GCP Spravochnik ID |

  | `flag_url` | string \| null | |

  | `image_url` | string \| null | To''liq URL |

  | `is_visa_available` | bool | |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` | int | Unix timestamp |

  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  | `updated_at` | int | Unix timestamp |

  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
