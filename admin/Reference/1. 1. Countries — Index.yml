http:
  method: GET
  url: '{{base_url}}/admin/countries'
  auth: inherit
docs: 'Davlatlar ro''yxati (paginatsiya bilan).


  **Auth:** `admin_token`.


  ### ЁЯФО Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | тЮЦ | Nom bo''yicha qidiruv (JSONB `name` bo''yicha `ILIKE`). |

  | `is_active` | int (0\|1) | тЮЦ | Faolligi bo''yicha filtr. |

  | `is_visa_available` | int (0\|1) | тЮЦ | Viza beradigan davlatlar. |

  | `page` | int | тЮЦ | Sahifa raqami (default `1`). |

  | `per-page` | int | тЮЦ | Sahifa hajmi (1тАУ100, default `20`). |


  ### ЁЯУЛ Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | тЬЕ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | тЮЦ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### ЁЯУд Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `name` | string | Til bo''yicha tarjima |

  | `iso_code` | string \| null | ISO 3166-1 alpha-2 (`UZ`) |

  | `iso_alpha3` | string \| null | ISO 3166-1 alpha-3 (`UZB`) |

  | `gcp_code` | int \| null | GCP Spravochnik ID |

  | `flag_url` | string \| null | |

  | `image_url` | string \| null | To''liq URL |

  | `is_visa_available` | bool | |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` | int | Unix timestamp |

  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  | `updated_at` | int | Unix timestamp |

  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
