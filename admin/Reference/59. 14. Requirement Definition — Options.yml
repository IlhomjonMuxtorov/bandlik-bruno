info:
  name: 59. 14. Requirement Definition — Options
  type: http
  seq: 59
http:
  method: GET
  url: '{{base_url}}/admin/requirement-definitions/options/2'
  headers:
  - name: Authorization
    value: 'Bearer {{admin_token}}'
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |-
  Bitta definition uchun resolved tanlovlar (ref jadval / enum / inline options),
  `Accept-Language` bo'yicha tarjima qilingan — wizard widgetini to'ldiradi.

  > Tanlovlar tarjima qilingan `label` bo'yicha alifbo (A-Z) tartibida qaytadi
  > (fallback `uz`) — **bundan mustasno**: ordinal shkalalar (masalan darajali
  > havolalar) hamon o'z tabiiy (`sort_order`) tartibida qoladi.

  **Auth:** `admin_token` (faqat `admin`).

  ### 📤 Response (`data[]`)

  | Field | Type | Description |
  |---|---|---|
  | `value` | string | Tanlov kodi yoki ref id. |
  | `label` | string | Tarjima qilingan nom. |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
