info:
  name: 33. 1. OVD — Index
  type: http
  seq: 33
http:
  method: GET
  url: '{{base_url}}/admin/ovd?region_id=10'
  auth: inherit
docs: |
  OVD (pasport beruvchi organlar — IIB bo'limlari va elchixonalar) ro'yxati, paginatsiya bilan.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `country_id` | int | ➖ | Davlat bo'yicha filtr. |
  | `region_id` | int | ➖ | Viloyat bo'yicha filtr. |
  | `district_id` | int | ➖ | Tuman bo'yicha filtr. |
  | `q` | string | ➖ | Nom bo'yicha qidiruv (JSONB `name` bo'yicha `ILIKE`). |
  | `is_active` | int (0\|1) | ➖ | Faolligi bo'yicha filtr. |
  | `page` | int | ➖ | Sahifa raqami (default `1`). |
  | `per-page` | int | ➖ | Sahifa hajmi (1–100, default `20`). |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |

  ### 📤 Response (`data.items[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | GCP SP_ID (manual PK) |
  | `country_id` | int \| null | Elchixonalar uchun `null` bo'lishi mumkin |
  | `region_id` | int \| null | Elchixonalar uchun `null` |
  | `district_id` | int \| null | Elchixonalar uchun `null` |
  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |
  | `is_active` | bool | |
  | `created_at` | int | Unix timestamp |
  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
  | `updated_at` | int | Unix timestamp |
  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
