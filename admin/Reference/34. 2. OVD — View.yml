info:
  name: 34. 2. OVD — View
  type: http
  seq: 34
http:
  method: GET
  url: '{{base_url}}/admin/ovd/1'
  auth: inherit
docs: |
  Bitta OVD (pasport beruvchi organ) ma'lumotlarini olish.

  **Auth:** `admin_token`.

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz`. |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | GCP SP_ID |
  | `country_id` | int \| null | |
  | `region_id` | int \| null | |
  | `district_id` | int \| null | |
  | `name` | string | Til bo'yicha tarjima |
  | `is_active` | bool | |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | OVD topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
