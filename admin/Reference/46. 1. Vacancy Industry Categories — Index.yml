info:
  name: 46. 1. Vacancy Industry Categories — Index
  type: http
  seq: 46
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-industry-categories'
  auth: inherit
docs: |
  Vakansiya sohasi kategoriyalarini boshqarish ro'yxati (paginatsiya bilan).
  Faol va nofaol yozuvlar ham qaytadi, barcha tillar bilan. Kategoriya bir nechta
  sohani (`vacancy_industry`) guruhlaydi.

  > Ro'yxat `Accept-Language` bo'yicha alifbo (A-Z) tartibida qaytadi (fallback
  > `uz`) — `sort_order` emas, agar `sort` yuborilmagan bo'lsa.

  **Auth:** `admin_token` (faqat `admin`).

  > Forma uchun yengil dropdown kerak bo'lsa — `Vacancies` kolleksiyasidagi
  > `GET /admin/vacancies/industry-categories` (admin + org user uchun ochiq) dan foydalaning.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | ➖ | Nom (`uz`/`ru`/`en`) bo'yicha qidiruv (`ILIKE`). |
  | `is_active` | int (0\|1) | ➖ | Faolligi bo'yicha filtr. |
  | `page` | int | ➖ | Sahifa raqami (default `1`). |
  | `per-page` | int | ➖ | Sahifa hajmi (1–300, default `20`). |
  | `sort` | string | ➖ | Berilmasa — A-Z. `sort_order` — eski tahririy tartib.
  Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at` \| `-created_at`. |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {{ _.admin_token }}` |

  ### 📤 Response (`data.items[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |
  | `is_active` | bool | |
  | `sort_order` | int | |
  | `industries_count` | int | Shu kategoriyaga tegishli sohalar (`vacancy_industry`) soni. |
  | `created_at` | int | Unix timestamp |
  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
  | `updated_at` | int | Unix timestamp |
  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  > `data.pagination` — `page`, `page_size`, `total_count`, `page_count`.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
