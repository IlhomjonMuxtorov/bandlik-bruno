info:
  name: Language Levels — Index
  type: http
  seq: 39
http:
  method: GET
  url: '{{base_url}}/admin/language-levels'
  auth: inherit
params:
  - name: language_id
    value: '9'
    type: query
    enabled: false
  - name: scale
    value: jlpt
    type: query
    enabled: false
headers:
  - name: Accept-Language
    value: uz
    enabled: true
docs: >
  Til bilish darajalari ro'yxati — leadlar Filter paneli va til tanlash dropdowni
  uchun. `language_id` bilan filtrlaganda shkala tilning o'zidan (`language.scale`)
  avtomatik aniqlanadi; `scale` bilan shkalani qo'lda ham berish mumkin.


  **Auth:** `access_token` (admin).


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `language_id` | int | ➖ | Til ID (`GET /admin/languages`). Berilsa shkala shu tilning
  `language.scale` ustunidan avtomatik aniqlanadi va `scale` param e'tiborsiz qoldiriladi.
  Mavjud bo'lmagan ID → bo'sh massiv. |

  | `scale` | string | ➖ | Bitta shkala darajalarini filtrlash: `cefr` \| `hsk` \|
  `topik` \| `jlpt` \| `torfl` \| `ilr` \| `actfl` \| `clb` \| `nclc` \| `testdaf` \|
  `tocfl` \| `stanag` \| `oet` \| `dsh` \| `nt2` \| `eiken`. Faqat `language_id`
  berilmaganda ishlaydi. Ikkalasi ham berilmasa — barcha darajalar. |


  ### 📤 Response (`data`)


  Massiv: `[{ id, code, name: { uz, ru, en }, name_localized, scale }]` (`code` masalan
  `A1` / `jlpt_n1`; `scale` — daraja shkalasi; `name` — tahrirlash uchun xom i18n map;
  `name_localized` — `Accept-Language` bo'yicha string).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
