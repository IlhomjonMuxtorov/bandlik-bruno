docs: >
  Til bilish darajalari ro'yxati (A1..C2, native) — leadlar Filter panelidagi
  "Tillar" daraja dropdowni uchun.


  **Auth:** `access_token` (admin).


  ### 📤 Response (`data`)

  Massiv: `[{ id, code, name }]` (`code` masalan `A1`/`B2`/`native`; `name` —
  `Accept-Language` bo'yicha string).
