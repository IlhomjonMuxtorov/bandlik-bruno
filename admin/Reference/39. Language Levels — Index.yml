info:
  name: Language Levels тАФ Index
  type: http
  seq: 39
http:
  method: GET
  url: '{{base_url}}/admin/language-levels'
  auth: inherit
params:
  - name: scale
    value: jlpt
    type: query
    enabled: false
headers:
  - name: Accept-Language
    value: uz
    enabled: true
docs: >
  Til bilish darajalari ro'yxati тАФ leadlar Filter paneli va til tanlash dropdowni
  uchun. `scale` bilan bitta shkala darajalarini filtrlash mumkin.


  **Auth:** `access_token` (admin).


  ### ЁЯФО Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `scale` | string | тЮЦ | Bitta shkala darajalarini filtrlash: `cefr` \| `hsk` \|
  `topik` \| `jlpt` \| `torfl` \| `ilr` \| `actfl` \| `clb` \| `nclc` \| `testdaf` \|
  `tocfl` \| `stanag` \| `oet` \| `dsh` \| `nt2` \| `eiken`. Berilmasa тАФ barcha darajalar. |


  ### ЁЯУд Response (`data`)


  Massiv: `[{ id, code, name: { uz, ru, en }, name_localized, scale }]` (`code` masalan
  `A1` / `jlpt_n1`; `scale` тАФ daraja shkalasi; `name` тАФ tahrirlash uchun xom i18n map;
  `name_localized` тАФ `Accept-Language` bo'yicha string).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
