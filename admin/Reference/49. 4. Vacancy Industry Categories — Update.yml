docs: |
  Kategoriyani yangilaydi. Faqat yuborilgan maydonlar o'zgaradi (partial update).

  **Auth:** `admin_token` (faqat `admin`).

  ### 📥 Request Body (multipart/form-data)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | object (JSON) | ➖ | `{"uz": "...", "ru": "...", "en": "..."}`. |
  | `is_active` | int (0\|1) | ➖ | Faollik holati. |
  | `sort_order` | int (≥ 0) | ➖ | Tartib raqami. |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Kategoriya topilmadi |
  | `422` | Validatsiya xatosi (bo'sh `name`). |
