  Millat ma'lumotlarini yangilash (qisman update — faqat yuborilgan maydonlar o'zgaradi).

  **Auth:** `admin_token`.

  ### 📥 Request Body (multipart/form-data)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | object (JSON) | ➖ | `{"uz": "...", "ru": "...", "en": "..."}` |
  | `is_active` | int (0\|1) | ➖ | |
  | `sort_order` | int | ➖ | |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Millat topilmadi |
