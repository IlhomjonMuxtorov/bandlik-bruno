info:
  name: 10. 1. Regions тАФ Index
  type: http
  seq: 10
http:
  method: GET
  url: '{{base_url}}/admin/regions'
  auth: inherit
docs: 'Viloyatlar ro''yxati (paginatsiya bilan).


  > Ro''yxat `Accept-Language` bo''yicha alifbo (A-Z) tartibida qaytadi (fallback
  `uz`) тАФ `sort_order` emas, agar `sort` yuborilmagan bo''lsa.


  **Auth:** `admin_token`.


  ### ЁЯФО Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | тЮЦ | Nom bo''yicha qidiruv (JSONB `name` bo''yicha `ILIKE`). |

  | `is_active` | int (0\|1) | тЮЦ | Faolligi bo''yicha filtr. |

  | `page` | int | тЮЦ | Sahifa raqami (default `1`). |

  | `per-page` | int | тЮЦ | Sahifa hajmi (1тАУ300, default `20`). |

  | `sort` | string | тЮЦ | Berilmasa тАФ A-Z. `sort_order` тАФ eski tahririy tartib.
  Ruxsat etilgan: `id` \| `-id` \| `sort_order` \| `-sort_order` \| `created_at` \|
  `-created_at`. |


  ### ЁЯУЛ Headers


  | Header | Required | Description |

  |---|:---:|---|

  | `Authorization` | тЬЕ | `Bearer {{ _.admin_token }}` |

  | `Accept-Language` | тЮЦ | `uz` \| `ru` \| `en`. Default: `uz`. |


  ### ЁЯУд Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | GCP SP_ID |

  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |

  | `is_active` | bool | |

  | `sort_order` | int | |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
