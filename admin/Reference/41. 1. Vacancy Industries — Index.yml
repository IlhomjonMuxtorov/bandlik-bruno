info:
  name: 41. 1. Vacancy Industries тАФ Index
  type: http
  seq: 41
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-industries'
  auth: inherit
docs: |
  Vakansiya sohalarini boshqarish ro'yxati (paginatsiya bilan). Faol va nofaol
  yozuvlar ham qaytadi, barcha tillar bilan.

  **Auth:** `admin_token` (faqat `admin`).

  > Forma uchun yengil dropdown kerak bo'lsa тАФ `Vacancies` kolleksiyasidagi
  > `GET /admin/vacancies/industries` (admin + org user uchun ochiq) dan foydalaning.

  ### ЁЯФО Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `q` | string | тЮЦ | Nom (`uz`/`ru`/`en`) yoki `code` bo'yicha qidiruv (`ILIKE`). |
  | `is_active` | int (0\|1) | тЮЦ | Faolligi bo'yicha filtr. |
  | `page` | int | тЮЦ | Sahifa raqami (default `1`). |
  | `per-page` | int | тЮЦ | Sahifa hajmi (1тАУ100, default `20`). |

  ### ЁЯУЛ Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | тЬЕ | `Bearer {{ _.admin_token }}` |

  ### ЁЯУд Response (`data.items[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | |
  | `code` | string | Mashina kaliti (masalan `restaurant`) |
  | `name` | object | Barcha tillar: `{"uz": "...", "ru": "...", "en": "..."}` |
  | `icon` | string \| null | Ikonka nomi (masalan `utensils`) |
  | `is_active` | bool | |
  | `sort_order` | int | |
  | `created_at` | int | Unix timestamp |
  | `created_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |
  | `updated_at` | int | Unix timestamp |
  | `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  > `data.pagination` тАФ `page`, `page_size`, `total_count`, `page_count`.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
