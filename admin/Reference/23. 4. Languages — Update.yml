docs: 'Til ma''lumotlarini yangilash (qisman update).


  **Auth:** `admin_token`.


  ### 📥 Request Body (multipart/form-data)


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `name` | object (JSON) | ➖ | `{"uz": "...", "ru": "...", "en": "..."}` |

  | `iso_code` | string (max 5) | ➖ | Unikal ISO kod |

  | `scale` | string | ➖ | Daraja shkalasi: `cefr` \| `hsk` \| `topik` \| `jlpt` \| `torfl` \| `ilr` \| `actfl` \| `clb` \| `nclc` \| `testdaf` \| `tocfl` \| `stanag` \| `oet` \| `dsh` \| `nt2` \| `eiken`. |

  | `is_active` | int (0\|1) | ➖ | |

  | `sort_order` | int | ➖ | |

  '
settings:
