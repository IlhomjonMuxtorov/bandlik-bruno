http:
  method: POST
  url: '{{base_url}}/admin/languages/1'
  body:
    type: multipartForm
    data:
    - name: name
      value: '{"uz": "O''zbek (yangilandi)", "ru": "Узбекский (обновлено)", "en": "Uzbek
        (updated)"}'
    - name: iso_code
