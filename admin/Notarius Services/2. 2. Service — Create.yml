info:
  name: 2. Service — Create
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/admin/notarius-services'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"name\": {\"uz\": \"Hujjatlarni notarial tasdiqlash\", \"ru\": \"Нотариальное заверение документов\", \"en\": \"Notarial certification\"}\
      ,\n  \"description\": \"Pasport nusxasi, diplom, sertifikat va boshqa hujjatlarni\
      \ tasdiqlash\",\n  \"price\": 123456000,\n  \"is_active\": 1,\n  \"sort_order\"\
      : 0\n}"
  auth: inherit
docs: 'Yangi Visa xizmatini yaratadi.


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `organization_id` | int | ✅ | Visa `organization.id` (type = 2 bo''lishi shart)
  |

  | `name` | object | ✅ | Ko''p tilli `{uz, ru, en}` (har biri max 200). Oddiy string ham
  qabul qilinadi → `{uz}`. |

  | `description` | object | ➖ | Ko''p tilli `{uz, ru, en}` |

  | `price` | int | ✅ | UZS so''mda — major unit (≥0), tiyin EMAS |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `sort_order` | int | ➖ | Default `0` |


  > **Birlik:** client `price` ni so''mda (major unit) yuboradi — backend uni tiyinda
  saqlaydi va javobda yana so''mda qaytaradi.


  > **Ko''p tillilik:** `name`, `description` — JSONB `{uz, ru, en}` obyekt sifatida saqlanadi
  (oddiy string yuborilsa `{uz}` ga o''raladi). Misol:
  `"name": { "uz": "...", "ru": "...", "en": "..." }`.


  ### 📤 Response


  `201` — `OrganizationServiceOutputDTO`. Ko''p tilli maydonlar xom `{uz, ru, en}` obyekt +
  joriy til (`Accept-Language`) uchun `name_localized` / `description_localized` string bilan qaytadi.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi (`organization_id` topilmadi yoki type mismatch) |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
