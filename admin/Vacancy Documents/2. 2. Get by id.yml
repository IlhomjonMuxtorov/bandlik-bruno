info:
  name: Document — Get by id
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-documents/:id'
  auth: inherit
params:
  path:
  - name: id
    value: '1'
docs: |
  Bitta vakansiya hujjati katalog elementini id bo'yicha qaytaradi.

  **Auth:** Faqat `admin_token`.

  ### 🔎 Path Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `id` | int | ✅ | Hujjat katalog elementi ID |

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | ID |
  | `name` | object | `{ uz, ru, en }` — multilingual nom |
  | `description` | object\|null | `{ uz, ru, en }` — multilingual tavsif. `null` — kiritilmagan |
  | `created_at` | string | ISO 8601 |
  | `updated_at` | string | ISO 8601 |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | `referenceView` ruxsati yo'q |
  | `404` | Berilgan id bo'yicha hujjat topilmadi |
