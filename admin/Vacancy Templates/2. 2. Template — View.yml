info:
  name: 2. Template — View
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/vacancy-templates/1'
  auth: inherit
docs: |
  Bitta shablonni to'liq ma'lumotlari bilan qaytaradi (`payload` JSON snapshot bilan birga).

  **Auth:** `admin_token` yoki shablon egasi tashkilot foydalanuvchisi.

  - **Admin** — istalgan shablonni ko'ra oladi.
  - **Tashkilot foydalanuvchisi** — faqat **o'z tashkiloti**ning shablonini; boshqa tashkilotniki → `403`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Shablon ID |
  | `organization_id` | int | Tashkilot ID |
  | `organization_name` | string \| null | Tashkilot nomi (`Accept-Language` bo'yicha locale; `null` mumkin) |
  | `name` | string | Shablon nomi |
  | `description` | string \| null | Tavsif (`null` mumkin) |
  | `payload` | object | Vacancy form JSON snapshot — yangi vakansiya yaratishda formaga qayta yuklash uchun ishlatiladi (erkin sxema, Vacancy Create body'si bilan bir xil) |
  | `is_active` | bool | Faol/nofaol holat |
  | `created_at` | int | Unix timestamp |
  | `created_at_formatted` | string | `d.m.Y H:i` (masalan `25.06.2024 14:30`) |
  | `updated_at` | int | Unix timestamp |
  | `updated_at_formatted` | string | `d.m.Y H:i` |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki eskirgan |
  | `403` | Non-admin boshqa tashkilot shablonini so'radi |
  | `404` | Shablon topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
