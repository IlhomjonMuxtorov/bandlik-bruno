docs: |
  Yangi Ish beruvchi tashkilotini yaratadi. Request body XBA `Create` bilan bir xil shaklda — yagona farq: `type = 2` saqlanadi va fayllar `@storage/web/source/organization/employer/*` ga yuklanadi.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  XBA `Create` endpointidagi to'liq ro'yxat (`name`, `brand_name`, `legal_name`, `description`, `license_number`, `region_id`, `district_id`, `address`, `phone`, `email`, `website_url`, `responsible_person`, `login`, `password`, social URL'lar, `license_file`, `logo`).

  ### 📤 Response

  `201` — `OrganizationOutputDTO` (`type = 2`).

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi |

