docs: 'Xodim ma''lumotlarini yangilaydi (partial — faqat yuborilgan maydonlar o''zgaradi).
  `country_id` / `city_id` yuborilsa xodim joylashuvi yangilanadi; `null` yuborish
  qiymatni o''chirmaydi. `organization_id` almashtirilsa va joylashuv yuborilmasa —
  yangi tashkilot joylashuvi avtomatik olinadi.


  **Auth:** `admin_token`.

  '
