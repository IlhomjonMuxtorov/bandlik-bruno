info:
  name: 8. Employee — Reset Password
  type: http
  seq: 8
http:
  method: POST
  url: '{{base_url}}/admin/employer-employees/1/reset-password'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"password\": \"newSecret8\",\n  \"password_repeat\": \"newSecret8\"\n}"
  auth: inherit
docs: |-
  Tashkilotning ma'sul shaxsi (org egasi / admin) boshqa xodimning **login parolini**
  almashtiradi. Yangi parolni ma'sul shaxs o'zi kiritadi; muvaffaqiyatdan keyin
  xodimning refresh tokenlari bekor qilinadi (qayta to'liq login talab qilinadi;
  amaldagi access token o'z muddati tugaguncha ishlaydi). Hodisa audit log'ga
  yoziladi (parol hech qachon yozilmaydi).

  **Auth:** `admin_token`. **Permission:** `employeePasswordReset`.

  Cheklovlar:
  - Xodim aktorning tashkilotiga tegishli bo'lishi kerak (platform admin uchun har qanday).
  - Tashkilot egasi (`role='admin'`) parolini faqat platform admin reset qila oladi.
  - Xodimda login user (`user_id`) bo'lishi shart.
  - O'z hisobingiz uchun emas — `me/change-password` ishlating.

  ### 📥 Request Body (JSON)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `password` | string | ✅ | Yangi login parol. Min 8 belgi |
  | `password_repeat` | string | ✅ | Parol takrori; `password` bilan bir xil bo'lishi shart |

  ### 📤 Response

  `200` — `{ success: true, message: "Password reset" }`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q/eskirgan |
  | `403` | `employeePasswordReset` yo'q; boshqa tashkilot xodimi; egasi paroli |
  | `404` | Xodim topilmadi |
  | `422` | `password` bo'sh / < 8 belgi; `password_repeat` mos emas; login user yo'q; o'zini reset |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
