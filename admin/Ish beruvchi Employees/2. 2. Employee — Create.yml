info:
  name: 2. Employee — Create
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/admin/employer-employees'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"firstname\": \"Rustam\",\n  \"lastname\": \"Qodirov\",\n  \"patronymic\": null,\n  \"phone\": \"+998942030000\",\n  \"role\": \"XBA agenti 1\",\n  \"country_id\": 1,\n  \"city_id\": 1,\n  \"is_active\": 1\n}"
  auth: inherit
docs: 'Yangi xodim qo''shadi. `joined_at` yuborilmasa hozirgi vaqt sifatida o''rnatiladi.
  Joylashuv maydonlaridan (`country_id`, `city_id`) hech biri yuborilmasa — tashkilotning
  joylashuvi avtomatik olinadi (bittasi yuborilsa meros ishlamaydi). `city_id` tanlangan
  `country_id`ga tegishli bo''lishi tekshiriladi.


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `organization_id` | int | ✅ | Visa `organization.id` (type = 2) |

  | `user_id` | int | ➖ | Agar xodim alohida login olsa |

  | `firstname`  | string       | ✅ | Ism. Max 100 |

  | `lastname`   | string       | ✅ | Familya. Max 100 |

  | `patronymic` | string\|null | ➖ | Otasining ismi. Max 100. `null` — yo''q yoki noma''lum |

  | `phone` | string | ➖ | Max 20 |

  | `role` | string | ✅ | "XBA agenti 1", "XBA admin", ... (max 50, erkin string)
  |

  | `country_id` | int | ➖ | Davlat `country.id`. Yuborilmasa tashkilotniki olinadi |

  | `city_id` | int | ➖ | Shahar `city.id`. Yuborilmasa tashkilotniki olinadi |

  | `joined_at` | int | ➖ | Unix timestamp. Default = hozir |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |


  ### 📤 Response


  `201` — `OrganizationEmployeeOutputDTO` (`country` / `city` obyektlari — `{id,
  name: {uz, ru, en}}` yoki `null`).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi |

  '
