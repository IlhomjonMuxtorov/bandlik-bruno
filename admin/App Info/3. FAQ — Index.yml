info:
  name: 3. FAQ — Index
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/faqs'
  body:
    type: none
  auth: inherit
docs: |
  FAQ yozuvlari ro'yxati (aktiv + nofaol), `sort_order` bo'yicha. Sahifalangan (`per-page`, `page` query paramlari). Har bir yozuv uch tilda to'liq qaytariladi.

  > **Ko'p tillilik:** `question` / `answer` xom `{uz, ru, en}` obyekt; qo'shimcha `question_localized` / `answer_localized` joriy til (`Accept-Language`, fallback `uz`) uchun string.

  **Auth:** `admin_token`.

  ### 📤 Response

  ```json
  {
    "success": true,
    "data": {
      "items": [
        {
          "id": 1,
          "question": {"uz": "...", "ru": "...", "en": "..."},
          "question_localized": "...",
          "answer": {"uz": "...", "ru": "...", "en": "..."},
          "answer_localized": "...",
          "sort_order": 1,
          "is_active": true,
          "created_at": 1739000000,
          "updated_at": 1739000000
        }
      ],
      "pagination": {"page": 1, "page_size": 20, "total_count": 3, "page_count": 1}
    },
    "message": "",
    "errors": {}
  }
  ```
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
