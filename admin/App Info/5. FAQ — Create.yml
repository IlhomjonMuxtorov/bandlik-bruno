info:
  name: 5. FAQ — Create
  type: http
  seq: 5
http:
  method: POST
  url: '{{base_url}}/admin/faqs'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "question": {"uz": "Ariza qanday topshiriladi?", "ru": "Как подать заявку?", "en": "How do I submit an application?"},
        "answer": {"uz": "Vakansiyani tanlang ...", "ru": "Выберите вакансию ...", "en": "Choose a vacancy ..."},
        "sort_order": 1,
        "is_active": 1
      }
  auth: inherit
docs: |
  Yangi FAQ yozuvi qo'shadi. `application/json` so'rov.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `question` | object (JSON) | ✅ | `{"uz": "...", "ru": "...", "en": "..."}` |
  | `answer` | object (JSON) | ✅ | `{"uz": "...", "ru": "...", "en": "..."}` |
  | `sort_order` | int | ➖ | Default: 0 |
  | `is_active` | int (0\|1) | ➖ | Default: 1 |

  Qo'shilgandan keyin mobil `faq` keshi avtomatik tozalanadi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi (`question`/`answer` majburiy) |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
