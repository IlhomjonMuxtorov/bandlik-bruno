docs: 'Yangi hujjat turini yaratadi.


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `code` | string | ✅ | Pattern `/^[a-z0-9_]+$/`, max 50, unique |

  | `name` | object | ✅ | `{uz, ru, en}` — kamida `uz` kaliti bo''lishi shart |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `sort_order` | int | ➖ | Default `0` |


  ### 📤 Response


  `201` — `NotaryDocumentTypeOutputDTO`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | `code` duplicate yoki regex-ga mos kelmadi; `name.uz` bo''sh |

  '
