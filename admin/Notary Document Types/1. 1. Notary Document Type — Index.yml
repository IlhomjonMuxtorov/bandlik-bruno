docs: 'Notarius hujjat turlari ro''yxati (Pasport, Diplom, Tug''ilganlik haqida guvohnoma, тАж).
  Skrinshotdagi "Hujjat turi" dropdownini to''ldirish uchun ishlatiladi.


  **Auth:** `admin_token`.


  ### ЁЯФО Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | тЮЦ | `code` yoki `name->>''uz''/''ru''/''en''` bo''yicha ILIKE |

  | `is_active` | int (0\|1) | тЮЦ | |

  | `page`, `per-page` | int | тЮЦ | Pagination |

  | `sort` | string | тЮЦ | `id` \| `sort_order` \| `code` \| `created_at` |


  ### ЁЯУд Response (`data.items[]`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | |

  | `code` | string | `passport`, `diploma`, тАж |

  | `name` | object | `{uz, ru, en}` JSONB |

  | `name_localized` | string | `Accept-Language` header bo''yicha tanlangan til |

  | `is_active` | bool | |

  | `sort_order` | int | |

  | `created_at` / `updated_at` | int | |

  | `created_at_formatted` / `updated_at_formatted` | string | `d.m.Y H:i` (Asia/Tashkent) |

  '
