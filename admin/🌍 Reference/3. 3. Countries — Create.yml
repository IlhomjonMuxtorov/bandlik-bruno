info:
  name: 3. Countries — Create
  type: http
  seq: 3
http:
  method: POST
  url: '{{ base_url }}/admin/countries'
  body:
    type: multipartForm
    data:
    - name: name
      value: '{"uz": "Germaniya", "ru": "Германия", "en": "Germany"}'
    - name: iso_code
      value: DE
    - name: is_visa_available
      value: '1'
    - name: is_active
      value: '1'
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
