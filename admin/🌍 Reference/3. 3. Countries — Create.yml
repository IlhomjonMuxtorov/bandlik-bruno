info:
  name: 3. Countries — Create
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/countries'
  body:
    type: multipartForm
    data:
    - name: name
      value: '{"uz": "Germaniya", "ru": "Германия", "en": "Germany"}'
    - name: iso_code
      value: DE
    - name: is_visa_available
      value: '1'
    - name: is_active
      value: '1'
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  This endpoint handles POST request.
  
  ### 📤 Response
  
  | Field | Type | Description |
  |---|---|---|
  | `success` | boolean | Request success status |
  | `data` | object | Response data |
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `400` | Invalid request data |
  | `401` | Unauthorized |
  | `404` | Not found |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
