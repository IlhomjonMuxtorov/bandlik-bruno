info:
  name: 5. Finance — Payments Overview
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/admin/reports/finance/payments-overview?from=1735603200&to=1738281600&currency=UZS'
  auth: inherit
docs: |
  "To'lovlar" sahifasidagi 4 ta stat-karta uchun jami ko'rsatkichlar:
  Jami daromad, Ushlab turilmoqda, Tasdiqlangan, Tranzaksiyalar soni.

  **Auth:** `admin_token` (faqat `UserType::Admin`).

  ### 🔎 Query Params

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `from` | int | ➖ | Default: oy boshi |
  | `to` | int | ➖ | Default: hozir |
  | `currency` | string | ➖ | Default `UZS` |
  | `organization_id` | int | ➖ | Berilsa — kartalar faqat shu tashkilot bo'yicha hisoblanadi (bitta tashkilot dashboardi). |

  ### 📤 Response

  > Pul ko'rsatkichlari (`total_income`, `total_held`, `total_released`) —
  > **so'm**da (valyutaga mos major unit; DB tiyinda saqlaydi).

  ```json
  {
    "from": 1735603200,
    "to": 1738281600,
    "currency": "UZS",
    "organization_id": null,
    "total_income": 287600000,
    "total_held": 98500000,
    "total_released": 186200000,
    "transaction_count": 2847
  }
  ```

  > `organization_id` berilganda `total_held` o'sha tashkilotning release qilinmagan escrow'i (wallet_entry asosida) bo'yicha hisoblanadi; aks holda butun platforma `Platform.hold_balance` snapshot'i.

  **Maydonlar:**

  | Field | Hisob |
  |---|---|
  | `total_income` | Jami daromad — `SUM(amount)` CandidatePayment + Completed (davr) |
  | `total_held` | Ushlab turilmoqda — joriy `Platform.hold_balance` (escrow snapshot, davrga bog'liq emas) |
  | `total_released` | Tasdiqlangan — davrda tashkilotlarga release qilingan escrow (InternalTransfer → organization balance CREDIT) |
  | `transaction_count` | Davrdagi tranzaksiyalar soni |

  > Taxminiy tenglik: `total_income ≈ total_commission + total_held + total_released`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Admin emas |
