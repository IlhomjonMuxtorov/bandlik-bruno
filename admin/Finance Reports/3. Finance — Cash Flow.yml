docs: 'Kunlik cash flow grafikasi — har kun uchun kirim/chiqim summasi. Dashboard
  diagrammasi uchun ishlatiladi.


  **Auth:** `admin_token`. Permission: `reportView`.


  ### 🔎 Query Params


  | Param | Type | Description |

  |---|---|---|

  | `from` / `to` | int | Davr |

  | `currency` | string | Default `UZS` |


  ### 📤 Response


  ```json

  {

    "from": 1735603200,

    "to": 1738281600,

    "currency": "UZS",

    "daily": [

      { "date": 1735603200, "income": 10000000, "expense": 1000000 },

      { "date": 1735689600, "income": 8500000, "expense": 0 },

      { "date": 1735776000, "income": 12000000, "expense": 3000000 }

    ]

  }

  ```


  `income` / `expense` — **so''m**da (valyutaga mos major unit; DB tiyinda saqlaydi).
  `date` — kun boshining unix timestamp''i (UTC 00:00:00). Faqat tranzaksiya bo''lgan
  kunlar ko''rinadi (bo''sh kunlar yo''q — frontend o''zi to''ldirishi kerak agar
  kerak bo''lsa).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Admin emas |

  '
