info:
  name: 2. Notification — Unread Count
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/notifications/unread-count'
  auth: inherit
docs: |
  Joriy foydalanuvchining o'qilmagan bildirishnomalari soni. Header'dagi
  qo'ng'iroqcha (Bell) badge shu qiymatni ko'rsatadi; `0` bo'lsa badge
  yashiriladi.

  **Auth:** `admin_token`.

  ### 📤 Response

  | Field | Type | Description |
  |---|---|---|
  | `count` | int | O'qilmagan bildirishnomalar soni |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
