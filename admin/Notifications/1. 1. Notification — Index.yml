info:
  name: 1. Notification — Index
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/notifications?unread=0&per-page=20'
  headers:
  - name: Accept-Language
    value: uz
  auth: inherit
docs: |
  Joriy (autentifikatsiya qilingan) foydalanuvchining o'z bildirishnomalari,
  eng yangisidan boshlab. In-app notification-center (Eslatmalar paneli) shu
  ro'yxatdan foydalanadi. Har bir foydalanuvchi **faqat o'zining**
  bildirishnomalarini ko'radi (maxsus permission talab qilinmaydi — token
  yetarli). `title`/`body` `Accept-Language` bo'yicha render qilinadi.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `unread` | int | ➖ | `1` — faqat o'qilmaganlar; `0`/yo'q — barchasi. Default: `0`. |
  | `per-page` | int | ➖ | Sahifadagi soni (1–100). Default: `20`. |
  | `page` | int | ➖ | Sahifa raqami. Default: `1`. |

  ### 📋 Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ✅ | `Bearer {admin_token}` |
  | `Accept-Language` | ➖ | `uz` \| `ru` \| `en`. Default: `uz` |

  ### 📤 Response

  `data.items[]` — bildirishnoma, `data.pagination` — sahifalash metadatasi.

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Bildirishnoma ID |
  | `type` | string | Turi, mas: `contract_pending_approval` |
  | `title` | string | Render qilingan sarlavha (so'ralgan til) |
  | `body` | string | Render qilingan matn (so'ralgan til) |
  | `url` | string \| null | Bosilganda o'tiladigan deep-link; hodisada link bo'lmasa `null` |
  | `contract_id` | int \| null | `contract_*` turlari uchun tegishli shartnoma ID; boshqa turlarda `null` |
  | `is_read` | bool | O'qilgan holati |
  | `created_at` | int | Yaratilgan vaqt (unix, sekund) |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
