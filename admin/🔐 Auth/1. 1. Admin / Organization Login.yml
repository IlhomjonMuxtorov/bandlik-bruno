info:
  name: 1. Admin / Organization Login
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url}}/admin/auth/login'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"login\": \"admin\",\n  \"password\": \"secret\"\n}"
  auth: inherit
docs: |
  This endpoint handles POST request.
  
  ### 📥 Request Body
  
  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `login` | string | ✅ | — |
  | `password` | string | ✅ | — |
  
  ### 📤 Response
  
  | Field | Type | Description |
  |---|---|---|
  | `success` | boolean | Request success status |
  | `data` | object | Response data |
  
  ### ⚠️ Errors
  
  | Code | Reason |
  |---|---|
  | `400` | Invalid request data |
  | `401` | Unauthorized |
  | `404` | Not found |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
tests: "const body = insomnia.response.json();\nconst token = body?.data?.token;\nif (token) {\n  insomnia.baseEnvironment.set('admin_token', token);\n  console.log('admin_token saved');\n} else {\n  console.warn('Login response did not contain data.token');\n}"
