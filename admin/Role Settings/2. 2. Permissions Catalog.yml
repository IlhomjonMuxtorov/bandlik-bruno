info:
  name: 2. Permissions Catalog
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/roles/permissions'
  auth: inherit
docs: |-
  To'liq permission katalogi — rol muharririda permission tanlash uchun.
  Permission'lar o'zgarmas (kod/seeder bilan aniqlangan); bu yerda faqat
  ro'yxat o'qiladi.

  **Auth:** `admin_token`. **Permission:** `roleView`.

  ### 📤 Response

  `data` — permission massivi:

  | Field | Type | Description |
  |---|---|---|
  | `name` | string | Permission kaliti (`<module><Action>`, masalan `vacancyManage`) |
  | `description` | string \| null | Inson o'qiy oladigan tavsif |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q yoki noto'g'ri |
  | `403` | `roleView` permission yo'q |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
