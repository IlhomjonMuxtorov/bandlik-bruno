http:
  method: GET
  url: '{{base_url}}/admin/logistics?per-page=20'
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Logistika tashkilotlari ro'yxati. Faqat `type = 2` yozuvlar qaytadi.

  **Auth:** `admin_token`.

  ### ЁЯФО Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `is_active`, `page`, `per-page`.

  ### ЁЯУд Response

  `data.items[]` тАФ `OrganizationOutputDTO` (`type = 2`, `type_label = "Logistika"`).

