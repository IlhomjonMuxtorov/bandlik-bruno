docs: 'Yangi O''quv markazi yaratadi. `application/json` so''rov. `type` avtomatik
  `8` (EDUCATIONAL_CENTER) o''rnatiladi.


  **Auth:** `admin_token`.


  ### 📥 Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `name` | string | ✅ | O''quv markazi nomi — bitta tilli (max 200) |

  | `brand_name` | string | ➖ | Brend nomi (mockup''da "Thompson School filial Oybek") |

  | `legal_name` | string | ➖ | Yuridik nomi |

  | `description` | object | ➖ | Ko''p tilli `{uz, ru, en}` |

  | `license_number` | string | ✅ | Unique `(type, license_number)` — max 64 |

  | `region_id` | int | ✅ | Viloyat ID (O''zbekiston) |

  | `district_id` | int | ✅ | Tuman ID |

  | `latitude` | float | ➖ | Geo kenglik (lat) — ixtiyoriy. Oraliq `-90`..`90`. |

  | `longitude` | float | ➖ | Geo uzunlik (lng) — ixtiyoriy. Oraliq `-180`..`180`. |

  | `address` | string | ✅ | Manzil (1-qator) — bitta tilli (max 500) |

  | `address2` | string | ➖ | Manzil (2-qator) — kvartira / ofis va h.k. (max 500) |

  | `state` | string | ➖ | Shtat / viloyat / o''lka nomi (max 150) |

  | `postal_code` | string | ➖ | Pochta indeksi (max 30) |

  | `phone` | string | ✅ | Max 20 |

  | `email` | string | ➖ | |

  | `website_url` | string | ➖ | https:// boshlanadi |

  | `responsible_first_name` | string | ✅ | Mas''ul shaxs ismi (max 100) |

  | `responsible_last_name` | string | ✅ | Mas''ul shaxs familiyasi (max 100) |

  | `responsible_middle_name` | string | ➖ | Mas''ul shaxs otasining ismi / sharifi (max 100) |

  | `login` | string | ✅ | Partner panel uchun login (min 3) |

  | `password` | string | ✅ | Min 6 |

  | `telegram_url` / `instagram_url` / `facebook_url` / `x_url` | string | ➖ | https:// |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `license_file_ids` | int[] | ➖ | Oldindan `/admin/upload` orqali yuklangan litsenziya fayl ID''lari massivi. Bir nechta hujjat biriktirish mumkin (to''liq to''plam; `[]` — tozalash). |

  | `logo_id` | int | ➖ | Logo fayl ID |


  ### 📤 Response


  `201` — `OrganizationOutputDTO`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi (licence_number duplicate, login band, va h.k.) |

  | `400` | Fayl ID topilmadi yoki `status=uploading` |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
