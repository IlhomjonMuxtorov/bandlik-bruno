docs: 'Yangi O''quv markazi yaratadi. `application/json` so''rov. `type` avtomatik
  `8` (EDUCATIONAL_CENTER) o''rnatiladi.


  **Auth:** `admin_token`.


  ### ЁЯУе Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `name` | object | тЬЕ | Ko''p tilli `{uz, ru, en}` (har biri max 200). Oddiy string тЖТ `{uz}`. |

  | `brand_name` | string | тЮЦ | Brend nomi (mockup''da "Thompson School filial Oybek") |

  | `legal_name` | string | тЮЦ | Yuridik nomi |

  | `description` | object | тЮЦ | Ko''p tilli `{uz, ru, en}` |

  | `license_number` | string | тЬЕ | Unique `(type, license_number)` тАФ max 64 |

  | `region_id` | int | тЬЕ | Viloyat ID (O''zbekiston) |

  | `district_id` | int | тЬЕ | Tuman ID |

  | `address` | object | тЬЕ | Ko''p tilli `{uz, ru, en}` (har biri max 500) |

  | `phone` | string | тЬЕ | Max 20 |

  | `email` | string | тЮЦ | |

  | `website_url` | string | тЮЦ | https:// boshlanadi |

  | `responsible_person` | string | тЬЕ | Mas''ul shaxs F.I.SH (mockup''da "Masul shaxs Timurbek Azizov") |

  | `login` | string | тЬЕ | Partner panel uchun login (min 3) |

  | `password` | string | тЬЕ | Min 6 |

  | `telegram_url` / `instagram_url` / `facebook_url` / `x_url` | string | тЮЦ | https:// |

  | `is_active` | bool (0\|1) | тЮЦ | Default `1` |

  | `license_file_id` | int | тЮЦ | Oldindan `/admin/upload` orqali yuklangan litsenziya fayl ID |

  | `logo_id` | int | тЮЦ | Logo fayl ID |


  ### ЁЯУд Response


  `201` тАФ `OrganizationOutputDTO`.


  ### тЪая╕П Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi (licence_number duplicate, login band, va h.k.) |

  | `400` | Fayl ID topilmadi yoki `status=uploading` |

  '
