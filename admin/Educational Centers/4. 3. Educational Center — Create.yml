docs: 'Yangi O''quv markazi yaratadi. `application/json` so''rov. `type` avtomatik
  `8` (EDUCATIONAL_CENTER) o''rnatiladi.


  **Auth:** `admin_token`.


  ### üì• Request Body


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `name` | string | ‚úÖ | O''quv markazi nomi ‚Äî bitta tilli (max 200) |

  | `brand_name` | string | ‚ûñ | Brend nomi (mockup''da "Thompson School filial Oybek") |

  | `legal_name` | string | ‚ûñ | Yuridik nomi |

  | `description` | object | ‚ûñ | Ko''p tilli `{uz, ru, en}` |

  | `license_number` | string | ‚úÖ | Unique `(type, license_number)` ‚Äî max 64 |

  | `region_id` | int | ‚úÖ | Viloyat ID (O''zbekiston) |

  | `district_id` | int | ‚úÖ | Tuman ID |

  | `latitude` | float | ‚ûñ | Geo kenglik (lat) ‚Äî ixtiyoriy. Oraliq `-90`..`90`. |

  | `longitude` | float | ‚ûñ | Geo uzunlik (lng) ‚Äî ixtiyoriy. Oraliq `-180`..`180`. |

  | `address` | object | ‚úÖ | Ko''p tilli `{uz, ru, en}` (har biri max 500) |

  | `phone` | string | ‚úÖ | Max 20 |

  | `email` | string | ‚ûñ | |

  | `website_url` | string | ‚ûñ | https:// boshlanadi |

  | `responsible_first_name` | string | ‚úÖ | Mas''ul shaxs ismi (max 100) |

  | `responsible_last_name` | string | ‚úÖ | Mas''ul shaxs familiyasi (max 100) |

  | `responsible_middle_name` | string | ‚ûñ | Mas''ul shaxs otasining ismi / sharifi (max 100) |

  | `login` | string | ‚úÖ | Partner panel uchun login (min 3) |

  | `password` | string | ‚úÖ | Min 6 |

  | `telegram_url` / `instagram_url` / `facebook_url` / `x_url` | string | ‚ûñ | https:// |

  | `is_active` | bool (0\|1) | ‚ûñ | Default `1` |

  | `license_file_id` | int | ‚ûñ | Oldindan `/admin/upload` orqali yuklangan litsenziya fayl ID |

  | `logo_id` | int | ‚ûñ | Logo fayl ID |


  ### üì§ Response


  `201` ‚Äî `OrganizationOutputDTO`.


  ### ‚öÝÔ∏è Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi (licence_number duplicate, login band, va h.k.) |

  | `400` | Fayl ID topilmadi yoki `status=uploading` |

  '
