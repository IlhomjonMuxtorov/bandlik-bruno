docs: 'O''quv markazlari ro''yxati. Faqat `type = 8` (EDUCATIONAL_CENTER) yozuvlar qaytadi.


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Nom / brand / litsenziya / mas''ul / telefon bo''yicha qidiruv |

  | `region_id` | int | ➖ | Viloyat bo''yicha filtr |

  | `district_id` | int | ➖ | Tuman bo''yicha filtr |

  | `is_active` | int (0\|1) | ➖ | Faollik holatini filtr |

  | `page`, `per-page` | int | ➖ | Pagination (max per-page = 100) |


  ### 📤 Response


  `data.items[]` — `OrganizationOutputDTO` (`type = 8`, `type_label = "O''quv markazi"`).


  '
