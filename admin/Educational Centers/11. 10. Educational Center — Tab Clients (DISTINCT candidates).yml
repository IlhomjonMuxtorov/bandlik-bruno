docs: 'O''quv markazining **Mijozlar** tabi — DISTINCT o''quvchilar bo''yicha oxirgi
  buyurtma ma''lumotlari.


  Query murakkab: `organization_service_order` → kandidat → `passport_data` (F.I.SH)
  + `user.phone`, har bir kandidat uchun **oxirgi** buyurtma (`MAX(served_at|created_at)`).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Kandidat F.I.SH / telefon bo''yicha qidiruv |

  | `status` | int (1\|2\|3) | ➖ | Buyurtma statusi bo''yicha filtr |

  | `page`, `per-page` | int | ➖ | |


  ### 📤 Response (`data.items[]` — `OrganizationClientOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `candidate_id` | int | |

  | `full_name` | string | Latin yoki Cyrillic (passport ma''lumotidan) |

  | `phone` | string \| null | |

  | `last_amount` | int \| null | Oxirgi buyurtma to''lovi (UZS) |

  | `last_served_at` | int \| null | Oxirgi buyurtma sanasi (Unix ts) |

  | `last_status` | int | Oxirgi buyurtma statusi (1/2/3) |

  | `orders_count` | int | Shu markaz kurslariga jami yozilishlar soni |

  '
settings:
