docs: 'O''quv markazining **Kurslar** tabi (mockup''dagi "A1 Ingliz tili", "A2 Rus
  tili" kabi kartochkalar grid''i).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Nom / slug / izoh / level bo''yicha qidiruv |

  | `language_id` | int | ➖ | Til bo''yicha filtr |

  | `status` | string | ➖ | `draft` \| `active` \| `archived` |

  | `is_active` | int (0\|1) | ➖ | |

  | `page`, `per-page` | int | ➖ | Pagination |


  ### 📤 Response (`data.items[]` — `EducationalCourseOutputDTO`)


  Sahifa formati [Educational Courses / Index](#) bilan bir xil — `language`, `level`,
  `duration_hours`, `lessons_count`, `price`, `currency`, `cover_url`, `status`, `status_label`.

  '
