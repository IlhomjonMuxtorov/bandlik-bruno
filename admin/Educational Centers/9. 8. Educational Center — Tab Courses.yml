info:
  name: '8. Educational Center — Tab: Courses'
  type: http
  seq: 9
http:
  method: GET
  url: '{{base_url}}/admin/educational-centers/1/courses?per-page=20'
  auth: inherit
docs: 'O''quv markazining **Kurslar** tabi (mockup''dagi "A1 Ingliz tili", "A2 Rus
  tili" kabi kartochkalar grid''i).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Nom / slug / izoh / level bo''yicha qidiruv |

  | `language_id` | int | ➖ | Til bo''yicha filtr |

  | `status` | string | ➖ | `draft` \| `active` \| `archived` |

  | `is_active` | int (0\|1) | ➖ | |

  | `page`, `per-page` | int | ➖ | Pagination |


  ### 📤 Response (`data.items[]` — `EducationalCourseOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `id` | int | Kurs identifikatori |

  | `name` | string | Kurs nomi |

  | `slug` | string | URL-friendly kurs nomasi |

  | `description` | string \| null | Kurs tavsifi |

  | `category_id` | int \| null | Kurs turi identifikatori |

  | `category_label` | string \| null | Kurs turi nomi |

  | `language` | object \| null | Til ma''lumoti (`id`, `iso_code`, `name`) |

  | `level` | string \| null | CEFR darajasi (A1, B2, va h.k.) |

  | `duration_hours` | int \| null | Kursning davomiyligi (soatlarda) |

  | `lessons_count` | int \| null | Darslar soni |

  | `price` | int | Kurs narxi (so''m) |

  | `currency` | string | Valyuta kodi (UZS, USD, EUR) |

  | `cover_url` | string \| null | Kurs qopqog''i rasmi URL manzili |

  | `status` | string | Status (`draft` \| `active` \| `archived`) |

  | `status_label` | string | Status tarjimasi |

  | `sort_order` | int | Saralash tartibi |

  | `student_count` | int | Ushbu kursga ro''yxatdan o''tgan o''quvchilar soni |

  | `created_at` | int | Unix timestamp (yaratilgan vaqti) |

  | `created_at_formatted` | string | Insonga qarab format (O''zbekcha) |

  | `updated_at` | int | Unix timestamp (yangilangan vaqti) |

  | `updated_at_formatted` | string | Insonga qarab format (O''zbekcha) |

  '
