info:
  name: 0. Educational Center — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/educational-centers/stats'
  auth: inherit
docs: |-
  O'quv markazlari modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta):
  **Umumiy daromad**, **Shu oydagi bitiruvchilar**, **Shu oydagi daromad**, **Shu oydagi yangi qo'shilganlar**.

  **Auth:** `admin_token` — `educationalCenterView` ruxsati. SuperAdmin / Admin'dan tashqari
  barcha **XBA rollari** (`xba_admin`, `xba_manager`, `xba_operator`, `xba_viewer`) ham bu
  statistikani o'qiy oladi (faqat ko'rish; yozuv amallari `educationalCenterManage` talab qiladi).

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan kurs buyurtmalari summasi (UZS). |
  | `this_month_graduates` | int | Joriy oyda yakunlangan (`status = completed`, `served_at` shu oyda) kurs buyurtmalari soni. |
  | `this_month_revenue` | int | Joriy oyda yakunlangan kurs buyurtmalari summasi. |
  | `this_month_new_students` | int | Joriy oyda qo'shilgan (`created_at` shu oyda) distinct kandidatlar. |

  > Barcha ko'rsatkichlar `educational_course` ga bog'langan `organization_service_order`
  > yozuvlaridan, har bir o'quv markazi bo'yicha yig'iladi (`getCenterStats()` bilan bir xil
  > manba). Bitta markaz kesimidagi ko'rsatkichlar uchun **Center Stats** endpointidan foydalaning.
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
