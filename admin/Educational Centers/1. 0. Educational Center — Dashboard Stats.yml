info:
  name: 0. Educational Center — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/educational-centers/stats'
  auth: inherit
docs: |-
  O'quv markazlari modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta).

  **Auth:** `admin_token`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS). |
  | `this_month_candidates` | int | Joriy oyda shu tur vakansiyalariga kelgan nomzodlar (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan shu tur vakansiyalari. |
  | `refunded_amount` | int | Yakunlangan refund summasi (`transaction.type = REFUND`, `status = COMPLETED`). |

  > Faqat `type = EDUCATIONAL_CENTER (8)` yozuvlari bo'yicha hisoblanadi. O'quv markazlari
  > vakansiyaga ega bo'lmagani uchun `this_month_candidates` / `this_month_vacancies`
  > odatda `0`. Markazga xos batafsil ko'rsatkichlar uchun **Center Stats** endpointidan
  > foydalaning (`students_count`, `courses_count`, `this_month_revenue`).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
