http:
  method: GET
  url: '{{base_url}}/admin/educational-centers/stats'
  auth: inherit
docs: 'O''quv markazlari modulining yuqori statistika kartochkalari (sahifa ustida 4 ta karta).


  **Auth:** `admin_token`.


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS) |

  | `holding_amount` | int | Hozircha `0` placeholder — transaction moduli kelganda integratsiya |

  | `this_month_revenue` | int | Joriy oydagi yakunlangan buyurtmalar summasi |

  | `refunded_amount` | int | Hozircha `0` placeholder |


  > Faqat `type = EDUCATIONAL_CENTER (8)` yozuvlari bo''yicha hisoblanadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
