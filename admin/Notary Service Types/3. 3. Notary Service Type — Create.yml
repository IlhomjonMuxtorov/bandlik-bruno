http:
  method: POST
  url: '{{base_url}}/admin/notary-service-types'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"category\": \"other\",\n  \"code\": \"binding\",\n  \"name\": {\n\
      \    \"uz\": \"Tikish\",\n    \"ru\": \"Прошивка\",\n    \"en\": \"Binding\"\n\
      \  },\n  \"is_active\": 1,\n  \"sort_order\": 9\n}"
  auth: inherit
docs: 'Yangi xizmat turini yaratadi.


  **Auth:** `admin_token`.


  ### 📥 Request Body (JSON)


  | Field | Type | Required | Description |

  |---|---|:---:|---|

  | `category` | string | ✅ | `apostille` \| `other` |

  | `code` | string | ✅ | Pattern `/^[a-z0-9_]+$/`, max 50; `(category, code)` juftligi
  unique |

  | `name` | object | ✅ | `{uz, ru, en}` — `uz` kaliti shart |

  | `is_active` | bool (0\|1) | ➖ | Default `1` |

  | `sort_order` | int | ➖ | Default `0` |


  ### 📤 Response


  `201` — `NotaryServiceTypeOutputDTO`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | `(category, code)` duplicate; `category` noto''g''ri qiymat; `name.uz`
  bo''sh |

  '
settings:
  encodeUrl: true
  timeout: 0
