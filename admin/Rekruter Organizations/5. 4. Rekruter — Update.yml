docs: |
  Mavjud Rekruter tashkilotini yangilaydi. `application/json` — faqat o'zgaradigan maydonlarni yuborish kifoya.

  **Auth:** `recruiterManage`. Super Admin — har qanday tashkilotni; XBA (org actor) — faqat o'zi onboard qilgan (`onboarded_by_organization_id`) tashkilotni.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | `recruiterManage` permission yo'q |
  | `404` | Topilmadi yoki boshqa tashkilot onboard qilgan (cross-org) |
settings:
  encodeUrl: true
