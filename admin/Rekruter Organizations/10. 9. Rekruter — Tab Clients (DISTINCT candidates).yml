info:
  name: '9. Rekruter — Tab: Clients (DISTINCT candidates)'
  type: http
  seq: 10
http:
  method: GET
  url: '{{base_url}}/admin/recruiters/1/clients?per-page=20'
  auth: inherit
docs: 'Rekruter tashkilotning **Mijozlar** tabi — DISTINCT kandidatlar bo''yicha oxirgi
  xizmat ma''lumotlari.


  Query murakkab: `organization_service_order` → kandidat → `passport_data` (F.I.SH)
  + `user.phone`, har bir kandidat uchun **oxirgi** buyurtma (`MAX(served_at|created_at)`).


  **Auth:** `admin_token`.


  ### 🔎 Query Parameters


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `q` | string | ➖ | Kandidat F.I.SH / telefon bo''yicha qidiruv |

  | `status` | int (1\|2\|3) | ➖ | Buyurtma statusi bo''yicha filtr |

  | `district_id` | int | ➖ | Kandidat propiska tumani (`registration_district_id`)
  bo''yicha filtr |

  | `page`, `per-page` | int | ➖ | |


  ### 📤 Response (`data.items[]` — `OrganizationClientOutputDTO`)


  | Field | Type | Description |

  |---|---|---|

  | `candidate_id` | int | |

  | `full_name` | string | Latin yoki Cyrillic (passport ma''lumotidan) |

  | `phone` | string \| null | |

  | `region_name` | string \| null | Hozircha `null` (kelajakda kandidat passport
  joyidan hisoblanadi) |

  | `district_name` | string \| null | Hozircha `null` |

  | `last_amount` | int \| null | Oxirgi xizmat to''lovi (UZS) |

  | `last_served_at` | int \| null | Oxirgi xizmat sanasi (Unix ts) |

  | `last_served_at_formatted` | string \| null | `d.m.Y H:i` (Asia/Tashkent) |

  | `last_status` | int | Oxirgi buyurtma statusi (1/2/3) |

  | `orders_count` | int | Shu org-ga jami buyurtmalar soni |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
