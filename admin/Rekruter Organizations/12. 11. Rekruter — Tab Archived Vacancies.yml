info:
  name: '11. Rekruter — Tab: Archived Vacancies'
  type: http
  seq: 12
http:
  method: GET
  url: '{{base_url}}/admin/recruiters/1/archived-vacancies?per-page=20'
  auth: inherit
docs: |-
  Rekruter tashkilotning **Arxiv vakansiyalar** tabi — faqat `status = archived`
  vakansiyalar.

  > **Bog'lanish qoidasi:** vakansiyalar `recruiter_id = <recruiter id>` bo'yicha filtrlanadi
  > (`organization_id` doim XBA). Active Vacancies tabidagi qoida bilan bir xil.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  `Active Vacancies` bilan bir xil (`q`, `country_id`, `city_id`, `page`, `per-page`).
  `status` filtri bu yerda e'tiborga olinmaydi — natija doim arxivlangan yozuvlar.

  ### 📤 Response

  `Active Vacancies` bilan bir xil shakl — `OrganizationVacancyListItemOutputDTO`
  (`title`, `location`, `salary_*`, `candidates_count`, `filled`, `hiring_quota`,
  `status`, `status_label`).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
