info:
  name: 0. Rekruter — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/recruiters/stats'
  auth: inherit
docs: |-
  Rekruter modulining yuqori statistika kartochkalari (ro'yxat sahifasi ustidagi 4 ta karta).

  **Auth:** `admin_token`.

  ### 📤 Response (`data`)

  | Field | Type | Description |
  |---|---|---|
  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS). |
  | `this_month_candidates` | int | Joriy oyda shu tur vakansiyalariga kelgan nomzodlar (distinct). |
  | `this_month_vacancies` | int | Joriy oyda yaratilgan shu tur vakansiyalari. |
  | `refunded_amount` | int | Yakunlangan refund summasi (`transaction.type = REFUND`, `status = COMPLETED`). |

  > Faqat `type = RECRUITER (7)` yozuvlari bo'yicha hisoblanadi. Count'lar `vacancy.organization_id`
  > bo'yicha bog'lanadi (faqat `recruiter_id` orqali bog'langan vakansiyalar bu yerda hisobga olinmaydi).
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
