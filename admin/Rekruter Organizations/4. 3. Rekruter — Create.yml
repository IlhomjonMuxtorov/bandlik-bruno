docs: 'Yangi Rekruter tashkilotini yaratadi. `application/json` so''rov.


  **Auth:** `admin_token`.


  ### 📥 Request Body


  XBA `Create` endpointidagi to''liq ro''yxat (farq: `country_id` + `city_id` o''rniga
  `region_id` + `district_id`). Fayl maydonlari: `license_file_id`, `logo_id` (oldindan
  `/admin/upload` orqali yuklangan fayl ID).


  ### 📤 Response


  `201` — `OrganizationOutputDTO`.


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `422` | Validatsiya xatosi |

  | `400` | Fayl ID topilmadi yoki `status=uploading` |

