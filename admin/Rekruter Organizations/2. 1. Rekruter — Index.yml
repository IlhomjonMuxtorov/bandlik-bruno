info:
  name: 1. Rekruter — Index
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/recruiters?per-page=20'
  auth: inherit
docs: |-
  Rekruter tashkilotlari ro'yxati. Faqat `type = 7` (RECRUITER) yozuvlar qaytadi.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `country_id`, `city_id`,
  `is_active`, `page`, `per-page`.

  ### 📤 Response (`data.items[]` — `OrganizationOutputDTO`)

  XBA Index bilan bir xil maydonlar (`type = 7`, `type_label = "Rekruter"`), plyus
  har bir qatorga **`counts`** obyekti qo'shiladi:

  | Field | Type | Description |
  |---|---|---|
  | `counts.employees_count` | int | Faol xodimlar soni (`organization_employee`, `is_active`) |
  | `counts.vacancies_count` | int | Tashkilotga biriktirilgan vakansiyalar (`recruiter_id` bo'yicha) |
  | `counts.candidates_count` | int | O'sha vakansiyalardagi distinct nomzodlar |
  | `counts.revenue` | int | **Daromadi** — yakunlangan servis buyurtmalari summasi (so'm) |

  > **Bog'lanish qoidasi:** vakansiya/nomzod hisobi `recruiter_id = <recruiter id>` bo'yicha
  > olinadi (`vacancy.organization_id` doim XBA agentligi). **`revenue`** esa tashkilotning
  > o'z `organization_service_order` lari bo'yicha (org id), turdan qat'i nazar. `counts`
  > joriy sahifa uchun batch hisoblanadi (N+1 yo'q); detal (`View`) javobida `stats` ichida
  > kengaytirilgan ko'rsatkichlar bo'ladi.
settings:
