info:
  name: 3. Delete Device
  type: http
  seq: 3
http:
  method: DELETE
  url: '{{base_url}}/admin/device/web-1a2b3c4d-5e6f-7890-abcd-ef1234567890'
  headers: []
  auth: inherit
docs: |
  Brauzer qurilmasining web push token'ini o'chiradi (logout / tab yopilganda).
  URL'dagi oxirgi segment — `device_id`. Idempotent: qurilma topilmasa ham
  `success` qaytadi.

  **Auth:** `admin_token` (yoki org foydalanuvchi token'i).

  ### 📤 Response

  `200` — `{ "deleted": true }`
settings:
