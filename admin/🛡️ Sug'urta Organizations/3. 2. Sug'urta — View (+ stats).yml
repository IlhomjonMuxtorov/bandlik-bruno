info:
  name: 2. Sug'urta — View (+ stats)
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url}}/admin/insurance/1'
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Bitta Sug'urta tashkiloti + `stats` sub-object:

  ```json
  {
    "id": 1,
    "type": 2,
    "type_label": "Sug'urta",
    "name": "...",
    ...
    "stats": {
      "total_revenue": 48000000,
      "clients_count": 1920,
      "services_count": 10,
      "employees_count": 12
    }
  }
  ```

  **Auth:** `admin_token`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | Sug'urta topilmadi (cross-type isolation: XBA/Visa id'si bilan urinilganda ham 404) |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
