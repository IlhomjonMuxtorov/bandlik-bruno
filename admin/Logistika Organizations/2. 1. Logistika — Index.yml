info:
  name: 1. Logistika — Index
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/logistics?per-page=20'
  auth: inherit
docs: |-
  Logistika tashkilotlari ro'yxati. Faqat `type = 3` yozuvlar qaytadi.

  **Auth:** `admin_token`. Ruxsat: `partnerOrgView` (XBA: xba_admin/xba_manager/xba_viewer) yoki superadmin/admin.

  ### 🔎 Query Parameters

  XBA Index bilan bir xil: `q`, `region_id`, `district_id`, `is_active`, `page`, `per-page`.

  ### 📤 Response

  `data.items[]` — `OrganizationOutputDTO` (`type = 3`, `type_label = "Logistika"`).

  | Field | Type | Description |
  |---|---|---|
  | `counts` | object | Faqat `logisticsView` ruxsati (superadmin/admin) borlarga chiqadi — `{employees_count, clients_count, revenue}`. `partnerOrgView`gina bo'lgan XBA foydalanuvchi uchun bu kalit javobda UMUMAN CHIQMAYDI (null emas — field yo'q). |
  | `counts.employees_count` | int | Faol xodimlar soni ("Xodimlar"). |
  | `counts.clients_count` | int | Xizmat ko'rsatilgan distinct kandidatlar ("Mijozlar"). |
  | `counts.revenue` | int | Yakunlangan buyurtmalar summasi, UZS ("Daromadi"). |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
