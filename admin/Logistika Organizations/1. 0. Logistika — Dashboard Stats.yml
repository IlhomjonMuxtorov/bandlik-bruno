info:
  name: 0. Logistika — Dashboard Stats
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/logistics/stats'
  auth: inherit
docs: 'Logistika modulining yuqori statistika kartochkalari (sahifa ustida 4 ta karta).


  **Auth:** `admin_token`.


  ### 📤 Response (`data`)


  | Field | Type | Description |

  |---|---|---|

  | `total_revenue` | int | Barcha vaqtlar uchun yakunlangan buyurtmalar summasi (UZS)
  |

  | `holding_amount` | int | Hozircha `0` placeholder — transaction moduli kelganda
  integratsiya |

  | `this_month_revenue` | int | Joriy oydagi yakunlangan buyurtmalar summasi |

  | `refunded_amount` | int | Hozircha `0` placeholder |


  > Faqat `type = NOTARIUS (2)` yozuvlari bo''yicha hisoblanadi.

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
