info:
  name: 4. Lesson Update
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/admin/lessons/1'
  body:
    type: multipartForm
    data:
    - name: name
      type: text
      value: '1-dars (yangilangan)'
    - name: status
      type: text
      value: active
    - name: file
      type: file
      fileName: ''
  auth: inherit
docs: |-
  Darsni yangilaydi. Ikki narsani qila oladi (ikkalasi ham ixtiyoriy):

  1. **Zip almashtirish** вЂ” `file` yuborilsa: yangi paket extract qilinadi, eski modullar/quizlar (va progress) o'chiriladi, yangi tincan strukturasi yaratiladi, eski extract papkasi o'chadi.
  2. **Meta yangilash** вЂ” `name`, `description`, `passing_score`, `status`, `is_active`, `sort_order`.

  **Auth:** `admin_token`. **Content-Type:** `multipart/form-data` (faqat meta bo'lsa JSON ham bo'ladi).

  ### рџ“Ґ Body

  | Field | Type | Description |
  |---|---|---|
  | `file` | file | вћ– Yangi Articulate zip (almashtirish) |
  | `name` | string | вћ– |
  | `description` | string | вћ– |
  | `passing_score` | number | вћ– |
  | `status` | string | вћ– `draft` \| `active` \| `archived` |
  | `is_active` | bool (0\|1) | вћ– |
  | `sort_order` | int | вћ– |

  ### рџ“¤ Response

  `200` вЂ” `CourseLessonOutputDTO`.

  ### вљ пёЏ Errors

  | Code | Reason |
  |---|---|
  | `401/403` | Admin emas |
  | `404` | `Lesson not found` |
  | `422` | Zip validatsiya / inject / meta validatsiya |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
