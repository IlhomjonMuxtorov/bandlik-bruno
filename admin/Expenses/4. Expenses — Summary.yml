docs: 'Xarajatlar yig''indisi — kategoriya × valyuta bo''yicha guruhlangan.


  **Auth:** `admin_token`. Permission: `expenseManage` yoki `reportView`.


  > **Scope:** `from`/`to` berilmasa — **all-time** (sana filtri yo''q), shunda
  "Jami xarajat" kartasi xarajatlar jadvali (all-time) bilan mos keladi.
  `from`/`to` birga berilsa — o''sha davr bilan chegaralanadi.


  ### 🔎 Query Params


  | Param | Type | Required | Description |

  |---|---|:---:|---|

  | `from` | int \| null | ➖ | Davr boshi (unix). Berilmasa — all-time. `to` bilan birga ishlaydi. |

  | `to` | int \| null | ➖ | Davr oxiri (unix). Berilmasa — all-time. |


  ### 📤 Response


  > Yig''indilar **so''m**da (valyutaga mos major unit — `USD` uchun dollar;
  DB tiyinda saqlaydi).


  ```json

  {

    "from": null,

    "to": null,

    "summary": {

      "salary": { "UZS": 150000000 },

      "marketing": { "UZS": 5000000, "USD": 2000 },

      "sms": { "UZS": 1200000 },

      "infrastructure": { "USD": 1500 },

      "office": { "UZS": 8000000 }

    }

  }

  ```


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Admin emas |

  '
