info:
  name: 2. Expenses — View
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/expenses/12'
  auth: inherit
docs: 'Bitta xarajat haqida to''liq ma''lumot. Bog''langan Transaction `transaction_id`
  orqali topiladi (`Transactions — View` orqali audit qatorlarini ko''rish mumkin).


  **Auth:** `admin_token`. Permission: `expenseManage`.


  ### 📤 Response


  OperationalExpense DTO. `amount` — **so''m**da (valyutaga mos major unit; DB
  tiyinda saqlaydi).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Admin emas |

  | `404` | Expense topilmadi |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
