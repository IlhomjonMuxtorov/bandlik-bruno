    bearer: '{{ admin_token }}'
docs: |
  Paginated xabarlar (cursor pagination). Mobile bilan bir xil format.

  **Auth:** `admin_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `before_id` | int | ➖ | Eski xabarlar |
  | `after_id` | int | ➖ | Delta sync |
  | `limit` | int | ➖ | Default `30`, max `100` |

  ### 📤 Response

  Mobile Messages bilan bir xil, lekin sender maydonida XBA xodimi bo'lsa `full_name` va `profile_photo_url` qo'shiladi:

  | Field | Type | Description |
  |---|---|---|
  | `sender` | object \| null | `{id, username, full_name?, profile_photo_url?}` — XBA xodimi bo'lsa full_name va profile_photo_url qo'shiladi |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Xodim emas |
  | `404` | Chat topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
