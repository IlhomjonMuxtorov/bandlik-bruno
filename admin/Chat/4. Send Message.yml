docs: |
  XBA xodimi nomzodga xabar yuboradi. Mobile `Send Message` bilan bir xil request body sxemasi.

  Audio/rasm/hujjat uchun avval `POST /admin/upload`, keyin `attachment_upload_file_id`.

  **Auth:** `admin_token`.

  ### рџ“Ґ Request Body

  Mobile `Send Message` bilan bir xil:

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `type` | string | вњ… | `text` \| `voice` \| `image` \| `document` |
  | `body` | string | вљ пёЏ | `type=text` da majburiy |
  | `attachment_upload_file_id` | int | вљ пёЏ | fayl turlari uchun |
  | `voice_duration_sec` | int | вљ пёЏ | `type=voice` da |
  | `reply_to_id` | int | вћ– | |

  ### рџ“¤ Response

  `201` + ChatMessageOutputDTO.

  Sender maydonida: XBA xodimi bo'lsa `full_name` va `profile_photo_url` (agar mavjud bo'lsa) qo'shiladi.

  ### вљ пёЏ Errors

  | Code | Reason |
  |---|---|
  | `400` | Validation |
  | `401` | Token yo'q |
  | `403` | Foydalanuvchi shu tashkilotning aktiv xodimi emas |
