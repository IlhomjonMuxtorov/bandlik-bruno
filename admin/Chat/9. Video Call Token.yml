info:
  name: Video Call Token
  type: http
  seq: 9
http:
  method: POST
  url: '{{base_url}}/admin/chats/1/video-call/token'
  headers: []
  body:
    type: none
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  XBA xodimi **yangi** qo'ng'iroq boshlaydi: Jitsi JWT (HS256, `moderator=true`), yangi xona ochiladi. Chat'da `type=call` system message yoziladi va nomzodga `incoming_call` (data-only) FCM push yuboriladi. Nomzod `POST /mobile/chats/<id>/video-call/join` orqali shu xonaga qo'shiladi.

  > Mavjud qo'ng'iroqqa **qo'shilish** uchun `POST /admin/chats/<id>/video-call/join` ishlatiladi (yangi xona ochmaydi).

  **Auth:** `admin_token`.

  ### 📤 Response

  Mobile Video Call Token bilan bir xil shape (`token`, `room_name`, `domain`, `expires_at`, `expires_at_formatted`, `call_message_id`).

  | Field | Type | Description |
  |---|---|---|
  | `call_message_id` | int | Yaratilgan `type=call` system message `id`'si. Qo'ng'iroq tugaganda `call-end`/`call-decline` ga shu qiymat yuboriladi. |

  Yagona farq — JWT'da `moderator: true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` / `403` / `404` | Standart |
  | `500` | `JITSI_APP_SECRET` configured emas |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
