info:
  name: Chat Detail
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/chats/1'
  headers:
  - name: Accept-Language
    value: uz
  body:
    type: none
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Bir chatning to'liq detali (XBA tomonidan ko'rinish) — `candidate_card` + `service_stages` bilan.

  **Auth:** `admin_token`. Foydalanuvchi shu tashkilot xodimi bo'lishi shart.

  ### 📤 Response

  Mobile `Chat Detail` bilan bir xil shape, lekin `unread_count` XBA tomonidan.

  **Xabarlar (`messages` maydonidagi xabarlar):**
  - Xabar muallifi (sender) XBA xodimi bo'lsa, sender maydonida `full_name` va `profile_photo_url` (agar mavjud bo'lsa) qo'shiladi
  - Kandidat xabarlari sender to'liq ma'lumotlari bilan qaytadi

  **Candidate Card:**
  - `{candidate_id, application_id, full_name, photo_url, phone, cv_id, cv_title, cover_message}`

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Foydalanuvchi bu tashkilot xodimi emas |
  | `404` | Chat topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
