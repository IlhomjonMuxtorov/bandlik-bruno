docs: |
  Bir chatning to'liq detali (XBA tomonidan ko'rinish) â€” `candidate_card` + `service_groups` bilan.

  **Auth:** `admin_token`. Foydalanuvchi shu tashkilot xodimi bo'lishi shart.

  ### đź“¤ Response

  Mobile `Chat Detail` bilan bir xil shape, lekin `unread_count` XBA tomonidan.

  - `service_groups[]` â€” bosqichlar **tashkilot bo'yicha guruhlangan** + Startâ†’Payâ†’Execute
  holati: `{service_group_id, organization, responsible_user, stages[], required_amount, funded_amount, awaiting_amount,
  currency, started, awaiting_start, fully_funded, is_current, payment_deadline_at, paid_percent,
  progress_percent}`. `service_group_id` (int|null) â€” guruhning `VacancyServiceGroup.id`'si,
  `POST /admin/chats/<id>/groups/{groupId}/start` uchun. Har `stages[]` elementi `service_group_id`, `started_at`, `payment_deadline_at`,
  `payment_time_left_text`, boyitilgan `responsible_user` (`{id, username, full_name, phone, photo_url}`)
  va `organization` (`{id, name, type, type_label, logo_url}`) bilan; status'lar: `pending`,
  `awaiting_payment`, `in_progress`, `completed`, `overdue`, `payment_overdue`, `skipped`.

  **Xabarlar (`messages` maydonidagi xabarlar):**
  - Xabar muallifi (sender) XBA xodimi bo'lsa, sender maydonida `full_name` va `profile_photo_url` (agar mavjud bo'lsa) qo'shiladi
  - Kandidat xabarlari sender to'liq ma'lumotlari bilan qaytadi

  **Candidate Card:**
  - `{candidate_id, application_id, full_name, photo_url, phone, cv_id, cv_title, cover_message}`
  - `vacancy_candidate_id` (int | null) â€” pipeline (`vacancy_candidate.id`); `POST /admin/vacancy-candidates/<id>/update-journey` uchun. Ariza hali qabul qilinmagan bo'lsa `null`.
  - `journey_status` (string | null) â€” joriy journey enum qiymati (`pending` â€¦ `dropped_out`). Snapshot emas, **jonli** o'qiladi.
  - `journey_status_label` (string | null) â€” joriy status'ning tarjima qilingan nomi (`Accept-Language` bo'yicha).

  **Active Call:**
  - `active_call` (object | null) â€” aktiv (davom etayotgan/jiringlayotgan) qo'ng'iroq. `null` â€” qo'shiladigan qo'ng'iroq yo'q. Admin shu maydon orqali `POST /admin/chats/<id>/video-call/join` bilan qayta qo'shiladi. Obyekt: `{call_message_id, room_name, domain, started_by, started_at}`

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Foydalanuvchi bu tashkilot xodimi emas |
  | `404` | Chat topilmadi |
