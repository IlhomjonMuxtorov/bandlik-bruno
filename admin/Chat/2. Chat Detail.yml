info:
  name: Chat Detail
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url}}/admin/chats/1'
  headers:
  - name: Accept-Language
    value: uz
  body:
    type: none
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Bir chatning to'liq detali (XBA tomonidan ko'rinish) ŌĆö `candidate_card` + `service_groups` bilan.

  **Auth:** `admin_token`. Foydalanuvchi shu tashkilot xodimi bo'lishi shart.

  ### ­¤ōż Response

  Mobile `Chat Detail` bilan bir xil shape, lekin `unread_count` XBA tomonidan.

  - `service_groups[]` ŌĆö bosqichlar **tashkilot bo'yicha guruhlangan** + StartŌåÆPayŌåÆExecute
  holati: `{service_group_id, organization, responsible_user, stages[], required_amount, funded_amount, awaiting_amount,
  discount_amount, currency, started, awaiting_start, fully_funded, is_current, payment_deadline_at, paid_percent,
  progress_percent}`. `service_group_id` (int|null) ŌĆö guruhning `VacancyServiceGroup.id`'si,
  `POST /admin/chats/<id>/groups/{groupId}/start` uchun. Har `stages[]` elementi `service_group_id`, `started_at`, `payment_deadline_at`,
  `payment_time_left_text`, `amount`, `discount_amount`, `original_amount` (=`amount + discount_amount`), boyitilgan `responsible_user` (`{id, username, full_name, phone, photo_url}`)
  va `organization` (`{id, name, type, type_label, logo_url}`) bilan; status'lar: `pending`,
  `awaiting_payment`, `in_progress`, `completed`, `overdue`, `payment_overdue`, `skipped`.

  > **Kurs chegirmasi (Task 21):** `training` bosqichidagi kursni nomzod **avval to'liq sotib olgan** bo'lsa, bosqich bepul bo'ladi (`amount = 0`, `discount_amount = original_amount`); guruh `discount_amount` shu chegirmalar yig'indisi.

  **Xabarlar (`messages` maydonidagi xabarlar):**
  - Xabar muallifi (sender) XBA xodimi bo'lsa, sender maydonida `full_name` va `profile_photo_url` (agar mavjud bo'lsa) qo'shiladi
  - Kandidat xabarlari sender to'liq ma'lumotlari bilan qaytadi

  **Candidate Card:**
  - `{candidate_id, application_id, full_name, photo_url, phone, cv_id, cv_title, cover_message}`
  - `vacancy_candidate_id` (int | null) ŌĆö pipeline (`vacancy_candidate.id`); `POST /admin/vacancy-candidates/<id>/update-journey` uchun. Ariza hali qabul qilinmagan bo'lsa `null`.
  - `journey_status` (string | null) ŌĆö joriy journey enum qiymati (`pending` ŌĆ” `dropped_out`). Snapshot emas, **jonli** o'qiladi.
  - `journey_status_label` (string | null) ŌĆö joriy status'ning tarjima qilingan nomi (`Accept-Language` bo'yicha).

  **Active Call:**
  - `active_call` (object | null) ŌĆö aktiv (davom etayotgan/jiringlayotgan) qo'ng'iroq. `null` ŌĆö qo'shiladigan qo'ng'iroq yo'q. Admin shu maydon orqali `POST /admin/chats/<id>/video-call/join` bilan qayta qo'shiladi. Obyekt: `{call_message_id, room_name, domain, started_by, started_at}`

  ### ŌÜĀ’ĖÅ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Foydalanuvchi bu tashkilot xodimi emas |
  | `404` | Chat topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
