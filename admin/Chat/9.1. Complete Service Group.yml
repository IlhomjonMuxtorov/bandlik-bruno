docs: |
  Tashkilot guruhdagi **barcha xizmatlarni bir martada yakunlaydi**: guruhning
  `in_progress` / `overdue` bosqichlari **birvarakayiga** `completed` ga o'tadi.

  > Chatga `type=system` (`kind: group_completed`) xabar yoziladi; **push faqat XBA**
  > tomonga (admin tasdiqi kutilmoqda — admin-ichki bildirishnoma). Matn
  > `service_group_completed` template'idan (yo'q bo'lsa standart matn).

  **Guruh turi bo'yicha oqim:**

  - **Training (`auto`)** — bu endpoint ishlatilmaydi (`400`); kurs progressi 100% ga yetganda
    guruh avtomatik `xba_confirmed` ga o'tadi (yoki admin `confirm` orqali qo'lda tasdiqlaydi).
  - **XBA (`single`)** — bu endpoint ishlatilmaydi (`400`); XBA'da alohida `complete` qadami
    yo'q — `confirm` (9.2) to'g'ridan-to'g'ri settle qiladi.
  - **Standart (Translation/Insurance/Visa/Logistics, `standard`)** — yakunlash
    `pending_confirmation` urinish yozuvi yaratadi; admin keyinchalik `confirm` yoki
    `reject` qiladi.

  **Shartlar:** guruh **to'liq to'langan** (`funded`) va **ijroda** (`in_progress`/`overdue`)
  bo'lishi shart — aks holda `400`.

  **Auth:** `admin_token`. Guruh shu chatning `vacancy_candidate` piplayniga tegishli bo'lishi shart.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `document_ids` | int[] | ➖ | Oldindan yuklangan `upload_file.id` lar — urinishga bog'lanadi. |
  | `visa_granted` | bool | ➖ | **Faqat Visa guruhi.** `true` = viza berildi, `false` = rad etildi. |
  | `visa_notes` | string | ➖ | **Faqat Visa guruhi.** Viza natijasi haqida izoh. |
  | `travel.*` | object | ➖ | **Faqat Logistika guruhi.** Safar ma'lumotlari (avia chipta majburiy). |
  | `travel.air_ticket_upload_file_id` | int | ✅ (Logistics) | Avia chipta — `POST /admin/upload` id. |
  | `travel.departure_country` | string | ➖ | Jo'nab ketish davlati. |
  | `travel.departure_city` | string | ➖ | Jo'nab ketish shahri. |
  | `travel.departure_airport` | string | ➖ | Aeroport kodi (masalan `TAS`). |
  | `travel.departure_at` | int | ➖ | Jo'nab ketish vaqti (unix ts). |
  | `travel.arrival_country` | string | ➖ | Kelish davlati. |
  | `travel.arrival_city` | string | ➖ | Kelish shahri. |
  | `travel.arrival_airport` | string | ➖ | Aeroport kodi (masalan `FRA`). |
  | `travel.arrival_at` | int | ➖ | Kelish vaqti (unix ts). |
  | `travel.airline` | string | ➖ | Aviakompaniya. |
  | `travel.flight_number` | string | ➖ | Reys raqami. |
  | `travel.baggage` | int | ➖ | Bagaj og'irligi (kg). |
  | `travel.sender_name` | string | ➖ | Kuzatuvchi F.I.Sh. |
  | `travel.sender_phone` | string | ➖ | Kuzatuvchi telefon. |
  | `travel.sender_address` | string | ➖ | Kuzatuvchi manzili. |
  | `travel.sender_at` | int | ➖ | Kuzatish vaqti (unix ts). |
  | `travel.receiver_name` | string | ➖ | Kutib oluvchi F.I.Sh. |
  | `travel.receiver_phone` | string | ➖ | Kutib oluvchi telefon. |
  | `travel.receiver_pickup_address` | string | ➖ | Kutib olish manzili. |
  | `travel.receiver_pickup_at` | int | ➖ | Kutib olish vaqti (unix ts). |

  > Logistika guruhi `travel.air_ticket_upload_file_id` siz yakunlansa — `400`.

  ### 📦 Body misollar (guruh turi bo'yicha)

  Body **guruh turiga qarab farq qiladi** — quyidagi variantlardan mosini yuboring:

  **Standart (Translation / Insurance va boshqa standart guruhlar)** — faqat proof fayllar
  (tarjima qilingan hujjat / sug'urta polisi `upload_file.id` lari):

  ```json
  { "document_ids": [101, 102] }
  ```

  **Visa guruhi** — viza natijasi + proof:

  ```json
  {
    "document_ids": [101],
    "visa_granted": true,
    "visa_notes": "Viza berildi, 2 yillik"
  }
  ```

  **Logistika guruhi** — safar ma'lumotlari (`travel.air_ticket_upload_file_id` **majburiy**):

  ```json
  {
    "document_ids": [101, 102],
    "travel": {
      "departure_country": "Uzbekistan",
      "departure_city": "Tashkent",
      "departure_airport": "TAS",
      "departure_at": 1782034200,
      "arrival_country": "Germany",
      "arrival_city": "Frankfurt",
      "arrival_airport": "FRA",
      "arrival_at": 1782057600,
      "airline": "Uzbekistan Airways",
      "flight_number": "HY 271",
      "baggage": 30,
      "sender_name": "Global SkillHub Logistics",
      "sender_phone": "+998901234567",
      "sender_address": "Tashkent, Amir Temur ko'chasi 12",
      "sender_at": 1782028800,
      "receiver_name": "Hans Müller",
      "receiver_phone": "+4915112345678",
      "receiver_pickup_address": "Frankfurt, Hauptbahnhof 1",
      "receiver_pickup_at": 1782061200,
      "air_ticket_upload_file_id": 555
    }
  }
  ```

  > **Training** (`auto`) va **XBA** (`single`) guruhlarida bu endpoint chaqirilmaydi (`400`) —
  > body yuborilmaydi. Training avtomatik, XBA esa to'g'ridan-to'g'ri `confirm` (9.2) orqali.

  ### 📤 Response

  `{ success, data: service_groups[], message: "Service group completed" }` — yangilangan
  guruhlangan ko'rinish. Standart guruhda `can_confirm=true`, `can_reject=true`; XBA guruhda
  `confirmed=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Guruh to'liq to'lanmagan yoki ijroda emas; Training guruhida chaqirilgan; Logistika guruhida avia chipta yo'q |
  | `403` | Foydalanuvchi xodim emas yoki guruh boshqa piplaynga tegishli |
  | `404` | Chat / piplayn / guruh topilmadi |
