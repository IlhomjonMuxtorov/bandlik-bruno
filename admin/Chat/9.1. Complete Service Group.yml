info:
  name: Complete Service Group
  type: http
  seq: 10
http:
  method: POST
  url: '{{base_url}}/admin/chats/1/groups/1/complete'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "document_ids": [1, 2],
        "visa_granted": true,
        "visa_notes": "Viza berildi, 2 yillik"
      }
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Tashkilot guruhdagi **barcha xizmatlarni bir martada yakunlaydi**: guruhning
  `in_progress` / `overdue` bosqichlari **birvarakayiga** `completed` ga o'tadi.

  **Guruh turi bo'yicha oqim:**

  - **Training (`auto`)** ‚Äî bu endpoint ishlatilmaydi; kurs progressi 100% ga yetganda
    guruh avtomatik `xba_confirmed` ga o'tadi.
  - **XBA (`single`)** ‚Äî yakunlash = darhol `xba_confirmed` + settlement (alohida tasdiqlash
    qadami yo'q).
  - **Standart (Translation/Insurance/Visa/Logistics, `standard`)** ‚Äî yakunlash
    `pending_confirmation` urinish yozuvi yaratadi; admin keyinchalik `confirm` yoki
    `reject` qiladi.

  **Shartlar:** guruh **to'liq to'langan** (`funded`) va **ijroda** (`in_progress`/`overdue`)
  bo'lishi shart ‚Äî aks holda `400`.

  **Auth:** `admin_token`. Guruh shu chatning `vacancy_candidate` piplayniga tegishli bo'lishi shart.

  ### üì• Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `document_ids` | int[] | ‚ûñ | Oldindan yuklangan `upload_file.id` lar ‚Äî urinishga bog'lanadi. |
  | `visa_granted` | bool | ‚ûñ | **Faqat Visa guruhi.** `true` = viza berildi, `false` = rad etildi. |
  | `visa_notes` | string | ‚ûñ | **Faqat Visa guruhi.** Viza natijasi haqida izoh. |
  | `travel.*` | object | ‚ûñ | **Faqat Logistika guruhi.** Safar ma'lumotlari (avia chipta majburiy). |
  | `travel.air_ticket_upload_file_id` | int | ‚úÖ (Logistics) | Avia chipta ‚Äî `POST /admin/upload` id. |
  | `travel.departure_country` | string | ‚ûñ | Jo'nab ketish davlati. |
  | `travel.departure_city` | string | ‚ûñ | Jo'nab ketish shahri. |
  | `travel.departure_airport` | string | ‚ûñ | Aeroport kodi (masalan `TAS`). |
  | `travel.departure_at` | int | ‚ûñ | Jo'nab ketish vaqti (unix ts). |
  | `travel.arrival_country` | string | ‚ûñ | Kelish davlati. |
  | `travel.arrival_city` | string | ‚ûñ | Kelish shahri. |
  | `travel.arrival_airport` | string | ‚ûñ | Aeroport kodi (masalan `FRA`). |
  | `travel.arrival_at` | int | ‚ûñ | Kelish vaqti (unix ts). |
  | `travel.airline` | string | ‚ûñ | Aviakompaniya. |
  | `travel.flight_number` | string | ‚ûñ | Reys raqami. |
  | `travel.baggage` | int | ‚ûñ | Bagaj og'irligi (kg). |
  | `travel.sender_name` | string | ‚ûñ | Kuzatuvchi F.I.Sh. |
  | `travel.sender_phone` | string | ‚ûñ | Kuzatuvchi telefon. |
  | `travel.sender_address` | string | ‚ûñ | Kuzatuvchi manzili. |
  | `travel.sender_at` | int | ‚ûñ | Kuzatish vaqti (unix ts). |
  | `travel.receiver_name` | string | ‚ûñ | Kutib oluvchi F.I.Sh. |
  | `travel.receiver_phone` | string | ‚ûñ | Kutib oluvchi telefon. |
  | `travel.receiver_pickup_address` | string | ‚ûñ | Kutib olish manzili. |
  | `travel.receiver_pickup_at` | int | ‚ûñ | Kutib olish vaqti (unix ts). |

  > Logistika guruhi `travel.air_ticket_upload_file_id` siz yakunlansa ‚Äî `400`.

  ### üì§ Response

  `{ success, data: service_groups[], message: "Service group completed" }` ‚Äî yangilangan
  guruhlangan ko'rinish. Standart guruhda `can_confirm=true`, `can_reject=true`; XBA guruhda
  `confirmed=true`.

  ### ‚ö†Ô∏è Errors

  | Code | Reason |
  |---|---|
  | `400` | Guruh to'liq to'lanmagan yoki ijroda emas; Training guruhida chaqirilgan; Logistika guruhida avia chipta yo'q |
  | `403` | Foydalanuvchi xodim emas yoki guruh boshqa piplaynga tegishli |
  | `404` | Chat / piplayn / guruh topilmadi |
