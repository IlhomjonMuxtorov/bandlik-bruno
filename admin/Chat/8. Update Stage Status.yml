info:
  name: Update Stage Status
  type: http
  seq: 8
http:
  method: POST
  url: '{{base_url}}/admin/chats/1/stages/1/status'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"status\": \"in_progress\",\n  \"progress_percent\": 50,\n  \"deadline_at\": null\n}"
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Bir service stage (XBA xizmati, Tarjima, Sug'urta, O'quv kursi, Logistika) statusini yangilash.

  `status=completed` qilinganda `completed_at` avtomatik yoziladi va chat'da `type=system` xabar paydo bo'ladi (`{kind: stage_completed, stage_id, stage_category, completed_at}`).

  ### đź’° Pul ta'siri (Start â†’ Pay â†’ Execute)
  - **Boshlash (Start)** â€” guruhni boshlash alohida endpoint orqali: `POST /admin/chats/{id}/groups/{groupId}/start`
    (bosqich `pending â†’ awaiting_payment`, to'lov oynasi ochiladi). Bu yerda (`update-stage`) emas.
  - **`in_progress`** â€” odatda **kandidat to'lov qilganda avtomatik** o'rnatiladi (Pay â†’ Execute);
    o'shanda ijro `deadline_at = now + group.execution_deadline_days` (to'langan kundan). Bu yerda
    qo'lda `in_progress` qilinsa, stage **funded** bo'lishi shart (aks holda `400`).
  - **`completed`ga o'tkazish** â€” xizmat **bajarildi** deb belgilanadi, lekin pul **capture
    QILINMAYDI**. Daromad endi faqat XBA tasdiqlaganda o'tadi:
    `POST /admin/chats/{id}/stages/{stageId}/confirm` (pastga qarang).
  - **`xba_confirmed`** ni bu endpoint orqali o'rnatib bo'lmaydi (`400`) â€” `confirm` endpointini
    ishlating. XBA o'zining `agency` xizmati esa nomzod **jo'nab ketganda** (departure) settle bo'ladi.

  **Auth:** `admin_token`. Stage shu chatning `vacancy_candidate` ga tegishli bo'lishi shart (aks holda 403).

  ### đź“Ą Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `status` | string | âś… | `pending` \| `awaiting_payment` \| `in_progress` \| `completed` \| `overdue` \| `payment_overdue` \| `skipped` |
  | `progress_percent` | int | âž– | 0â€“100. `completed` da avtomatik 100 |
  | `deadline_at` | int | âž– | unix ts |

  > Eslatma: `responsible_user_id` endi qabul qilinmaydi â€” mas'ul xodim xizmatni beruvchi **tashkilotdan** avtomatik aniqlanadi (`responsible_user` javobda `{id, username, full_name, phone, photo_url}`).

  ### đź“¤ Response

  `{ success, data: ChatServiceStageOutputDTO, message: "Stage updated" }`.

  `data` ichida `responsible_user` (`{id, username, full_name, phone, photo_url}` â€” xizmatni
  beruvchi tashkilotdan) va `organization` (`{id, name, type, type_label, logo_url}`) ham bor.

  ### âš ď¸Ź Errors

  | Code | Reason |
  |---|---|
  | `400` | Invalid `status` qiymati, yoki `status=xba_confirmed` (confirm endpointini ishlating) |
  | `403` | Foydalanuvchi xodim emas yoki stage boshqa application'ga tegishli |
  | `404` | Chat yoki stage topilmadi |
