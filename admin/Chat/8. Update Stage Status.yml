info:
  name: Update Stage Status
  type: http
  seq: 8
http:
  method: POST
  url: '{{base_url}}/admin/chats/1/stages/1/status'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"status\": \"in_progress\",\n  \"progress_percent\": 50,\n  \"deadline_at\": null\n}"
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Bir service stage (XBA xizmati, Tarjima, Sug'urta, O'quv kursi, Logistika) statusini yangilash.

  `status=completed` qilinganda `completed_at` avtomatik yoziladi va chat'da `type=system` xabar paydo bo'ladi (`{kind: stage_completed, stage_id, stage_category, completed_at}`).

  ### 💰 Pul ta'siri (Start → Pay → Execute)
  - **Boshlash (Start)** — guruhni boshlash alohida endpoint orqali: `POST /admin/chats/{id}/groups/{groupId}/start`
    (bosqich `pending → awaiting_payment`, to'lov oynasi ochiladi). Bu yerda (`update-stage`) emas.
  - **`in_progress`** — odatda **kandidat to'lov qilganda avtomatik** o'rnatiladi (Pay → Execute);
    o'shanda ijro `deadline_at = now + group.execution_deadline_days` (to'langan kundan). Bu yerda
    qo'lda `in_progress` qilinsa, stage **funded** bo'lishi shart (aks holda `400`).
  - **`completed`ga o'tkazish** — nomzod hold'idan shu xizmat summasi **capture** qilinadi:
    komissiya platformaga, qolgani tashkilot balansiga. Idempotent (`captured_at`).

  **Auth:** `admin_token`. Stage shu chatning `vacancy_candidate` ga tegishli bo'lishi shart (aks holda 403).

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `status` | string | ✅ | `pending` \| `awaiting_payment` \| `in_progress` \| `completed` \| `overdue` \| `payment_overdue` \| `skipped` |
  | `progress_percent` | int | ➖ | 0–100. `completed` da avtomatik 100 |
  | `deadline_at` | int | ➖ | unix ts |

  > Eslatma: `responsible_user_id` endi qabul qilinmaydi — mas'ul xodim xizmatni beruvchi **tashkilotdan** avtomatik aniqlanadi (`responsible_user` javobda `{id, username, full_name, phone, photo_url}`).

  ### 📤 Response

  `{ success, data: ChatServiceStageOutputDTO, message: "Stage updated" }`.

  `data` ichida `responsible_user` (`{id, username, full_name, phone, photo_url}` — xizmatni
  beruvchi tashkilotdan) va `organization` (`{id, name, type, type_label, logo_url}`) ham bor.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Invalid `status` qiymati |
  | `403` | Foydalanuvchi xodim emas yoki stage boshqa application'ga tegishli |
  | `404` | Chat yoki stage topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
