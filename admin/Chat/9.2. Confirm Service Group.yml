info:
  name: Confirm Service Group
  type: http
  seq: 11
http:
  method: POST
  url: '{{base_url}}/admin/chats/1/groups/1/confirm'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "attempt_id": null
      }
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Admin **guruhni tasdiqlaydi**: barcha bosqichlar `xba_confirmed` ga o'tadi, hold settlement
  qilinadi va keyingi guruh `is_current=true` bo'ladi (sequential gate). Guruh turiga qarab:

  > Chatga `type=system` (`kind: group_confirmed`) xabar yoziladi va **push** yuboriladi
  > (nomzod + XBA) — "xizmat bajarildi". Bu oxirgi guruh bo'lsa, qo'shimcha
  > `pipeline_completed` xabar+push ham ketadi; keyingi guruh avtomatik boshlansa, uning
  > `group_started` xabari ham keladi. Matn `service_group_confirmed` /
  > `pipeline_completed` template'idan (yo'q bo'lsa standart matn).

  - **Standart (Translation/Insurance/Visa/Logistics)** — oxirgi `pending_confirmation`
    urinishi `confirmed` ga o'tadi (avval `complete` qilingan bo'lishi shart). `attempt_id` bilan
    aniq urinish, yoki `null` — oxirgi pending.
  - **XBA (`single`)** — alohida `complete` qadami **yo'q**: bu endpoint to'g'ridan-to'g'ri
    settle qiladi. Guruh `is_current`, to'liq to'langan va `in_progress`/`overdue` bo'lishi shart.
  - **Training (`auto`)** — odatda kurs 100% da avtomatik tasdiqlanadi; admin shu endpoint orqali
    **qo'lda** ham tasdiqlashi mumkin (kurs tugamasa ham), guruh to'langan + `in_progress` bo'lsa.

  **Shart:** standart guruhda `pending_confirmation` urinish mavjud bo'lishi kerak; XBA/Training'da
  urinish shart emas, lekin guruh to'langan va ijroda bo'lishi kerak — aks holda `400`.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `attempt_id` | int \| null | ➖ | Tasdiqlanadigan urinish ID si. `null` yoki ko'rsatilmasa — oxirgi `pending_confirmation` urinish. |

  ### 📤 Response

  `{ success, data: service_groups[], message: "Service group confirmed" }` — yangilangan
  guruhlangan ko'rinish. Tasdiqlangan guruhda `confirmed=true`; keyingi guruh `is_current=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Guruhda `pending_confirmation` urinish topilmadi; yoki guruh allaqachon tasdiqlangan |
  | `403` | Foydalanuvchi xodim emas yoki guruh boshqa piplaynga tegishli |
  | `404` | Chat / piplayn / guruh topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
