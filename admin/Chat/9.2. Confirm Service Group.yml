info:
  name: Confirm Service Group
  type: http
  seq: 11
http:
  method: POST
  url: '{{base_url}}/admin/chats/1/groups/1/confirm'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "attempt_id": null
      }
  auth:
    mode: bearer
    bearer: '{{ admin_token }}'
docs: |
  Admin **standart guruhni tasdiqlaydi** (Translation/Insurance/Visa/Logistics): oxirgi
  `pending_confirmation` urinishi `confirmed` ga o'tadi, barcha bosqichlar `xba_confirmed`
  ga o'tadi va hold settlement qilinadi. Tasdiqdan keyin keyingi guruh `is_current=true`
  bo'ladi (sequential gate).

  > **XBA guruhi** bu endpointdan foydalanmaydi — u single-step: `complete` = darhol
  > `xba_confirmed`. **Training guruhi** — avtomatik (kurs progressi orqali).

  **Shart:** guruhda `pending_confirmation` statusdagi urinish mavjud bo'lishi kerak —
  aks holda `400`.

  **Auth:** `admin_token`.

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `attempt_id` | int \| null | ➖ | Tasdiqlanadigan urinish ID si. `null` yoki ko'rsatilmasa — oxirgi `pending_confirmation` urinish. |

  ### 📤 Response

  `{ success, data: service_groups[], message: "Service group confirmed" }` — yangilangan
  guruhlangan ko'rinish. Tasdiqlangan guruhda `confirmed=true`; keyingi guruh `is_current=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Guruhda `pending_confirmation` urinish topilmadi; yoki guruh allaqachon tasdiqlangan |
  | `403` | Foydalanuvchi xodim emas yoki guruh boshqa piplaynga tegishli |
  | `404` | Chat / piplayn / guruh topilmadi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
