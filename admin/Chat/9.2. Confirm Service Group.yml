docs: |
  XBA **butun guruhni bir martada tasdiqlaydi** ("Keyingi bosqich"): guruhdagi barcha
  bosqichlar `xba_confirmed` ga o'tadi va guruhning **umumiy holdi xizmat ko'rsatgan
  tashkilot hamyoniga** bir martada o'tkaziladi (settlement). Tasdiqdan keyin **keyingi
  guruh** ochilishi mumkin (sequential gate). Chatga `type=system` xabar
  (`kind: group_confirmed`) yuboriladi.

  Bu ‚ÄĒ **XBA xizmati (agency)** uchun ham yagona settlement nuqtasi: agency holdi endi
  departure'da avtomatik yechilmaydi, faqat shu **alohida tasdiq** orqali XBAga o'tadi.

  **Shart:** guruhning har bir (skip qilinmagan) bosqichi `completed` bo'lishi kerak ‚ÄĒ aks
  holda `400`. Idempotent: allaqachon `xba_confirmed` bosqich qayta capture qilinmaydi.

  ### ūüď• Request Body ‚ÄĒ faqat LOGISTIKA guruhi uchun (inline safar ma'lumotlari)

  Logistika guruhini tasdiqlashda safar ma'lumotlari **shu so'rov ichida** (bitta call)
  yuboriladi va `vacancy_candidate_travel` ga upsert qilinadi. Boshqa guruhlar uchun body
  **bo'sh** bo'lishi mumkin (e'tiborga olinmaydi).

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `air_ticket_upload_file_id` | int | ‚úÖ | Avia chipta ‚ÄĒ avval `POST /admin/upload` orqali yuklangan `upload_file.id`. |
  | `departure_*` / `arrival_*` | string/int | ‚ěĖ | Parvoz: davlat / shahar / aeroport / vaqt (unix ts). |
  | `airline` | string | ‚ěĖ | Aviakompaniya. |
  | `flight_number` | string | ‚ěĖ | Reys raqami. |
  | `flight_class` | string | ‚ěĖ | Klass (masalan `Economy` / `Business`). |
  | `baggage` | int | ‚ěĖ | Parvoz bagaji (kg). |
  | `sender_name` / `sender_phone` | string | ‚ěĖ | Kuzatuvchi shaxs F.I.Sh / telefon. |
  | `sender_address` / `sender_at` | string / int | ‚ěĖ | Kuzatuvchi manzili / vaqti. |
  | `receiver_name` / `receiver_phone` | string | ‚ěĖ | Kutib oluvchi shaxs F.I.Sh / telefon. |
  | `receiver_pickup_address` / `receiver_pickup_at` | string / int | ‚ěĖ | Kutib olish manzili / vaqti. |

  > Logistika guruhi `air_ticket_upload_file_id` (avia chipta) siz tasdiqlansa ‚ÄĒ `400`.

  **Auth:** `admin_token`. Guruh shu chatning `vacancy_candidate` piplayniga tegishli bo'lishi shart.

  ### ūüď§ Response

  `{ success, data: service_groups[], message: "Service group confirmed" }` ‚ÄĒ yangilangan
  guruhlangan ko'rinish. Tasdiqlangan guruhda `confirmed=true`; keyingi guruh `is_current=true`.

  ### ‚ö†ÔłŹ Errors

  | Code | Reason |
  |---|---|
  | `400` | Guruhda yakunlanmagan bosqich bor; yoki logistika guruhi avia chipta (`air_ticket_upload_file_id`) siz tasdiqlanmoqda |
  | `403` | Foydalanuvchi xodim emas yoki guruh boshqa piplaynga tegishli |
  | `404` | Chat / qabul qilingan piplayn topilmadi yoki guruh shu nomzodga tegishli emas |
