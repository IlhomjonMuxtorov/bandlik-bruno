docs: |
  XBA **butun guruhni bir martada tasdiqlaydi** ("Keyingi bosqich"): guruhdagi barcha
  bosqichlar `xba_confirmed` ga o'tadi va guruhning **umumiy holdi xizmat ko'rsatgan
  tashkilot hamyoniga** bir martada o'tkaziladi (settlement). Tasdiqdan keyin **keyingi
  guruh** ochilishi mumkin (sequential gate). Chatga `type=system` xabar
  (`kind: group_confirmed`) yuboriladi.

  Bu — **XBA xizmati (agency)** uchun ham yagona settlement nuqtasi: agency holdi endi
  departure'da avtomatik yechilmaydi, faqat shu **alohida tasdiq** orqali XBAga o'tadi.

  **Shart:** guruhning har bir (skip qilinmagan) bosqichi `completed` bo'lishi kerak — aks
  holda `400`. Idempotent: allaqachon `xba_confirmed` bosqich qayta capture qilinmaydi.

  ### 📥 Request Body — faqat LOGISTIKA guruhi uchun (inline safar ma'lumotlari)

  Logistika guruhini tasdiqlashda safar ma'lumotlari **shu so'rov ichida** (bitta call)
  yuboriladi va `vacancy_candidate_travel` ga upsert qilinadi. Boshqa guruhlar uchun body
  **bo'sh** bo'lishi mumkin (e'tiborga olinmaydi).

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `company_name` | string | ✅ | Logistika kompaniyasi nomi (LOGISTIKA modali "Kompaniya nomi"). |
  | `air_ticket_upload_file_id` | int | ✅ | Avia chipta — avval `POST /admin/upload` orqali yuklangan `upload_file.id`. |
  | `company_license_number` | string | ➖ | Litsenziya raqami. |
  | `receiver_name` | string | ➖ | Kutib oluvchi shaxs F.I.Sh. |
  | `receiver_phone` | string | ➖ | Kutib oluvchi telefoni. |
  | `receiver_pickup_address` | string | ➖ | Kutib olish manzili. |
  | `receiver_pickup_at` | int | ➖ | Kutib olish vaqti (unix ts). |
  | `departure_*` / `arrival_*` | string/int | ➖ | Parvoz ma'lumotlari (davlat/shahar/airport/at). |
  | `airline`, `flight_number`, `aircraft` | string | ➖ | Reys ma'lumotlari. |

  > Logistika guruhi `company_name` yoki `air_ticket_upload_file_id` siz tasdiqlansa — `400`.

  **Auth:** `admin_token`. Guruh shu chatning `vacancy_candidate` piplayniga tegishli bo'lishi shart.

  ### 📤 Response

  `{ success, data: service_groups[], message: "Service group confirmed" }` — yangilangan
  guruhlangan ko'rinish. Tasdiqlangan guruhda `confirmed=true`; keyingi guruh `is_current=true`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `400` | Guruhda yakunlanmagan bosqich bor; yoki logistika guruhi safar ma'lumotlari (kompaniya nomi + avia chipta) siz tasdiqlanmoqda |
  | `403` | Foydalanuvchi xodim emas yoki guruh boshqa piplaynga tegishli |
  | `404` | Chat / qabul qilingan piplayn topilmadi yoki guruh shu nomzodga tegishli emas |
