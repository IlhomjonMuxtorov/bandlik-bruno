info:
  name: Categories — Tree
  type: http
  seq: 8
http:
  method: GET
  url: '{{base_url}}/admin/benefit-categories'
  params:
  - name: active_only
    value: '1'
    enabled: false
  auth: inherit
docs: |
  Imtiyoz taksonomiyasi daraxti — yuqori darajadagi guruhlar va ularning subgroup'lari.
  Kategoriyalarda kod yo'q — id va lokalizatsiyalangan nom bilan aniqlanadi.

  > Daraxtning **har bir darajasi** `Accept-Language` bo'yicha alifbo (A-Z)
  > tartibida qaytadi (fallback `uz`), agar `sort` yuborilmagan bo'lsa. `?sort=sort_order`
  > eski tahririy (editorial) tartibni qaytaradi — paginatsiya yo'q, faqat A-Z/`sort_order`
  > tumblerini boshqaradi.

  **Auth:** Faqat `admin_token`.

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `active_only` | int | ➖ | `1` — faqat faol kategoriyalar. |
  | `sort` | string | ➖ | Berilmasa — A-Z (har bir daraja). `sort_order` — eski
  tahririy tartib. |

  ### 📤 Response

  `[{ id, parent_id, name:{uz,ru,en}, is_active, sort_order, children:[...] }]` — rekursiv.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Admin emas |
