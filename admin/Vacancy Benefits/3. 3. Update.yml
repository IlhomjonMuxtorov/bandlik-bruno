info:
  name: Benefit — Update
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url}}/admin/vacancy-benefits/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"name\": {\n    \"uz\": \"Bepul turar joy + ovqat\",\n    \"ru\": \"Бесплатное жильё + питание\",\n    \"en\": \"Free accommodation + meals\"\n  },\n  \"description\": {\n    \"uz\": \"Tukimko + sahariy xana + 3 mahal ovqat\",\n    \"ru\": \"Общежитие + 3 питания в день\",\n    \"en\": \"Dormitory + 3 meals per day\"\n  }\n}"
  auth: inherit
docs: |
  Mavjud vakansiya imtiyozini yangilaydi.

  **Auth:** Faqat `admin_token`.

  > **Eslatma:** Update uchun `POST` method ishlatiladi (PUT/PATCH emas). URL da element ID beriladi.

  ### 📥 Request Body

  Create bilan bir xil.

  ### 📤 Response (200)

  Yangilangan element: `{ id, name, description, created_at, updated_at }`

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Admin emas |
  | `404` | Element topilmadi |
  | `422` | `name` bo'sh yoki noto'g'ri format |