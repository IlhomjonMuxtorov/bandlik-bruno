http:
  method: GET
  url: '{{base_url}}/admin/benefit-definitions/1'
  auth: inherit
docs: |
  Bitta imtiyoz ta'rifi — `choices` (inline options) bilan.

  **Auth:** Faqat `admin_token`.

  ### 📤 Response

  `{ id, code, name, description, category_id, category_name, value_type, options, unit, is_system, is_active, sort_order, choices }`.
  `choices` — `options` mavjud bo'lsa `[{ value, label }]`, aks holda `[]`.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `401` | Token yo'q |
  | `403` | Admin emas |
  | `404` | Topilmadi |
