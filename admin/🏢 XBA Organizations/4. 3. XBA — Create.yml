info:
  name: 3. XBA ‚Äî Create
  type: http
  seq: 4
http:
  method: POST
  url: '{{base_url}}/admin/xba'
  body:
    type: multipartForm
    data:
    - name: name
      value: XBA Tashkent
    - name: brand_name
      value: XBA Tashkent MChJ
    - name: legal_name
      value: XBA Tashkent OOO
    - name: description
      value: Toshkent shahar XBA tashkiloti
    - name: license_number
      value: LIC-001-2026
    - name: region_id
      value: '10'
    - name: district_id
      value: '1001'
    - name: address
      value: Toshkent sh., Yunusobod tumani, Amir Temur ko'chasi 1
    - name: phone
      value: '+998941202200'
    - name: email
      value: info@xba-tashkent.uz
    - name: website_url
      value: https://xba-tashkent.uz
    - name: responsible_person
      value: Kamolbek Sardorov
    - name: login
      value: xba_tashkent
    - name: password
      value: secret123
    - name: telegram_url
      value: https://t.me/xba_tashkent
    - name: instagram_url
      value: https://instagram.com/xba_tashkent
    - name: facebook_url
      value: https://facebook.com/xba_tashkent
    - name: x_url
      value: https://x.com/xba_tashkent
    - name: is_active
      value: '1'
    - name: license_file
      type: file
      fileName: ''
    - name: logo
      type: file
      fileName: ''
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Yangi XBA tashkilotini yaratadi. `multipart/form-data` so'rov ‚Äî matn maydonlar + 2 ta fayl (`license_file`, `logo`).

  Service quyidagilarni bir DB tranzaksiyasida bajaradi:
  1. Yangi `User` (`TYPE_PARTNER`, `STATUS_ACTIVE`) yaratiladi ‚Äî `username = login`, `password_hash`.
  2. Fayllarni `@storage/web/source/organization/xba/{license,logo}/` ga saqlaydi.
  3. `organization` jadvalga `type = 1` bilan yozadi.

  **Auth:** `admin_token`.

  ### üì• Request Body (multipart/form-data)

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `name` | string | ‚úÖ | XBA nomi (max 200) |
  | `brand_name` | string | ‚ûñ | Brend nomi (max 200) |
  | `legal_name` | string | ‚ûñ | Yuridik nomi (max 200) |
  | `description` | string | ‚ûñ | Tashkilot haqida |
  | `license_number` | string | ‚úÖ | `type + license_number` unique (max 64) |
  | `region_id` | int | ‚úÖ | FK `region.id` ‚Äî viloyat |
  | `district_id` | int | ‚úÖ | FK `district.id` ‚Äî tuman |
  | `address` | string | ‚úÖ | Manzil (max 500) |
  | `phone` | string | ‚úÖ | Call-center raqami (max 20) |
  | `email` | string | ‚ûñ | Email |
  | `website_url` | string | ‚ûñ | URL (https sxema avtomatik qo'shiladi) |
  | `responsible_person` | string | ‚úÖ | Mas'ul shaxs F.I.SH. |
  | `login` | string | ‚úÖ | Min 3 belgi. Unique. |
  | `password` | string | ‚úÖ | Min 6 belgi |
  | `telegram_url` | string | ‚ûñ | URL |
  | `instagram_url` | string | ‚ûñ | URL |
  | `facebook_url` | string | ‚ûñ | URL |
  | `x_url` | string | ‚ûñ | URL |
  | `is_active` | bool (0\|1) | ‚ûñ | Default `1` |
  | `license_file` | file | ‚ûñ | pdf \| jpg \| png \| gif. Max 3.1 MB |
  | `logo` | file | ‚ûñ | jpg \| png \| gif. Max 3.1 MB |

  ### üìã Headers

  | Header | Required | Description |
  |---|:---:|---|
  | `Authorization` | ‚úÖ | `Bearer {{ _.admin_token }}` |

  ### üì§ Response

  `201` ‚Äî yaratilgan XBA `OrganizationOutputDTO` formatida.

  ### ‚öÝÔ∏è Errors

  | Code | Reason |
  |---|---|
  | `422` | Validatsiya xatosi (`license_number` band, `region_id`/`district_id` topilmadi, parol qisqa, fayl formati noto'g'ri va h.k.) |
  | `401` | Token yo'q yoki yaroqsiz |
  | `403` | Super-admin emas |

