info:
  name: 4. XBA — Update
  type: http
  seq: 5
http:
  method: POST
  url: '{{base_url}}/admin/xba/1'
  body:
    type: multipartForm
    data:
    - name: phone
      value: '+998941202299'
    - name: is_active
      value: '0'
  auth:
    mode: bearer
    bearer: '{{admin_token}}'
docs: |
  Mavjud XBA tashkilotini yangilaydi. `multipart/form-data` — faqat o'zgartirmoqchi bo'lgan maydonlarni yuborish kifoya.

  > PHP `PUT + multipart` cheklangani uchun update **`POST`** orqali amalga oshiriladi.

  Login/parol yuborilsa bog'langan `User` ham yangilanadi. Yangi fayl yuklanganda eski fayl storage'dan o'chiriladi.

  **Auth:** `admin_token`.

  ### 📥 Request Body (multipart/form-data)

  Barcha maydonlar **ixtiyoriy** (faqat o'zgaradiganlarini yuboring). To'liq ro'yxat — `Create` endpointidagi kabi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `404` | XBA topilmadi (yoki id boshqa partner turida) |
  | `422` | Validatsiya xatosi |

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
