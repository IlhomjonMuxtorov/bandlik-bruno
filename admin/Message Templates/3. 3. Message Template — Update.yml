info:
  name: 3. Message Template — Update
  type: http
  seq: 3
http:
  method: PUT
  url: '{{base_url}}/admin/message-templates/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"title_uz\": \"Rad etish\",\n  \"title_ru\": \"Отказ\",\n  \"title_en\": \"Rejection\",\n  \"body_uz\": \"Afsuski, arizangiz rad etildi.\",\n  \"body_ru\": \"К сожалению, ваша заявка отклонена.\",\n  \"body_en\": \"Unfortunately, your application has been rejected.\",\n  \"is_active\": true\n}"
  auth: inherit
docs: |
  Mavjud shablonni yangilaydi (URL'dagi `/<id>` bo'yicha). Barcha til maydonlari
  qayta yuboriladi.

  **Auth:** `admin_token` yoki shablon egasi (tashkilot mos kelishi shart).

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `title_uz` / `title_ru` / `title_en` | string | ✅ | Sarlavha (3 til) |
  | `body_uz` / `body_ru` / `body_en` | string | ✅ | Xabar matni (3 til) |
  | `is_active` | bool | ➖ | Faollik holati |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | Boshqa tashkilot shabloni |
  | `404` | Shablon topilmadi |
  | `422` | Validatsiya xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
