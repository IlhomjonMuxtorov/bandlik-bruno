info:
  name: 3. Message Template — Update
  type: http
  seq: 3
http:
  method: PUT
  url: '{{base_url}}/admin/message-templates/1'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"title_uz\": \"Rad etish\",\n  \"title_ru\": \"Отказ\",\n  \"title_en\": \"Rejection\",\n  \"body_uz\": \"Afsuski, arizangiz rad etildi.\",\n  \"body_ru\": \"К сожалению, ваша заявка отклонена.\",\n  \"body_en\": \"Unfortunately, your application has been rejected.\",\n  \"event\": \"application_rejected\",\n  \"is_active\": true\n}"
  auth: inherit
docs: |
  Mavjud shablonni yangilaydi (URL'dagi `/<id>` bo'yicha). Barcha til maydonlari
  qayta yuboriladi.

  **Auth:** `admin_token` yoki shablon egasi (tashkilot mos kelishi shart).

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `title_uz` / `title_ru` / `title_en` | string | ✅ | Sarlavha (3 til) |
  | `body_uz` / `body_ru` / `body_en` | string | ✅ | Xabar matni (3 til) |
  | `event` | string \| null | ➖ | Bog'langan tizim hodisasi (yoki `null`). Qiymatlar: `application_accepted` \| `application_rejected` \| `service_group_started` \| `service_group_completed` \| `service_group_confirmed` \| `service_group_rejected` \| `pipeline_completed` \| `payment_overdue` \| `offer_accepted` \| `offer_declined` \| `offer_funded`. |
  | `is_active` | bool | ➖ | Faollik holati |

  ### 🔔 Auto-reply (event bog'langanda)

  `event` + `is_active=true` bo'lsa, hodisa sodir bo'lganda shablon avtomatik
  chatga system-xabar + push sifatida yuboriladi. Shablon yo'q bo'lsa o'rnatilgan
  standart matn ishlatiladi. To'liq event/placeholder/`push kimga` jadvali
  **Create** endpointi `docs` ida. `body` ichidagi `{placeholder}` lar event bo'yicha:

  | Event | Placeholderlar |
  |---|---|
  | `application_accepted` | `{candidate_name}`, `{vacancy_title}` |
  | `application_rejected` | `{candidate_name}`, `{vacancy_title}`, `{rejection_reason}` |
  | `service_group_started` | `{candidate_name}`, `{vacancy_title}`, `{service_name}`, `{amount}`, `{currency}`, `{payment_deadline}` |
  | `service_group_completed` | `{candidate_name}`, `{vacancy_title}`, `{service_name}` |
  | `service_group_confirmed` | `{candidate_name}`, `{vacancy_title}`, `{service_name}` |
  | `service_group_rejected` | `{candidate_name}`, `{vacancy_title}`, `{service_name}`, `{rejection_reason}` |
  | `pipeline_completed` | `{candidate_name}`, `{vacancy_title}` |
  | `payment_overdue` | `{candidate_name}`, `{vacancy_title}`, `{service_name}`, `{amount}`, `{currency}`, `{payment_deadline}` |
  | `offer_accepted` / `offer_declined` / `offer_funded` | `{candidate_name}`, `{vacancy_title}` |

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | Boshqa tashkilot shabloni |
  | `404` | Shablon topilmadi |
  | `422` | Validatsiya xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
