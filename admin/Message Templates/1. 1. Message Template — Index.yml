info:
  name: 1. Message Template — Index
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/admin/message-templates'
  auth: inherit
docs: |
  Javob xabarlari shablonlari ro'yxati (sahifalangan). Har bir shablon 3 tilda
  (`uz` / `ru` / `en`) `title` va `body` saqlaydi.

  Admin barcha shablonlarni ko'radi; Partner/Employee faqat o'z tashkilotinikini.

  **Auth:** `admin_token` (Admin yoki org foydalanuvchi).

  ### 🔎 Query Parameters

  | Param | Type | Required | Description |
  |---|---|:---:|---|
  | `page` | int | ➖ | Sahifa raqami (default `1`) |
  | `page_size` | int | ➖ | Sahifadagi soni (default `20`) |

  ### 📤 Response (`data.items[]`)

  | Field | Type | Description |
  |---|---|---|
  | `id` | int | Shablon ID |
  | `organization_id` / `organization_name` | int\|string | Tashkilot |
  | `title` | object | `{ "uz": "...", "ru": "...", "en": "..." }` |
  | `title_localized` | string | Joriy til (`Accept-Language`, fallback `uz`) |
  | `body` | object | `{ "uz": "...", "ru": "...", "en": "..." }` |
  | `body_localized` | string | Joriy til (`Accept-Language`, fallback `uz`) |
  | `event` | string \| null | Bog'langan tizim hodisasi (`application_accepted` \| `application_rejected` \| `service_group_started` \| `payment_overdue` \| `service_stage_started` \| `service_stage_completed`) yoki `null` |
  | `event_label` | string \| null | `event` ning tarjima qilingan nomi (`Accept-Language`); `event` `null` bo'lsa `null` |
  | `is_active` | bool | Faollik holati |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
