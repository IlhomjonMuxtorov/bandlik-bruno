info:
  name: 2. Message Template ‚Äî Create
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/admin/message-templates'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"title_uz\": \"Hujjat yetarli emas\",\n  \"title_ru\": \"–î–æ–∫—É–º–µ–Ω—Ç—ã –Ω–µ–¥–æ—Å—Ç–∞—Ç–æ—á–Ω—ã\",\n  \"title_en\": \"Documents insufficient\",\n  \"body_uz\": \"Siz yuborgan hujjatlar yetarli emas. Iltimos, to'liq to'plamni qayta yuboring.\",\n  \"body_ru\": \"–û—Ç–ø—Ä–∞–≤–ª–µ–Ω–Ω—ã–µ –≤–∞–º–∏ –¥–æ–∫—É–º–µ–Ω—Ç—ã –Ω–µ–¥–æ—Å—Ç–∞—Ç–æ—á–Ω—ã. –ü–æ–∂–∞–ª—É–π—Å—Ç–∞, –æ—Ç–ø—Ä–∞–≤—å—Ç–µ –ø–æ–ª–Ω—ã–π –∫–æ–º–ø–ª–µ–∫—Ç.\",\n  \"body_en\": \"The documents you submitted are insufficient. Please resend the full set.\",\n  \"event\": \"application_rejected\",\n  \"is_active\": true\n}"
  auth: inherit
docs: |
  Yangi javob xabari shablonini yaratadi. `title` va `body` 3 tilda alohida
  maydonlar sifatida yuboriladi va backendda `{uz, ru, en}` JSON sifatida saqlanadi.

  **Auth:** `admin_token` yoki org foydalanuvchi (faqat o'z `organization_id` uchun).

  ### üì• Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ‚úÖ | Tashkilot ID |
  | `title_uz` / `title_ru` / `title_en` | string | ‚úÖ | Sarlavha (3 til) |
  | `body_uz` / `body_ru` / `body_en` | string | ‚úÖ | Xabar matni (3 til) |
  | `event` | string \| null | ‚ûñ | Bog'langan tizim hodisasi. `null` = erkin/manual shablon. Qiymatlar: `application_accepted` \| `application_rejected` \| `service_group_started` \| `service_group_completed` \| `service_group_confirmed` \| `service_group_rejected` \| `pipeline_completed` \| `payment_overdue` \| `offer_accepted` \| `offer_declined` \| `offer_funded`. |
  | `is_active` | bool | ‚ûñ | Default `true` |

  ### üîî Auto-reply (event bog'langanda)

  `event` to'ldirilgan va `is_active=true` bo'lsa, o'sha hodisa sodir bo'lganda
  shablon **avtomatik** chat thread'iga system-xabar sifatida yoziladi va push
  notification yuboriladi (nomzod tilida ‚Äî qurilma tili, fallback `uz`). `body`
  ichida quyidagi `{placeholder}` lar ishlatilishi mumkin (almashtiriladi):

  | Event | Placeholderlar | Push kimga |
  |---|---|---|
  | `application_accepted` | `{candidate_name}`, `{vacancy_title}` | nomzod + XBA |
  | `application_rejected` | `{candidate_name}`, `{vacancy_title}`, `{rejection_reason}` | nomzod + XBA |
  | `service_group_started` | `{candidate_name}`, `{vacancy_title}`, `{service_name}`, `{amount}`, `{currency}`, `{payment_deadline}` | nomzod + XBA |
  | `service_group_completed` | `{candidate_name}`, `{vacancy_title}`, `{service_name}` | faqat XBA |
  | `service_group_confirmed` | `{candidate_name}`, `{vacancy_title}`, `{service_name}` | nomzod + XBA |
  | `service_group_rejected` | `{candidate_name}`, `{vacancy_title}`, `{service_name}`, `{rejection_reason}` | faqat XBA |
  | `pipeline_completed` | `{candidate_name}`, `{vacancy_title}` | nomzod + XBA |
  | `payment_overdue` | `{candidate_name}`, `{vacancy_title}`, `{service_name}`, `{amount}`, `{currency}`, `{payment_deadline}` | nomzod + XBA |
  | `offer_accepted` | `{candidate_name}`, `{vacancy_title}` | faqat XBA |
  | `offer_declined` | `{candidate_name}`, `{vacancy_title}` | faqat XBA |
  | `offer_funded` | `{candidate_name}`, `{vacancy_title}` | faqat XBA |

  > **Standart matn (default).** Tashkilotda mos faol shablon bo'lmasa ham xabar
  > **har doim** yuboriladi ‚Äî o'rnatilgan i18n standart matn ishlatiladi. Shablon
  > qo'yilsa, uning matni standart matn o'rnini bosadi.
  >
  > **Push kimga.** System-xabar har doim umumiy chat tasmasida ikkala tomonga
  > ko'rinadi; "Push kimga" ustuni faqat push notification kimga yuborilishini
  > bildiradi (admin-ichki va nomzod amallari nomzodga push qilmaydi).
  >
  > Eski `service_stage_started` / `service_stage_completed` event'lari
  > **eskirgan** (815aa95 refaktoridan keyin ishlatilmaydi) ‚Äî yangi
  > `service_group_*` event'larini ishlating.

  ### ‚öÝÔ∏è Errors

  | Code | Reason |
  |---|---|
  | `403` | Org foydalanuvchi boshqa tashkilot uchun yaratmoqchi |
  | `422` | Validatsiya xatosi |
