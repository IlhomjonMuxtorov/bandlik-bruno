info:
  name: 2. Message Template — Create
  type: http
  seq: 2
http:
  method: POST
  url: '{{base_url}}/admin/message-templates'
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: "{\n  \"organization_id\": 1,\n  \"title_uz\": \"Hujjat yetarli emas\",\n  \"title_ru\": \"Документы недостаточны\",\n  \"title_en\": \"Documents insufficient\",\n  \"body_uz\": \"Siz yuborgan hujjatlar yetarli emas. Iltimos, to'liq to'plamni qayta yuboring.\",\n  \"body_ru\": \"Отправленные вами документы недостаточны. Пожалуйста, отправьте полный комплект.\",\n  \"body_en\": \"The documents you submitted are insufficient. Please resend the full set.\",\n  \"event\": \"application_rejected\",\n  \"is_active\": true\n}"
  auth: inherit
docs: |
  Yangi javob xabari shablonini yaratadi. `title` va `body` 3 tilda alohida
  maydonlar sifatida yuboriladi va backendda `{uz, ru, en}` JSON sifatida saqlanadi.

  **Auth:** `admin_token` yoki org foydalanuvchi (faqat o'z `organization_id` uchun).

  ### 📥 Request Body

  | Field | Type | Required | Description |
  |---|---|:---:|---|
  | `organization_id` | int | ✅ | Tashkilot ID |
  | `title_uz` / `title_ru` / `title_en` | string | ✅ | Sarlavha (3 til) |
  | `body_uz` / `body_ru` / `body_en` | string | ✅ | Xabar matni (3 til) |
  | `event` | string \| null | ➖ | Bog'langan tizim hodisasi. `null` = erkin/manual shablon. Qiymatlar: `application_accepted` \| `application_rejected` \| `service_group_started` \| `payment_overdue` \| `service_stage_started` \| `service_stage_completed`. |
  | `is_active` | bool | ➖ | Default `true` |

  ### 🔔 Auto-reply (event bog'langanda)

  `event` to'ldirilgan va `is_active=true` bo'lsa, o'sha hodisa sodir bo'lganda
  shablon **avtomatik** nomzod bilan chat thread'iga xabar sifatida yuboriladi
  (nomzod tilida — qurilma tili, fallback `uz`). `body` ichida quyidagi
  `{placeholder}` lar ishlatilishi mumkin (almashtiriladi):

  | Event | Placeholderlar |
  |---|---|
  | `application_accepted` | `{candidate_name}`, `{vacancy_title}` |
  | `application_rejected` | `{candidate_name}`, `{vacancy_title}`, `{rejection_reason}` |
  | `service_group_started` | `{candidate_name}`, `{vacancy_title}`, `{stage_category}`, `{payment_deadline}` |
  | `service_stage_started` | `{candidate_name}`, `{vacancy_title}`, `{stage_category}`, `{deadline}` |
  | `service_stage_completed` | `{candidate_name}`, `{vacancy_title}`, `{stage_category}` |
  | `payment_overdue` | `{candidate_name}`, `{vacancy_title}`, `{stage_category}`, `{amount}`, `{payment_deadline}` |

  > `service_stage_started` va `payment_overdue` xabarlari **faqat** mos faol
  > shablon mavjud bo'lganda yuboriladi. Qolgan event'larda system xabar har doim
  > ketadi; shablon faqat uning matnini (`body`) boyitadi.

  ### ⚠️ Errors

  | Code | Reason |
  |---|---|
  | `403` | Org foydalanuvchi boshqa tashkilot uchun yaratmoqchi |
  | `422` | Validatsiya xatosi |
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
