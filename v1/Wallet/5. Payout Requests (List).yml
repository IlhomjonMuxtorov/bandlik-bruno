info:
  name: 5. Payout Requests (List)
  type: http
  seq: 5
http:
  method: GET
  url: '{{base_url}}/v1/wallet/payout-requests?per-page=20'
  auth: inherit
docs: 'Partner tashkilot tomonidan yuborilgan barcha payout so''rovlari ro''yxati,
  status bo''yicha filtrlash mumkin.


  > **Breaking change:** `amount` endi **so''m**da (valyutaga mos major unit) qaytadi
  — avval tiyinda edi (1 so''m = 100 tiyin). DB tiyinda saqlaydi, backend chegarada
  konvertatsiya qiladi.


  **Status kodlari:**


  | Status | Label |

  |---|---|

  | 1 | Pending |

  | 2 | Approved |

  | 3 | Rejected |

  | 4 | Processing |

  | 5 | Completed |

  | 6 | Failed |


  **Auth:** `partner_token`.


  ### 🔎 Query Params


  | Param | Type | Description |

  |---|---|---|

  | `per-page` | int | 1..100 |

  | `page` | int | 1+ |

  | `sort` | string | `id`, `created_at`, `amount` |


  ### 📤 Response


  ```json

  {

    "items": [

      {

        "id": 17,

        "organization_id": 3,

        "amount": 500000,

        "currency": "UZS",

        "status": 5,

        "status_label": "Completed",

        "bank_details": { "bank_name": "Asaka Bank", "account": "...", "external_ref":
  "BK-2026-05-25-9817" },

        "note": "May oyi uchun payout",

        "reject_reason": null,

        "approved_by": 1,

        "approved_at": 1735650000,

        "completed_at": 1735653600,

        "transaction_id": 412,

        "created_at": 1735647500

      }

    ],

    "pagination": { "page": 1, "page_size": 20, "total_count": 3, "page_count": 1 }

  }

  ```


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Foydalanuvchi birorta tashkilotga biriktirilmagan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
