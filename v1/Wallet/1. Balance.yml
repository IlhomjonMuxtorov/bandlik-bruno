info:
  name: 1. Balance
  type: http
  seq: 1
http:
  method: GET
  url: '{{base_url}}/v1/wallet/balance'
  auth: inherit
docs: 'Partner tashkilotning wallet balansi (UZS, USD, EUR — har valyuta uchun alohida
  row). `available = balance - hold_balance` — payout uchun yechib olish mumkin bo''lgan
  summa.


  **Auth:** `partner_token` (bearer). Token ortidagi `User` `OrganizationEmployee.is_active=true`
  bilan birorta tashkilotga biriktirilgan bo''lishi shart.


  ### 📤 Response


  ```json

  {

    "data": [

      {

        "id": 11,

        "owner_type": "organization",

        "owner_id": 3,

        "currency": "UZS",

        "balance": 5400000,

        "hold_balance": 1000000,

        "available": 4400000,

        "is_active": true

      },

      {

        "id": 12,

        "owner_type": "organization",

        "owner_id": 3,

        "currency": "USD",

        "balance": 0,

        "hold_balance": 0,

        "available": 0,

        "is_active": true

      }

    ]

  }

  ```


  Agar tashkilotda hali to''lov olinmagan bo''lsa, list bo''sh bo''lishi mumkin —
  wallet faqat birinchi credit kelganda yaratiladi (`WalletService::ensureOrganization`).


  ### ⚠️ Errors


  | Code | Reason |

  |---|---|

  | `401` | Token yo''q |

  | `403` | Foydalanuvchi birorta tashkilotga biriktirilmagan |

  '
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
