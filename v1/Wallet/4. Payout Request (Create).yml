  | `currency` | string | âž– | Faqat `UZS` (default `UZS`). Boshqa valyuta yuborilsa
  `422`. |

  | `bank_details` | object | âś… | Bank rekvizitlari (free-form jsonb). Kamida `account`
  bo''lishi tavsiya etiladi |

